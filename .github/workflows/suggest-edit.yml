name: Suggest an edit → PR

# The contribution front door. A "Suggest an edit" Issue Form submission is turned into a
# validated pull request by this Action — no external service and no stored secret: the
# Action commits with the built-in GITHUB_TOKEN and runs validate.py inline, so the PR is
# born already-valid. A maintainer reviews and merges on GitHub. Contributors need only a
# GitHub account (to file the issue); no YAML or Git knowledge.
# See .github/scripts/apply_suggested_edit.py and etymon_edit.py.
on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  suggest-edit:
    # Only act on submissions from the Suggest-an-edit form. We key off the form's field
    # heading rather than a label, so the pipeline never depends on a label existing.
    if: contains(github.event.issue.body, '### Etymon number')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml

      - name: Apply the suggested edit
        id: apply
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        run: python3 .github/scripts/apply_suggested_edit.py

      - name: Comment on a rejected or no-op suggestion
        if: steps.apply.outputs.status != 'applied'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE: ${{ github.event.issue.number }}
          REASON: ${{ steps.apply.outputs.reason }}
        run: |
          gh issue comment "$ISSUE" --body "🤖 I couldn't open a pull request for this suggestion: $REASON

          Open a new suggestion (or edit this one and resubmit) and I'll try again."
          gh issue edit "$ISSUE" --add-label "needs-revision" 2>/dev/null || true

      - name: Validate the dataset
        id: validate
        if: steps.apply.outputs.status == 'applied'
        continue-on-error: true
        run: python3 validate.py 2>&1 | tee validate.out

      - name: Comment on a validation failure
        if: steps.apply.outputs.status == 'applied' && steps.validate.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE: ${{ github.event.issue.number }}
          TAG: ${{ steps.apply.outputs.tag }}
        run: |
          {
            echo "🤖 Your suggested change to etymon #$TAG didn't pass the data-integrity checks, so I didn't open a pull request:"
            echo
            echo '```'
            awk '/^ERRORS:/{p=1} p' validate.out | head -40
            echo '```'
            echo
            echo "Open a new suggestion with a fix and I'll retry."
          } > comment.md
          gh issue comment "$ISSUE" --body-file comment.md
          gh issue edit "$ISSUE" --add-label "needs-revision" 2>/dev/null || true

      - name: Open the pull request
        if: steps.apply.outputs.status == 'applied' && steps.validate.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE: ${{ github.event.issue.number }}
          TAG: ${{ steps.apply.outputs.tag }}
        run: |
          branch="suggest-edit/issue-${ISSUE}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add "data/etyma/${TAG}.yaml"
          git commit -m "Suggested edit to etymon #${TAG} (from #${ISSUE})"
          git push -u origin "$branch"
          url=$(gh pr create --base main --head "$branch" \
            --title "Suggested edit to etymon #${TAG}" \
            --body-file pr_body.md)
          gh pr edit "$url" --add-label "suggested-edit" 2>/dev/null || true
          gh issue comment "$ISSUE" --body "🤖 Thanks! I opened $url with your change — a maintainer will review it. Nothing on the site changes until it's merged."
