name: Deploy preview to GitHub Pages

# Static-first build: data/ → stedt.sqlite → prerendered HTML pages + a lean search.sqlite3
# queried in-browser via WASM SQLite (sql.js-httpvfs over HTTP range requests). No runtime
# server, no Pagefind. Publishes to GitHub Pages.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install .
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Compile data/ into stedt.sqlite
        run: stedt build
      - name: Build the lean search.sqlite3 (FTS5)
        run: stedt search-db
      - name: Prerender the static site (+ copy search.sqlite3)
        run: stedt render
      - name: Bundle the client search (WASM SQLite)
        run: npm run build:search
      # /_legacy/ — pixel-faithful rootcanal clone (separate subtree; writes only under site/_legacy,
      # so these must run AFTER `stedt render`, which rmtrees + builds site/).
      - name: Build the legacy search DB (rootcanal columns + FTS5)
        run: stedt legacy search-db
      - name: Prerender the /_legacy/ rootcanal clone
        run: stedt legacy render
      - name: Bundle the legacy data-plane shim (WASM SQLite)
        run: npm run build:legacy
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
