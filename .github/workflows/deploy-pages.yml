name: Deploy preview to GitHub Pages

# Static-first build: data/ → stedt.sqlite → prerendered HTML pages + a lean search.sqlite3
# queried in-browser via WASM SQLite (sql.js-httpvfs over HTTP range requests). No runtime
# server, no Pagefind. Publishes to GitHub Pages.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install .
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install JS build deps
        run: stedt setup
      - name: Compile data/ into stedt.sqlite
        run: stedt build db
      - name: Build the lean search.sqlite3 (FTS5)
        run: stedt build search-db
      - name: Prerender the static site (+ copy search.sqlite3)
        run: stedt build render
      - name: Bundle the client JS (search data layer + page scripts)
        run: stedt build bundle
      # /_legacy/ — pixel-faithful rootcanal clone; writes only under site/_legacy, so it must run
      # AFTER `stedt build render` (which rmtrees + builds site/). build legacy = DB + pages + shim.
      - name: Build the /_legacy/ rootcanal clone
        run: stedt build legacy
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
