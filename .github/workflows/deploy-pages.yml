name: Deploy preview to GitHub Pages

# Static-first build: data/ → stedt.sqlite → prerendered HTML pages + a lean search.sqlite3
# queried in-browser via WASM SQLite (sql.js-httpvfs over HTTP range requests). No runtime
# server, no Pagefind. Publishes to GitHub Pages.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Build SQLite from data/
        run: python3 build_from_files.py
      - name: Build the lean search.sqlite3 (FTS5)
        run: python3 build_search_db.py
      - name: Prerender static site (+ copy search.sqlite3)
        run: python3 build_static.py
      - name: Bundle the client search (WASM SQLite)
        run: npm run build:search
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
