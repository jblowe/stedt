name: validate

# Gate every contribution on referential integrity of the data/ source files.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install .
      # the render-invariant section of validate needs the compiled DB; building it
      # here makes this workflow assert the same contract the deploy gate does
      - name: Compile data/ into stedt.sqlite
        run: stedt build db
      - name: Validate data/ integrity + render invariants
        run: stedt validate
