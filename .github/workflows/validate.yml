name: validate

# Gate every contribution on referential integrity of the data/ source files.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install .
      - name: Validate data/ integrity
        run: stedt validate
