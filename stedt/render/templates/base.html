<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="{{ desc }}">
<meta property="og:title" content="{{ title }} · STEDT"><meta property="og:description" content="{{ desc }}"><meta property="og:site_name" content="STEDT">
<title>{{ title }} · STEDT</title>
<link rel="icon" href="data:,">
<link rel="preload" href="/static/fonts/CharisSIL-Regular.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/static/fonts/Fraunces-latin.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="/static/site.css?v={{ css_ver }}"></head><body>
<a class="skip" href="#main">Skip to content</a>
<div class="top"></div>
<header class="mast">
  <div class="brand">
    <span class="wm"><a href="/">STEDT</a></span>
    <span class="sub">Sino-Tibetan Etymological Dictionary &amp; Thesaurus</span>
  </div>
  <nav class="main">{% for key, href, label in nav_items %}<a href="{{ href }}"{% if nav == key %} class="active"{% endif %}>{{ label }}</a>{% endfor %}</nav>
  <form class="hsearch" action="/search" method="get"><input name="q" aria-label="Search STEDT" placeholder="search…" value="{{ q }}" autocomplete="off"></form>
</header>
<main id="main">{{ body }}</main>
<footer>Preview interface for STEDT · <a href="https://github.com/larc-iu/stedt">github.com/larc-iu/stedt</a> · <a href="/_legacy/" rel="nofollow">Legacy interface</a></footer>
<script src="/static/site.js?v={{ js_ver }}"></script>
<script type="module" src="/assets/stedt-search.js"></script>
</body></html>
