
    <div class="ety-head">
      <h1 class="pagetitle">Reconstructions</h1>
      <div class="metabar"><span><b>{{ total }}</b> etyma</span><span>ordered by gloss</span></div>
    </div>
    <div class="rbar">
      <input id="rfilter" type="search" aria-label="Filter reconstructions" placeholder="Filter by form, gloss, group, or tag…" autocomplete="off">

    <script id="recon-data" type="application/json">{{ payload }}</script>
    <script type="module" src="/assets/reconstructions.js"></script>
