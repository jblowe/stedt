[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "stedt"
version = "0.1.0"
description = "Build tooling and page renderer for the STEDT static site"
requires-python = ">=3.11"
dependencies = ["pyyaml", "jinja2", "typer"]

[project.scripts]
stedt = "stedt.cli:app"

[tool.setuptools.packages.find]
include = ["stedt*"]

[tool.setuptools.package-data]
"stedt.render" = ["templates/*.html"]
