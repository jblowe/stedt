  text: '<par><latinform>lii</latinform> appears in the words for various breeding animals in Galo:  <latinform>ho◦lii</latinform>
    &apos;breeding mithun&apos;, <latinform>rog◦lii</latinform> &apos;breeding fowl&apos;, <latinform>rəg◦lii</latinform>
    &apos;breeding pig&apos;, <latinform>bin◦lii</latinform> &apos;breeding goat&apos;, <latinform>jab◦lii</latinform>
    &apos;breeding duck&apos;, and <latinform>ə◦lii</latinform> &apos;breeding cow&apos;.  It also appears
    in <latinform>a◦lii</latinform>, which has a number of apparently related glosses: &quot;heritage&quot;,
    &quot;clan&quot;, &quot;seed (heirloom)&quot;, &quot;seed&quot;, &quot;lineage&quot;, and &quot;breeder&quot;.
    lii also appears in the compounds <latinform>lii◦luk</latinform> &quot;reborn&quot;, <latinform>lii◦nam</latinform>
    &quot;fruit (v.i.)&quot;, <latinform>lii◦nam</latinform> &quot;propagate&quot;.  <latinform>-lii</latinform>
    is glossed as &quot;new (adj.)&quot;; this may be related to the morpheme that appears in the words
    for breeding animals.  <latinform>lii</latinform> also appears in various words for easily spread
    diseases:  <latinform>ci◦lii-ram◦lii</latinform> &quot;epidemic&quot;, &quot;virus&quot;, <latinform>hi◦lii</latinform>
    &quot;plague&quot;,<latinform>buu◦lii</latinform> &quot;plague (of rats)&quot;, <latinform>rɨ◦lii</latinform>
    &quot;plague&quot;, &quot;communicable disease&quot;, &quot;epidemic&quot; ; this may be related to
    the &quot;propagate&quot; sense of <latinform>lii</latinform>. [Liberty Lidz]</par>'
