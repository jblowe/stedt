  type: T
  text: <par>The second syllable of Lahu &apos;mouth&apos; occurs in several other words <latinform>làʔ=tɔ-qɔ</latinform>
    &apos;palm of the hand&apos;, <latinform>mə̂-<emph>qɔ</emph></latinform> &apos;lip&apos;, <latinform>mû-lɔ̀ʔ-qɔ</latinform>
    &apos;daytime; afternoon&apos;, and is glossed &apos;noun formative of elusive meaning&apos;. For
    now, however, we are assigning it to the present root.</par>
- rn: 192654
  type: I
  text: <par>The initial of the second syllable is apparently a rhotacism from d-; cf. Ganan <latinform>kr̀dblquote
    adɔʔ⁴</latinform> ‘neck’ (164268).</par>
- rn: 192707
  type: I
  text: <par>Note that it is probably not plausible to tag this form differently from the Geman form <latinform>go³¹ɹoŋ³⁵</latinform>
    (39873), which has been tagged as a monomorphemic form 489.</par>
- rn: 192783
  type: I
  text: <par>For alternative etymologies, see STC notes 102, 109, 137. The Jingpho word for ‘hand’ (<latinform>lətáʔ</latinform>
    in the STC’ s notation) may be monomorphemically from *lak or *glak.</par>
