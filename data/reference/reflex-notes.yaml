- rn: 284221
  type: I
  text: <par>The syllabic nasals in the Nesu and Noesu compounds are possibly developments from a previous
    w‑ or zero initial. A similar, though opposite development can be seen e.g. in the correspondence
    of Cantonese initial ŋ‑ and Mandarin w‑ (e.g. Cantonese ‘five’ and 1st.pro vs. Mandarin ‘five’ and
    1st.pro).</par>
