- rn: 236080
  type: I
  text: <par>Note the similarity between this form and 127492 &apos;back of hand&apos; which both have
    the same first syllable; in the latter it looks like *lak HAND; but that seems inappropriate here.
    The prefix is very common in Phunoi body part words; in most of those it seems to mean ‘arm’ or ‘hand’
    , but not in all (cf. ‘nostril’ ; ‘tendon’ ; etc.).</par>
