- rn: 341236
  type: I
  text: '<par>&apos;kru&apos; appears in a number of words for female animals: belleig-kru &quot;sow&quot;;  kuak-kru
    &quot;bitch&quot;; ma:bi kru &quot;she-goat&quot;; ma:cu-kru &quot;doe&quot;; ma:◦bi-kru &quot;goat
    (she)&quot;; and tyu-kru &quot;hen&quot;. Note, however, that a:◦shya:-kru &quot;mithun (cow)&quot;
    and klembab kru &quot;duck&quot; contain this morpheme and yet are not glossed as being female.</par>'
