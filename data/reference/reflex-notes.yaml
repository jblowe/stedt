- rn: 193082
  type: T
  text: <par>This form is also cited in DL:852 as <latinform>pɛ̀-pɨ</latinform> ‘crop of bird; (human)
    breast, chest’. It is co-allofamic with <latinform>pɛ̀-pì(-qu)</latinform> ‘chicken’s breast’ (cf.
    also <latinform>pɛ̀-qu</latinform> ‘goiter’).</par>
- rn: 193101
  type: I
  text: <par>Either of the last two syllables could be assigned to etymon 288 <reconstruction>*b-raŋ</reconstruction>
    CHEST (cf. Qiang (Mawo) <latinform>ɹu qʰuaʴ</latinform> ‘chest’ ; Qiang (Taoping) <latinform>ʐu⁵⁵dzɿ³³qə³³</latinform>
    ‘chest’ ). The final syllable could also be assigned to 299 *t(s)u CHEST, if we allow an allofam with
    nasal final *t(s)u-N; it could also be assigned to 1276 <reconstruction>*kruːŋ CAGE/CHEST</reconstruction>,
    cf. Tujia <latinform>li⁵⁵kho⁵⁵tshoŋ⁵⁵</latinform>, <latinform>li⁵⁵ kʰo⁵⁵ tsʰũ⁵⁵</latinform> ‘chest’
    .</par>
- rn: 193107
  type: I
  text: <par>First syllable is probably &lt; Mand. Chinese <latinform>xiōng</latinform> ‘chest’ .</par>
- rn: 193152
  type: I
  text: <par>The first syllable <latinform>ʁua⁵⁵</latinform> may be descended from etymon 213 *r-gyap,
    but note that <latinform>dʑo³³lɑ³⁵</latinform> &apos;back&apos; (182646) has the first syllable tagged
    213. Cf. also 130978, which is the same Shixing form.</par>
- rn: 193198
  type: T
  text: <par>This form is rather arbitrarily assigned to this set, rather than to <xref ref="3586">#3586</xref>.</par>
- rn: 193314
  type: I
  text: <par>This is perhaps just a straight borrowing from Chinese <latinform>yèmdash aogǎn</latinform>
    &apos;waist, trunk, torso&apos;.</par>
- rn: 193329
