- rn: 194311
  type: T
  text: '<par>Maru final <latinform>-k</latinform> is secondary; <latinform>-uk</latinform> is the regular
    Maru reflex of <reconstruction>*-əw</reconstruction>, as first noted in the original version of STC
    (p. 60 in the published version, 1972) and for the first time in print by Burling 1966 (<emph>Language</emph>
    42.3). Thus this form is not to be referred to the stop-finalled allofam <xref ref="259">#259</xref>.
    Burling&apos;s correct observation about the secondariness of the velar stop in the Maru rhyme <latinform>-uk</latinform>
    (which is paralleled by the secondary <latinform>-t</latinform> in Maru <latinform>-it</latinform>
    &lt; PTB <reconstruction>*-əy</reconstruction>), was attacked by Roy Andrew Miller &quot;Once again,
    the Maru final stops&quot; (1968 paper presented at ICSTLL #1, Yale University). This attack was in
    turn refuted in STC, in the new note 193 (added in 1972).</par>'
