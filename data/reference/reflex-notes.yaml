- rn: 78269
  type: T
  text: '<par>It looks superficially as though the last syllable of this Chang form goes with <xref ref="288">#288</xref>,
    but since <latinform>-laŋ</latinform> appears as a formative in several rounded bodyparts, we assign
    this syllable to <xref ref="2045">#2045</xref>, following French 1983: 540.</par>'
- rn: 78271
  type: I
  text: '<par>The second syllable of this Chang form is referred by W. T. French (1983: 540) to PNN <reconstruction>*C-ruŋ</reconstruction>
    &apos;round (of body parts)&apos;. This binome is thus not a dimidiation of a sesquisyllabic combination
    of prefixal <reconstruction>*t-</reconstruction> plus root-initial <reconstruction>*l-</reconstruction>
    (as in Lepcha). Besides no final <latinform>-ŋ</latinform> occurs anywhere else in the set.</par>'
- rn: 78457
