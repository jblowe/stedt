    this word with what sounds like an ordinary [<latinform>s</latinform>]. In general, PTB <reconstruction>*s-</reconstruction>
    &gt; Proto-Chin <reconstruction>*t(h)-</reconstruction>, while PTB <reconstruction>*ts-</reconstruction>
    &gt; Proto-Chin <reconstruction>*s-</reconstruction>.</par>
