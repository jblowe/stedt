  text: '<par>A Lalung subtlety should be noted: the first elements of <latinform>tu-dar</latinform> &apos;penis&apos;
    and <latinform>tu ki ku-thi</latinform> &apos;testicle&apos; are to be assigned to <xref ref="3420">#3420</xref>;
    on the other hand, the first element of Lalung <latinform>tu-di</latinform> &apos;egg&apos; is from
    <xref ref="1604">#1604</xref> &apos;bird&apos;. This is somewhat confusing, since <xref ref="300">#300</xref>
    sometimes means &apos;testicle&apos; rather than &apos;egg&apos;.</par>'
