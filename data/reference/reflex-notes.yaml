- rn: 283516
  type: I
  text: <par>The stopped tone in the second syllable is unexplained. Note, however, the final <latinform>-q</latinform>
    in some Qiang forms. Akha <latinform>a˯loe˯</latinform> has been tentatively assigned to <xref ref="1154">#1154</xref>,
    below.</par>
