    Er. <latinform>bu⁵⁵</latinform>/Lz. (Mianning) <latinform>`du</latinform> &apos;plow&apos;; Er. <latinform>jɑ³³bu⁵⁵</latinform>/Lz.
    <latinform>`ʒduʒdu</latinform> &apos;thick&apos;; Er. <latinform>bu⁵⁵tʂhɛ⁵⁵</latinform>/Lz. <latinform>dʐu⁵³tʂhɯ³¹</latinform>
    &apos;year&apos;; and Er. <latinform>bu⁵⁵phɑ⁵⁵</latinform>/Lz. (Mianning) <latinform>dʑypʰæ</latinform>  &apos;stomach&apos;.
