- rn: 296545
  type: T
  text: <par>The cognacy of WT <latinform>śa</latinform> is not certain, since WT does preserve final
    <reconstruction>*-l</reconstruction>. The first syllable is homophonous with <latinform>śa</latinform>
    (&lt; <xref ref="34">#34</xref>), though Jäschke (p.556) does not include it under that lemma, evidently
    considering it to be a separate morpheme. The Newar form <latinform>saː</latinform> &apos;placenta&apos;
    apparently means &quot;house&quot;, but Newar <latinform>swa̩</latinform> &apos;nest&apos; seems to
    be a genuine reflex of <reconstruction>*tsywal</reconstruction>.</par>
