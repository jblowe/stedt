- rn: 338486
  type: T
  text: <par>Kanauri regularly develops a cluster <latinform>st-</latinform> from the PTB sequence <latinform>*sn-</latinform>,
    see HPTB:103. The <latinform>-i-</latinform> vocalism of Kanauri <latinform>ṣṭiṅ</latinform> is probably
    explicable in terms of the widespread TB variational pattern of <latinform>*-u- ⪤ -i-</latinform>,
    cf. HPTB:493-505.</par>
