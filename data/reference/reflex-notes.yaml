  text: <par>Cf. Lyuzu <latinform>nbo³³ly⁵³</latinform> &apos;kidney&apos;. Both <latinform>lu̵⁵³</latinform>
    and <latinform>ly⁵³</latinform> are probably &lt; <reconstruction>*lum</reconstruction>.</par>
