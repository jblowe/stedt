  text: <par>In Hakha Lai there is a little difference between  <latinform>thlaak</latinform> and <latinform>thlaʔ</latinform>.  <latinform>thlaak</latinform>
    is used when the descendant reflects the source (e.g. <latinform>ʔa-pâa thlaak</latinform> &apos;image
    of his father&apos;) whereas <latinform>thlaʔ</latinform> is used when the existence of the descendant
    is caused by the source (e.g. <latinform>ʔa-pâa thlaʔ</latinform> &apos;the father’s descendant&apos;)
    (VanBik 2009:299).</par>
