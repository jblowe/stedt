    further justifying the treatment of <reconstruction>*s-lay</reconstruction> and <reconstruction>*s-tay</reconstruction>
    as co-allofams of the same etymon.</par>
- rn: 29562
  type: T
  text: <par>For now we are including this Abor-Miri form for &apos;self&apos; with zero-initial in this
    set, along with several zero-initial forms meaning &apos;I/me&apos; from Naga languages. One can imagine
    a scenario whereby the <reconstruction>*s-l</reconstruction> cluster became a voiceless lateral <reconstruction>*hl-</reconstruction>,
    thence a plain <reconstruction>*h-</reconstruction>, then zero. (Such was the fate, e.g. of the voiceless
    PLB resonants <reconstruction>*hl-</reconstruction>, <reconstruction>*hr-</reconstruction>, <reconstruction>*hy-</reconstruction>,
    which all became <latinform>h-</latinform> in Lahu. Cf. also the Tangkhul reflexes in <latinform>h-</latinform>.)</par>
