- rn: 188630
  type: I
  text: <par>The first syllable of WT <latinform>sgo-pur</latinform> &apos;foreskin (vulg.)&apos; does
    not appear to descend from this etymon, but seems rather to mean &apos;door; aperture, outlet&apos;.
    However, Jäschke does not include this under compounds with <latinform>sgo</latinform> &apos;door&apos;
    (114-6), but rather lists it as a separate head-entry (p. 116). The meaning of the second syllable
    <latinform>-pur</latinform> is unclear, though there might be a connection with <latinform>ḥp&apos;ur-ba</latinform>
    &apos;wrap up, envelop&apos;.</par>
- rn: 188638
