- rn: 514634
  type: T
  text: <par>WT <latinform>dpun̊-pa rkan̊</latinform> also means &apos;upper arm&apos;, but is to be analyzed
    as &quot;shoulder&apos;s leg&quot; (<latinform>dpun̊-pa</latinform> &apos;shoulder&apos;). Perhaps
    the girth of the upper arm reminded speakers of a leg.</par>
- rn: 514636
  type: T
  text: <par>This word was originally glossed &apos;whole arm (shoulder to wrist)&apos; during JAM&apos;s
    1965-66 field trip, but was revised to &apos;narrow part of forearm where it joins the hand&apos;
    when the data was revised on subsequent trips (cf. <latinform>qɔ̄</latinform> &apos;neck&apos;). Given
    the imprecision of body part terminology, it is very possible that both glosses are correct.</par>
- rn: 514664
  type: I
  text: <par>Added per JAM (waiting on page number).</par>
- rn: 514927
  type: I
  text: '<par>Error in HPTB index: This is supposed to be a PKaren root (HPTB:260).</par>'
- rn: 515079
  type: I
  text: <par>(See HPTB p.26, fn. 25).</par>
- rn: 515340
  type: I
  text: <par>HPTB &quot;Index of Proto-Forms&quot; (p.599) has <latinform>*s-lay ⪤ *s-ləy</latinform>,
    which is an error (should be <latinform>*s-lay ⪤ *s-ley</latinform>).</par>
- rn: 515466
  type: T
  text: <par>Although STC sets up this root with <latinform>*-r-</latinform>, the evidence favors the
    reconstruction of <latinform>*-y-</latinform>. The only evidence for <latinform>*-r-</latinform> offered
    in STC is Bahing <latinform>moro</latinform> and the Intha dialect of Burmese (<latinform>mrok ~ mlok</latinform>)
    (see also Sunwar and Jirel <latinform>moro</latinform>). These Himalayish forms bear some resemblance
    to Nepali <latinform>mākul</latinform>, though they show no trace of a velar.</par>
- rn: 515497
  type: T
  text: <par>This allofam, poorly attested, was reconstructed in HPTB:39 on the basis of Bisu <latinform>mjò</latinform>,
    since plain nasals generally developed into Bisu stops.</par>
- rn: 515509
  type: T
  text: '<par>Although Written Burmese does not differentiate between <latinform>nak</latinform> BLACK
    and DEEP, Lahu has a clear distinction: <latinform>nâʔ</latinform> &apos;black&apos; &lt; <latinform>*s-nakᴴ</latinform>
    vs. <latinform>ná</latinform> &lt; <latinform>*ʔ-nakᴸ</latinform> &apos;deep&apos;. This latter Lahu
    word has the high rising tone which developed by &quot;glottal dissimilation&quot; in syllables containing
    both a glottal onset and a stopped final (see Matisoff: 1970 passim and 1972, section 2.3).</par>'
- rn: 515657
  type: I
  text: <par>The HPTB index erroneously classifies this form as PTB instead of *Burmish (see HPTB:26).</par>
- rn: 515797
  type: T
  text: <par>This is a root where some of the reflexes point to a unitary cluster of <latinform>*m + y</latinform>,
    while others have evidently treated the <latinform>*m-</latinform> as a prefix, yielding forms with
    initial <latinform>y-</latinform>.</par>
- rn: 515864
  type: T
  text: <par><plainlatinform>HPTB p. 31</plainlatinform> erroneously gives 1 as the PLB tone for this
    form.</par>
- rn: 516062
  type: I
  text: '<par>Error in HPTB index: This is supposed to be a PKaren root (HPTB:305).</par>'
- rn: 516108
  type: T
  text: <par>The <latinform>*d-</latinform> prefix was set up for PTB in HPTB on the basis of forms like
    Angami <latinform>te◦kwi</latinform>, but this is undoubtedly of more recent origin.</par>
- rn: 516186
  type: I
  text: <par>Since <latinform>ul</latinform> already means &apos;hand&apos; (see <xref ref="373">#373</xref>),
    Trung <latinform>kui</latinform> probably means &apos;right&apos;, though this is perhaps not a fatal
    objection to including the form here. The semantic shift HAND &lt;--&gt; RIGHTSIDE is quite pluasible,
    given that the right hand is the hand <emph>par excellence</emph>.</par>
- rn: 516192
  type: T
