- rn: 311338
  type: T
  text: '<par>This is an excellent example of the original &quot;overcounting&quot; numeral system of
    Mongsen Ao (cf. Coupe 2007, Clark 1893). The individual morphemes are are as follows: &apos;twenty-NEG-be.complete-seven&apos;,
    i.e. &quot;the seven before the twenty&quot;.</par>'
