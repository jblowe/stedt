- rn: 303196
  type: T
  text: <par>Benedict proposes a development from PLB <latinform>*lak-bai</latinform> &gt; <latinform>*laŋ-wai</latinform>
    &gt; <latinform>*mai</latinform> &gt; <latinform>mɛ̄</latinform>. This analysis implies that there
    was a subsequent re-compounding of this <latinform>mɛ̄</latinform> with the morpheme <latinform>làʔ</latinform>
    &apos;hand&apos;.</par>
- rn: 303450
