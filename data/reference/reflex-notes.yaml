- rn: 349232
  type: T
  text: <par>These two Nanhua forms, <latinform>phe²¹me̱³³</latinform> and <latinform>tʰᴀ̱²¹me̱³³</latinform>,
    are perhaps evidence of dialect mixture. The PLB cluster <latinform>*pl-</latinform> sometimes loses
    the lateral element, but sometimes develops into a retroflex stop (as in Mojiang and Dafang). It is
    possible that the Nanhua form with retroflex initial is borrowed from such a dialect.</par>
- rn: 351017
