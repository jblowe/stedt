  type: T
  text: '<par>Lahu <latinform>cú</latinform>, despite its non-checked tone synchronically, reflects a
    PLB prototype with final stop, <reconstruction>*ʔjup</reconstruction>; the high-rising tone is the
    result of &quot;glottal dissimilation&quot;, which occurred in pre-Lahu syllables that had both a
    *glottalized initial and a *final stop (which was reduced to <latinform>-ʔ</latinform> in Lahu). For
    a detailed account of this phenomenon, see Matisoff 1970, 1972a #73b.</par>'
