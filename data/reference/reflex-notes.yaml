- rn: 118473
  type: T
  text: '<par>This curious form receives four glosses in Jäschke, p. 231: (1) &apos;spot (as on a leopard)&apos;;
    (2) &apos;zero, naught&apos;; (3) <emph>‘semen virile’</emph>; (4) &apos;contemplation&apos;. Jäschke
    remarks that the last two senses are &quot;mystically connected with each other&quot; in Buddhist
    thought. (The sense of &apos;naught&apos; seems like a recent extension of &apos;spot&apos;, since
    a small zero looks like a dot.) On <emph>a priori</emph> semantic grounds, another WT word, <latinform>t&apos;igs-pa</latinform>
    &apos;drop (of liquid)&apos; also looks like it might be related; but in other Himalayish languages
    similar forms have no liquid associations, e.g. Bunan <latinform>tig-pa</latinform> &apos;testicle&apos;
    and Lepcha <latinform>t&apos;ik</latinform> &apos;penis&apos;. It looks as if &apos;spot/zero&apos;
    and &apos;semen/contemplation&apos; are mere homophones.</par>'
- rn: 118478
  type: T
  text: <par>Note assimilation of the medial consonants.</par>
- rn: 118479
  type: T
  text: <par>The <latinform>-d-</latinform> in Bodo <latinform>da</latinform> is a plausible intervocalic
    reflex of <reconstruction>*-r-</reconstruction>. The name of this language itself is often transcribed
    as &quot;Boro&quot;. See Bhat 1968.</par>
- rn: 118484
  type: T
  text: <par>Tangkhul <latinform>hai ra</latinform> certainly looks like a case of &quot;genital flipflop&quot;,
    i.e. semen is viewed as &quot;vagina-semen&quot;, since that is its destination.</par>
