- rn: 3767
  type: I
  text: <par>The <latinform>tl-</latinform> cluster in this Miju form looks like a reduction of the disyllabic
    sequence <latinform>tɯ-lai</latinform> (cf. <latinform>pɑ³¹ tɯ³¹ lɑi⁵⁵</latinform> &apos;center&apos;).
    This disyllabic form in turn is susceptible of two interpretations. Either it is a two-morpheme sequence
    where the first element is &lt; <reconstruction>*du</reconstruction> NAVEL/UMBILICAL CORD (i.e. &lt;
    <reconstruction>*du-laːy</reconstruction>; see below), or more plausibly it, as well as the first
    consonant in the monosyllabic form <latinform>tlái</latinform>, is simply a reflex of the <reconstruction>*s-</reconstruction>
    prefix (<reconstruction>*s-laːy</reconstruction> &gt; <latinform>tlái</latinform>, or <reconstruction>*s-laːy</reconstruction>
    &gt; <latinform>tɯ-lai</latinform>). See also the Bantawa, Kham, and Lakher (Mara) reflexes with <latinform>tl-</latinform>
    in this section, as well as the WT form with <latinform>lt-</latinform>, under <xref ref="519">#519</xref>.</par>
- rn: 3767
  type: T
  text: <par>The <latinform>tl-</latinform> cluster in this Miju form looks like a reduction of the disyllabic
    sequence <latinform>tɯ-lai</latinform> (cf. <latinform>pɑ³¹ tɯ³¹ lɑi⁵⁵</latinform> &apos;center&apos;).</par>
- rn: 3770
  type: I
  text: <par>The <latinform>tl-</latinform> in the last syllable seems to be the reflex of the <reconstruction>*s-l</reconstruction>
    cluster (cf. the Lakher [Mara] and Miju forms with similar initials). If the second syllable <latinform>-bu(y)-</latinform>
    were really just a fully vocalized reflex of a labial prefix <reconstruction>*bV-</reconstruction>,
    this form would reflect a doubly-prefixed prototype like <reconstruction>*b-s-lay</reconstruction>
    (cf. the Ashö Sandoway <latinform>hmlai</latinform> &lt; <reconstruction>*s-m-lay</reconstruction>).
    On the other hand, the second syllable seems to descend from a separate etymon (perhaps <xref ref="164">#164</xref>
    or <xref ref="2111">#2111</xref>), especially in view of Kham forms like <latinform>pũ:h-tali</latinform>.</par>
- rn: 3770
