      />u | u<br />y | ə<br />ii | ī<br />ee | ē<br />oo | ō<br />aa | ā<br />• or &apos; | glottalisation<br
      /><emph>Table 76 (p. 623)</emph></par><par><strong>Abbrevations:</strong> See p. 625 of the grammar
