- srcabbr: DS-Kan
  citation: Sharma, D.D. 88 Kn
  author: Sharma, Devi D.
  year: '1988'
  title: A descriptive grammar of Kinnauri
  imprint: '(Studies in Tibeto-Himalayan languages, 1). Delhi: Mittal Publications'
  location: '*s-ning:database:final:'
  notes: 'JP 7/14/97:  It''s not clear how entry has been done.  Forms were entered in alphabetical order
    by gloss, but there is not comprehensive word list per se in the volume.  Instead, there are a number
    of small word lists throughout the volume, used to illustrated different aspects of the language.  It
    looks like body parts were found, checked off in the volume, put in a list, alphabetized by gloss,
    and then entered.  Transcriptions match (with the small "exception" that the retroflex dot appears
    over ''n'' in the volume, under in the database).  Some morpheme boundaries have been inserted into
    entered forms.  Due to the disconnected nature of the data, the number of total forms is difficult
    to estimate.  It looks like about 10ɹ of the forms have been entered, which would yield a total of
    about 1000 forms, but this is only a *very* rough estimate.'
- srcabbr: DS-Kayah
