- srcabbr: IMS-HMLG
  citation: Simon 76 Miri
  author: Simon, Ivan Martin
  year: '1976'
  title: Hill Miri language guide
  imprint: 'Shillong: Philological Section, Research Dept., Government of Arunachal Pradesh'
  location: '*s-ning:database:final:'
  notes: 'JP 7/14/97:  (Located in Mirish volume)  As far as I can tell, all forms have been entered.  There
    are two candidate wordlists:  English-Miri (with illustrative sentences) and Miri-English.  The latter
    was used for entry.  Borrowed words are given separately at the end of the wordlist, but have been
    entered, as far as I can tell, as regular Miri words.  Transcription has been normalized.  I''ve found
    the following correspondences:  ng -> engma; t̑ -> IPA palatal nasal; y -> j; j -> inverted f (IPA
    voiced palatal fricative);  ̛-> IPA high back unrounded vowel;  ̣-> baby gamma; Ⓒ -> y.'
- srcabbr: IMS-Miji
