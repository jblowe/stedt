- srcabbr: SRS-PSS
  citation: Sharma, S.R. 79 Sp
  author: Sharma, Suhnu Ram
  year: '1979'
  title: Phonological structure of Spiti
  imprint: LTBA 4.2:83-110
  location: '*s-ning:database:final:'
  notes: "JP 7/16/97:  Looks like all the data for this particular source have been entered.  It's an\
    \ LTBA article, and forms appear in no particular order, semantically or alphabetically speaking:\
    \  they appear when the author wishes to offer an example of whatever he's discussing at the moment.\v\
    \vThe order of the items in the database is a tad strange.  The first 25 or so entries appear in more\
    \ or less random order.  After that, everything is alphabetized by gloss.  It looks like verbs were\
    \ originally entered as 'to X', with the 'to' later deleted, since verbs appear, alphabetically, where\
    \ 'to' would go.\v\vThis points up a general problem with this data:  careless glossing.  Some examples:\
    \  \"big crow\", \"small river\", \"type of X\", \"male yak\".  Perhaps these should be corrected.\v\
    \vTranscription has been normalized.  Correspondences are as follows:  'h' denoting aspiration has\
    \ been superscripted; consonants with dots under them have been converted into the appropriate IPA\
    \ retroflex symbols; 'n' with macron -> engma; 'c' with hatckek (sp?) -> 'c'; 'j' with hatchek ->\
    \ IPA voiced palatal fricative (inverted 'f'); 's' with hatchek -> IPA voiceless post-alveolar fricative\
    \ ('esh'); 'z' with hatchek -> voiced post-alveolar fricative ('ezh'?); dotted 'r' -> inverted 'r';\
    \ t̑ -> IPA palatal nasal; E -> epsilon.\v\vForms are given in phonemic notation throughout the article,\
    \ i.e. are enclosed within forward slashes."
