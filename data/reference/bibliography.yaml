- srcabbr: DS-Patt
  citation: Sharma, D.D. 82 TH
  author: Sharma, Devi D.
  year: '1982'
  title: 'Studies in Tibeto-Himalayan linguistics:  A descriptive analysis of Pattani (a dialect of Lahaul)'
  imprint: 'Hoshiarpur: Vishveshvaranand Vishva Bandhu Institute of Sanskrit and Indological Studies,
    Panjab University'
  location: '*s-ning:database:final:'
  notes: 'JP notes 7/30/97:  Looks like the entire wordlist (end of book) has been entered; perhaps this
    should be changed to ''complete''?  Transcription has been normalized.  Correspondences are as follows:  all
    retroflex consonants (under-dots) -> appropriate IPA symbols, including dotted r -> voiced retroflex
    fricative (hooked ''z''); over-dotted n -> engma; hatchek-c -> t-esh cluster; t̑ -> IPA palatal nasal;
    j -> IPA voiced palatal fricative (inverted ''f''); s̉ -> IPA voiceless palatal fricative; h for aspiration
    has been superscripted.  Note also that ''y'' has not been changed to IPA ''j''.'
