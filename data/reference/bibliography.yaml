- srcabbr: GLDC-GED
  citation: GLDC 09 Galo
  author: GLDC
  year: '2009'
  title: Galo-English dictionary, with English-Galo index [International Edition]
  imprint: 'Itanagar, Arunachal Pradesh, India: Galo Welfare Society'
  notes: "Vowels: a i u e o ɨ ə \n\nConsonants: k g ŋ c [ʨ] j [ʥ] ɲ t d n p b m y r l s [s ~ ɕ] h \n\n\
    Tones:\n1) “Plain” *or* unspecified: (unmarked) \n2) “Tense”: `\n\n(see pp. xxiii-xxiv for parts-of-speech\
    \ abbreviations)\n\np. xiv:\n\"It has also been decided to retain the Galo system for marking tones,\
    \ which is quite different from most standard practices. Namely, an accent marker “`” marks only words\
    \ specified for a “Tense” tone (phonetically low or rising-falling, depending on word structure/length),\
    \ while words specified for a “Plain” tone (phonetically high and level) are left unmarked;\"\n\n\
    p. xv:\n\"A final and quite serious drawback of the orthography used in this Dictionary concerns non-representation\
    \ of breathy versus glottal (stop) onsets to otherwise vowel-initial words. This is an extremely important\
    \ aspect of Proto-Galo prosody which is unfortunately completely ignored in the representation given\
    \ here. The reason for this is that prosodic onset contrasts are robustly retained in only a few Galo\
    \ dialects; in several other Galo dialects, including the  `Laree dialect which forms the primary\
    \ reference point for this Dictionary, prosodic onset contrasts have decayed to the point that even\
    \ expert speakers are not able to recognize or reproduce the relevant distinctions.\""
  annotations:
  - type: T
    text: '<par><strong>Note:</strong> The complete work is available <a href="http://victoria.linguistlist.org/~lapolla/downloads/Galo-English_Dictionary_%28International_Edition%29.pdf">here</a>.
      (Permission to store and use electronic copies is hereby extended to local and international scholars
      under fair use. Permission to further disseminate electronic copies is <emph>not</emph> extended
      to this group.)</par><par><strong>Orthography:</strong><br /><emph>Vowels</emph>: a i u e o ɨ ə
      </par><par><emph>Consonants</emph>: k g ŋ c [ʨ] j [ʥ] ɲ t d n p b m y r l s [s ~ ɕ] h </par><par><emph>Tones</emph>:<br
      />1) &quot;Plain&quot; <strong>or</strong> unspecified: (unmarked) <br />2) &quot;Tense&quot;: `</par><par><strong>Abbreviations:</strong>
      See pp. xxiii-xxiv of the dictionary for parts-of-speech abbreviations.</par><par><strong>Other
      notes:</strong><br />p. xiv:<br />&quot;It has also been decided to retain the Galo system for marking
      tones, which is quite different from most standard practices. Namely, an accent marker “`” marks
      only words specified for a “Tense” tone (phonetically low or rising-falling, depending on word structure/length),
      while words specified for a “Plain” tone (phonetically high and level) are left unmarked;&quot;</par><par>p.
      xv:<br />&quot;A final and quite serious drawback of the orthography used in this Dictionary concerns
      non-representation of breathy versus glottal (stop) onsets to otherwise vowel-initial words. This
      is an extremely important aspect of Proto-Galo prosody which is unfortunately completely ignored
      in the representation given here. The reason for this is that prosodic onset contrasts are robustly
      retained in only a few Galo dialects; in several other Galo dialects, including the  `Laree dialect
      which forms the primary reference point for this Dictionary, prosodic onset contrasts have decayed
      to the point that even expert speakers are not able to recognize or reproduce the relevant distinctions.&quot;</par>'
