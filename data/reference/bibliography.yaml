  notes: "van Breugel: -Atong HAS NO DIPHTHONGS -the glottal stop is NOT a phoneme\n\nTable 76:\nGrapheme\t\
    Phoneme\nph\tpʰ\nth\ttʰ\nkh\tkʰ\np\tp\nt\tt\nk\tk\nb\tb\nd\td\ng\tg\nw\tw\nm\tm\nn\tn\nng\tŋ\nr\t\
