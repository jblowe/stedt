  - type: T
    text: "<par><strong>Note:</strong> The wordlist is also available from <a href=\"http://www.brassett.org.uk/tujia/elng/edload.html\"\
      >this site</a>.</par><par><strong>Orthography:</strong><br />The Tujia orthography (based on pinyin)\
      \ is as follows:</par><par><emph>INITIALS</emph><br /><strong>Tujia [IPA]</strong><br />b\t[p]<br\
      \ />c\t[tsʰ]<br />d\t[t]<br />g\t[k]<br />h\t[x]; [f] before u<br />hh\t[ɣ]<br />j\t[tɕ]<br />k\t\
      [kʰ]<br />l\t[l] or [n]<br />m\t[m]<br />n\t[ȵ]<br />ng\t[ŋ]<br />p\t[pʰ]<br />q\t[tɕʰ]<br />r\t\
      [z]<br />s\t[s]<br />t\t[tʰ]<br />w\t[w]<br />x\t[ɕ]<br />y\t[j]<br />z\t[ts]</par><par><emph>FINALS</emph><br\
      \ /><strong>Tujia [IPA]</strong><br />a\t[a]<br />ai\t[aⁱ]<br />an\t[ɛn]<br />ang\t[aŋ]<br />ao\t\
      [aᵘ]<br />e\t[ɤ]<br />ei\t[eⁱ]<br />eng\t[ɜŋ]<br />i\t[ɨ] after c, g, h, hh, k, r, s, z; else [i]<br\
      \ />ia\t[ⁱa]<br />ian\t[ⁱɛn]<br />iao\t[ⁱaᵘ]<br />ie\t[ⁱɛ]<br />ii\t[ɯ]<br />ing\t[iŋ]<br />iong\t\
      [ⁱɔŋ]<br />iu\t[ⁱu]<br />o\t[ɔ]<br />ong\t[ɔŋ]<br />ou\t[oᵘ]<br />u\t[u]<br />ua\t[ᵘa]<br />uai\t\
      [ᵘaⁱ]<br />uan\t[ᵘɛn]<br />ui\t[ᵘeⁱ]<br />un\t[un]<br />uo\t[ᵘɔ]</par><par><emph>TONES</emph><br\
      \ />The tones are similar to those in <emph>putonghua</emph> and are numbered accordingly:<br />1\
      \ = high level<br />2 = high rising<br />3 = low falling<br />4 = high falling</par><par>Note that\
      \ the Tujia orthography does not distinguish nasal vowel phonemes.</par>"
