    text: '<par>Note the following three WT forms for ‘throat’: <latinform>ʼog-ma  ⪤ lkog-ma ↮ ʼol-ma</latinform>.
      </par><par>  It is difficult to distinguish among the velar-initialed etyma: <xref ref="486">#486</xref>,
      <xref ref="495">#495</xref>, and <xref ref="3361">#3361</xref>. Compare Sangkong <latinform>aŋ³³khoŋ³¹</latinform>
      and Phunoi <latinform>ʔã⁵⁵ko¹¹</latinform> (both &apos;throat&apos;). The Phunoi form cannot be
      from <reconstruction>*-waŋ</reconstruction>, since <reconstruction>*-waŋ &gt; on/õ</reconstruction>,
      cf. ‘wing’ <latinform>ʔã́ tṍ</latinform> &lt; <xref ref="711">#711</xref>, ‘thigh’ <latinform>ʔã́-pon</latinform>
      &lt; <xref ref="404">#404</xref>.</par>'
