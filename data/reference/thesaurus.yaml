  old_chapter: 1a
  old_subchapter: 3.1.2
  notes:
  - type: I
    text: <par>STC recognizes only one root for BEAK/BILL, <reconstruction>*muːr</reconstruction> (#366),
      which is also glossed MOUTH/FACE/GILLS. Many TB lgs simply have no special words for this meaning,
      and the words for ‘mouth’ or ‘lip’ are used instead. Many languages employ compound patterns like
      BIRD-MOUTH, BIRD-LIP, BIRD-TOOTH, HORN-LIP etc.</par>
