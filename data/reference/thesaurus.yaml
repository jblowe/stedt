      rGyalrong <latinform>m</latinform><latinform>pʰɐt</latinform>; Jingpho <latinform>n</latinform><latinform>-phat</latinform>;
      Kaman <latinform>tʌ-</latinform><latinform>m</latinform><latinform>phat</latinform>. Evidence of
      <latinform>-s</latinform> final: Tsangla <latinform>pʰro</latinform><latinform>s</latinform>, Kanauri
      <latinform>pha</latinform><latinform>s</latinform><latinform>-</latinform>; Chepang <latinform>hèmdash
      a</latinform><latinform>s</latinform>; Thulung <latinform>pho</latinform><latinform>s</latinform>;
      Bantawa <latinform>pe</latinform><latinform>s</latinform>; rGyalrong (NW) <latinform>kə-mbe</latinform><latinform>s</latinform>;
      WT <latinform>&apos;phro</latinform><latinform>s</latinform> &apos;to come out&apos;. Evidence of
      <latinform>-r-</latinform> medial: Tsangla <latinform>pʰ</latinform><latinform>r</latinform><latinform>os</latinform>,
      WT <latinform>&apos;ph</latinform><latinform>r</latinform><latinform>os</latinform> &apos;to come
      out&apos;, Nusu <latinform>pʰ</latinform><latinform>ɹ</latinform><latinform>ə̱³¹</latinform>; Pattani
      <latinform>p</latinform><latinform>r</latinform><latinform>ãsi;</latinform> Mao <latinform>¹p</latinform><latinform>r</latinform><latinform>a</latinform>;
      Khezha <latinform>²te²p</latinform><latinform>r</latinform><latinform>e</latinform>; Nyisu (Mirish)
      <latinform>b</latinform><latinform>l</latinform><latinform>â.</latinform></par>'
