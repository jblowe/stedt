- semkey: 1.9.8
  title: Copulate
  semcat: Nbp
  old_chapter: 1a
  old_subchapter: '9.8'
  notes:
  - type: T
    text: '<par>It should come as no surprise that verbs meaning COPULATE are closely associated with
      notions of LOVE and DESIRE. Most etyma in this chapter have a semantic range which encompasses both
      the physical act of love and its emotional concomitant. At least one root makes an overt connection
      between COPULATE and PENIS (cf. <xref ref="548">#548</xref>, above). Innumerable euphemisms for
      the act of sexual congress occur, but most of these are best treated in a separate study devoted
      to verbs. Typical verbs extended to a sexual sense include: PUSH (Karbi <latinform>dòy</latinform>
      &apos;push&apos;, <latinform>che-dōy</latinform> &apos;copulate&apos;); DO (Jingpho <latinform>dī</latinform>
      &apos;do, make, form, fashion; be guilty of illicit intercourse&apos;); MEET (Jingpho <latinform>khrúm</latinform>
      &apos;meet, converge; have sexual intercourse&apos;), etc. </par>'
- semkey: 1.9.9
  title: Body Fluids
  semcat: Nbp
  notes:
  - type: T
    text: <par>In Sino-Tibetan languages, the words for the various liquids produced by or contained in
      the body tend to be transparent compounds where the last element is a morpheme meaning &apos;water;
      liquid&apos;.<footnote>Exceptions are BLOOD, URINE, SWEAT, and sometimes BILE, which are usually
      monosyllabic words.</footnote> Of the many body fluids,<footnote>That is, AMNIOTIC FLUID, BILE,
      BLOOD, MILK, PHLEGM, PUS, SALIVA, SEMEN, SNOT, SWEAT, TEARS, VAGINAL SECRETIONS.</footnote> only
      a few relate directly to the reproductive system (AMNIOTIC FLUID, MILK, SEMEN, VAGINAL SECRETIONS).
      In this chapter, however, in order to illustrate the scope of the various ST roots for WATER, I
      include a generous sampling of compounds referring to non-reproductive body fluids.<footnote>The
      numerous roots for water (over ten at last count) in the STEDT database merit a separate study.
      Words for WATER seldom seem to be used by themselves in ST languages to mean URINE, unlike e.g.
      English, where <emph>make water</emph> is a common euphemism for &apos;urinate&apos;; for an exception
      see the WT form <latinform>c̀ʻu</latinform> below.</footnote></par>
- semkey: 1.9.9.1
  title: Sperm/Semen
- semkey: 1.9.9.2
  title: Ejaculate
  notes:
  - type: I
    text: <par>Most compounds are of the form O-V where O is “semen” and the verb is “shoot” , “wet” ,
      or somesuch.</par>
