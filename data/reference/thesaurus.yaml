    text: <par>Note the semantic connection between LARYNX and KNOT or SEED., e.g. WT <latinform>ʼol-mdud</latinform>
      ‘throat-knot’ ; WB <latinform>lañ-ceʼ</latinform> ‘neck-seed’ ; Lisu <latinform>tɕeɑ³⁵miʔ²¹tɔ⁵⁵si&apos;̀a
      a¹</latinform> ‘monkey-knot’. </par><par>Note the similarity between the Lolopho form <latinform>ɒ⁴⁴
      kɤ̱⁴⁴ lɤ̱⁴⁴</latinform>, the Lahu form <latinform>qá-qə̂ʔ-lə̂ʔ</latinform>, and the Lisu form <latinform>bø⁴⁴
      kɔ²¹ lɔ³⁵</latinform> (all &apos;larynx/Adam&apos;s apple&apos;). There seems to be a Loloish binome
      here, currently tagged <xref ref="486">#486</xref> + <xref ref="3412">#3412</xref>, but this could
      just be imitative, as in English &apos;gullet&apos;, &apos;glug&apos;.</par>
