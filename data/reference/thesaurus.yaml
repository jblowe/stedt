- semkey: 1.3.4.2
  title: Molar
  semcat: Nbp
  old_chapter: 1a
  old_subchapter: 3.4.2
  notes:
  - type: T
    text: '<par>Many TB words meaning MOLAR are compounds: Lepcha <latinform>fo-góm</latinform> and Bokar
      <latinform>jiː-kam</latinform> are compounds of TOOTH + JAW. (See <xref ref="630">#630</xref>.)
      Lahu <latinform>cì-g̈àʔ-ma</latinform> &apos;molar&apos; is a compound of <xref ref="635">#635</xref>
      and <xref ref="5669">#5669</xref>. Lushai (Mizo) <latinform>ha-pui</latinform> &apos;molar&apos;
      is a compound of <xref ref="632">#632</xref> and <xref ref="1622">#1622</xref>.</par>'
- semkey: 1.3.4.3
  title: Gums
  semcat: Nbp
  old_chapter: 1a
  old_subchapter: 3.4.3
  notes:
  - type: T
    text: <par>Most TB languages reflect the PTB root <reconstruction>*r-nil ⪤ s-nil</reconstruction>,
      which STC claims to be possibly related to PTB<reconstruction>*r-ni </reconstruction>‘red’ . The
      Northern Qiang forms for ‘gums’ <latinform>-zdi</latinform> and ‘red’ <latinform>ɕi-</latinform>
      (Taoping <latinform>χȵi-</latinform>), however, seem to come from different initials. The form <latinform>khV-</latinform>
      is also common in BL and Qiangic (Bradley reconstructs Proto-Loloish <reconstruction>*ʔ-ko³</reconstruction>
      on the basis of Lahu Shi and Southern Loloish). Attested compound formations in TB include TOOTH
      + GUMS, TOOTH + RED, TOOTH + BASE and TOOTH + FOOT; the Chinese formation TOOTH + FLESH is also
      attested.</par>
