      Cf. Dulong Nujiang <latinform>gɔŋ¹³</latinform> BODY, <latinform>ʃi⁵⁵gɯ⁵⁵</latinform> CORPSE. Dulong
      has <latinform>aŋ³¹</latinform> prefix like Bisu/Sangkong/Phunoi. Akha, Burmish forms w/ defunct
      tag 1803 <latinform>raŋ⪤waŋ</latinform>:Akha: <latinform>g&apos;aw</latinform><latinform>ˇmawˇ BODY,</latinform>
      Bola <latinform>ɣɔ⁵⁵</latinform><latinform>kɔ̃⁵⁵</latinform> CHEST, Lashi <latinform>jaŋ³¹</latinform><latinform>kaŋ³¹</latinform>
      CHEST, Zaiwa <latinform>vaŋ⁵¹</latinform><latinform>-kaŋ⁵¹</latinform> CHEST, Hani (Dazai) <latinform>ɣo⁵⁵</latinform><latinform>mo⁵⁵</latinform>
      BODY, Hani (Shuikui) <latinform>ʒu³³</latinform><latinform>ɣu⁵⁵</latinform> BODY, Hani (Lüchun)
      <latinform>jò vó</latinform> BODY, Langsu <latinform>vɔ̃³¹</latinform><latinform>(kɔ̃³¹)</latinform>
      CHEST, Sani <latinform>ɣo̱²¹</latinform> BODY (why constricted?).</par>'
