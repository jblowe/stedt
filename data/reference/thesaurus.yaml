- semkey: 1.9.5
  title: Vagina
  semcat: Nbp
  old_chapter: 1a
  old_subchapter: '9.5'
  notes:
  - type: T
    text: '<par>Etyma for VAGINA and PENIS show frequent interchange and/or phonological similarity, by
      a phenomenon felicitously dubbed &quot;genital flipflop&quot; by Benedict.<footnote>Benedict 1979,
      &quot;A note on Karen genital flipflop&quot; (LTBA 5.1:21-24); 1981 &quot;A further (unexpurgated)
      note on Karen genital flipflop&quot; (LTBA 6.1:103); 1991 &quot;Genital flipflop: a Chinese note&quot;
      (LTBA 14.1:143-6).</footnote> The roots where this interchange is most evident include: <xref ref="661">#661</xref>
      : <xref ref="3420">#3420</xref>; <xref ref="1616">#1616</xref> : <xref ref="1284">#1284</xref>;
      <xref ref="1352">#1352</xref> : <xref ref="641">#641</xref>; <xref ref="1353">#1353</xref> : <xref
      ref="547">#547 PENIS / MALE / SON-IN-LAW</xref>. This relationship is indicated by a <emph>yin-yang</emph>
      curve in the semantic diagram.</par>'
  - type: T
    text: <par>Roots for VAGINA also show interchange with etyma for MOUTH. See especially <xref ref="1356">#1356</xref>;
      <xref ref="686">#686</xref>; and <xref ref="667">#667</xref>.</par><par>There is also an association
      between VAGINA and ANUS (see, e.g. <xref ref="3432">#3432</xref> and <xref ref="665">#665</xref>).</par>
  - type: T
    text: <par>An association between CLITORIS and UVULA is shown by Mizo <latinform>daŋ-mɔn</latinform>
      &apos;uvula&apos;, literally &quot;palate-clitoris&quot;. See VSTB, p. 67.</par>
  - type: T
    text: <par>We are not including roots for FEMALE/WOMAN in this chapter, since they seem quite independent
      of etyma for the &quot;female organs&quot;. (Apparent exceptions are a few forms from rGyalrong,
      e.g. NW rGyalrong <latinform>tə◦stə</latinform> &apos;female&apos; &lt; <xref ref="661">#661</xref>;
      but these may be misglossed.) On the other hand, words for MALE do frequently interchange with words
      for the male genitals; some of these etyma are accordingly discussed in Chapter 1.9.7 below. </par>
- semkey: 1.9.5.1
  title: Vulva/Labia
- semkey: 1.9.5.2
  title: Clitoris
