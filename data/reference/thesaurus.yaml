- semkey: 1.9.1
  title: Egg
  semcat: Nbp
  old_chapter: 1a
  old_subchapter: '9.1'
  notes:
  - type: T
    text: <par>The English word <emph>yolk</emph> (&lt; OE <emph>geolca</emph>) is an allofam of <emph>yellow</emph>
      (&lt; OE <emph>geolu</emph>) &lt; PIE <reconstruction>*ghel-</reconstruction> &apos;shine; shiny
      object&apos; [AHD:2029]. Similarly, TB words for YOLK typically contain a morpheme meaning YELLOW,
      e.g. Lahu <latinform>g̈âʔ-u-ši</latinform> &apos;yolk of hen&apos;s egg&apos; &lt; <xref ref="1606">#1606</xref>
      + <xref ref="301">#301</xref> + <latinform>ši</latinform> &apos;yellow/gold&apos; &lt; <xref ref="3496">#3496</xref>.
      See HPTB:191.</par>
  - type: T
    text: <par>An important associated concept is BIRD, with several distinct roots appearing in compounds
      for EGG, including <xref ref="1603">#1603</xref>, <xref ref="1600">#1600</xref>, <xref ref="2187">#2187</xref>,
      <xref ref="1604">#1604</xref>, <xref ref="3442">#3442</xref>. It is sometimes hard to distinguish
      reflexes of <reconstruction>*wa</reconstruction> and <reconstruction>*haːr</reconstruction>; cf.
      the first syllable in Wancho <latinform>ao-ti</latinform>, below. Similarly, it is sometimes hard
      to distinguish reflexes of <reconstruction>*wa</reconstruction> and <reconstruction>*bya</reconstruction>;
      cf. the first syllable in Bahing <latinform>ʔba-di</latinform>.</par>
