  - type: T
    text: <par>Note the relationship between CHEST and BELLY; the Kiranti root <xref ref="3378">#3378</xref>
      is from <xref ref="137">#137</xref>.</par><par><xref ref="2">#2</xref> is the source for WT <latinform>sku-braŋ</latinform>
      ‘chest (resp.)’, and also of the honorific prefix used with many body parts in WT. It should be
      kept distinct from <xref ref="560">#560</xref>, which is reflected in Thakali <latinform>&apos;ku</latinform>,
      Kaike <latinform>gu</latinform>, etc. </par><par>It is interesting to note that both ‘chest’ and
      ‘trunk’ are ambiguous in English between body-part and receptacle!</par>
- semkey: 1.4.4.4
  title: Ribs/Ribcage
  semcat: Nbp
  old_chapter: 1a
  old_subchapter: 4.4.3
  notes:
  - type: T
    text: <par>For the formations WAIST + BONE = RIB and BELLY + BONE = RIB, see Chapters 1.4.6 and 1.4.7.<br
      />The two roots <xref ref="553">#553</xref> and <xref ref="297">#297</xref> are sometimes difficult
      to distinguish, especially in Lolo-Burmese, but in general it seems that <xref ref="553">#553</xref>
      is more typical of Burmish, while <xref ref="297">#297</xref> is more typical of Loloish.</par>
