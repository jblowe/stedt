  notes:
  - type: I
    text: <par>Note that common terms for womb are “child-house” ,” child-nest” , and possibly “child-aid”
      .</par>
  - type: T
    text: <par>Words for WOMB or PLACENTA are frequently associated with notions of NEST, HOUSE, or BELLY.
      A slightly different metaphor is exemplified by Kanauri <latinform>chaŋ khŭl</latinform>, lit. &quot;child
      skin&quot;, with the second element &lt; <xref ref="593">#593</xref>.</par>
