- semkey: 1.4.6
  title: Waist
  semcat: Nbp
  old_chapter: 1a
  old_subchapter: '4.6'
  notes:
  - type: T
    text: '<par>The Angami, Jirel, Kulung, Moyon, Bodo, Lalung, and Apatani forms appear to be closely
      related.</par><par>  Note the relation WAIST + BONE = RIB in Phunoi <latinform>ʔã cò</latinform>
      ‘waist’, <latinform>ʔɑ̃⁵⁵ co¹¹ jɑu¹¹</latinform> ‘rib’ (<latinform>jɑu¹¹</latinform> is ‘bone’);
      for the similar construction BELLY + BONE = RIB, see Chapter 1.4.7. </par><par>  Note that in the
      Loloish languages (e.g. Lisu, Xide, Gazhuo), compounds for WAIST often have <xref ref="418">#418</xref>
      as a constituent; these morphemes should not be confused with <xref ref="223">#223</xref>. </par><par>  Note
      the following NE Indian ‘parallel’ binomes which appear to have the same etymological structure,
      all glossed ‘waist’: Meluri <latinform>a-khü-shi</latinform>; Miji <latinform>gɯ-tsiʔ</latinform>;
      Miri <latinform>ki-čik</latinform>; Galo <latinform>pak-pu-cik</latinform> (last syllable only);
      Ntenyi <latinform>a-khü-shü</latinform>. The final syllables may be stop-final allofams of <xref
      ref="223">#223</xref>; the first syllables may possibly be related to <xref ref="211">#211</xref>
      or <xref ref="217">#217</xref>.</par>'
- semkey: 1.4.7
  title: Belly/Abdomen
  semcat: Nbp
  old_chapter: 1a
  old_subchapter: '4.7'
  notes:
  - type: T
    text: <par>Note the relation BELLY + BONE = RIB in Apatani <latinform>a-kʰrjɯ</latinform> ‘belly’
      , <latinform>a-kʰrjɯ a-lo</latinform> ‘rib’ (<latinform>a-lo</latinform> is ‘bone’ ); for the similar
      construction WAIST + BONE = RIB, see Chapter 1.4.6.</par>
- semkey: 1.4.8
  title: Back
  semcat: Nbp
  old_chapter: 1a
  old_subchapter: '4.8'
  notes:
  - type: T
    text: '<par>Many Lolo-Burmese forms for &apos;back&apos; are apparently descended from a bi-syllabic
      protoform <xref ref="225">#225</xref> + <xref ref="219">#219</xref>, as Bisu <latinform>taŋ-khaŋ</latinform>.
      We also note the frequent pattern <xref ref="1">#1</xref> + <xref ref="225">#225</xref>, as Lisu
      <latinform>gu³⁵ du³¹</latinform>. Lolo-Burmese languages show no real evidence for <xref ref="211">#211</xref>
      or <xref ref="206">#206</xref>. </par><par>  Note the following forms for ‘back’ : Sde-dge Tibetan
      <latinform>dʑɑʔ³¹loʔ⁵³</latinform>, Sherpa <latinform>&apos;gyap-lā</latinform>, Shixing <latinform>dʑo³³lɑ³⁵</latinform>.
      The second syllables seem to be related to WT <latinform>logs</latinform> ‘side’, for which we have
      no PTB etymology.</par>'
