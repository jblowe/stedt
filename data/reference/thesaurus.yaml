      also the semantic connection between SHOULDER and the adjoining NECK. <xref ref="563">#563</xref>
      is probably related to <xref ref="479">#479</xref>.</par><par>  Some words for SHOULDER are derived
      from roots meaning CONVEX, as WB <latinform>paʼ khûm</latinform>. </par><par>  Note the general
      proliferation of etyma for SHOULDER  with labial initials.</par><par>  Note the striking similarity
      between the Lahu form <latinform>làʔ-qá-pɨ</latinform> and Qiang (Taoping) <latinform>lɑ³¹ χɑ⁵⁵
      pi³³</latinform>, both meaning ‘shoulder’ and both tagged as <xref ref="695">#695</xref> + <xref
      ref="1278">#1278</xref> + <xref ref="276">#276</xref>.</par>
