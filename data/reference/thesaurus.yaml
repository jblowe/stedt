  notes:
  - type: I
    text: <par>Note that in the Garo form for ‘waist’ ko-mor, the second syllable is apparently from etymon
      467 *s-m<latinform>ːr MOUTH. The semantics are peculiar, and this etymology may need to be reconsidered.
      See the footnote under the Garo form and the note at Chapter 4.6 WAIST.</latinform> </par><par>  In
      the drawing for MOUTH labeled &quot;I-E&quot;, the &quot;k&quot; of CHEEK is being obliterated by
      the semicircle figure. Maybe this will be fixed automatically in newer Superpaint, or by pasting
      into Word. </par><par>  Nepali for SNOUT? Chinese <latinform>chún ↭ zǔi</latinform>.</par>
