- semkey: 1.9.7
  title: Penis
  semcat: Nbp
  old_chapter: 1a
  old_subchapter: '9.7'
  notes:
  - type: T
    text: '<par>The various components of the male genitalia show semantic associations with a number
      of other bodyparts, as well as with a wide range of objects in other semantic fields. Some of these
      associations are widespread or universal in the world&apos;s languages; others seem more idiosyncratic
      to ST or the SEA&apos;n linguistic area.</par><par>Among the universal semantic associations we
      may list the following:</par><par>(1) PENIS &lt;--&gt; TAIL: The English word <emph>penis</emph>
      itself is from Lat. <emph>pēnis</emph> &apos;tail&apos; (cf. also Fr. <emph>queue</emph> &lt; Lat.
      <emph>cauda</emph> &apos;tail&apos;), among countless other examples. The widespread TB etymon for
      TAIL <xref ref="1288">#1288 </xref> <reconstruction>*may ⪤ *mey ⪤ *mi</reconstruction> (cf. also
      Chinese <hanform>尾</hanform> OC <reconstruction>*mi̯wər</reconstruction>) has similar associations,
      e.g. Jingpho <latinform>mài</latinform>, <latinform>ǹ-mài</latinform> &apos;tail; a euphemistic
      name for the male private parts&apos; (Hanson 1906/1954, p. 400).</par><par>(2) PENIS &lt;--&gt;
      BANANA: This connection is made explicitly in Kokborok <latinform>tʰa-li</latinform> (see <xref
      ref="1284">#1284</xref> below) and in Newar <latinform>mwā-e</latinform> &apos;banana; penis&apos;.</par><par>(3)
      GLANS PENIS &lt;--&gt; PENIS + HEAD: This is a universal association (cf. WT <latinform>mje-mgo</latinform>;
      Lahu <latinform>nī-ó-qō</latinform>; Lisu (Northern) <latinform>ɔ⁵⁵dy³³</latinform> &apos;head&apos;,
      <latinform>hɔ̃²¹ɔ⁵⁵dy³³</latinform> &apos;penis&apos;; Yakha <latinform>tu◦khəruk</latinform> &apos;head&apos;,
      <latinform>liː◦goː u◦tu◦kəruk</latinform> &apos;glans&apos;; Qiang (Mawo) <latinform>qə̥ pætʂ</latinform>
      &apos;head&apos;, <latinform>li◦qə̥ pætʂ</latinform> &apos;glans&apos;; Eng. <emph>dick-head</emph>).</par><par>(4)
      TESTICLE &lt;--&gt; EGG: This is also a universal association (cf. e.g. Russian <emph>jajtsy</emph>
      &apos;eggs; testicles&apos;, Hebrew <emph>beytsim</emph> &apos;id.&apos;). The same etymon may have
      some reflexes meaning EGG and others meaning TESTICLE. Several TB etyma showing this association
      have been treated above under EGG (Chapter 1.9.1); others will be treated below in this chapter.
      Alternatively a language may have a compound word for TESTICLE of the structure PENIS + EGG.</par><par>(5)
      TESTICLE &lt;--&gt; FRUIT / BALL / ROUNDED OBJECT: TB compounds for TESTICLE frequently take the
      form PENIS + FRUIT/ROUND OBJECT, e.g. Lahu <latinform>nī-šī</latinform> &apos;testicle&apos; (2nd
      syll. &lt; <xref ref="1019">#1019</xref>).<footnote>Note that TESTICLE &lt;--&gt; NUT is not characteristic
      of SEA, since languages in this region generally lack a word for NUT distinct from FRUIT. Cf. Chinese
      <hanform>果</hanform> (Mand. <latinform>guǒ</latinform>), used equally well for FRUIT (more specifically
      <hanform>水果</hanform> Mand. <latinform>shuǐguǒ</latinform> &quot;water-fruit&quot;) and NUT, e.g.
      <hanform>開心果</hanform> Mand. <latinform>kāixīnguǒ</latinform> &apos;pistachio&apos; (lit. &quot;open-heart-fruit&quot;).</footnote></par><par>Cf.
      also Newar <latinform>kwaa-si</latinform> &apos;testicles&apos; (lit. &quot;hot-fruit&quot;), reminiscent
      of the vulgar English simile &quot;hot as balls&quot;.</par><par>(6) TESTICLE &lt;--&gt; STONE:
      Also a widespread association in the world&apos;s languages, including archaic English slang. In
      TB, cf. formations like Monpa <latinform>khong-lung</latinform> &apos;testicle&apos; (<latinform>lung</latinform>
      &apos;stone&apos;).</par><par>(7) SCROTUM &lt;--&gt; BASKET / BAG / POUCH / NEST: This obvious association
      occurs in Lat. <emph>scrōtum</emph> &lt; <emph>scrautum</emph> &apos;leather pouch for arrows&apos;,
      and is also found in TB, e.g. Lahu <latinform>nī-sī-phɨ</latinform> &apos;scrotum&apos;, <latinform>phɨ</latinform>
      &apos;nest; receptacle&apos; &lt; <xref ref="1611">#1611</xref>. Cf. also <xref ref="3471">#3471</xref>,
      <xref ref="643">#643</xref>.</par><par>(8) SEMEN &lt;--&gt; PENIS + LIQUID: Cf. Nesu <latinform>le̱ṟ³³
      ʑʅ²¹</latinform> and Noesu <latinform>ɬu⁵⁵ʑi²¹</latinform>, where the second element &lt; <xref
      ref="1013">#1013</xref>, and WB <latinform>lî-rañ</latinform>.</par>'
  - type: T
    text: '<par>Semantic associations that seem more peculiar to the SEA&apos;n linguistic area include
      the following:</par><par>(9) PENIS &lt;--&gt; VAGINA: Many etyma have some reflexes which refer
      to the male organ, but others which refer to the female counterpart, a phenomenon that has been
      dubbed &apos;genital flipflop&apos; (see chapter note under VAGINA). Etyma like this should perhaps
      be assigned the gender-neutral gloss GENITALS at the proto-level. Several have been treated under
      VAGINA (Chapter 1.9.5, above); others will be treated below in this chapter.</par><par>(10) PENIS
      &lt;--&gt; BODY + TONGUE: Cf. Garo <latinform>maŋ-sre</latinform> &apos;penis&apos; &lt; <xref ref="17">#17</xref>
      + <xref ref="623">#623 </xref> <reconstruction>*s-lya</reconstruction> <strong>TONGUE</strong>.
      This form was cited in Benedict 1979:24.</par><par>(11) TESTICLE &lt;--&gt; SEED: Cf. WB <latinform>lî-ce’</latinform>,
      lit. &quot;penis-seed&quot;.</par><par>(12) GLANS &lt;--&gt; NOTCH: Cf. WB <latinform>lî-thac</latinform>
      &apos;corona glandis&apos;, lit. &quot;penis-notch&quot;, and Lahu <latinform>nī-qhɛ̀ʔ</latinform>
      &apos;penis&apos;, where the second syllable means &apos;notch (as a stick); chip; break off a piece&apos;.</par><par>(13)
      GLANS &lt;--&gt; BUD: Cf. WB <latinform>lî-ŋum</latinform> &apos;glans&apos;, lit. &quot;penis-bud&quot;.</par><par>(14)
      GLANS &lt;--&gt; TURTLE: While Latin <emph>glāns</emph> means &apos;acorn&apos;, Mandarin <latinform>guī-tóu</latinform>
      &apos;glans penis&apos; means literally &quot;turtle-head&quot;. (For obvious reasons, this formation
      is especially appropriate for the uncircumcised organ.) The data is so far insufficient to establish
      whether this same metaphor occurs in TB languages.</par><par>(15) SEMEN &lt;--&gt; SHIT: A few languages
      associate semen with SHIT / BODY DIRT / EXCRETION. Cf. Lahu <latinform>nī-qhɛ̂</latinform> &quot;penis-shit&quot;,
      Chepang <latinform>təyŋ-kliʔ</latinform> &apos;id.&apos;, and Bantawa <latinform>lü-khü-wa</latinform>
      (<latinform>khü</latinform> &apos;stool, excreta&apos;). In Jingpho <latinform>ne³¹khji⁵⁵</latinform>,
      however, this combination of morphemes means SMEGMA.</par><par>(16) SEMEN &lt;--&gt; FAT: Cf. Lahu
      <latinform>nī-chu</latinform> &apos;semen&apos; (lit. &quot;penis-fat&quot;).</par><par>Few monomorphemic
      etyma are reconstructible for SEMEN, with three possibilities offered below in Chapter 1.9.9: <xref
      ref="1614">#1614</xref>, <xref ref="1627">#1627</xref>, and <xref ref="3486">#3486</xref>.</par><par>Words
      for FORESKIN/PREPUCE, naturally enough, are compounds of PENIS + SKIN (see Chapter 1.6.5).</par><par>Expressions
      for COPULATE frequently involve PENIS plus a verb. See Chapter 1.9.8.</par>'
  - type: I
    text: '<par>Another possible etymon (perhaps <reconstruction>*kloŋ</reconstruction>) is represented
      by the first syllable of Hayu <latinform>kluŋ-klaŋ</latinform> &apos;penis&apos; RN#120292 and the
      second syllable of Written Burmese <latinform>lî-khyôŋ</latinform> &apos;glans penis&apos; #118258.
      The latter form might be allofamically related to WB <latinform>əkhyoŋ</latinform> &apos;bar; long
      piece&apos; #52597.</par>'
