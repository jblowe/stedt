- semkey: 1.4.2
  title: Neck
  semcat: Nbp
  old_chapter: 1a
  old_subchapter: '4.2'
  notes:
  - type: T
    text: <par>Note the semantic connection between NECK and WAIST; the latter is the neck of the body.
      This is analogous to the extension of words for &apos;neck&apos; to other thin flexible areas of
      the body, as in Korean <latinform>son-mok</latinform> &apos;wrist&apos; (&apos;hand neck&apos;)
      and <latinform>pal-mok</latinform> &apos;ankle&apos; (&apos;foot neck&apos;). There is thus probably
      a relationship between WT <latinform>sked-pa ~ rked-pa</latinform> &apos;waist; middle&apos; and
      <latinform>ske ~ skye ~ skya</latinform> &apos;neck, throat&apos;.</par><par>  For the semantic
      connection between NECK and SHOULDER, see Chapter 1.4.3. </par><par>  The Karen forms, which all
      look something like <latinform>ko</latinform>, could either be from <xref ref="486">#486</xref>
      or from <xref ref="3361">#3361</xref>.</par><par>  Note also the similarity between the Hani forms
      for ‘neck’ <latinform>kʰɔ³¹ lɔ⁵⁵</latinform>, <latinform>kʰɔ³¹ laŋ⁵⁵</latinform>, <latinform>kʰɯ³¹
      l̥ɯ⁵⁵</latinform> and the Karen (B) form <latinform>kʰo³¹ lø³¹ tʰi⁵⁵</latinform>. </par><par>  There
      is a widespread binome in LB consisting of etyma <xref ref="479">#479</xref> + <xref ref="255">#255</xref>.</par><par>  There
      is a possible semantic connection between THROAT/NECK and HEART; the first syllables of Limbu <latinform>niŋ-mā</latinform>
      ‘throat’ and Bisu <latinform>nɨŋ-tshɨ</latinform> ‘neck’ mean ‘heart’ .</par>
  - type: G
    text: <par></par>
