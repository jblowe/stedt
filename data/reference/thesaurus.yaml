  notes:
  - type: T
    text: '<par>Note the collocation of BUTT and HEAVY for words meaning &apos;lazy; sluggish&apos;. See
      Jingpho <latinform>maidang li</latinform> &apos;heavy, slow, lazy&apos;; Lahu <latinform>qhɛ̂-qhɔ
      hɔ̂ </latinform>&apos;sluggish, slow-moving; lazy&apos;. (Note also the English expression &apos;lead
      in your pants&apos;, and Japanese <latinform>koshi ga omoi</latinform> &apos;hips are heavy&apos;.)
      </par><par>  It is interesting to note that Padam-Mising [Abor-Miri] preserves four distinct PTB
      roots in four synonyms glossed &apos;buttock&apos;: <latinform>ko-dun</latinform>, <latinform>ko-piang</latinform>,
      <latinform>ta-pong</latinform>, <latinform>ki-pum</latinform> (roots <xref ref="574">#574</xref>,
      <xref ref="399">#399</xref>, <xref ref="404">#404</xref>, and <xref ref="163">#163</xref> resp.).</par>'
