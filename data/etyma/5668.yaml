- type: T
  text: <par>Many reflexes point to a simple prototype <latinform>*ka</latinform>, but there also is strong
    evidence for a rhotic element, either prefixal (as in WT <latinform>rka</latinform>) or medial (as
    in Nusu Bijiang <latinform>khɹɑ³⁵</latinform>). Many other purported reflexes have voiced initials
    (as in Hani Gelanghe <latinform>ga⁵⁵ma³³</latinform> &apos;road, way&apos;), which perhaps means that
    a separate root or allofam <latinform>*ga</latinform> should be set up, as witness another Gelanghe
    form, <latinform>ɯ⁵⁵xɛ³¹</latinform> &apos;ditch&apos;.</par>
