notes:
- type: T
  text: '<par>This root is not reconstructed in J. Sun (1993), where it seems to be treated as a suffix
    following <xref ref="1425">#1425</xref>. The final <latinform>-r</latinform> in the Bokar forms is
    probably a secondary effect of the back unrounded vowel. Darang has a final <latinform>-m</latinform>,
    perhaps an effect of the preceding rounded vowel.</par><par>Jingpho provides evidence for both the
    open- and nasal-final allofams: Hanson (p.42) gives both <latinform>u-baw</latinform> and <latinform>u-bawng</latinform>
    ‘a head’, the latter marked ‘Hkauri dialect’ or ‘in religious poetry’  (p.71). Dai et al. 1983 (p.851)
    glosses <latinform>u³¹ po³³</latinform> as ‘chicken head’ (<latinform>ù-</latinform> is a prefix in
    many words referring to birds).</par>'
- type: T
  text: <par>The second syllables of the Milang, Tagin, Idu, and Galo forms for &apos;horn&apos; resemble
    this root, but we are keeping them separate for now (see <xref ref="814">#814</xref>).</par>
