notes:
- type: T
  text: '<par>This root is reconstructed in STC #382, which cites the WT, Jingpho, Bodo, and Dimasa forms.
    The Bai and Lolo-Burmese forms look cognate, but the relationship of the Jinuo form to this set is
    uncertain. The semantic range of this etymon, which extends from the notion of birth to that of sprouting,
    greenness, freshness, is parallelled by another root <xref ref="71">#71</xref> (q.v.).</par>'
