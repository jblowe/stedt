notes:
- type: T
  text: '<par>Strikingly similar patterns of allofamy are shown by the Lahu and Chinese forms: Lh. <latinform>šêʔ</latinform>
    is the direct cognate of OC <latinform>*sât</latinform>, while Lh. <latinform>šē</latinform> is
    the direct cognate of OC <latinform>*sân</latinform>.</par><par>The most ancient coda of this etymon
    seems to have ended in <latinform>*-r</latinform>.</par>'
- type: F
  text: '<par><hanform>散</hanform> OC <latinform>*sɑ̂n</latinform>, GSR #156a-b &apos;disperse; scattered;
    undisciplined; useless&apos;; Schuessler 2007:449-50 <latinform>*sânʔ</latinform>; B &amp; S 2011:
    <latinform>*sˁanʔ {[s]ˁa[n]ʔ}</latinform>; Mand. <latinform>sǎn</latinform>.<br /><hanform>散</hanform>
    OC <latinform>*sɑ̂n</latinform>, GSR #156a-b &apos;come loose, fall apart, scatter&apos;; Schuessler
    2007:449-50 <latinform>*sâns</latinform>; B &amp; S 2011: <latinform>*m-sˁanʔ-s {m-sˁa[n]ʔ-s}</latinform>;
    Mand. <latinform>sàn</latinform>.<br /><hanform>宣</hanform> OC <latinform>*si̯wɑn</latinform>, GSR
    #164t-v &apos;spread, diffuse; proclaim, display&apos;; Schuessler 2007:546 <latinform>*swan</latinform>;
    B &amp; S 2011: <latinform>*s-qʷar </latinform>; Mand. <latinform>xuān</latinform>.</par>'
