notes:
- type: T
  text: '<par>This root was set up as <latinform>*ble</latinform> in STC #141, on the basis of the Kanauri
    and Digaro forms. Firm cognates have since been discovered in Karenic and Tamangic. A number of forms
    point to a variant with final <latinform>*-l</latinform>, including Pattani and Lushai (Mizo) (such
    a variant is also hypothesized as possible in Proto-Tamangic). The Cuona form might reflect a further
    variant with a velar suffix. See HPTB:204.</par>'
- type: F
