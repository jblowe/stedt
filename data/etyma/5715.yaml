notes:
- type: T
  text: <par>This root has so far been attested only in Tamangic and rGyalrongic. The meaning always seems
    to refer to the contents of a container rather than to satiety from eating. The rGyalrongic forms
    show evidence both of a palatal and labial glide, but no trace of a final <latinform>-t</latinform>.
    The Tamangic forms, on the other hand, attest to an alternation between final stop and nasal, as well
    as evidence of a palatal semivowel (but not of a labial one).</par>
