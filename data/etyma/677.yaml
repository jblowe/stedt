notes:
- type: T
  text: '<par>This root has been identified in the NE Indian Areal Group and Himalayish. The reconstructed
    rhyme <reconstruction>*-ay</reconstruction> is directly reflected by the Mru, Tiddim, Mizo, and Chepang
    reflexes, and indirectly by Written Tibetan and Karbi <latinform>-e</latinform>, which are also the
    regular reflexes of <reconstruction>*-ay</reconstruction>. See Matisoff 1985a #140 and HPTB pp. 206-219
    for many corroborative cognate sets. The Lakher (Mara) word for &apos;add; increase&apos; is tentatively
    included in this set, since the same association between WOMB/PLACENTA and ADD/INCREASE is found in
    <xref ref="679">#679</xref>.</par>'
