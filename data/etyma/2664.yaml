- type: F
  text: '<par><hanform>甥</hanform> OC <latinform>*sěng</latinform>, GSR #812d &apos;sister&apos;s son
    or daughter; son-in-law&apos;; B &amp; S 2011: <latinform>*s.reŋ</latinform>; Schuessler 2007:460
