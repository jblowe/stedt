    son&apos;; <hanform>甥女</hanform> <latinform>shēngnyǔ</latinform> &apos;sister&apos;s daughter&apos;.</par><par>Schuessler
    2007:460 posits a connection between Chinese <hanform>甥</hanform> <latinform>shēng</latinform> &apos;sister&apos;s
    offspring&apos; and WT <latinform>sring-mo</latinform> &apos;sister (of a male)&apos;.<br />[SPB]</par>'
- type: F
  text: '<par><hanform>姓</hanform> OC <latinform>*sri̯ěŋ</latinform>, GSR #812q &apos;clan / family /
    family name&apos;; Mand. <latinform>xìng</latinform>.</par><par>This word is reconstructed as <latinform>*si̯ěng</latinform>
