  text: <par>This root shows variation between a palatalized velar and a palatalized dental affricate
    initial. Note the variant Jingpho forms.</par><par>In this case, both Written Burmese and Mizo unambiguously
    reflect a long vowel (<reconstruction>*-in</reconstruction> &gt; WB <latinform>-añ</latinform>, while
    <reconstruction>*-iːn</reconstruction> &gt; WB <latinform>-in</latinform>). See HPTB:277.</par>
