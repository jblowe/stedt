notes:
- type: T
  text: <par>This root is confined mostly to Karenic, with possible cognates in the NE Indian Areal Group
    and Himalayish. The Lotha form with nasal prefix makes this root look very much like <xref ref="1284">#1284</xref>,
    suggesting that this might be yet another example of &quot;genital flipflop&quot; (see Benedict 1979,
    LTBA 5.1). For the moment, the final nasal in some Karenic forms is regarded as suffixal.</par>
