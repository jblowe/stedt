notes:
- type: T
  text: <par>This root is so far sparsely attested, with support only from Lahu and Chinese. The voiced
    Lahu initial points to a PLB prenasalized consonant <reconstruction>*mb-</reconstruction>.</par>
- type: F
  text: '<par><hanform>剥</hanform> OC <reconstruction>*pŭk</reconstruction>, GSR #1228a &apos;cut, flay,
    peel&apos;; WHB-OC 544; Schuessler 157; Li: <reconstruction>*pruk</reconstruction>; Baxter: <reconstruction>*prok</reconstruction>
    &gt; Mand. <latinform>bō ~ bāo</latinform>.</par><par>The poor vowel correspondence, and the lack
    of a directly attested <reconstruction>*-r-</reconstruction> on the TB side,<footnote>Although -<latinform>r</latinform>-
    would leave no trace in Lahu here.</footnote> cast doubt on the proposed cognate, but more TB support
    for the root would be necessary to reconstruct a reliable PTB root and fully evaluate the connection.</par><par>Schuessler
    cites Manomaivibool 1975:120 and relates the Chinese word to Thai <latinform>pɔɔk<sup>D1</sup></latinform>
    &apos;to peel&apos; and Thai <latinform>lɔɔk<sup>D2</sup></latinform> &apos;to skin, peel&apos; <latinform>⪤
    plɔɔk<sup>D1</sup></latinform> &apos;encasement, slipcover, sheath&apos; &lt; PTai <reconstruction>*dlɔɔk</reconstruction>.</par>'
