- type: T
  text: <par>This etymon seems to partially overlap with <xref ref="1107">#1107</xref>, and should perhaps
    be merged with it in the future.</par>
- type: T
  text: <par>This weakly attested but fairly solid root has so far been found almost exclusively in Himalayish
    languages, with a likely Deng cognate. Hayu shows variation between final <latinform>-n</latinform>
    and <latinform>-m</latinform>, but the basic form of the etymon seems to reflect the former, especially
    since Tsangla has a final dental stop.</par>
