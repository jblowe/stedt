notes:
- type: F
  text: '<par><hanform>鳥</hanform> OC <latinform>*tiôg</latinform>, GSR #1116a &apos;bird&apos;; Schuessler
    2007:401 <latinform>*tiûʔ</latinform>; Mand. <latinform>niǎo</latinform>.<br /><hanform>雕</hanform>/<hanform>鵰</hanform>
    OC <latinform>*tiôg</latinform>, GSR #1083t-u &apos;eagle&apos;; B &amp; S 2011: <latinform>*tˁiw</latinform>;
    Mand. <latinform>diāo</latinform>.</par><par>The irregular initial <latinform>n-</latinform> in the
    Mandarin pronunciation <latinform>niǎo</latinform> for the word <hanform>鳥</hanform> BIRD (Karlgren
    called it &quot;quite a riddle,&quot; <plainlatinform>GSR #1116a</plainlatinform>) is usually attributed
    to pernicious homophony with a dental stop initial word meaning PENIS.</par>'
- type: T
  text: <par><plainlatinform>STC p.192</plainlatinform> expressed uncertainty about the rhyme of this
    etymon, saying it was either <latinform>*-aw</latinform> or <latinform>*-ow</latinform>. STC and HPTB
    p. 227 wrongly assumed that this root was confined to Bodo-Garo.</par><par>STC <emph>loc. cit.</emph>
    suggested an association with Proto-Kuki-Chin <latinform>*m-tsow</latinform> FLY (n.).</par>
