notes:
- type: T
  text: '<par>There is evidently an allofam with final velar, reflected by WT <latinform>nyag-mo</latinform>
    &apos;woman&apos; and Chinese <hanform>孃</hanform> / <hanform>娘</hanform> &apos;lady, woman, mother&apos;,
    OC <latinform>ni̯ang</latinform> (not in GSR #730); AD 541 reconstructs <latinform>ni̯ang</latinform>
    for MC.</par><par>HPTB:173 errs in relating Chinese <hanform>女</hanform> both to the present root
    and to <xref ref="1623">#1623</xref>. In addition, a wrong GSR citation is given under <reconstruction>*nya</reconstruction>.</par><par>In
    any case, there seems to be considerable overlap among this root, <xref ref="1623">#1623</xref>, and
    <xref ref="1621">#1621</xref>, and further work will be needed to clarify their interrelationship.</par>'
- type: F
  text: '<par><hanform>女</hanform> OC <latinform>*ni̯o</latinform>, GSR #94a-e &apos;woman, lady, girl&apos;;
    Coblin 86:161 ST <latinform>*nr̵yak</latinform> &gt; OC <latinform>*nrjakx</latinform>; B &amp; S
    2011 <latinform>*nraʔ</latinform>; Mand. <latinform>nǚ</latinform>.</par>'
