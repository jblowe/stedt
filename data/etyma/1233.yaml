notes:
- type: T
  text: '<par>The present reconstruction is a revision of <latinform>gop ⪤ kop</latinform>, found in HPTB
    #11a. This revision seems to go better with the Baxter/Sagart reconstruction of the Chinese comparandum
    (see below).</par><par>This etymon, with velar stop or fricative initial reflexes, seems clearly to
    have an allofamic relationship to <xref ref="2767">#2767</xref>. Other TB etyma showing variation
    between velar and zero (=glottal stop) initial include NEEDLE <reconstruction>*kap</reconstruction>
    (but WB <latinform>ʔap</latinform>), HOUSE <reconstruction>*kyim</reconstruction> (but WB <latinform>ʔim</latinform>),
    etc. See STC pp. 25-6, Matisoff 1997 (&quot;Primary and secondary laryngeal initials in TB&quot;),
    and HPTB p. 57.</par><par>This widely-attested root includes both simplex and causative allofams (thus
    the variation in voicing). It occurs in Tani, Himalayish, Jingpho, and perhaps Karenic. There is also
    a good Chinese comparandum, <hanform>蓋</hanform>, meaning &apos;cover; lid&apos; (below).</par>'
- type: F
  text: '<par><hanform>蓋</hanform> OC <latinform>*gɑ̂p</latinform>/<latinform>*kɑ̂b</latinform>&gt;<latinform>*kɑ̂d</latinform>,
    GSR #642q, ‘to cover, thatch’ <plainlatinform>⪤</plainlatinform> &apos;a cover, lid&apos;; Li 1971:
    <latinform>*gap</latinform>/<latinform>*kabh</latinform>&gt;<latinform>*kadh</latinform>; Baxter 1992
    #1732, 1731: <latinform>*ɦkap</latinform>/<latinform>*kaps</latinform>&gt;<latinform>*kats</latinform>;
    Mand. <latinform>hé</latinform> <plainlatinform>⪤</plainlatinform> <latinform>gài</latinform>.</par><par>These
    two related words perhaps derive from an unattested root <reconstruction>*kap</reconstruction>.  The
    noun has an <reconstruction>*-s</reconstruction> suffix, which derives a passive noun from a transitive
    verb (i.e. ‘the thing that is used to cover’ &gt; ‘a lid’).  In the verb form, Baxter’s <reconstruction>*ɦkap</reconstruction>
    develops as <reconstruction>*gap</reconstruction>, the notation suggesting morphological derivation
    from a root with initial <reconstruction>*k-</reconstruction>.  While voicing derivation is a well-known
    Old Chinese morphological process, it usually derives intransitives from transitive verbs, so the
    function here is not clear.</par><par>The only difficulty with the TB comparison is the vowel.  While
    Baxter’s six-vowel system permits the possibility of reconstructing <reconstruction>*ɦkop</reconstruction>
    or <reconstruction>*gop</reconstruction> for the verb, the noun must be reconstructed with <reconstruction>*a</reconstruction>
    to account for subsequent sound changes, and this forces a reconstruction of <reconstruction>*a</reconstruction>
    in the verb as well.</par><par>It is possible that OC <reconstruction>*a</reconstruction> corresponds
    regularly to PTB <reconstruction>*o</reconstruction> before bilabial codas.  Unfortunately, there
    are very few proposed cognate sets that would help us establish or refute such a possibility.<br />[ZJH]</par>'
- type: F
  text: '<par><hanform>盍</hanform> OC <latinform>*g’ɑ̂p</latinform>, GSR #642n-o &apos;join, unite; door
    leaf&apos;; Schuessler 2007:275 <latinform>*gâp</latinform>; B &amp; S 2011: <latinform>*m-kˁap {m-[k]ˁap}</latinform>;
    Mand. <latinform>hé</latinform>.<br /><hanform>蓋</hanform> OC <latinform>*g’ɑ̂p</latinform>; <latinform>*kɑ̂b</latinform>
    &gt; <latinform>*kɑ̂d</latinform>; GSR #642q-r &apos;thatch, cover (v.); cover, lid (n.)&apos;; Schuessler
