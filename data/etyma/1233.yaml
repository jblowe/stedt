    OC <latinform>*g’əp</latinform>, GSR #675a-d &apos;join, unite; harmony; close, shut&apos;; Schuessler
    2007:274 <latinform>*gə̂p</latinform>; B &amp; S 2011: <latinform>*m-kˁop</latinform>; Mand. <latinform>hé</latinform>.<br
    /><hanform>洽</hanform> OC <latinform>*g’ɛp</latinform>, GSR #675m &apos;unite, assemble; accord with&apos;;
    Schuessler 2007:274 <latinform>*grə̂p</latinform>; B &amp; S 2011: <latinform>*ɢˁ‹r›op {[ɢ]ˁ‹r›[o]p}</latinform>;
    Mand. <latinform>qià</latinform>.<br /><hanform>翕</hanform> OC <latinform>*χi̯əp</latinform>, GSR
    #675q &apos;united; harmonious&apos;; Schuessler 2007:274 (<latinform>*həp</latinform>); B &amp; S
