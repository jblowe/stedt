notes:
- type: T
  text: '<par>This root appears mainly in Southern Loloish. It is reconstructed as PLB <reconstruction>*loŋ²</reconstruction>
    in Bradley 1979, #119A. The putative Womatu (Kuki-Chin) cognate with voiceless lateral leads me to
    reconstruct this etymon as <reconstruction>*s-loŋ</reconstruction> at the PTB level. This etymon bears
    some resemblance to <reconstruction>*b-raŋ</reconstruction> CHEST, but we are keeping them separate
    for now, despite the similarity between, e.g. WB <latinform>raŋ-pat</latinform> &apos;chest&apos;
    and Bisu <latinform>lɔŋ-pɛ́t</latinform> &apos;breast&apos;, where the second syllables are both assigned
    to <xref ref="3463">#3463</xref>.</par>'
