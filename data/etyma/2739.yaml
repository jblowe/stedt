  text: <par>As indicated in HPTB p. 380, it is sometimes quite difficult to distinguish the Loloish reflexes
    of the present root from those of <xref ref="2313">#2313</xref>. For now, we are assigning most forms
    with front vowels to <xref ref="2313">#2313</xref> and most of the others to <xref ref="2739">#2739</xref>.</par><par>The
    sambar (or sambhur) deer is a large species, <emph>Cervus unicolor</emph>.</par>
