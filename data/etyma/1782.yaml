  text: <par>For now, the reflexes with back vowels are deemed to descend from <latinform>*mwa</latinform>,
    while those with front vowels are assumed to come from <reconstruction>*mya-n</reconstruction>.</par><par>The
    Jingpho form seems to incorporate the nominalizing suffix <latinform>*-n</latinform>. See HPTB:439-453.
    According to Dai 1983:515, there is a minimal pair between <latinform>mǎ³³ jen³³</latinform> &apos;tin&apos;
    and <latinform>mǎ³³ je̠n³³</latinform> &apos;spit&apos;, with the latter showing constriction of
    the vowel of the full syllable. The latter form was interpreted in HPTB:115 as being due to a glottal
    prefix, i.e. Pre-Jingpho <latinform>*məʔyen</latinform>.</par>
