- type: T
  text: <par>At first glance, WB <latinform></latinform> seems to contradict this reconstruction, since
    the regular reflex of PTB <latinform>*-waŋ</latinform> is <latinform>-waŋ</latinform>. However, there
    are possible WB allofams <latinform>lwaŋʼ</latinform> and <latinform>hlwaŋʼ</latinform>, which are
    in its favor. These latter two WB forms are a simplex / causative pair, so we reconstruct the <latinform>*s-</latinform>
    prefix to accommodate the causative allofam.</par><par>For a similar semantic connection between CORPSE
    and WITHERED OBJECT, see <xref ref="19">#19</xref>.</par>
