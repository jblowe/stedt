notes:
- type: F
  text: '<par><hanform>出</hanform> OC <latinform>*t̑’i̯wət</latinform>, GSR #496a-e; Chou 1972:213; Mand.
    <latinform>chū</latinform>.</par><par>This character, which means &apos;emerge&apos; in Modern Chinese,
    is glossed &apos;nephew, descendant&apos; in <hanform>爾雅</hanform> <emph>Er Ya</emph> (see Benedict
    1942, &apos;Tibetan and Chinese kinship terms&apos;). The OC form <latinform>*t̑’i̯wət</latinform>
    is treated as a <latinform>-*t</latinform>-suffixed variant of PTB <latinform>*m-(t/d)u</latinform>.
    </par><par>Due to a typographical error, a wrong character (<hanform>畀</hanform>, Mand. <latinform>bì</latinform>,
    &apos;confer, give&apos;) was cited in HPTB:200 instead of <hanform>出</hanform> (Mand. <latinform>chū</latinform>),
    cited correctly on p. 464.</par>'
