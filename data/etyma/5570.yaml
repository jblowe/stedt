references: cf. HPTB p. 396
notes:
- type: T
  text: <par>This root displays considerable vocalic alternation, ranging, e.g. from <latinform>*dar</latinform>
    (in Bodic) to <latinform>*dur</latinform> (in Tani) to <latinform>*dir</latinform> (in Tangkhulic).
    The <latinform>-u- ⪤ -i-</latinform> alternation is well established at all stages of TB (HPTB:493-505).
    The <latinform>-a- ⪤ -u-</latinform> alternation is attested but much rarer (see e.g. <xref ref="1417">#1417</xref>
    [HPTB:513]).</par><par>The Written Burmese / Chin comparison is due to Kenneth VanBik.</par><par>A
    nasal prefix is attested in Bodic and Qiangic / rGyalrongic.</par><par>There is a promising Chinese
    comparandum.</par>
- type: F
  text: '<par><hanform>彈</hanform> OC <latinform>*d’ɑ̂n</latinform>, GSR #147n &apos;shoot pellets; beat;
    shake&apos;; Coblin 1986:152 ST <latinform>*dar</latinform> &gt; OC <latinform>*dan</latinform>; Schuessler
    2007:206, 489 <reconstruction>*dân</reconstruction>; B &amp; S 2011: <latinform>*dˁar {(Cə.)[d]ˁar}</latinform>;
    Mand. <latinform>tán</latinform>.<br /><hanform>彈</hanform> OC <latinform>*d’ɑ̂n</latinform>, GSR
    #147n &apos;bow for shooting pellets; pellet&apos;; Schuessler 2007:490 <latinform>*dâns</latinform>;
    B &amp; S 2011: <latinform>*Cə.dˁar-s {Cə.[d]ˁar-s}</latinform>; Mand. <latinform>dàn</latinform>.<br
    /><hanform>憚</hanform> OC <latinform>*d’ɑ̂n</latinform>, GSR #147o &apos;fear, dislike&apos;; Coblin
    86:152 ST <latinform>*dar</latinform> &gt; OC <latinform>*danh</latinform>; Schuessler 2007:206 <latinform>*dâns</latinform>;
    Mand. <latinform>dàn</latinform>.<br /><hanform>戰</hanform> OC <latinform>*t̂i̯ɑn</latinform>, GSR
    #147r &apos;tremble, fear; fight, battle, war&apos;; Schuessler 2007:206, 605 <latinform>*tans</latinform>;
    B &amp; S 2011: <latinform>*tar-s</latinform>; Mand. <latinform>zhàn</latinform>.</par><par>The Chinese/Tibetan
    comparison is due to Coblin 1986:152. The Chinese word has meanings ranging from &apos;shoot pellets&apos;
    to &apos;beat&apos; to &apos;play on a stringed instrument&apos; to &apos;shake&apos;. The semantic
    development to the latter meaning is probably due to the trembling of a string being played.</par><par>S611
    <hanform>娠</hanform> <hanform>振</hanform> <hanform>晨</hanform></par>'
