- type: T
  text: <par>The last syllable of the Lahu form <latinform>khɨ-mɛ̄-<emph>cu</emph></latinform> &apos;heel&apos;
    also occurs in <latinform>làʔ-mɛ̄-<emph>cu</emph></latinform> &apos;elbow&apos; and <latinform>qhɔ-<emph>cu</emph></latinform>
    &apos;hill, mountain peak&apos;, and seems to mean &quot;rounded object&quot;. (The form <latinform>cwi</latinform>
    is a more colloquial variant of <latinform>cu</latinform>. See GL:19.)</par><par>Further confirmation
    of this root would be welcome.</par>
