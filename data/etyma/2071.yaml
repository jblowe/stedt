- type: F
  text: '<par><hanform>糲</hanform> OC <latinform>*lɑ̂d</latinform> ~ <latinform>*li̯ɑd</latinform> ~ <latinform>*lɑ̂t</latinform>,
    GSR #340g &apos;grain (dehusked but not polished)&apos;; Schuessler 2007:352 <latinform>*rats</latinform>;
    B &amp; S 2011: <latinform>*rat-s {([m]ə-)rat-s}</latinform>; Mand. <latinform>lì</latinform>.<br
    /><hanform>粺</hanform> OC <latinform>*b’ĕg</latinform>, GSR #874t &apos;fine grain&apos;; Schuessler
    2007:155 <latinform>*brêh</latinform>; B &amp; S 2011: <latinform>*C.bˁre-s {C.[b]ˁre-s}</latinform>;
    Mand. <latinform>bài</latinform>.</par>'
- type: T
  text: <par>An Austronesian connection has long been suggested for this root (cf. Malay <latinform>bəras</latinform>
    &lt; Proto-Indonesian <latinform>*bəɣa/s</latinform> &apos;husked rice&apos;) although this etymology
    has been rejected by Benedict (1975:104), who prefers to relate the WT form to Chinese 飯 &apos;cooked
    rice or millet&apos; (OC <latinform>*b&apos;i̯wăn</latinform>; <plainlatinform>GSR 262i</plainlatinform>),
    on the grounds that the basic meaning of the TB etymon is FRUIT / BEAR FRUIT (cf. WT <latinform>ḥbras-bu</latinform>
    &apos;fruit, corn, grain&apos;). See Gong 2001:23.</par>
