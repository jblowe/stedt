  text: '<par>This is a small nocturnal arboreal primate, <emph>Nycticebus coucang</emph>.</par><par>A
    slightly different reconstruction is given in DL:1397: PLB <latinform>*s-loŋ¹</latinform>. The initial
    element is undoubtedly from the PTB &quot;animal prefix&quot;, ult. from PTB <latinform>*sya</latinform>.
    (At the Proto-Loloish level, it is difficult to distinguish between prefixal <latinform>*s-</latinform>
    and <latinform>*ʔ-</latinform>.)</par>'
