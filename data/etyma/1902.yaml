notes:
- type: T
  text: <par>This morpheme is actually a general noun suffix in Tibetan and other languages. For ease
    of reference, however, nouns with this suffix relating to the body are here assembled in one place.
    See Jäschke:324-325.</par><par>Written Tibetan has the three suffixes <latinform>-pa</latinform>,
    <latinform>-ba</latinform>, and <latinform>-po</latinform>, which sometimes have nominalizing force,
    but often merely serve to provide an additional syllable to a noun root. After a verbal root, <latinform>-pa</latinform>
    behaves rather like English &apos;to&apos;, used in the citation form of verbs, creating a kind of
    infinitive or verbal noun.</par>
