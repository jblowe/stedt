notes:
- type: T
  text: '<par>This etymon should be kept distinct from the similarly-shaped forms <xref ref="206">#206</xref>  which
    occurs mostly in forms for ‘back’  and means ‘body’  only by extension, and <xref ref="2252">#2252</xref>
    which also occurs in some forms meaning ‘back’. All three roots are etymologically unrelated.</par><par>Many
    Loloish forms have reflexes which might be attributed equally well to <xref ref="2">#2</xref> or <xref
    ref="206">#206</xref>. In the absence of more precise research into Northern Yi rhyme correspondences,
    we are here adopting the rather arbitrary choice of attributing all Loloish forms meaning BACK to
    the present root.</par><par>See STC p. 182, n. 479; HPTB: 19, 309.</par><par>There is a good  Chinese
    comparandum, <hanform>躬</hanform> .</par>'
- type: F
  text: '<par><hanform>躬</hanform> OC <latinform>*ki̯ông</latinform>, GSR #1006e-f; Coblin 86: <latinform>*kjəngw</latinform>;
    B &amp; S 2011 <latinform>*kuŋ {k(r)uŋ}</latinform>; Mand. <latinform>gōng</latinform>.</par>'
