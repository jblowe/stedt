notes:
- type: T
  text: '<par>This root could take either the <latinform>*-n</latinform> suffix (as in Sunwar, Newar,
    and Chinese) or the <latinform>*-t</latinform> suffix (as in Jingpho).</par><par>Many languages have
    binomes meaning SMOKE, where the first element is <xref ref="2136">#2136</xref>. This first element
    is sometimes &quot;prefixized&quot; to simple <latinform>m-</latinform>, as in Ergong/Daofu.</par><par>Many
    Loloish languages (e.g., Lahu <latinform>mû-qhɔ̂</latinform>) have a similar but different formation
    where the first element is from <xref ref="2473">#2473</xref>.</par><par>Lahu has a doublet derived
    from this etymon: <latinform>mû-qhɔ̂</latinform> &apos;smoke&apos; &lt; PLB <latinform>*kəw²</latinform>
    ⪤ <latinform>qhɔ̀ʔ-lá</latinform> &apos;ashes&apos; &lt; PLB <reconstruction>*kutᴸ</reconstruction></par>'
- type: F
  text: '<par><hanform>熏</hanform> OC <latinform>*xi̯wən~χi̯wən</latinform>, GSR #461a-c &apos;smoke,
    steam, ablaze&apos;; B &amp; S 2011: <latinform>*qʰun {qʰu[n]}</latinform>; Mand. <latinform>xūn</latinform>.</par>'
