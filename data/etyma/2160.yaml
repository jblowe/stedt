- type: T
  text: <par>As discussed in Matisoff 1988 (&quot;Straight, flat, full&quot;), this root is allofamically
    related both to <xref ref="707">#707</xref> and <xref ref="111">#111</xref>, the common semantic core
    being &quot;a complete or ideal realization of a quality appropriate to a particular dimensionality
    in space&quot;.</par>
- type: F
