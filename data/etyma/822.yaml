notes:
- type: T
  text: <par>This root typically appears as the final morpheme in words for bodily orifices (anus, ear,
    mouth, nostril, throat, trachea, vagina), as well as words describing inanimate openings like caves
    and wells.</par><par>The Tiddim forms meaning &apos;hole&apos; with initial <latinform>w-</latinform>
    appear to be cognate, although the loss of the initial dental stop is not parallelled elsewhere. Note
    the Tiddim allofam <latinform>daŋ</latinform> &apos;throat&apos; where the initial stop is preserved.</par><par>The
    apparent lateral prefix in the second syllable of the WT word for &apos;throat&apos; (<latinform>&apos;ol-ldoṅ</latinform>)
    seems to be merely a perseverative effect of the preceding syllable with final <latinform>-l</latinform>.</par>
- type: T
  text: <par>Cf. Chinese <latinform>tǔng</latinform> ‘tube’ , GSR 1176g.</par>
