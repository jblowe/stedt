notes:
- type: T
  text: '<par>WB <latinform>bhâi</latinform> (&lt; Tone *2); Lahu <latinform>á-pɛ̀</latinform> (&lt; Tone
    *1); Mpi <latinform>tɕa²peʔ⁴</latinform> seems to reflect a prototype with final stop. The unusual
    WB initial (Bradley #53a reconstructs <latinform>ʔ-b</latinform>) adds to the impression that this
    is a loanword, and in fact a Southeast Asian areal etymon. Cf. PTai <latinform>*pet</latinform>. Benedict
    reconstructs Proto Austro-Tai <latinform>*bets</latinform> (1975a, p. 276).</par><par>This root appears
    primarily in Lolo-Burmese, with perhaps a couple of scattered borrowings in Qiangic.</par><par>Other
    areal words for DUCK that have been borrowed into TB are Indo-Aryan <xref ref="5716">#5716</xref>,
    Nepali <xref ref="5717">#5717</xref>, and Mandarin <xref ref="5718">#5718</xref>.</par>'
- type: F
  text: '<par><hanform>鴄</hanform> OC (<latinform>*p’i̯ĕt</latinform>), GSR (not in #408) &apos;duck&apos;;
    Schuessler 2007:413 <latinform>*phit</latinform>; B &amp; S 2011: <latinform>*pʰit {pʰi[t]})</latinform>;
    Mand. <latinform>pǐ</latinform>.</par>'
