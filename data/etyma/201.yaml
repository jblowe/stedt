notes:
- type: T
  text: <par>The PKC etymon <latinform>*khel</latinform> (a meso-root of <xref ref="202">#202</xref>)
    definitely seems related to this root, perhaps pointing to a PKC variant <latinform>*k(y)al</latinform>.</par><par>The
    meaning of this etymon ranges from KIDNEY / SMALL OF BACK to the notion of CARRY ON THE BACK / LOAD.
    There also seems to be a relationship with the widespread root <xref ref="2355">#2355</xref>, which
    perhaps indicates an original meaning like &apos;a complete load; everything that can be placed on
    a beast of burden at one time.&apos;</par><par>The original meaning of the graph <hanform>荷</hanform>
    of the Chinese comparandum was &apos;lotus&apos;, as witness its &quot;grass radical&quot;, but it
    came to be used as a loan character for the concept CARRY (in the Confucian Analects [Lún Yǔ <hanform>论语</hanform>])
    and for SUSTAIN (in the Zuǒ Zhuàn [<hanform>左傳</hanform>], one of the commentaries on the Spring
    and Autumn Annals).</par>
- type: F
  text: '<par><hanform>荷</hanform> OC <latinform>*gʼɑ̂</latinform>, GSR #1o &apos;carry, sustain&apos;;
