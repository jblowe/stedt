notes:
- type: T
  text: <par>This is an East / Southeast Asian areal word; cf. Siamese <latinform>khlɔɔŋ</latinform>,
    Old Mon <latinform>kruŋ</latinform>, Cham <latinform>krauŋ</latinform>. HPTB reconstructs two separate
    roots (<latinform>*kluŋ ⪤ kluk</latinform> and <latinform>*klyoŋ</latinform>), although it suggests
    that the two are related. We treat them here as co-allofamic.</par><par>Chinese <latinform>kuk ~ gi̯uk</latinform>
    &apos;valley&apos; reflects the allofam with final stop.</par><par>It seems likely that this etymon
    is related to <xref ref="1277">#1277</xref>.</par>
- type: F
  text: '<par><hanform>谷</hanform> OC <latinform>*kuk~gi̯uk</latinform>, GSR #1202a-c &apos;valley&apos;;
    B &amp; S 2011: <latinform>*C.qˤok</latinform>; Mand. <latinform>gǔ</latinform>.<br /><hanform>江</hanform>
    OC <latinform>*kŭng</latinform>, GSR #1172v &apos;(Yangtze) river&apos;; B &amp; S 2011: <latinform>*kˤroŋ</latinform>;
    Mand. <latinform>jiāng</latinform>.<br /><hanform>港</hanform></par>'
