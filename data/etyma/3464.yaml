notes:
- type: T
  text: '<par>This etymon is particularly well attested in Himalayish. Most of the NE Indian Areal Group
    forms (especially those with <latinform>-ma</latinform> as final syllable) look like loans from Tibetan.
    The root also occurs in Baic. There are several possible explanations for the final <latinform>-m</latinform>
    in certain Himalayish forms (Bantawa, Chamling, Hayu), as well as the nasalization in Bai <latinform>ɯ̃</latinform>
    &apos;nurse; suckle&apos;: (a) they could be due to rhinoglottophilia<footnote>See Matisoff 1975.</footnote>
    because of the zero or glottal-stop initial; (b) they could have arisen by assimilatory epenthesis
    to the initial <latinform>p-</latinform> of the following syllable; or (c) they could have been metanalyzed
    from the initial of the second syllable of the binome <reconstruction>*o-ma</reconstruction>, which
    might originally have been borrowed from Tibetan as a unit before being reduced to a single syllable
    in the new Bantawa/Chamling compounds. The development of <reconstruction>*wa</reconstruction> &gt;
    WT <latinform>o</latinform> is regular, e.g. <reconstruction>*swa</reconstruction> TOOTH &gt; WB <latinform>swâ</latinform>/WT
    <latinform>so</latinform>; <reconstruction>*g-lwat ⪤ *s-lwat</reconstruction> LOOSEN / FREE &gt; WB
    <latinform>lwat/hlwat ⪤ kywat/khywat</latinform>/WT <latinform>glod-pa ⪤ hlod-pa</latinform>.</par>'
- type: T
  text: <par>This root appears principally in Himalayish and contiguous languages of the NE Indian Areal
    Group, but also in Bai, so that it must be set up for PTB.</par>
