notes:
- type: T
  text: <par>For the moment, we are reconstructing this root as a separate item from <xref ref="689">#689</xref>.
    However, Kanauri <latinform>stiŋ</latinform> is a regular reflex of the latter, since the initial
    sequence <latinform>*sn-</latinform> is regularly obstruentized into Kanauri <latinform>st-</latinform>
    (see HPTB p. 103).</par><par>A number of Qiangic forms with complex initials are also provisionally
    assigned to this root.</par><par>It is highly likely that this root is indeed ultimately related to
    <xref ref="689">#689</xref>.</par>
