notes:
- type: T
  text: '<par>This etymon seems basically to belong in masculine semantic space, since most TB reflexes
    mean PENIS. The likely Chinese comparandum <hanform>牡</hanform>, Mand. <latinform>mǔ</latinform>,
    means MALE (of certain birds and animals; see below), and this sense also occurs in TB (see Taraon
    <latinform>mau-a</latinform>, below), implying that MALE is the more original meaning.</par><par>Benedict
    1979<footnote>&quot;A note on Karen genital flipflop&quot;, LTBA 5.1:22-23, n. 36.</footnote> suggests
    a connection with PTB <reconstruction>*maːk</reconstruction> (better <reconstruction>*s-maːk</reconstruction>)
    &apos;son-in-law&apos; [STC #324; HPTB p. 325]: cf. WT <latinform>mag-pa</latinform>, Lepcha <latinform>myok</latinform>,
    Dhimal <latinform>hma-wa</latinform>, Miri <latinform>mak-bo ~ mag-bo</latinform>, Jingpho <latinform>dà-máʔ</latinform>,
    WB <latinform>səmak</latinform>, Lahu <latinform>ɔ̀-má-pā</latinform>, Lushai [Mizo] <latinform>maːk-pa</latinform>.
    The long vowel is supported by the Mizo form, and the <reconstruction>*s-</reconstruction> prefix
    is evidenced indirectly by Lepcha (where <latinform>-y-</latinform> &lt; <reconstruction>*s-</reconstruction>),
    and directly by Dhimal and WB. This <reconstruction>*s-</reconstruction> prefix is in turn undoubtedly
    a reduction of PTB <reconstruction>*za</reconstruction> SON / CHILD.</par><par>Nevertheless, this
    root has undergone an enantiodromic shift or &quot;genital flipflop&quot; to mean VAGINA in both Karbi
    and (probably) Newar (neither of these forms was cited in Benedict 1979), so that it was evidently
    reinterpreted in some areas as &apos;genitals (of either sex)&apos;. This makes one wonder whether
    the root <xref ref="1353">#1353</xref>, reconstructed on the basis of forms from Naga languages, might
    also be somehow related to the present etymon.</par>'
- type: F
  text: '<par>A likely Chinese comparandum has been suggested by Benedict 1979, pp. 22-23 and n. 36: <hanform>牡</hanform>
    OC <latinform>*môg</latinform>/<latinform>*mə̯u</latinform> [irreg.], GSR #1063a ‘male (quadruped)&apos;;
    Li 1971: <latinform>*məgwx</latinform>; Baxter 1992: <latinform>*m(r)juʔ</latinform>; Mand. <latinform>mǔ</latinform>
    [JAM].</par><par>The Middle Chinese reflex of this word has irregular vocalism: <latinform>*mə̯u</latinform>.
    This accounts for the discrepancy between Baxter&apos;s reconstruction (with medial <reconstruction>*-j-</reconstruction>)
    and Li&apos;s (without medial <reconstruction>*-j-</reconstruction>). The presence of <reconstruction>*-j-</reconstruction>
    in Baxter&apos;s form accounts regularly for vocalic development, but the medial itself must then
    be assumed to drop irregularly in Middle Chinese.</par><par>The proposed connection to PTB <reconstruction>*maːk</reconstruction>
    presents some difficulties. The Chinese vocalism would normally correspond to a rounded PTB vowel.  (See
    examples in Gong 1995 #61-69.) Although those open syllables in OC reconstructed with <reconstruction>*-g</reconstruction>
    by Karlgren and Li sometimes correspond to syllables with coda <reconstruction>*-k</reconstruction>
    in PTB, more generally we find OC <reconstruction>*-k</reconstruction> corresponding to PTB <reconstruction>*-k</reconstruction>
    and open syllables corresponding to open syllables.</par><par>Schuessler 2007:391 argues that the
    Chinese word is related to Austroasiatic forms meaning &apos;male animal&apos;.<br />[ZJH]</par>'
