notes:
- type: T
  text: '<par>This relatively sparsely attested root occurs especially in Qiangic with likely but scattered
    cognates in Kuki-Chin and Newar. Both the nasal and sibilant prefixes show up in Qiangic.</par><par>There
    is a possible etymological connection with <xref ref="1603">#1603 </xref> and <xref ref="1168">#1168
    </xref>. See HPTB p. 165 and TBRS #1. For the interplay between labial stops and semivowel in Tibeto-Burman,
    see Matisoff 2000 (&quot;An Extrusional Approach to <latinform>*p-/w-</latinform> Variation in Sino-Tibetan&quot;).</par><par>This
    root seems quite distinct from the Indo-Aryan derived <xref ref="706">#706</xref>.</par>'
