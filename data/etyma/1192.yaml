notes:
- type: T
  text: <par>The final liquid is attested directly in Kaman, Karbi, Tsangla, and Tshona, and indirectly
    in Manang, Thakali, Bantawa, and Chinese (all of which have a final nasal). The final <latinform>-i</latinform>
    in Bantawa <latinform>ŋai wa</latinform> and Chamling <latinform>ngai</latinform> is also perhaps
    a reflex of this final liquid. The <latinform>*r-</latinform> prefix is attested in rGyalrongic.</par><par>The
    Written Tibetan rhyme <latinform>-o</latinform> is a regular reflex of PTB <latinform>*-wa</latinform>
    (cf. <xref ref="632">#632</xref> &gt; WT <latinform>so</latinform>).</par><par>There is no apparent
    relation to PTai *<latinform>hnaa-C</latinform> &apos;face&apos;.</par><par>The final nasals in the
    Tamang and Magar forms are either to be attributed to the final <latinform>-l</latinform> or to assimilation
    from the nasal initial.</par><par>There is a Chinese comparandum (<hanform>顏</hanform>) reconstructed
    in GSR 199c with final <latinform>-n</latinform>. Again, it is possible to assign this to <xref ref="2017">#2017</xref>
    rather than to the present allofam.</par>
- type: F
  text: <par><hanform>顏</hanform> <xref ref="2533">#2533</xref>.</par>
