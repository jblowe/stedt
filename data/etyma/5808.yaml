notes:
- type: F
  text: '<par><hanform>渡</hanform> OC <latinform>*d’ɑ̂g</latinform>, GSR #801b &apos;cross over, ford,
    ferry&apos;; Coblin 86:116 ST <latinform>*daɣ</latinform> &gt; OC <latinform>*dagh</latinform>; Schuessler
    2007:218 <latinform>*dâkh</latinform>; B &amp; S 2011: (<latinform>*dˁak-s</latinform>); Mand. <latinform>dù</latinform>.</par><par><latinform>Comment:</latinform>
    The Chinese comparandum suggests a PST variant with final velar stop, while the WT allofam <latinform>&apos;das</latinform>
    seems to indicate suffixal <latinform>-s</latinform>.</par>'
- type: T
  text: <par>There is a look-alike in Proto-Tai, <latinform>*da</latinform><sup>B2</sup>, cf. Siamese
    <latinform>thâa</latinform>. See Li Fang Kuei 1977:104 &apos;wharf, ford&apos;. Li notes (p. 105)
    that in most Central and Northern Tai dialects, this word means &apos;river&apos;. This Tai root is
    very possibly an old loan from Chinese.</par>
