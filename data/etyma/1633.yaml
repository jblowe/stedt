notes:
- type: T
  text: <par>This etymon means CHILD. It is included here because of the important WT form <latinform>bu-snod</latinform>
    &apos;womb&apos; (&quot;child-vessel&quot;). Care is required to distinguish this etymon from reflexes
    of <xref ref="1733">#1733</xref>, above. The Tibetan-Chinese comparison is due to Coblin (1986:164).</par>
- type: F
  text: '<par><hanform>僕</hanform> OC <latinform>*b’uk/*b’ôk</latinform>, GSR #1211b &apos;servant, groom,
    male slave&apos;; Li 1971: <reconstruction>*buk</reconstruction>; Baxter 1992: <reconstruction>*bok</reconstruction>;
    Mand. <latinform>pú</latinform>.</par><par>The vowel correspondence is regular, as OC <reconstruction>*-uk</reconstruction>
    (Li)/<reconstruction>*-ok</reconstruction> (Baxter) normally corresponds to PTB <reconstruction>*-uk</reconstruction>,
    as in &apos;bend /crooked&apos; PTB <reconstruction>*guk~*kuk</reconstruction>, OC <hanform>曲</hanform>
    <reconstruction>*khjuk</reconstruction> (Li)/<reconstruction>*kh(r)jok</reconstruction> (Baxter);
    Mand. <latinform>qū, qǔ</latinform>.  However, the presence of coda <reconstruction>*-k</reconstruction>
    in the Chinese form is unexplained.</par><par>Peiros and Starostin (1996.1:57 #203) relate this Chinese
    word to Tibetan <latinform>phrug</latinform> &apos;child&apos; and Burmese <latinform>pauk</latinform>
    &apos;young of animals&apos;.<br />[ZJH]</par>'
