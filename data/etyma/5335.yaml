notes:
- type: T
  text: <par>The initial cluster <latinform>*tr-</latinform> is extremely rare in TB. While the evidence
    from PCC and TGTM is convincing, the Karenic forms apparently descend from a simple dental stop. However,
    the Karenic allofam with medial <latinform>-w-</latinform> suggest that some sort of glide should
    be reconstructed at the PTB level.</par>
