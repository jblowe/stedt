notes:
- type: F
  text: '<par><hanform>亦</hanform> OC <latinform>*zi̯ɑ̆k</latinform>, GSR #800a-c; Li 1971: <latinform>*rak</latinform>;
    Baxter 1992: <latinform>(*ljAk)</latinform>; B &amp; S 2011:  <latinform>*m‑q(r)Ak</latinform>; Schuessler
    2007:568; Mand. <latinform> yì</latinform>.</par><par><hanform>掖</hanform> OC <latinform>*zi̯ɑ̆k</latinform>,
    GSR #800l; Li 1971: <latinform>*rak</latinform>; Baxter 1992: <latinform>(*ljAk)</latinform>; B &amp;
    S 2011: --; Schuessler 2007:568; Mand. <latinform> yì</latinform>.</par><par><hanform>掖</hanform>
    OC <latinform>*zi̯ɑ̆k</latinform>, GSR #800m; Li 1971: <latinform>*rak</latinform>; Baxter 1992: <latinform>(*ljAk)</latinform>;
    B &amp; S 2011: --; Schuessler 2007:568; Mand. <latinform> yì</latinform>.</par><par>These three characters
    are considered by GSR to represent the same lexical item.</par><par>ZJH: It seems likely, as noted
    in Handel 2009:133-5, that the Chinese word began with <reconstruction>*l-</reconstruction> rather
    than Karlgren’s <reconstruction>*z-</reconstruction>, so that this word is a perfect match for the
    basic PTB root <xref ref="695">#695 </xref> rather than <xref ref="696">#696 </xref>. Schuessler (2007:568),
    who like Baxter (1992) reconstructs initial <reconstruction>*j-</reconstruction>, compares this Chinese
    word instead to PTB <reconstruction>*(g-)yak</reconstruction> just as Matisoff does here. Baxter &amp;
    Sagart’s most recent (2011) reconstruction, <reconstruction>*m-q(r)Ak</reconstruction>, would seem
    to make the comparison to PTB problematic, but the general correspondence patterns of their uvular
    initial <reconstruction>*q-</reconstruction> in Tibeto-Burman are unclear, so the possibility of a
    comparison of the root <reconstruction>*qAk</reconstruction> to PTB <reconstruction>*g-yak</reconstruction>
    is not out of the question (<reconstruction>*m-</reconstruction> is a human body part prefix). Because
    Baxter and Sagart have not published a full explanation of their individual reconstructions, it is
    not clear why they have chosen to reconstruct <reconstruction>*q-</reconstruction> for this word,
    but most likely it is because uvular initials are reconstructed for other words in GSR #800 and #954.
    </par>'
