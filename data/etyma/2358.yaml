notes:
- type: T
  text: '<par>Coblin (1986: 47) suggests a relationship between this PTB root and Chinese <hanform>弓</hanform>
    (Mand. <emph>gōng</emph>) &apos;bow&apos;, the semantic connection residing in the shape of a bent
    tree branch. Cf. Written Burmese <latinform>ə-kuing</latinform> &apos;stalk, branch&apos;, <latinform>kuing</latinform>
    &apos;hang over in a curve&apos;, <latinform>ə-kùing</latinform> &apos;large branch, bough of tree&apos;.</par><par>Jingpho
    has forms with medial <latinform>-ji-</latinform> (<latinform>lă³¹<emph>kji̱ŋ³¹</emph></latinform>
    &apos;branch / twig&apos; [TBL], <latinform>phun⁵⁵lă³¹<emph>kji̱n³¹</emph></latinform> &apos;branch&apos;
    [ZMYYC]), which are perhaps related to the present root.</par>'
- type: F
