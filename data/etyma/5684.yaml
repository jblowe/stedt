notes:
- type: T
  text: <par>This root is universal in Lolo-Burmese, and also appears in two adjacent Qiangic languages
    influenced by LB, as well as in Naxi.</par><par>The WB reflex has <latinform>-o</latinform> instead
    of the expected <latinform>-u</latinform>, perhaps reflecting a variant with PLB <latinform>*-aw</latinform>.
    Several Burmish languages have the diphthongal reflex <latinform>-ai</latinform>. This suggests that
    the PLB rhyme is still subject to revision.</par>
