notes:
- type: T
  text: '<par>This etymon has solid reflexes in the NE Indian Areal Group (Garo, Karbi) and Himalayish
    (Lepcha, Manchati). Several Chinese comparanda suggest themselves: <hanform>雄</hanform> OC <latinform>*gi̯ŭng</latinform>,
    GSR #887l &apos;male&apos;; Mand. <latinform>xióng</latinform>, and/or <hanform>犅</hanform> OC <reconstruction>*kɑ̂ng</reconstruction>,
    GSR #697f-g, &apos;bull&apos;; Mand. <latinform>gāng</latinform>. A less plausible comparison is with
    <hanform>公</hanform> OC <latinform>*kung</latinform>, GSR #1173a-f &apos;father; prince&apos;; Mand
    <latinform>gōng</latinform> (although Karlgren notes that &apos;some of these forms seem to suggest
    a phallic interpretation&apos;). STC (n. 488, p. 190) suggests comparing this last Chinese morpheme
    to TB forms like Rawang <latinform>əkhaŋ</latinform> &apos;grandfather&apos;; WB <latinform>pha’-khaŋ</latinform>
    &apos;father&apos;, <latinform>mi’-khaŋ</latinform> &apos;mother&apos;, <latinform>khaŋ-pwân</latinform>
    &apos;spouse&apos;, and <latinform>khaŋ-bhya</latinform> &apos;sir; madam&apos;. It seems unlikely,
    however, that this group of forms has anything specifically to do with maleness; it seems rather to
    have been an honorific appellation for an elder or respected relative of either sex.</par>'
- type: F
  text: '<par><hanform>雄</hanform> OC <latinform>*gi̯ŭng</latinform>, GSR #887l &apos;male&apos;; Li 1971:
    <latinform>*gwjəng</latinform>; Baxter 1992 #1348: <latinform>*wjɨng</latinform>; Mand. <latinform>xióng</latinform>.</par><par>This
    proposed cognate is doubtful.  The OC labialized initial plus schwa vocalism would normally correspond
    to a rounded vowel in PTB.<br />[ZJH]</par>'
- type: F
  text: '<par><hanform>犅</hanform> OC <reconstruction>*kɑ̂ng</reconstruction>, GSR #697f-g ‘bull’; Li
    1971: <reconstruction>*kang</reconstruction>; Baxter 1992: <reconstruction>*kang</reconstruction>;
    Mand. <latinform>gāng</latinform>.</par><par>The proposed cognacy works phonetically, but one must
    also note a competing etymology with equally persuasive semantics that relates this Chinese word to
    WT <latinform>glang</latinform> ‘cow, elephant’.  (Gong 1995 and 2001 instead relate WT <latinform>glang</latinform>
    to OC &apos;elephant&apos; <hanform>象</hanform> <reconstruction>*gljangx</reconstruction> &gt; <reconstruction>*ljangx</reconstruction>.)</par><par>Schuessler
    (2007:251) suggests that <hanform>犅</hanform> may come from earlier <reconstruction>*klaŋ</reconstruction>,
    and posits a relationship with Mru <latinform>klaŋ</latinform> &apos;male&apos; and Lushai (Mizo)
    <latinform>tlaŋ</latinform> &apos;male&apos;, as well as with WT <latinform>glang</latinform>.  He
    proposes a PTB root <reconstruction>*laŋ</reconstruction> with animal prefix <reconstruction>*s-</reconstruction>
    or <reconstruction>*k-</reconstruction>.<footnote>See the previous etymon <xref ref="1638">#1638</xref>.</footnote></par><par>Note
    the parallel etymology with a homophonous member of the same phonetic series <hanform>岡</hanform>
    ‘ridge’ (Mand. <latinform>gāng</latinform>), which has been compared to WT <latinform>sgang</latinform>
    ‘hill, spur’ and WB <latinform>khang</latinform> ‘strip of high ground’ (see for example Coblin 1986:94-2).<footnote>See
    also HPTB:266, 303. [JAM]</footnote><br />[ZJH]</par>'
