- type: I
  text: <par>JS notes a Padam-Mising L form si-pjak &apos;cotton as it comes from the pod&apos;. JS, HCST:138.
    There are a number of <latinform>*pjak</latinform> reflexes that mean &apos;cotton&apos;, often as
    the second part of a compound in which the first element is &apos;tree&apos;, i.e. &apos;cotton&apos;
    = &apos;tree&apos; + &apos;wool&apos;.</par>
