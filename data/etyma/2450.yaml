notes:
- type: F
  text: '<par><hanform>名</hanform> OC <latinform>*mi̯ĕng</latinform>, GSR #826a-c; B &amp; S 2011: <latinform>*C.meŋ</latinform>;
    Mand. <latinform>míng</latinform>.<br /><hanform>命</hanform> OC <latinform>*mi̯ɑ̌ng</latinform>, GSR
    #762a-b; B &amp; S 2011: <latinform>*mə-riŋ-s (dial. › *mreŋ-s)</latinform>; Mand. <latinform>mìng</latinform>.<br
    /><hanform>令</hanform> OC <latinform>*li̯ĕng</latinform>, GSR #823a; B &amp; S 2011: <latinform>*riŋ-s</latinform>;
    Mand. <latinform>lìng</latinform>.</par>'
- type: T
  text: <par>This etymon is attested universally in Sino-Tibetan. The variant with final dental nasal
    is secondary, reflecting a rather widespread phenomenon of assimilation of final velars to medial
    <latinform>-i-</latinform>.</par><par>The semantic association between NAME and COMMAND probably stems
    from the notion of a superior designating a particular person to carry out a task.</par><par>In Baxter&apos;s
    reconstruction, the OC forms with initial <latinform>*mrj-</latinform> are completely compatible with
    the reconstruction of PST prefixal <latinform>*r-</latinform>, which could easily have metathesized
    with the labial nasal in Chinese.</par>
