notes:
- type: T
  text: '<par>From French 1983 (p.506): &quot;Probably to be referred to PTB <latinform>*pwaːy</latinform>
    &apos;husks, chaff&apos; via a compound like Mk. <latinform>phe ke</latinform>, id., accounting for
    the final <latinform>-k</latinform>. Cf. FRUIT(2), PTB <latinform>*sey</latinform> but NN <latinform>*sek</latinform>.&quot;</par>'
- type: T
  text: <par>An <latinform>*r-</latinform> prefix is attested in Qiangic/rGyalrongic. The final velar
    in Proto-Northern Naga is unexplained.</par>
- type: F
  text: '<par><hanform>秕</hanform> OC <latinform>*pi̯ər</latinform>, GSR #0566q &apos;chaff&apos;; Schuessler
    2007:162 <latinform>*piʔ</latinform>; B &amp; S 2011: <latinform>*pijʔ</latinform>; Mand. <latinform>bǐ</latinform>.</par><par><latinform>Comment:</latinform>
    Also see <hanform>播</hanform> <latinform>bò</latinform>, a comparandum for <xref ref="2184">#2184</xref>.</par>'
