notes:
- type: T
  text: <par>This etymon is probably related to <xref ref="1233">#1233</xref>. Cf. e.g. Ao (Chungli) <latinform>si
    küp</latinform> &apos;skin&apos;, <latinform>küp bang</latinform> &apos;cover (v.)&apos;. Jingpho
    <latinform>ǹ-gùp</latinform> &apos;mouth&apos;, despite its resemblance to Kaman <latinform>gᴜ̀p</latinform>
    &apos;skin&apos; and a possible semantic connection with LIP, is only a remote candidate for relationship.</par><par>In
    several putative cognates (see Yakha, Achang, and perhaps Ahi and Lolopho) this etymon  means &apos;scales
    of fish&apos;.</par><par>See also <xref ref="5516">#5516</xref> for a phono-semantically similar but
    probably distinct root.</par>
