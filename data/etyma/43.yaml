  text: <par>The Nusu voiceless nasals point to an <latinform>ʔ-</latinform> prefix at the PLB stage.
    The Lahu mid tone is also compatible with the glottal prefix.</par><par>It has been suggested that
    there is a connection between this root and <xref ref="2499">#2499</xref>, since lean meat has a red
    appearance due to the lack of fat marbling, but this remains to be seen.</par>
