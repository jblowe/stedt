notes:
- type: T
  text: '<par>This root is reconstructed as <latinform>*m-glun</latinform> (HPTB 73, 125, 198), largely
    because of the voiced initial in the OC comparanda <latinform>*d̑i̯ĕn</latinform> and <latinform>*di̯ən</latinform>
    (GSR #368h &apos;kidney&apos; and #450h-i &apos;small of the back&apos;). On the TB level, however,
    it now seems best to reconstruct it with a voiceless root initial.</par>'
- type: F
  text: '<par><hanform>腎</hanform> OC <latinform>*d̑i̯ĕn</latinform>, GSR #368h &apos;kidney&apos;; B
    &amp; S 2011: <latinform>*ginʔ {(g)i(n)ʔ}</latinform>; Mand. <latinform>shèn</latinform>.<br /><hanform>夤</hanform>
    OC <latinform>*di̯ĕn</latinform>, GSR #450h-i &apos;small of the back, region of the reins&apos;;
    B &amp; S 2011: <latinform>*ɢər {ɢ(r)ə(r)}</latinform>; Mand. <latinform>yín</latinform>.</par>'
- type: I
  text: <par>HPTB (p.73) erroneously reports GSR <latinform>#450h-i</latinform> &apos;small of the back&apos;
    as <latinform>#540h-i</latinform>.</par>
- type: I
  text: <par>[Internal Note:] <emph>GSR <latinform>#450h-i</latinform> now cited correctly in note above
    and in comparandum below</emph>. [spbaron]</par>
