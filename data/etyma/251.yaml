notes:
- type: T
  text: '<par>Note the appearance of this root in the Lepcha form for ‘sperm’: <latinform>nyiŋ (bam-lyan̊)</latinform>
    ‘(abode of the) soul’. </par><par>This root is distinct but closely related to <xref ref="297">#297</xref>
    and <xref ref="1385">#1385</xref>. In general it is more ‘hearty’, while <xref ref="297">#297 </xref>
    is more ‘chesty’.</par>'
