notes:
- type: T
  text: '<par><reconstruction>*n-dzi</reconstruction>. This etymon may be related to two verbs, PLB <reconstruction>*ʔtsik</reconstruction>
    ‘be stuck onto’ (Lh. <latinform>cɨ́</latinform> ‘be stuck in place; <latinform>pâ-</latinform><latinform>cɨ̂ʔ</latinform><latinform>-mu</latinform>
    ‘beard’ ), and PLB <reconstruction>*ʔdzik</reconstruction> ‘be joined; join to’  (Lh. <latinform>cɨ́</latinform>)
    [LTSR #45]. Cf. <xref ref="418">#418</xref>. Lahu informants vouch for the semantic connection, feeling
    that hairs are “stuck onto”  the head or face. This perhaps should be taken with a grain of salt,
    however.</par>'
