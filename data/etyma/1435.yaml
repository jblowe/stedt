  text: <par>This root is well-attested in the North Assam group, although there is no Proto-Tani reconstruction
    in J. Sun 1993.</par><par>The interesting Idu forms perhaps include what we have called &quot;incestuous
    compounds&quot;, where two members of the same word family cooccur, one with a velar cluster and one
    with a simple lateral. The resemblance between these forms with velar clusters and <xref ref="720">#720</xref>
    seems to be fortuitous.</par>
