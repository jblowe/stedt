notes:
- type: T
  text: '<par>This etymon is not reconstructed in STC, but appears in VSTB pp. 225-6 and Matisoff 1983<footnote>&quot;Translucent
    insights: a look at Proto-Sino-Tibetan through Gordon H. Luce&apos;s <emph>Comparative Wordlist</emph>.&quot;
    BSOAS 46.3:462-76.</footnote> #52.</par>'
- type: T
  text: <par>This root occurs in the NE Indian Areal Group, Himalayish, and perhaps Lolo-Burmese (Ugong).  There
    are possible Chinese comparanda (below). WT shows variation between <latinform>-r-</latinform> and
    <latinform>-l-</latinform>. The <latinform>b-</latinform> has been treated as a prefix and dropped
    everywhere but in WT and Chinese. For a similar doubly prefixed form set up for PTB, cf. <reconstruction>*s-b-rul</reconstruction>
    SNAKE. WT <latinform>hlums</latinform> reflects an alternant <reconstruction>*s-lum</reconstruction>.
    This <reconstruction>*s-</reconstruction> prefix seems to have preempted the initial consonant in
    Tsangla <latinform>shum</latinform>, <latinform>wak◦tsa ɕum</latinform> &apos;placenta&apos;.</par><par>We
    now consider this etymon to be independent of <xref ref="680">#680</xref>, even though they were treated
    as allofams in VSTB and Matisoff 1983.</par>
- type: F
  text: '<par>Luce 1981 (&quot;A Comparative Word-List of Old Burmese, Chinese, and Tibetan&quot;) compares
    this root with <hanform>範</hanform> OC <reconstruction>*b&apos;i̯wɑ̆m</reconstruction>, Mand. <latinform>fàn</latinform>,
    glossed by him as &apos;mould, matrix&apos;. See Matisoff 1983: #52 (&quot;Transclucent insights&quot;).
    For the semantic connection, cf. Latin and English <emph>matrix</emph> &apos;womb; a situation or
    surrounding substance in which something originates&apos;, ult. &lt; <emph>mater</emph> &apos;mother&apos;.</par>'
- type: F
  text: '<par><hanform>範</hanform> OC <reconstruction>*bʼi̯wɑ̆m</reconstruction>, GSR #626d ‘mould; rule,
    law’; Li 1971: <reconstruction>*bjamx</reconstruction>; Baxter 1992: <latinform>(*bjamʔ / *b(r)jomʔ)</latinform>;
    Mand. <latinform>fàn</latinform>.</par><par>Baxter does not reconstruct this word.  There are several
    possible reconstructions in his system, as indicated above.  The Chinese word <hanform>範</hanform>
    may be related to <hanform>凡</hanform> &apos;general rule, pattern&apos;, Mand. <latinform>fán</latinform>
    and <hanform>法</hanform> &apos;law, model&apos;, Mand. <latinform>fǎ</latinform>, reconstructed <reconstruction>*b(r)jom</reconstruction>
    and <reconstruction>*pjap</reconstruction> respectively by Baxter.<br />[ZJH]</par>'
- type: F
  text: '<par><hanform>妊</hanform> OC <reconstruction>*ńi̯əm</reconstruction>, GSR #667i ‘pregnant’; Li
    1971: <reconstruction>*njəmh</reconstruction>; Baxter 1992: <reconstruction>*njɨms</reconstruction>;
    Mand. <latinform>rèn</latinform>.</par><par>Gong (1995 #368) proposed that this Chinese word was cognate
    to WT <latinform>sbrum</latinform> &lt; <reconstruction>*smrum</reconstruction>.  However, the vowel
    and initial correspondences are not regular, and the comparison is not found in Gong&apos;s later
    publications. Schuessler 2007:441 treats <hanform>妊</hanform> <latinform>rèn</latinform> ‘pregnant’
    as an internal Chinese derivation from <hanform>任</hanform> <latinform>rèn</latinform> ‘carry on the
    shoulder, to load’. <br />[ZJH]</par>'
