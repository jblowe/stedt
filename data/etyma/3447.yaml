- type: T
  text: <par>To this more conservative allofam we assign reflexes with dental stop initials.</par>
- type: F
  text: '<par><hanform>中</hanform> OC <reconstruction>*ti̯ông</reconstruction><footnote>HPTB pp. 287,
    310 incorrectly cites GSR&apos;s reconstruction as <reconstruction>*ti̯əŋ</reconstruction>. This was
    corrected in L. Sagart&apos;s review of HPTB (2006:217) to <reconstruction>*t̑i̯uŋ</reconstruction>,
    which is also incorrect: this is Karlgren&apos;s MC form. [JAM]</footnote>, GSR #1007a-e ‘middle,
    center’;  Li 1971: <reconstruction>*trjəngw</reconstruction>; Baxter 1992:477, 1641: <reconstruction>*k-ljung</reconstruction>;
    Mand. <latinform>zhōng</latinform>.</par><par>There are at least two competing etymologies for this
    Chinese word, one relating it to Tibetan <latinform>gźung</latinform> ‘middle, midst’ (e.g. Bodman
    1980:123 set 240, Coblin 1986:53) and the other the one proposed here (e.g. STC p. 182). </par><par>Baxter
    (1992:525) follows Bodman, reconstructing <reconstruction>*k-l-</reconstruction> rather than <reconstruction>*trj-</reconstruction>
    to match Tibetan <latinform>gźung</latinform> and to explain the use of the character as a sound gloss
    for <hanform>宮</hanform> <reconstruction>*k(r)jung</reconstruction>, Mand. <latinform>gōng</latinform>
    in the Eastern Han.</par><par>The original comparison in STC seemed suspect because of the irregular
    correspondence between the stop initial in Chinese and the sibilant initial in Tibeto-Burman, but
    the revised PTB etymon makes a good match.  If we consider the possibility of reconstructing <reconstruction>*r-tjung</reconstruction>,
    as proposed in Handel 1998, then there is no mismatch in the medial.</par><par>For another example
    of the same final correspondence, cf. <xref ref="820">#820</xref> <hanform>孔</hanform>, Mand. <latinform>kǒng</latinform>.<br
    />[ZJH]</par>'
