notes:
- type: T
  text: '<par>This etymon has an impressive number of variants, motivating an extreme pan-allofamic formula
    like <xref ref="6713">#6713</xref>. The sub-roots fall into several categories: some of the reflexes
    derive from prototypes with final *liquids; others point to earlier final *nasals; while still others
    derive from *open syllables. For convenience&apos;s sake, we will present the allofams in that order.</par><par>The
    semantic developments of this root are also quite varied, ranging from FIRE / BURN / KINDLE / ROAST
    to SHINE / LIGHT / BRIGHT to HEAT UP / SWEAT to WHITE / YELLOW. Less this be thought implausible,
    cf. Proto-Indo-European *bhel- &quot;shine; flash; burn; shining white and various bright colors&quot;
    which give us English reflexes including &apos;black&apos;, &apos;blank&apos;, &apos;blanch&apos;,
    &apos;bleak&apos;, &apos;bald&apos;, &apos;bleach&apos;, &apos;blue&apos;, &apos;blaze&apos;, &apos;blind&apos;,
    &apos;blend&apos;, &apos;blond&apos;, &apos;blink&apos;, etc. See HPTB 428-430.</par>'
