notes:
- type: T
  text: <par>This root is well-attested, both with a dental stop initial and initial <latinform>r-</latinform>,
    leading one to hypothesize an ultimate origin in a sequence of consonants like <latinform>*trak</latinform>
    or <latinform>drak</latinform>, although this cluster is not reconstructed for PTB or PST. Certain
    branches of the family, like Lolo-Burmese, show evidence for both the stop- and rhotic-initialed variants.
    </par><par>See <xref ref="2686">#2686</xref>.</par>
- type: F
  text: '<par><hanform>織</hanform> OC <latinform>*t̑i̯ək</latinform>, GSR #920f &apos;weave&apos;; Coblin
    86: ST <latinform>*tjək</latinform> &gt; TB *<latinform>tak</latinform> &gt; OC <latinform>*tjək</latinform>;
    B &amp; S 2011: <latinform>*tək</latinform>; Mand. <latinform>zhī</latinform>.</par>'
