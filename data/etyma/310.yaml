notes:
- type: T
  text: '<par>A few languages (Qiang, Bai) have a labial semi-vowel, but this might be secondary, in view
    of a similar tendency to labialize velar onsets in languages like Lisu: cf. e.g. BITTER <xref ref="229">#229
    </xref>, Lisu <latinform>khwa²¹</latinform>.</par><par>The first syllable of Chang <latinform>ku khu</latinform>
    might also reflect this labialization, a similar development is characteristic of Chinese (cf. Mandarin
    <latinform>ku³</latinform> &apos;bitter&apos; from <xref ref="229">#229</xref>). See STC p. 186.</par><par>For
    a phonosemantically similar root, see <xref ref="3399">#3399</xref>.</par>'
