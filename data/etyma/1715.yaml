notes:
- type: T
  text: <par>This root is still another example of the widespread variational pattern between <latinform>h-</latinform>
    and initial velars. See Matisoff (1997) and HPTB:57. Chepang, Kulung, and Jingpho have velar stops,
    while several other languages (rGyalrong and the Burmish languages Achang, Bola, Lashi) have velar
    fricatives.</par><par>Many reflexes show a nasal prefix, which has perhaps developed due to rhinoglottophilia
    (Matisoff 1975).</par><par>There is also a related root <xref ref="1716">#1716</xref> with initial
    <latinform>h-</latinform>, demonstrating that these etyma are sound-symbolic.</par><par>Written Burmese
    <latinform>sâm</latinform> is of doubtful cognacy.</par>
- type: F
  text: '<par><hanform>欠</hanform> OC <latinform>*k’i̯ɑ̆m</latinform>, GSR #624a &apos;yawn&apos;; Schuessler
    2007:426 <latinform>*khams</latinform>; B &amp; S 2011: <latinform>*bkʰom-s {[k]ʰ(r)om-s}</latinform>;
    Mand. <latinform>qiàn</latinform>.</par>'
