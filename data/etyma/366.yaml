    </latinform>1266.</par>
- type: T
  text: <par><latinform>-a</latinform> is the regular Angami reflex of <latinform>-am</latinform>; cf.
    Angami Naga <latinform>²khuo⁵rha</latinform> &apos;otter&apos; &lt; <xref ref="2595">#2595</xref>.</par>
- type: T
  text: <par>The inclusion of the Ao &apos;banana leaf / aspidistra leaf&apos; forms is somewhat doubtful,
    as the large leaves of the banana and Aspidistra plants are not very similar to body hair (though
    perhaps they resemble giant green feathers). [dwbruhn, 2014 Feb 3]</par>
- type: F
  text: '<par><hanform>彡</hanform>/<hanform>髟</hanform> OC <latinform>*sɑm</latinform>, GSR #1154a &apos;long
