- type: F
  text: '<par><hanform>薯</hanform> OC <latinform>*d’i̯o</latinform>, not in GSR #45; Mand. <latinform>shǔ</latinform>.<br
    /><hanform>芋</hanform> OC <latinform>*gi̯wo</latinform> &apos;taro&apos;, GSR #97o; B &amp; S 2011:
    <latinform>*ɢʷa-s {[ɢ]ʷ(r)a-s}</latinform>; Schuessler 2007:589 <latinform>*wah</latinform>; Mand.
    <latinform>yù</latinform>.</par>'
- type: T
  text: '<par>The Written Tibetan comparison with GSR #97o is due to Gong 2001 #28, who reconstructs PST
    <latinform>*grwa</latinform>. STC reconstructs <hanform>薯</hanform> as PTB <latinform>*źra</latinform>,
    which he regards as a doublet of his PTB <latinform>*śra</latinform>, reconstructed in STC #434 (but
    mistakenly listed as <latinform>*s-ra</latinform> in the Index p. 207).</par><par>We are regarding
    both Chinese forms cited as allofamically related.</par>'
