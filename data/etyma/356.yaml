notes:
- type: T
  text: <par>The oldest form of this root seems to begin with the velar nasal. This has developed into
    pre-glottalized <latinform>ʔ-n</latinform> in Lolo-Burmese.</par>
- type: T
  text: <par>The Loloish glottal prefix is reflected directly by Lalo and Yi (Weishan), and indirectly
    by the very low tone in Lahu <latinform>nā</latinform>, and by the voiceless nasals in Nusu (Central)
    and Jinuo.</par>
