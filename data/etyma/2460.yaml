notes:
- type: T
  text: '<par>This etymon was formerly divided between two separate etyma, one meaning GRASS and the other
    meaning WEEDS / DETRITUS. The latter was reconstructed both in STC #363 and in HPTB:360 as <reconstruction>*muːk</reconstruction>.
    However, despite the WB doublet <latinform>mrak</latinform> &apos;grass&apos; and <latinform>ăhmuik</latinform>
    &apos;refuse, dust&apos;, we have now decided to combine them into a single etymon.</par>'
