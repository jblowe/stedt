notes:
- type: T
  text: '<par>We prefer the &quot;paradigmatic&quot; reconstruction <latinform>*s/g-la</latinform> to
    the &quot;syntagmatic&quot; one offered in <plainlatinform>STC</plainlatinform>, <latinform>*s-gla</latinform>.</par><par>Jingpho,
    Asakian and Ao have developed a dental stop from the original *lateral. See JAM 2013 (&quot;The dinguist&apos;s
    dilemma&quot;).</par><par>The first element in Proto-Tani <latinform>*po-lo</latinform> resembles
    the prefix-like onset of Proto-Loloish <latinform>*bəla</latinform>, but it is not possible to assign
    a meaning to it at present.</par><par>The Written Tibetan binome <latinform>zla-ba</latinform> is
    paralleled by many Loloish forms, e.g., Lahu <latinform>ha-pa</latinform>, Lisu <latinform>hã³³ba⁴⁴</latinform>,
    etc.</par><par>Lahu <latinform>lɔ́-pa</latinform> is a poetic word for MOON, which is of doubtful
    relationship to the ordinary word <latinform>ha-pa</latinform>. Cognates have just been found in several
    recently discovered Loloish languages of the &quot;Mangish&quot; group (Lama Ziwo 2015, in prep.):
    Mongi <latinform>li¹³ e¹³ pɔ¹³</latinform>, Mondzi <latinform>lie¹³ pɔ¹³</latinform>, Munji <latinform>la³³
    po³¹</latinform>.</par>'
