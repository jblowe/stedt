notes:
- type: T
  text: <par>The obvious semantic connection between DONKEY and RABBIT is the length of the ears in both
    species. Chundra Cathcart points out that the same semantic association exists in Iranian, e.g. Modern
    Persian <latinform>xar-goš</latinform> &quot;hare, rabbit, literally &apos;donkey-ears&apos;&quot;.
    See <xref ref="5357">#5357</xref> and <xref ref="5358">#5358</xref>.</par><par>For the same DONKEY-RABBIT
    association, see <xref ref="5356">#5356</xref>.</par><par>In many languages, the word for &apos;rabbit&apos;
    is a binome with the first syllable meaning &apos;mountain, wild&apos; &lt; <xref ref="6076">#6076</xref>.</par><par>In
    several languages (the Deng group, Cuona, Lhasa Tibetan, and Dulong/Trung), the second syllable of
    these binomes begins with a velar rather than a labial. It is possible that this points to a *labiovelar
    onset to this syllable. However, it is at least equally possible that a separate morpheme is involved.</par><par>The
    doublet in Caodeng rGyalrong <latinform>poŋ-luʔ</latinform> &apos;donkey&apos; and <latinform>re-waŋ</latinform>
    &apos;rabbit&apos; is some evidence for the medial <latinform>*-wa-</latinform> in the reconstruction.</par>
