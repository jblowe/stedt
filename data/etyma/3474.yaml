notes:
- type: T
  text: <par>This root has been found only in the NE Indian Areal Group, where it shows variation between
    initial <latinform>k-</latinform> and <latinform>h-</latinform>. (This variation is paralleled in
    a number of other etyma, including <xref ref="664">#664</xref>; see the note under that reconstruction,
    Chapter 1.9.5 above.) The final <latinform>-n</latinform> in the Konyak and Bodo forms is unexplained.<footnote>It
    is remotely possible that these two forms are related to the second Karbi syllable <latinform>hon</latinform>,
    from a separate root <reconstruction>*kon ⪤ *hon</reconstruction>.</footnote></par>
