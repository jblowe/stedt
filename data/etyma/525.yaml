notes:
- type: T
  text: '<par>This root is abundantly attested in Lolo-Burmese and in Qiangic. It is reconstructed as
    PLB <reconstruction>*ʔkyak</reconstruction> in LTSR #58, with the meaning ROPE/STRING; LTSR also tentatively
    assigns several forms for NAVEL to this etymon.</par>'
- type: T
  text: '<par>There are two Chinese candidates for relationship to this etymon: <hanform>弋</hanform> <latinform>*di̯ək/i̯ək</latinform>,
    GSR #918a-b &apos;shoot with arrow with string attached; such an arrow&apos; <plainlatinform>⪤</plainlatinform>
    <hanform>繳</hanform> OC <latinform>*t̑i̯ak/tśi̯ak</latinform>, GSR #1258e  [OC form not cited in GSR]
    &apos;string attached to arrow&apos;. STC (p. 176) attempts to relate these Chinese words to PTB <latinform>*b-la</latinform>
    &apos;arrow&apos; [STC #449], via a hypothetical intermediate form <latinform>**pli̯ak</latinform>.
    I consider this to be far-fetched phonologically and unsatisfying semantically. The semantic association
    between an umbilical cord and an arrow with string attached is irresistible. The metaphor is still
    alive today, e.g. in spacecraft, where the lifeline attaching a space-walking astronaut to the mother
    ship is commonly called an <emph>umbilical cord</emph>. For more discussion of these Chinese words,
    see ZJH&apos;s note below.</par>'
- type: F
  text: '<par><hanform>弋</hanform> OC <latinform>*di̯ək</latinform> GSR #918a, ‘shoot arrow (with string
    attached)’; Li 1971: <latinform>*rək</latinform>; Baxter 1992 #467: <latinform>*ljɨk</latinform>;
    Mand. <latinform>yì</latinform>.</par><par>There is considerable disagreement about the reconstruction
    of words with MC initial <latinform>j-</latinform> which appear in phonetic series with words having
    dental initials. While Karlgren’s <reconstruction>*d-</reconstruction> (GSR) is no longer accepted,
    variations of <reconstruction>*r-</reconstruction>, <reconstruction>*l-</reconstruction>, and <reconstruction>*j-</reconstruction>
    are proposed by a number of scholars.</par><par>This Chinese word does not appear to be directly cognate
    to the PTB form, as there is no evidence of a velar initial.  Gong (2001) revives Benedict’s (STC
    p. 176) comparison with PTB <reconstruction>*b-la</reconstruction> ‘arrow’, reconstructing OC <reconstruction>*blək</reconstruction>,
    with the regular development <reconstruction>*bl-</reconstruction> &gt; <reconstruction>*l-</reconstruction>.  Gong&apos;s
    system would also admit the possibility of reconstructing <reconstruction>*glək</reconstruction>.</par><par>A
    more likely candidate for cognacy is <hanform>繳</hanform> ( Mand. <latinform>zhuó</latinform>); see
    below.</par><par>Cf. <hanform>射</hanform> OC <latinform>*mljaks</latinform> Baxter 1992 #1357, 1393,  ‘shoot
    with bow’ (Mand. <latinform>shè</latinform>), with revision of <reconstruction>*L-</reconstruction>
    to <reconstruction>*ml-</reconstruction>. This may also be etymologically related to <hanform>弋</hanform>
    and/or PTB <reconstruction>*b-la</reconstruction>.</par>'
- type: F
  text: '<par><hanform>繳</hanform> OC (see below), GSR #1258e ‘string attached to arrow’; Li 1971: <latinform>(*krjakw?)</latinform>
    Baxter: <latinform>(*kjewk?)</latinform>; Mand. <latinform>zhuó</latinform>.</par><par>This character
    has two Middle Chinese readings, one with velar initial and no coda, and one with palatal initial
    and velar coda.  Based on internal Chinese evidence, the Old Chinese reconstruction cannot be determined
    with certainty.  Karlgren placed this word in series #1258, which is not a phonetic series at all
    but a collection of words that Karlgren deemed unreconstructible for lack of evidence.  Other characters
    that appear to have the same phonetic element appear in GSR #1162, all of which are reconstructed
    as open syllables with velar initial.</par><par>The character <hanform>激</hanform> ‘dam up and cause
    (water) to rush up’ (Mand. <latinform>jī</latinform>), found in GSR #1162 and apparently sharing a
    phonetic element with <hanform>繳</hanform> <latinform>zhuó</latinform>, is reconstructed <reconstruction>*kewk</reconstruction>
    by Baxter 1992 and <reconstruction>*kiakw</reconstruction> by Li 1971, suggesting that in Baxter’s
    system, <hanform>繳</hanform> should be reconstructed <reconstruction>*kjewk</reconstruction> and <reconstruction>*kewʔ</reconstruction>
    to account for the two Middle Chinese pronunciations.  An <reconstruction>*a</reconstruction> vocalism
    in Baxter&apos;s system cannot be completely discounted, but it would make it difficult to explain
    the subsequent palatalization of the initial velar in one of the Middle Chinese forms.</par><par>All
    of the possible Old Chinese reconstructions present problems in terms of the Chinese/PTB vowel correspondence.  Old
    Chinese coda <reconstruction>*-kw</reconstruction> (Li)/<reconstruction>*-wk</reconstruction> (Baxter)
    regularly corresponds to TB rounded vowels.</par><par>Given the difficulty of determining the Old
    Chinese reconstruction of <hanform>繳</hanform>, this proposed cognate set must be considered tentative.<br
    />[ZJH]</par>'
- type: H
  text: <par>See HPTB, pp. 318, 319.</par>
