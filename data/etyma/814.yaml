notes:
- type: T
  text: '<par>STC #85 originally reconstructed this root as <reconstruction>*ruŋ</reconstruction>, but
    this was later changed to <reconstruction>*rwaŋ</reconstruction> (STC p.32, n.101), treated as an
    allofam of <reconstruction>*rwa</reconstruction> (see STC p.75, n.231).</par>'
- type: F
  text: '<par><hanform>角</hanform> OC <latinform>*kǔk</latinform>, GSR #1225a-c &apos;horn, corner&apos;;
    Schuessler 2007:309 <latinform>*krôk</latinform>; B &amp; S 2011: <latinform>*C.kˤrok</latinform>;
    Mand. <latinform>jiǎo</latinform>.<br /><hanform>觡</hanform> OC <latinform>*klɑ̆k</latinform>, GSR
    #766b&apos; &apos;antlers, horns&apos;; Schuessler 2007:253 <latinform>*krâk</latinform>; Mand. <latinform>gé</latinform>.</par>'
- type: T
  text: <par>Initial <latinform>-r-</latinform> in this root was preemptible after either <latinform>n-</latinform>
    (e.g. PK <reconstruction>*noŋ</reconstruction>, Dolakha Newar <latinform>ŋwɔ̃</latinform>) or <latinform>-g-
    </latinform> (e.g. Chinese <emph>jiǎo</emph> <hanform>角</hanform>).</par>
- type: T
  text: <par>Forms like Limbu <latinform>ùl taŋ</latinform>, Yakha <latinform>ùl taŋ</latinform><emph></emph>
    ‘horn’ are probably not from this root, but could rather be from <xref ref="371">#371</xref>.</par>
- type: T
  text: <par>The second syllables of the Milang, Tagin, Idu, and Galo forms resemble <xref ref="388">#388</xref>,
    but we are keeping them separate for now.</par>
