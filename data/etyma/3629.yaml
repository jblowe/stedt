notes:
- type: T
  text: <par>This mythical animal has been associated with WATER, RAINBOW, and THUNDER. Some forms which
    look as if they might descend from this root should actually be assigned to <xref ref="2465">#2465</xref>.</par>
- type: F
  text: '<par><hanform>龍</hanform> OC <latinform>*li̯ung</latinform>, GSR #1193a-e &apos;dragon&apos;;
    Gong 2001:24 <latinform>*m-bruŋ / *m-bruk</latinform>; B &amp; S 2011: <latinform>*mə-roŋ {[mə]-roŋ}</latinform>;
    Mand. <latinform>lóng</latinform>.<br /><hanform>隆</hanform> OC <latinform>*gli̯ông</latinform>, GSR
    #1015f &apos;thunder, sound of thunder&apos;; Schuessler 2007:363 <latinform>*ruŋ</latinform>; B &amp;
    S 2011: <latinform>*ruŋ {[r]uŋ}</latinform>; Mand. <latinform>lóng</latinform>.<br /><hanform>雹</hanform>
    OC <latinform>*b’ộk</latinform>, GSR #1113n &apos;hail&apos;; B &amp; S 2011: <reconstruction>*C.bˁruk
    {C.[b]ˁruk}</reconstruction>; Mand. <latinform>báo</latinform>.</par><par>Gong 2001:24 and HPTB #585
    compare the current etymon, PTB <latinform>*m-bru(ŋ/k)</latinform> &apos;dragon; rain&apos;, with
    Chinese <hanform>龍</hanform> <latinform>lóng</latinform> &apos;dragon&apos;. Both these etyma may
    be allofamic with <hanform>雹</hanform> <latinform>báo</latinform> &apos;hail&apos;, as suggested by
    the latter&apos;s reconstruction as <latinform>*C.bˁruk</latinform> in B &amp; S 2011.</par><par>[SPB]</par>'
