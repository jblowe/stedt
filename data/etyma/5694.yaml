  text: <par>This etymon is apparently distinct from <xref ref="5695">#5695</xref>. An <latinform>*m-</latinform>
    prefix is attested in Kaman [Miju] <latinform>mphlɑt³⁵</latinform>, while an <latinform>*s-</latinform>
    prefix is attested in Daofu <latinform>sphro</latinform>. The Burmish and Dulong forms support the
    variant with a nasal final. (This etymology is due to Liberty Lidz.)</par>
