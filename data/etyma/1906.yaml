notes:
- type: T
  text: <par>Dialects of Tibetan point to variants with final velar stop and/or nasal prefix. The long
    vowel is reconstructed on the basis of the Written Burmese rhyme <latinform>-uiŋ</latinform>.</par><par>This
    root strongly resembles <xref ref="3602">#3602</xref>, and may well be allofamic with it.</par><par>In
    addition, there well may be a relationship between this root and <xref ref="5757">#5757</xref>. For
    a similar alternation between <latinform>d-</latinform> and <latinform>r-</latinform>, see numbers
    <xref ref="2686">#2686</xref> and <xref ref="5669">#5669</xref>.</par>
- type: F
  text: '<par><hanform>躅</hanform> OC <latinform>*d’i̯uk</latinform>, GSR #1224h &apos;check the foot,
