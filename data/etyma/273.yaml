notes:
- type: T
  text: '<par>Of the two prefixes set up for this root, <latinform>*m-</latinform> is much better attested.
    The <latinform>*s-</latinform> prefix appears in Dimasa, as well as in Written Tibetan <latinform>sgo</latinform>
    &apos;door&apos;. The current etymon comprises three roots set up separately in STC (468, 469, 470),
    which Benedict judges as &quot;apparently all related&quot; (p. 120).</par><par>There is a likely
    Chinese comparandum <hanform>戶</hanform>, OC <latinform>*g’o</latinform> [GSR #53a-b] &apos;door,
    opening&apos;.</par><par>Kuki-Chin (and perhaps other) languages show variation between a plain and
    aspirated initial.</par><par>There is some slight evidence for an allofam with medial <latinform>-y-</latinform>,
    <latinform>*m-k(y)a</latinform>, as witness rGyalrongic forms like <latinform>tə mɟja</latinform>,
    <latinform>tA mgya</latinform>, and <latinform>tə-mdʒa</latinform> &apos;chin&apos;.</par>'
- type: F
  text: '<par><hanform>戶</hanform> OC <latinform>*g’o</latinform>, GSR #53a-b ‘door, opening, house, family’;
    Schuessler 2007:282 <latinform>*gâʔ</latinform>; B &amp; S 2011: <latinform>*m-qˁaʔ </latinform>;
    Mand. <latinform>hù</latinform>.<br /><hanform>開</hanform> OC <latinform>*k’ər</latinform>, GSR #541a
    &apos;open&apos;; B &amp; S 2011: <latinform>*kʰˁəj {[k]ʰˁəj}</latinform>; Mand. <latinform>kāi</latinform>.</par>'
