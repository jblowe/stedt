notes:
- type: T
  text: '<par>This etymon was reconstructed as PTB <reconstruction>*m-dza</reconstruction> in STC #67,
    on the basis of forms from Written Tibetan, Jingpho, and Written Burmese (with a note that the Jingpho
    form actually ends in glottal stop, so that it &quot;may be distinct&quot;). There is in fact ample
    reason to set up both open-syllabled and stop-finalled allofams for this root: <reconstruction>*m-dza
    ⪤ *m-dzak</reconstruction>. The latter allofam is attested not only in Jingpho, but in Yi Nanhua (note
    the constricted vowel), and directly in NW rGyalrong (Qiangic group). The nasal prefix is directly
    reflected in WT, Yi (Dafang), and Jingpho.</par><par>The Hayu form has apparently acquired the <plainlatinform>-n</plainlatinform>
    suffix.</par>'
