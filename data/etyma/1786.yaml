notes:
- type: T
  text: <par>This root so far seems to be confined to Qiangic (including Tangut). The <reconstruction>*s-</reconstruction>
    prefix is reconstructed on the basis of the voiceless liquids in Ergong, NW rGyalrong, and (Sofronov&apos;s)
    Tangut. The aspirated dental stops in Ergong and NW rGyalrong appear to be secondary &quot;extrusions&quot;
    of the previous liquids. There is no apparent connection with <xref ref="3458">#3458</xref>, which
    always means BREAST, not MILK.</par>
