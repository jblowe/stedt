notes:
- type: T
  text: '<par>Chinese character; STC #485; LTSR #123 (PLB <reconstruction>*C-sak¹</reconstruction>); GSR
    925a <reconstruction>*si̯ək</reconstruction>; WTF pp.462-3.</par>'
- type: T
  text: '<par>For now, Karenic syllables <latinform>θaʔ</latinform> etc. have been assigned to this etymon.
    But note that the tones are different; compare Jones sets #150 BREATH(E) [pp. 124-5] and #410 CHEST
    [pp. 140-1].</par>'
- type: F
  text: '<par><hanform>息</hanform> OC <latinform>*si̯ək</latinform>, GSR #925a; Coblin 86: <latinform>*sjək</latinform>;
    B &amp; S 2011: <latinform>*sək</latinform>; Mand. <latinform>xí</latinform>. S523</par>'
- type: T
  text: <par>The basic meaning of this root is the &quot;breath of life&quot; with semantic extensions
    into HEART (as locus of the life force), CHEST (as locus of the heart), or AIR / STEAM / VAPOR.</par>
- type: I
  text: <par>Support for nasal prefix only in Jingpho?</par>
