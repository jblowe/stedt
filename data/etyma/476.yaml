notes:
- type: T
  text: <par>&quot;The first morpheme is &apos;tooth&apos;; the second morpheme can be identified with
    the classifier for long slender objects, PT *buŋ...&quot; Sun 1993a:92.</par>
- type: T
  text: <par>Two forms with final velar stop (Bokar Lhoba <latinform>gum pɯk</latinform> and Tsangla Motuo
    <latinform>ʔa pak taŋ</latinform> &apos;mouth&apos;) seem at first glance to be related to this root.
    However, Bokar <latinform>nap pang</latinform> and Tsangla <latinform>no waŋ</latinform> &apos;mouth&apos;
    suggest that a separate root is involved.</par><par>The resemblance of these stop-finalled forms to
    Thai (cf. Siamese <latinform>pàak</latinform> &apos;mouth&apos;) seems quite fortuitous.</par><par>So
    far the nasal prefix has only been found in Qiangic.</par>
