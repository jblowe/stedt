  text: <par>This root is confined to a few languages of the Deng group. All three nasals are attested
    in final position, motivating the reconstruction with a neutral capital <latinform>*-N</latinform>.
    The variation between medial <latinform>-i-</latinform> and <latinform>-u-</latinform> is a well-established
    TB pattern.</par>
