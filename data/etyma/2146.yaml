- type: F
  text: '<par><hanform>蝙蝠</hanform> OC (<latinform>*pi̯ŭk</latinform>), GSR (not in #933) &apos;bat (animal)&apos;;
    Schuessler 2007:165 ST <latinform>*p/bək</latinform>; B &amp; S 2011: (<latinform>*pək</latinform>);
    Mand. <latinform>fú</latinform>.</par><par><latinform>Comment:</latinform> In Chinese, <hanform>蝙</hanform>
    <latinform>fú</latinform> is usually found in the compound <hanform>蝙</hanform><hanform>蝙</hanform>,
    Mand. <latinform>biānfú</latinform>, which is the common word for &apos;bat (animal)&apos;. The compound
    itself is of quite ancient origin (cf. <emph>Shuowen</emph>).</par>'
