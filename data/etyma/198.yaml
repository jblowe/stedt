notes:
- type: T
  text: <par>HPTB:174 incorrectly gives &quot;GSR 25q&quot; as the source of the OC reconstruction. Actually,
    however, this character is not to be found in GSR, but is cited in STC:174 as well as in Benedict
    1942 (&quot;Tibetan and Chinese kinship terms&quot;).</par>
- type: F
  text: '<par><hanform>婆</hanform> OC <latinform>*b’wɑ̂</latinform>, GSR #25q &apos;saunter, dance&apos;;
    Schuessler 2007:416 <latinform>*buâ</latinform> &apos;old woman&apos;; B &amp; S 2011: <latinform>*bˁaj
    {[b]ˁaj}</latinform> &apos;saunter, dance&apos;; Mand. <latinform>pó</latinform>.</par><par>Karlgren
    cites <hanform>婆</hanform> <latinform>pó</latinform> as GSR #25q with the gloss &quot;dance, saunter&quot;;
    this meaning is attested in ancient sources such as Er Ya <hanform>爾</hanform><hanform>雅</hanform>,
    but is not relevant to the present comparandum. The meaning &quot;old woman, grandmother, female relative&quot;,
    which does concern us here, is attested for <hanform>婆</hanform> <latinform>pó</latinform> in post-Han
    times, and is the only meaning commonly associated with <hanform>婆</hanform> <latinform>pó</latinform>
    in modern standard Chinese. Of course, it is possible (and it is our assumption) that a Chinese etymon
    &quot;old woman, ...&quot;, reconstructed as OC <latinform>*b’wɑ̂</latinform> or similar, existed
    in Han times or earlier. [SPB]</par>'
