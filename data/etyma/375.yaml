notes:
- type: T
  text: <par>Further support for the notion that this and the preceding etymon are related to the basic
    root <reconstruction>*lak</reconstruction> is provided by the parallelism of allofamy between <reconstruction>*la</reconstruction>/<reconstruction>*ya</reconstruction>
    and <reconstruction>*lak</reconstruction>/<reconstruction>*yak</reconstruction>. Furthermore, there
    are a group of forms with initial affricates in the Bodo-Garo family that are parallel to <reconstruction>*d-yak</reconstruction>
    or <reconstruction>*g-yak</reconstruction>. See <xref ref="888">#888 </xref> below.</par>
