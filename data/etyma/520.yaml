notes:
- type: T
  text: <par>The stronghold of this etymon is Lolo-Burmese (including Jinuo), but cognates also occur
    in the NE Indian Areal Group, Himalayish, and Tujia.</par>
- type: F
  text: '<par><hanform>肚</hanform> OC <reconstruction>*d&apos;o</reconstruction> &apos;stomach&apos;;
    GSR: not in #62; Li 1971: <latinform>*dagx</latinform>; Baxter 1992: <latinform>*laʔ</latinform> or
    <latinform>*daʔ</latinform>; Mand. <latinform>dù</latinform>. </par><par>There is also a variant with
    a voiceless initial, meaning &apos;animal stomach used as food&apos;. GSR #62 is reconstructed as
    a lateral-initial series by Baxter, but since the character is not attested until late, it is possible
    that this word had a dental initial, and that the character used to write it was created after the
    change <reconstruction>*l-</reconstruction> &gt; <reconstruction>*d-</reconstruction> had taken place,
    making <hanform>土</hanform> <reconstruction>*hlaʔ</reconstruction> &gt; <reconstruction>*thaʔ</reconstruction>,
    Mand. <latinform>tǔ</latinform> a suitable phonetic element.</par><par>The difficulty with this comparison
    lies in the vowel, as we would expect to find PTB <reconstruction>*a</reconstruction> corresponding
    with OC <reconstruction>*a</reconstruction>, as in Chinese <hanform>吾</hanform> &apos;first person
    pronoun&apos; <reconstruction>*ngag</reconstruction> (Li)/<reconstruction>*nga</reconstruction> (Baxter),
    Mand. <latinform>wú</latinform> and PTB <reconstruction>*ŋa</reconstruction> (STC #406); and Chinese
    <hanform>魚</hanform> &apos;fish&apos; <reconstruction>*ngjag</reconstruction> (Li)/<reconstruction>*ng(r)ja</reconstruction>
    (Baxter), Mand. <latinform>yú</latinform> and PTB <reconstruction>*ŋya</reconstruction> (STC #189).<br
    />[ZJH]</par>'
- type: T
  text: <par>The second syllable of the Kaman [Miju] form <latinform>pɑ³¹ tɯ³¹ lɑi⁵⁵</latinform> is probably
    just a reflex of the <reconstruction>*s-</reconstruction> prefix in <xref ref="517">#517</xref>, above.
    See the note on Kaman [Miju] <latinform>tlái</latinform> under that etymon.</par>
