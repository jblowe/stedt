notes:
- type: T
  text: <par>This root has acquired a variety of final consonants in Himalayish languages, including <latinform>-k</latinform>
    (Kiranti, Tamangic), <latinform>-ŋ</latinform> (Kanauri), <latinform>-r</latinform> (Lepcha), and
    <latinform>-m</latinform> (Written Tibetan).</par>
- type: F
  text: '<par><hanform>耳</hanform> OC <latinform>*ńi̯əg</latinform>, GSR #981a &apos;ear&apos;; Coblin
    86:69 ST <latinform>*rnjəɣ</latinform> &gt; OC <latinform>*njəgx</latinform>; B &amp; S 2011: <latinform>*C.nəʔ</latinform>;
    Mand. <latinform>ěr</latinform>.</par>'
- type: T
  text: <par>There is a fortuitous resemblance between this root and an Indo-European synonym (cf. Sanskrit
    <latinform>karṇa-</latinform>). The velar prefix is well attested in Bodo-Garo, Asakian, and Naga
    languages.</par>
