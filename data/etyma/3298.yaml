notes:
- type: T
  text: '<par>This root seems almost exclusively to be attested in Lolo-Burmese, where both the prefixed
    and unprefixed variants occur: e.g. Lahu <latinform>vi</latinform> &lt; <latinform>*-wi</latinform>
    ⪤ <latinform>fī</latinform> &lt; <latinform>*s-wi</latinform>. Semantically, however, this is not
    a simplex / causative pair; <latinform>fī</latinform> refers to a mass of water drying up or being
    emptied out, while <latinform>vi</latinform> focuses on the drying out of a wet object. Furthermore,
    <latinform>vi</latinform> &lt; PLB *Tone 1, but <latinform>fī</latinform> &lt; PLB *Tone 2.</par><par>Several
    languages point to a diphthongal rhyme <latinform>*-ay</latinform>.</par>'
