notes:
- type: T
  text: <par>This root is distinct from <xref ref="593">#593</xref>. Cf. Lalung <latinform>khongʔ</latinform>
    &apos;skin&apos; (from the present etymon) vs. <latinform>kur</latinform> &apos;skin&apos; and <latinform>mokun</latinform>
    &apos;eyelid&apos; (from <reconstruction>*gul</reconstruction>). Neither does there seem to be a connection
    between this root and <xref ref="586">#586</xref>. The second syllable of Lahu <latinform>mə̂-<emph>qɔ</emph></latinform>
    &apos;lip&apos; might well be derived from PLB <reconstruction>*ʔgaŋ</reconstruction>, but this syllable
    also appears in several other words (<latinform>mɔ̀ʔ-qɔ</latinform> &apos;mouth&apos;, <latinform>làʔ=tɔ-qɔ</latinform>
    &apos;palm of the hand&apos;, <latinform>mû-lɔ̀ʔ-qɔ</latinform> &apos;daytime; afternoon&apos;), and
    is glossed &apos;noun formative of elusive meaning&apos; in Matisoff 1988:250. See <xref ref="473">#473</xref>,
    to which we temporarily assign Lahu &apos;mouth&apos;.</par>
