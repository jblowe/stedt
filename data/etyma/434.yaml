  text: <par>A glottal stop prefix is exceptionally reconstructed for this root at the PTB level, because
    of the pre-glottalized nasals in the Jingpho forms. (To reconstruct the <latinform>*s-</latinform>
    prefix here would be anomalous, since that prefix regularly gives Jingpho <latinform>šə- ~ džə-</latinform>.)</par><par>This
    etymon definitely seems related to <xref ref="2493">#2493</xref>.</par>
