notes:
- type: T
  text: <par>STC p.184 reconstructs PLB <reconstruction>*gi</reconstruction>. Many of the TB forms seem
    to be borrowings from Chinese <hanform>騎</hanform> OC <latinform>g&apos;ia</latinform> [GSR 1-u].
    However, this is evidently an East Asian Wanderwort (cf. Siamese <latinform>khìi</latinform>), and
    Benedict surmises that it is an ancient loan into PST from Austro-Tai [STC n. 484; 1975a, p. 252].</par>
