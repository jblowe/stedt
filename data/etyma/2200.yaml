- type: T
  text: <par>This morpheme frequently occurs as the second element in compounds beginning with <xref ref="1603">#1603</xref>.
    This first element varies from an unreduced form of the shape <latinform>wa</latinform> and a prefixized
    version <latinform>u-</latinform>.</par><par>Besides the normal initial reflex with dental stop, this
    etymon shows a puzzling variation among <latinform>h-</latinform>, <latinform>y-</latinform>, and
    <latinform>w-</latinform>, which remains to be explained.</par>
- type: F
