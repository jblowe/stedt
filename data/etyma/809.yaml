  text: <par>This etymon very frequently occurs as a second element in compounds with <xref ref="803">#803</xref>.
    The vocalism of the reflexes varies from <latinform>-a-</latinform> to <latinform>-u-</latinform>
    or <latinform>-o-</latinform>, motivating the diphthongal reconstruction <latinform>*-wa-</latinform>.
    A few reflexes, however, have high front vowels (Garo, Sema, Bwe), so that we reconstruct a double
    medial glide <latinform>*-yw-</latinform>.</par>
