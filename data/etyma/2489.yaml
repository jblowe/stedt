notes:
- type: T
  text: <par>As is frequently the case with pronouns, there is quite a bit of variation with this etymon.
    In particular, the Loloish languages have multiple reflexes for YOU (sg.), YOU (du.) and YOU (pl.).
    A number of languages have an open-syllable allofam, but most reflexes have the final velar nasal.</par><par>See
    e.g. <latinform>nɔ̀-hɨ</latinform>, <latinform>nì-hɨ</latinform>, <latinform>nɨ̀-hɨ</latinform> &apos;you
    (pl.)&apos; (<plainlatinform>DL</plainlatinform> 792). For an analysis of pronominal paradigms in
    Loloish, see Matisoff 1993 (&quot;Sangkong&quot;).</par>
- type: F
