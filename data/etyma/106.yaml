- type: T
  text: <par>Gong (2001:25) gives a root <strong>*b-kres</strong> &apos;hungry/famine&apos;.</par>
- type: F
  text: '<par><hanform>飢</hanform> OC (<latinform>*ki̯ɛr</latinform>), (not in GSR #602) &apos;hungry,
    famine&apos;; Schuessler 2007:292 <latinform>*kri</latinform>; B &amp; S 2011: <latinform>*Cə.k‹r›əj
    {Cə.k‹r›ə[j]}</latinform>; Mand. <latinform>jī</latinform>.<br /><hanform>饑</hanform> OC <latinform>*ki̯ər</latinform>,
    GSR #547k &apos;famine&apos;; Schuessler 2007:292 <latinform>*kəi</latinform>; B &amp; S 2011: <latinform>*kəj
    {kə[j]}</latinform>; Mand. <latinform>jī</latinform>.<br /><hanform>饉</hanform> OC <latinform>*g’i̯ɛn</latinform>,
    GSR #480r-s &apos;famine&apos;; Schuessler 2007:316 <latinform>*gəns</latinform>; B &amp; S 2011:
    <latinform>*ɡrər-s {[ɡ]rə[r]-s}</latinform>; Mand. <latinform>jìn</latinform>.</par><par><latinform>Comment:</latinform>
    Note that the original graph <hanform>饑</hanform> <latinform>jī</latinform> is usually written <hanform>飢</hanform>
    <latinform>jī</latinform> in Simplified Chinese script; however, Schuessler (2007:292) cautions that
    the graphs <hanform>飢</hanform> and <hanform>饑</hanform> represent phonologically distinct etyma in
    OC.</par>'
