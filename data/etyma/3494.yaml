notes:
- type: T
  text: <par>This root has scattered but good-looking reflexes in the NE Indian Areal Group (Maram, Meithei),
    Himalayish (Kanauri, Manchati), Loloish (Ahi, Nesu), Nungish (Dulong), Qiangic (Muya), and Tujia.
    Most reflexes have a simple sibilant fricative initial, but the Loloish and Tujia forms have affricates.
    There does not seem to be any connection with <xref ref="641">#641</xref> or <xref ref="1601">#1601</xref>.</par>
