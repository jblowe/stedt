notes:
- type: T
  text: '<par>Most reflexes of this etymon (possibly including WB <latinform>muik</latinform>) have a
    final velar stop, but other Burmese forms point to an allofam with final velar nasal. Several Himalayish
    languages of Nepal have borrowed an accidentally similar Indo-Aryan root with the meaning &apos;fist&apos;:
    Kanauri <latinform>muṭhu</latinform>, <latinform>mŭṭṭhu</latinform>, Chantyal <latinform>murki</latinform>,
    Kham <latinform>mutka</latinform> &lt; cf. Skt. <emph>muṣṭi-</emph>, Pali <emph>muṭṭhi-</emph>.</par>'
