- type: T
  text: <par>This root is etymologically distinct from <xref ref="1">#1</xref>, <xref ref="206">#206</xref>,
    and <xref ref="1251">#1251</xref>.</par>
- type: F
  text: '<par><hanform>句</hanform> OC <latinform>*ki̯ôk</latinform>, GSR #1017j &apos;bend of a river&apos;;
    B &amp; S 2011: <latinform>*kˁok-s {[k]ˁ(r)ok-s}</latinform>; Mand. <latinform>gòu</latinform>.<br
    /><hanform>曲</hanform> OC <latinform>*k’i̯uk</latinform>, GSR #1213a &apos;bent, crooked, unjust&apos;;
    B &amp; S 2011: <latinform>*kʰok {kʰ(r)ok}</latinform>; Mand. <latinform>qū</latinform>.<br /><hanform>局</hanform>
    OC <latinform>*g’i̯uk</latinform>, GSR #1214a &apos;compressed, bent, twist&apos;; B &amp; S 2011:
    <latinform>*N-kʰok {N-kʰ(r)ok}</latinform>; Mand. <latinform>jú</latinform>.<br /><hanform>跼</hanform>
    OC <latinform>*g’i̯uk</latinform>, GSR #1214b &apos;bent, stooped, crouched&apos;; Mand. <latinform>jú</latinform>,
    <latinform>qù</latinform>.</par>'
- type: T
  text: <par>As explained in DL p.310, the Lahu word <plainlatinform>qhɔ̀ʔ</plainlatinform> means both
    <emph>year</emph> and <emph>return; give/take back</emph>, the semantic connection between these notions
    residing in the fact that the years keep returning in an annual cycle. The same connection of ideas
    occurs in many other Loloish languages. </par>
