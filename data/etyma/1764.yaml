notes:
- type: T
  text: <par>Root-initial <latinform>*k-</latinform> in <xref ref="1764">#1764</xref> reanalyzed as prefix,
    then replaced by <latinform>t(h)-</latinform> (cf. Karen <latinform>tho̱⁵⁵</latinform> &lt; <xref
    ref="1006">#1006</xref>).</par>
- type: T
  text: <par>Interesting reflexes of this etymon with labiovelar initial include the labial-initial Lahu
    form, the dental-initial Karenic forms, and the zero-initial Chin forms, the last two of which indicate
    that the velar-initial was sometimes treated as a prefix.</par><par>The nasal suffix is reconstructed
    on the basis of the Chinese comparandum.</par>
- type: F
  text: '<par>Two Chinese forms are considered to descend from this etymon:</par><par><hanform>狗</hanform>
    OC <latinform>*ku</latinform>, GSR #108d; B &amp; S 2011: <latinform>*Cə.kˁroʔ {Cə.[k]ˁroʔ}</latinform>;
    Mand. <latinform>gǒu</latinform><br /><hanform>犬</hanform> OC <latinform>*k’iwən</latinform>, GSR
    #479a-d; B &amp; S 2011: <latinform>*kʷʰˁenʔ {[k]ʷʰˁ[e][n]ʔ}</latinform>; Mand. <latinform>quǎn</latinform>.</par><par>OC
    <latinform>*ku</latinform> reflects the unsuffixed root, while OC <latinform>*k’iwən</latinform> bears
    the &quot;collective&quot; nasal suffix.</par>'
- type: T
  text: <par>The second element in the Karenic compounds for FOX / WOLF seem to derive from <xref ref="2453">#2453</xref>.</par>
