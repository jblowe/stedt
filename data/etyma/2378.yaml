notes:
- type: T
  text: <par>We reconstruct this interesting root with medial <latinform>*-l-</latinform> on the basis
    of the PKC form, even though this medial does not appear overtly elsewhere in TB. Written Tibetan
    lacks an <latinform>skl</latinform> cluster, so that medial <latinform>-y-</latinform> was substituted
    for it. Written Burmese has a doublet, <latinform>kyôŋ</latinform> &apos;feed, tend cattle&apos; and
    <latinform>ə-coŋʼ</latinform> &apos;watchman, guard&apos;, with the latter apparently a later development.
    This etymon is thus a good example of a proto-contrast better preserved in a particular subgroup than
    in the family as a whole.</par><par>This root was formerly reconstructed as <latinform>*s-gyoŋ</latinform>
    (HPTB:294).</par>
- type: F
  text: '<par><hanform>養</hanform> OC <latinform>*zi̯ɑng</latinform>, GSR #732j &apos;nourish, raise,
