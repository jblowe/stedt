notes:
- type: T
  text: <par>Jingpho illustrates both the <latinform>*s-</latinform> and the <latinform>*ʔ-</latinform>
    prefix, which motivates our unusual PTB reconstruction with either prefix.</par><par>There is a possible
    allofamic relationship between this root and <xref ref="2804">#2804</xref>. If this is true, it would
    be another example of the unusual alternation between medial <latinform>*-u-</latinform> and <latinform>*-a-</latinform>
    to be found in <xref ref="1417">#1417</xref>.</par>
