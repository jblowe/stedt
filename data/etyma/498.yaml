notes:
- type: T
  text: <par>This sparsely attested root, which in TB languages refers to the neck, seems to be distinct
    from <xref ref="66">#66</xref>, whose semantic center of gravity is more abstract. </par><par>The
    putative Chinese comparandum, however, has a more &quot;internal&quot; meaning, referring to the voice
    or throat. Cf. Mandarin <latinform>sǎngzi</latinform> ‘voice’, which occurs neither in GSR 704 nor
    in Baxter&apos;s system, so that it probably has no early attestation. By analogy with <latinform>sāng</latinform>
    ‘mulberry’, which is in both sources, it would be reconstructed <reconstruction>*sɑ̂ng</reconstruction>
    by Karlgren and <reconstruction>*sangʔ</reconstruction> by Baxter.</par>
