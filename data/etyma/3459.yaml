notes:
- type: T
  text: <par>This root appears mostly in Lolo-Burmese, Qiangic, and Baic. It frequently occurs reduplicated,
    and its simple phonological shape makes it likely that it is hypocoristic in origin. (The same may
    be said for <xref ref="3457">#3457</xref>, below.) Some Lolo-Burmese and Bai forms have been recorded
    with vowel constriction, but it is not yet clear whether these reflect an allofam with final stop.</par>
