notes:
- type: T
  text: <par>The velar prefix is reflected directly in Khumi, Barish (Kokborok, Meche, Bodo), and Karenic
    (Bwe, Sgaw). The Loloish forms with voiceless laterals perhaps point to a variant with the <latinform>s-</latinform>
    prefix.</par><par>The front vowels in several scattered forms (Karenic, Nosu, Ergong) point perhaps
    to a variant with a palatal suffix, <latinform>*la-y</latinform> (see Matisoff 1995 &quot;Sino-Tibetan
    palatal suffixes revisited&quot;). </par>
