notes:
- type: T
  text: '<par>As J. Sun (1993a: 93) remarks, Proto-Tani <latinform>*b</latinform> became <latinform>ǰ</latinform>
    in Western Tani before <latinform>*i</latinform>.</par>'
- type: T
  text: '<par>Two sorts of alternations are to be found with this etymon: between open and nasal final
    syllables, and between open and velar final syllables. Several languages have doublets reflecting
    two variants, e.g. Lepcha <latinform>bi~bín</latinform>, Hpun <latinform>pè</latinform> and <latinform>pèŋ</latinform>,
    Lahu (Black) <latinform>pèʔ</latinform> and <latinform>pî</latinform>, and Dulong <latinform>biŋ</latinform>
    and <latinform>bi⁵⁵</latinform>. The Chin languages have a thorough-going morphological alternation
    between open syllables in Form I and velar final syllables in Form II.</par>'
- type: F
  text: '<par><hanform>畀</hanform> OC <latinform>*pi̯əd</latinform>, GSR #521a-b &apos;give&apos;; Schuessler
