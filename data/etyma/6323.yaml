notes:
- type: T
  text: '<par>Note that [<latinform>²</latinform>] is not a tone marker:</par><par>&quot;Modern Tani languages
    exhibit two different equations corresponding to <latinform>-at</latinform> in Mising and Padam. This
    indicates that the <latinform>-at</latinform> rhyme in Padam-Mising L has two distinct origins in
    PT. In the absence of Tani-internal evidence for a more precise distinction, two kinds of <latinform>-at</latinform>
    rhymes are tentatively posited for PT, <latinform>-at¹</latinform> and <latinform>-at²</latinform>&quot;
    (Sun 1993: 202).</par>'
