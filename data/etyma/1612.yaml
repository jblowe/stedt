notes:
- type: T
  text: '<par>This etymon is extremely widespread in TB with the meaning HOUSE (see STC #53). It appears
    as second element in compounds meaning WOMB / PLACENTA, where the first element means CHILD.</par><par>This
    root shows vocalic variation between <reconstruction>*-u-</reconstruction> and <reconstruction>*-i-</reconstruction>.
    Some languages have reflexes with initial velar stop, but others (e.g. Lushai [Mizo], WB) point to
    a variant beginning with <latinform>y-</latinform> or <latinform>i-</latinform>; that is, some languages
    have treated the velar as a prefix.</par>'
