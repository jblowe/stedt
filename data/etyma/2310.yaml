notes:
- type: T
  text: '<par>There is an unfortunate mistake in the index to STC (p.201) where this etymon is glossed
    &quot;bind, twist; roll; angle&quot; instead of &quot;wind, twist; roll; angle&quot;, undoubtedly
    due to perseveration from the previous entry, <reconstruction>*kik</reconstruction> &quot;bind, twist,
    tie&quot;. This error was, alas, reproduced in HPTB: 57, 412, 413, 426, 595.</par>'
- type: F
  text: '<par>Comparanda for this etymon comprise a large set of allofams within Chinese (cf. Schuessler
    2007:320-1), showing extensive variation in initial (simple vs. complex) and medial (presence vs.
    lack) segments, as well as phonation type. The following examples are representative:</par><par><hanform>絞</hanform>
    OC <latinform>*kŏg</latinform>, GSR #1166k &apos;twist, strangle&apos;; Schuessler 2007:309 <latinform>*kriâuʔ</latinform>
    or <latinform>*krâuʔ</latinform>; B &amp; S 2011: <latinform>*k-rˁiwʔ {k-rˁ[i]wʔ}</latinform> (dial.
    › <latinform>*krˁ[i]wʔ</latinform>); Mand. <latinform>jiǎo</latinform>.<br /><hanform>糾</hanform>
    OC <latinform>*ki̯ŏg</latinform>, GSR #1064b &apos;twist, plait; unite&apos;; Schuessler 2007:320
    <latinform>*kiuʔ</latinform>; B &amp; S 2011: <latinform>*k‹r›iwʔ</latinform>; Mand. <latinform>jiǔ</latinform>.<br
    /><hanform>樛</hanform> OC <latinform>*kli̯ŏg</latinform>, GSR #1069h &apos;downward-curving (of branches);
    to twist&apos;; Schuessler 2007:320 <latinform>*kiu</latinform>; B &amp; S 2011: <latinform>*k-riw</latinform>
    (dial. › <latinform>*kriw</latinform>); Mand. <latinform>jiū</latinform>.<br /><hanform>摎</hanform>
    OC <latinform>*gli̯ôg</latinform>/<latinform>*kli̯ŏg</latinform>, GSR #1069g &apos;tie around, strangle&apos;;
    Schuessler 2007: (<latinform>*(k)riw</latinform>); B &amp; S 2011: <latinform>*k-riw</latinform> (dial.
    › <latinform>*kriw</latinform>); Mand. <latinform>liú</latinform>/<latinform>jiū</latinform>.<br /><hanform>繚</hanform>
    OC <latinform>*liog</latinform>/<latinform>li̯og</latinform>, GSR #1151g &apos;bind around, wrap;
    entangle&apos;; Schuessler 2007:309 <latinform>*riauʔ</latinform>; B &amp; S 2011: (<latinform>*rˁewʔ
    {[r]ˁewʔ}</latinform>); Mand. <latinform>liǎo</latinform>.<br /><hanform>謬</hanform> OC <latinform>*mli̯ŏg</latinform>,
    GSR #1069m &apos;to lie (i.e. &apos;twist words&apos;)&apos;; Schuessler 2007:389 <latinform>*mriuh</latinform>;
    B &amp; S 2011: <latinform>*mə-riw-s</latinform> (dial. › <latinform>*mriw-s</latinform>); Mand. <latinform>miù</latinform>.</par>'
