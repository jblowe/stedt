notes:
- type: T
  text: '<par>Some reflexes of this extremely widespread etymon reflect the minimal form <reconstruction>*ruk</reconstruction>;
    others descend from a <reconstruction>*kr-</reconstruction> cluster; while still others come from
    a <reconstruction>*d-r-</reconstruction> combination.</par><par>The PLB form <reconstruction>*C-krokᴸ</reconstruction>
    is reconstructed with a voiced prefix (represented by the cover symbol <latinform>C-</latinform>),
    since its reflexes derive from the Proto-Loloish low-stopped tone, which can only come from a *voiced
    initial sequence. Cf. Matisoff 1972: #35.</par><par>For additional discussion of the numeral SIX,
    see Matisoff 1995 (&quot;Numerals&quot;), pp. 193-197.</par>'
- type: F
