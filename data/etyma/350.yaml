notes:
- type: T
  text: <par>As mentioned above, a number of languages have forms with open syllables and initial <latinform>l-</latinform>,
    <latinform>y-</latinform>, or <latinform>d-</latinform> with the meaning &apos;foot&apos;. Although
    this might seem strange, it cannot be excluded that these etyma for <emph>hand</emph> and <emph>foot</emph>
    are somehow related. This is rather analogous to the situation with NOSE and EAR, which are reconstructed
    as <reconstruction>*s-na</reconstruction> and <reconstruction>*r-na ⪤ *g-na</reconstruction>, respectively.</par><par>The
    prefixal <latinform>lə</latinform> in Jingpho forms referring to the feet are assigned to this etymon,
    while similar referring to the hand are interpreted as deriving from <xref ref="695">#695 </xref>.
    This ambiguity is the result of the weakening of the rhyme in the prefixization process.</par>
