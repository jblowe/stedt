notes:
- type: T
  text: <par>This word is ultimately from Arabic <latinform>bat̤t̤ax</latinform>, from which it was borrowed
    into many Indo-Aryan languages, and from there into TB. This disyllabic root has been monosyllabized
    in various ways in TB languages, but has sometimes survived as a disyllable.</par><par>Other areal
    words for DUCK that have been borrowed into TB are Nepali <xref ref="5717">#5717</xref>, Mandarin
    <xref ref="5718">#5718</xref>, and Austro-Tai <xref ref="5713">#5713</xref>.</par>
