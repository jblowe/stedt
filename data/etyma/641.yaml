notes:
- type: T
  text: <par>This etymon is well-attested in Karenic and apparently also in Lolo-Burmese (see note above
    under <xref ref="1284">#1284</xref>), with scattered but good-looking cognates in the NE Indian Areal
    Group (Meithei), Himalayish, and Asakian (Jingpho-Asakian).</par>
- type: T
  text: <par>In Chart L (Sak-Luish Group) of Luce 1985, under the confusing gloss &quot;Penis/Testicles&quot;,
    two forms are given from Bawtala Sak, one from Dodem Sak, two from Ganan, and two from Kadu (Kantu).
    Where two forms are given from the same language, separated by a semicolon, I have assumed that the
    first one means &apos;penis&apos; and the second one &apos;testicles&apos;, and have reglossed them
    accordingly. Under this interpretation, some syllables are assigned to the present root; while others,
    phonologically quite similar, are taken to mean &apos;testicle&apos;, and are assigned to <xref ref="300">#300</xref>,
    above [q.v.].</par><par>Rather arbitrarily, I assign reflexes with stop initials to this root and
    those with fricated or palatalized initials to <xref ref="1601">#1601</xref>.</par><par>Like the previous
    etymology <xref ref="3420">#3420</xref>, some reflexes of this root have a final <latinform>-k</latinform>.</par><par>The
    resemblance to English <emph>dick</emph> appears entirely accidental.</par>
