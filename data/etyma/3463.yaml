notes:
- type: T
  text: <par>The semantic range of this etymon is similar to that of English &apos;breast&apos;; i.e.
    it can refer to the general thoracic area (like &apos;chest&apos;), or specifically to a woman&apos;s
    mammary gland. In Southern Loloish this root typically occurs after <xref ref="3458">#3458</xref>
    [q.v.]. The phonological resemblance of this root to <xref ref="662">#662</xref> [q.v.] seems entirely
    fortuitous.</par>
