notes:
- type: T
  text: <par>This etymon ranges semantically between VAGINA/VULVA and MOUTH/LIP. Reflexes with the latter
    meanings are assembled separately below as <xref ref="478">#478</xref>. Another root with similar
    semantic range is <xref ref="1349">#1349</xref> [q.v.].</par>
- type: T
  text: '<par>This etymon is well-attested in Burmish, with good-looking but scattered cognates in Loloish,
    the NE Indian Areal Group, and Himalayish. It seems best to reconstruct this root with a palatal (rather
    than dental) affricate, as demonstrated in Matisoff 1969 (cf. the discussion in STC, n. 178 (p. 53)).
    Some reflexes of this etymon are cited in Bauer&apos;s far-ranging article (Bauer, R. 1991. &quot;Sino-Tibetan
    *vulva&quot;, LTBA 14.1:147-172).</par><par>See TBRS #77, #77a, #77b.</par>'
