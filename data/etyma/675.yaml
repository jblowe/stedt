notes:
- type: T
  text: <par>This etymon is well-represented in Himalayish (with the <reconstruction>*m-</reconstruction>
    prefix in WT) and in Qiangic (with a lateral prefix in Ergong and rGyalrong). The root-initial <reconstruction>*ŋ-</reconstruction>
    has become <latinform>n-</latinform> in several languages.</par><par>The first syllables of Meithei
    <latinform>naw phəm</latinform> &apos;placenta&apos; and Tangkhul <latinform>nao-pam</latinform> &apos;womb&apos;
    are apparently not cognate, since <reconstruction>*-al</reconstruction> &gt; Meithei <latinform>-al</latinform>
    or <latinform>-an</latinform> (cf. <reconstruction>*m-kal ⪤ *s-gal</reconstruction> SMALL OF BACK
    &gt; Meithei <latinform>nam-gal ~ nam-gan</latinform>) and &gt; Tangkhul <latinform>-ay</latinform>
    (cf. <reconstruction>*baːl</reconstruction> FILTH / EXCREMENT &gt; Tangkhul <latinform>páy</latinform>).
    S. Imoba 2004 (<emph>Manipuri to English Dictionary</emph>, p. 202) records <latinform>-naw</latinform>
    &apos;small, little&apos;, <latinform>naw-wà</latinform> &apos;baby&apos;, <latinform>nawsum</latinform>
    &apos;cradle&apos;, and <latinform>nawpu-bə</latinform> &apos;gestation, pregnancy&apos;.</par>
