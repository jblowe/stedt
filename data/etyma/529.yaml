notes:
- type: T
  text: '<par>This relatively rare root appears in the NE Indian Areal Group, Himalayish, and Nungish.
    It is quite possible that it is related to <xref ref="251">#251</xref>, STC #367. The Dulong compounds
    look as if they could mean &quot;belly-heart&quot;, although the usual Dulong word for &apos;heart&apos;
    is <latinform>ɹɯ³¹ mɔ̆ʔ⁵⁵</latinform>. Cf. also Meithei <latinform>puk-ning</latinform> &apos;heart&apos;
    (Marrison 1967:120), where BELLY + HEART apparently means &apos;heart&apos;, not &apos;navel&apos;.</par>'
- type: T
  text: <par>The second element of the Tani binome <xref ref="6396">#6396</xref> looks as if it might
    be related to this root.</par>
