notes:
- type: T
  text: <par>This root appears in several Tani languages and is perhaps related to a group of Naga forms
    with the <latinform>m-</latinform> prefix.<footnote>Chokri <latinform>merü zho</latinform>, Mao <latinform>mare</latinform>,
    Chang <latinform>mili shen</latinform>, perhaps also Meluri <latinform>a re pi</latinform>.</footnote>
    Several languages show semantic associations between RAINBOW and BOW (for arrows), as well as with
    SNAKE. The Naga forms just mentioned resemble many reflexes of <xref ref="2623">#2623</xref>.</par>
