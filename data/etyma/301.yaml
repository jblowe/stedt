notes:
- type: T
  text: '<par>This etymon is closely related to one for BIRD, set up as <xref ref="1603">#1603</xref>.
    The original version of STC sets up <reconstruction>*wa</reconstruction> for BIRD (STC #99), but this
    is revised to <reconstruction>*(b)wa</reconstruction> (largely because of Bahing <latinform>ba</latinform>
    &apos;fowl&apos;) in the indexes (pp. 209, 211). In some languages (e.g. Jingpho and Kadu) a reflex
    of <xref ref="301">#301</xref> occurs as a prefix in bird-names (<latinform>ù-</latinform>). Marrison
    (p. 459) sets up three Proto-Northern Naga allofams for BIRD: <reconstruction>*C-waw</reconstruction>,
    <reconstruction>*ua</reconstruction>, and <reconstruction>*wa</reconstruction>. It is sometimes difficult
    to distinguish the reflexes of <reconstruction>*wa</reconstruction> and <reconstruction>*wu</reconstruction>.
    For example, in the following NE Indian Areal Group forms, the italicized syllables are to be derived
    from <reconstruction>*wa ⪤ *wu</reconstruction> BIRD, with another constituent conveying the meaning
    EGG: Chang <latinform><emph>ao</emph>kiak</latinform>, Chokri <latinform>thü<emph>vu</emph>zü</latinform>,
    Konyak <latinform><emph>ao</emph>kiak</latinform>, Konyak (Tamlu) <latinform><emph>ʌu</emph>ji</latinform>,
    Ntenyi <latinform>a<emph>wüü</emph>-atsü</latinform>, Sema <latinform><emph>au</emph>khu</latinform>,
    Tangsa <latinform><emph>¹vu</emph>¹t̪ʌi</latinform>, Tangsa (Moshang) <latinform><emph>wu</emph>◦di</latinform>,
    Wancho <latinform><emph>ao</emph>-ti</latinform>/<latinform><emph>ɔ</emph>-ti</latinform>, Yacham-Tengsa
    <latinform><emph>u</emph>-tü</latinform>.</par>'
- type: T
  text: <par>These roots have a wide distribution in TB. In Lolo-Burmese (including Jinuo), the root <reconstruction>*wu</reconstruction>
    is widely attested with the predominant meanings &apos;egg; lay egg; hatch&apos;. In Bai this root
    means &apos;hatch&apos;, while in Northern Naga and Qiang (Mawo, Yadu) it generally means &apos;bird&apos;,
    occurring as the first element in compounds for &apos;egg&apos; (see below).</par>
- type: F
  text: '<par><hanform>嫗</hanform> OC <latinform>*ʔi̯u</latinform>, GSR #122o &apos;sit on eggs, incubate,
    warm (v.) with the body&apos;; Schuessler 2007:590 <latinform>*ʔoʔ</latinform>; B &amp; S 2011: (<latinform>*qoʔ</latinform>);
    Mand. <latinform>yù</latinform> ~ <latinform>yǔ</latinform>.</par>'
