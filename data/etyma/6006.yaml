notes:
- type: T
  text: <par>This root is well attested in Qiangic, with a very likely Angami cognate. The putative Jingpho
    cognate with the rhyme <latinform>-oi</latinform> justifies the reconstruction of the nasal prefix;
    the presumed development of <reconstruction>*-wa</reconstruction> to Jingpho <latinform>-oi</latinform>
    looks like the exact opposite of the sound change from Middle French <latinform>-oi</latinform> to
    Modern French <latinform>-wa</latinform>.</par>
