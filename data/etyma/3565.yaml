notes:
- type: T
  text: '<par>In some TB languages, an apparent reflex of PTB <latinform>*s-ŋar</latinform> may refer
    not to ‘frost’ per se, but instead refer e.g. to ‘frost’ or ‘dew’ equivocally, or to ‘dew’ alone.  Cases
    in point are particularly evident within Lolo-Burmese, especially among closely related languages.
    For instance, WB has an etymon <latinform>hnâŋ</latinform> or <latinform>hnɑŋ³</latinform>, glossed
    ’dew’, but also as ‘fog, mist’; the notion ‘frost’ is expressed as WB <latinform>hnɑŋ³khɑi³</latinform>,
    i.e. ‘hard dew’. Similary, Atsi (Zaiwa) has <latinform>ŋa̱n⁵¹</latinform> ‘dew’, while ‘frost’ is
    <latinform>ŋa̱n⁵¹phju⁵¹</latinform> lit. ‘white dew’, and ‘ice’ is <latinform>ŋa̱n⁵¹thuŋ²¹</latinform>.
    Single lexemes which can mean either ‘frost’ or ‘dew’, apparently depending on context, are seen in
    Langsu (Luxi) <latinform>ŋa̱ŋ³¹</latinform> and Maru (Langsu) <latinform>ŋə̱ŋ³¹</latinform>. </par><par>In
    Loloish, reflexes of PTB <latinform>*s-ŋar</latinform> most often refer to ‘frost’ and/or ‘ice’, cf.
    Black Lahu <latinform>ᴀ³³ŋə³³</latinform> ‘frost, ice’; the notion ‘dew’ is then expressed through
    reflexes of a separate etymon PTB <latinform>*(d)zil</latinform> ‘dew’ (PLB <latinform>*ʔ-dzi²</latinform>),
    either alone or in compounds, cf. Black Lahu <latinform>tsi³¹ɣə³¹</latinform>, lit. ‘dew water’.  The
    situation in Nusu (Bijiang), however, is noteworthy: PTB <latinform>*s-ŋar</latinform> yields Nusu
    <latinform>hɑ̃ʴ³⁵</latinform>, which as a single lexeme is glossed ‘frost’, while the compound <latinform>hɑ̃ʴ³⁵tɕhe³⁵</latinform> ,
    literally ‘frost dew’, is the term for ‘dew’ (compare e.g. Nusu (Southern), which simply has <latinform>tɕhe⁵⁵</latinform>
    ‘dew’). In Leqi (Luxi) (a Burmish language), <latinform>ŋa̱n³³</latinform> by itself is glossed ‘ice’;
    the term for dew is <latinform>ŋa̱n³³tʃu⁵⁵</latinform>,  lit. ‘ice dew (?)’, &apos;frost&apos; is
    <latinform>ŋa̱n³³phiu³³</latinform>, lit. &apos;white ice’.</par><par>In dealing with the above examples,
    it should be kept in mind that in the real world, the phenomena we call ‘fog, mist, dew, frost’ refer
    to points along a continuum. When air temperature cools to near the dew point, then we see ‘fog’ or
    ‘mist’. When the surface temperature of an exposed, thin object cools to near the dew point, then
    we see ‘dew’. When the surface temperature of that object cools to near a dew point that is already
    below freezing, then rather than ‘dew’, we see ice in the form of ‘frost’.</par><par>We can, then,
    cautiously say that some languages describe this meteorological continuum using relatively more single
    lexemes (e.g. English and Chinese), while other languages use relatively fewer single lexemes but
    more lexemic compounds (e.g. Burmese, Atsi, Langsu and Maru). Regarding Nusu (Bijiang) <latinform>hɑ̃ʴ³⁵</latinform>
    and Leqi <latinform>ŋa̱n³³</latinform>, we surmise that the underlying lexemic meaning is maximally
    inclusive, i.e. ‘condensed/congealed water in general’; this may account for the seeming disparity
    between the surface connotation of single lexemes vs. the same lexemes in compounds.</par><par>Admittedly,
    our suppositions above are based on data likely collected in part via prepared word lists, which can
    unwittingly impose lexemic categories and distinctions that speakers of a particular language being
    studied may not find natural. More in-depth and beyond the glossary studies of Lolo-Burmese languages
    will hopefully become available to help us better shed light on this interesting area of the TB lexicon.</par>'
