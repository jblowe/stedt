- type: T
  text: '<par>PKC has two homophonous roots, <latinform>*may</latinform> TAIL and FIRE. These are quite
    separate etymologically (<xref ref="1288">#1288</xref> vs. <xref ref="2136">#2136</xref>), although
    KVB (#794, #767) glosses certain forms with both English words.</par>'
