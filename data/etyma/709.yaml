- type: T
  text: <par>The labial prefix is attested in Kuki-Chin and Naga. The Sema/Simi forms seem to show reduplication
    of the root. Palatalization of the initial has occurred in Nungic and Qiangic. The Wakung and Nungic
    forms provide evidence for the velar nasal final.</par>
