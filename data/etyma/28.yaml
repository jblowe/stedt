- type: T
  text: <par>This root is solidly established for PTB on the basis of the Jingpho and Burmese reflexes,
    with good confirmation from the Limbu form. It also is well attested in Qiangic, although the vocalism
    of some of these forms remains to be explained. The cognacy of the rGyalrongic forms is possible but
    not certain.</par>
