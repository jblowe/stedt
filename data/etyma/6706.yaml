notes:
- type: T
  text: '<par>This etymon was formerly reconstructed as <latinform>*r/g-dek</latinform>. (The velar prefix
    is attested in Tangkhul and Bodo-Garo.) The nasal final in Bodo-Garo, Kanauri, and Tsangla might motivate
    reconstructing another allofam <latinform>*r-tyaŋ ⪤ r-twaŋ</latinform>.</par><par>The Tibetan shows
    vowel gradation in this root: <latinform>rdeg(s)-pa ⪤ rdog(s)-pa</latinform>.</par>'
