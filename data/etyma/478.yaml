notes:
- type: T
  text: <par>This is undoubtedly the same etymon as <xref ref="1356">#1356</xref>, with obvious semantic
    connections. Reflexes with meanings like MOUTH or LIP have so far been found in the NE Indian Areal
    Group (including Barish [Atong] and the outlying Sulung language), Himalayish (including Bodic [Tshona]
    and Kiranti), and Burmese (which has homophonous forms with both the VAGINA and MOUTH meanings).</par>
