notes:
- type: T
  text: <par>This root has been reconstructed with a nasal prefix at the PTB level, but many languages
    have fully vocalized disyllabic compounds where the initial syllable begins with a nasal (cf. Jingpho
    <latinform>min</latinform>, Tangkhul <latinform>maŋ</latinform>, Proto-Ao <latinform>hməy</latinform>).
    It is thus natural to assume that this first element represented a separate morpheme which was subsequently
    &quot;prefixized.&quot; It is possible that this morpheme was actually <xref ref="17">#17</xref>.</par>
