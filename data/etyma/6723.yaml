notes:
- type: T
  text: <par>This root has many allofams, displaying variation in prefix, voicing or leniting of the initial,
    alternation between the high vowels <latinform>-u-</latinform> and <latinform>-i-</latinform>, and
    presence or absence of final stop. The reflexes also display considerable variation in meaning, ranging
    from the body part &apos;stomach&apos; to other vital organs like &apos;heart&apos; to hollow natural
    objects like &apos;cave&apos;.</par><par>See the extended discussion in Matisoff 1978b:124-126 (VSTB).</par>
