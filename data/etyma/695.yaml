notes:
- type: F
  text: '<par><hanform>力</hanform> OC <reconstruction>*li̯ək</reconstruction>, GSR #928a-b &apos;sinew,
    strength, force, power&apos;; Li 1971: <latinform>(*ljək)</latinform>; Baxter 1992 #1314: <reconstruction>*C‑rjɨk</reconstruction>;
    B &amp; S 2011: <reconstruction>*k.rək</reconstruction>; Schuessler 2007:351; Mand. <latinform>lì</latinform>.</par><par><hanform>仂</hanform>
    OC <reconstruction>*lək, *li̯ək</reconstruction>, GSR #928c &apos;a tenth&apos;; Li 1971: <latinform>(*lək,
    ljək)</latinform>; Baxter 1992 #1315: <reconstruction>*C‑rɨk, C‑rjɨk</reconstruction>; B &amp; S 2011:
    <latinform>(*[r]ˤək, [r]ək)</latinform>; Schuessler 2007:349-350; Mand. <latinform>lè</latinform>.</par><par><hanform>扐</hanform>
    OC <reconstruction>*lək</reconstruction>, GSR #928d &apos;space between fingers&apos;; Li 1971: <latinform>(*lək)</latinform>;
    Baxter 1992 #1315: <reconstruction>*C‑rɨk</reconstruction>; B &amp; S 2011: <latinform>(*[r]ˤək)</latinform>;
    Schuessler 2007:349-350; Mand. <latinform>lè</latinform>.</par><par>The graph seems to depict an arm
    with a hand. Also, in the same phonetic series, <hanform>仂</hanform> OC <reconstruction>*lək ⪤ li̯ək</reconstruction>,
    GSR #928c ‘a tenth’ (from the 10 fingers); Mand. <latinform>lè</latinform>, and <hanform>扐</hanform>
    OC <reconstruction>*lək</reconstruction>, GSR #928d ‘space between the fingers’ (where divination
    sticks were inserted); Mand. <latinform>lè</latinform>.</par><par>For a similar semantic association,
    cf. Japanese <latinform>ude</latinform> ‘arm’ and te ‘hand’, which may often be used in the sense
    of ‘ability, competence, skill’.</par><par>ZJH: Handel 2009:133-4 considers Chinese <hanform>亦</hanform>
    ‘armpit’ <latinform>yì</latinform> and <hanform>翼</hanform> ‘wing’ <latinform>yì</latinform>, both
    with OC *lateral initial, to be the most direct cognates to the basic PTB root <reconstruction>*lak</reconstruction>,
    while <hanform>力</hanform> <latinform>lì</latinform> with initial <reconstruction>*r‑</reconstruction>
    is probably a more distantly related member of the Chinese word family. See <xref ref="696">#696</xref>
    and <xref ref="699">#699</xref> for more details.</par><par>SPB: Note that Schuessler (2007:349-50)
    considers <hanform>仂</hanform> <latinform>lè</latinform> and <hanform>扐</hanform> <latinform>lè</latinform>
    to be unrelated etymologically to <hanform>力</hanform> ‘strength’ <latinform>lì</latinform>; he considers
    them to derive from a basic sense of ‘vein (in soil)’, and thus connects them to <hanform>理</hanform>/<hanform>里</hanform>
    ‘cut in a regular way, divide into even sections’ (cf. <reconstruction>*li̯əg</reconstruction>, GSR
    #978a,d; Mand. <latinform>lǐ</latinform>).</par>'
