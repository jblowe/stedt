notes:
- type: T
  text: <par>This root seems to be fairly widely distributed across subgroups, although with scant attestation
    in each. There is some slight evidence for an <reconstruction>*s-</reconstruction> prefix (Achang
    [Xiandao] <latinform>l̥ɿ⁵⁵ɲ̊ɔʔ⁵⁵<emph>l̥aŋ³¹</emph>kam⁵⁵</latinform>).</par><par>At first glance,
    Bodo <latinform>zay klóŋ</latinform> &apos;rainbow&apos; seems to reflect a velar prefix with this
    root, but it is at least equally probable that the second syllable actually means &apos;bridge&apos;
    (cf. Bodo <latinform>sayklóŋ</latinform>), the semantic association residing in the arched appearance
    of the rainbow.</par>
