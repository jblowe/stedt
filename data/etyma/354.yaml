  text: <par>This root is of restricted occurrence, although the Lepcha / WB correspondence looks particularly
    good; Lepcha medial <latinform>-y-</latinform> is a frequent reflex of the PTB <latinform>*s-</latinform>
    prefix, as shown long ago in Benedict (1941), while the WB voiceless nasal has a similar origin.</par><par>The
    Tujia form is also provisionally assigned to this root.</par>
