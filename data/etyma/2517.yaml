notes:
- type: T
  text: '<par>This etymon displays two well-attested patterns of variation: between <latinform>*-i-</latinform>
    and <latinform>*-u-</latinform>,  and between <latinform>*-i-</latinform> and <latinform>*-ya-</latinform>.
    Similar allofamic behavior is shown by <xref ref="363">#363</xref>.</par><par>The meanings of the
    reflexes range from PINCH / SQUEEZE to PRESS / OPPRESS  to SUBMERGE / SINK INTO / WEST, the common
    semantic link being downward motion. There is a resemblant root, <xref ref="2407">#2407</xref>, with
    similar meanings related to downward motion.</par><par>STC sets up two separate roots in this area,
    <latinform>*nup ⪤ *nip</latinform> &apos;sink&apos; and <latinform>*nyap</latinform> &apos;pinch,
    squeeze&apos;, although it seems best to combine them into a single etymon.</par><par>Note the large
    number of Kuki-Chin allofams of this semantically highly differentiated root.</par>'
- type: F
  text: '<par><hanform>入</hanform> OC <latinform>*ńi̯əp </latinform>, GSR #695a-d; B &amp; S 2011: <latinform>*nəp
