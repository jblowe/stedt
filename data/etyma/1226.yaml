notes:
- type: T
  text: <par>Vowel length is reconstructed at the PLB level because of WB <latinform>chit</latinform>,
    since the short rhyme <latinform>*-it</latinform> developed into WB <latinform>-ac</latinform> (thus
    merging with PLB <latinform>*-ik</latinform>).</par><par>It is necessary to reconstruct a voiced prefix
    at the PLB level to account for the low stopped tone in Loloish. This was symbolized by the arbitrary
    element <latinform>V-</latinform> in LTSR, but perhaps the LOW tone is an indirect reflection of a
    much earlier <latinform>*r-</latinform> prefix found in Tibetan.</par>
- type: I
  text: <par>Prefixal <latinform>*r-</latinform> is reconstructed because of WT <latinform>rtsid</latinform>.</par>
