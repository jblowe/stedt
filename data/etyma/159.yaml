notes:
- type: T
  text: <par>We set up this root with an initial affricate to accommodate the Tibetan and Northern Naga
    forms. At the PLB level, the initial had simplified to a sibilant, a development which is replicated
    in scattered forms elsewhere, e.g. Sangtam <latinform>a ze</latinform> and Kayan Pekon <latinform>sên</latinform>.</par>
