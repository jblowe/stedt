notes:
- type: T
  text: <par>This etymon is represented in the Naga, Qiangic, and Himalayish branches. The Amdo (Bla-brang)
    form <latinform>hwoŋ wa</latinform> seems to represent a distinct root. The velar prefix is attested
    in both Ntenyi and Lepcha.</par><par>The second syllable of Ersu <latinform>da⁵⁵ vɛ⁵⁵ ȵo³³</latinform>
    looks like a possible reflex of this etymon, but <latinform>vɛ⁵⁵ȵo⁵⁵</latinform> is glossed as &apos;intestines&apos;.
    However, the semantic development of HAND + INTESTINES &gt; ARM seems quite implausible.</par><par>There
    is a good Chinese comparandum meaning &apos;wrist&apos;.</par>
- type: F
  text: '<par><hanform>腕</hanform> OC <reconstruction>*ʔwɑ̂n</reconstruction>, GSR #260n &apos;wrist&apos;;
    Li 1971: <latinform>(*·uanh)</latinform>; Baxter 1992: <latinform>(*ʔons)</latinform>; B &amp; S 2011:
    <reconstruction>*[ʔ]ˤo[r]-s</reconstruction>; Schuessler 2007:582-3 (see <hanform>迂</hanform> below);
    Mand. <latinform>wàn</latinform>.</par><par><hanform>捥</hanform> OC <latinform>*ʔwɑ̂n</latinform>,
    GSR #260m &apos;wrist&apos;; Li 1971: <latinform>(*·uanh)</latinform>; Baxter 1992: <latinform>(*ʔons)</latinform>;
    B &amp; S 2011: <latinform>*[ʔ]ˤo[r]-s</latinform>; Schuessler 2007:--; Mand. <latinform>wàn</latinform>.</par><par>ZH:
    The Old Chinese words may have ended in <reconstruction>*-n</reconstruction> or <reconstruction>*-r</reconstruction>,
    which merge in later stages of Chinese; the brackets around <reconstruction>*r</reconstruction> in
    Baxter &amp; Sagart’s (2011) reconstruction are meant to reflect these two possibilities. Bodman (1980:65)
    suggested a comparison with Old Tibetan <latinform>’khord</latinform> ‘to turn around’ &gt; WT <latinform>’khor</latinform>
    and reconstructed OC <reconstruction>*skwars</reconstruction>.</par><par>Schuessler 2007:582-3 instead
    derives the Chinese word for ‘wrist’ from an open-syllable root meaning ‘bend’ (<hanform>迂</hanform>,
    Mand. <latinform>yū</latinform>), with nominalizing suffix <reconstruction>*-n</reconstruction>, an
    etymology unrelated to this PTB root.</par><par>OC forms reconstructed with <reconstruction>*o</reconstruction>
    (<reconstruction>*wa</reconstruction> in Karlgren and Li) should normally correspond to PTB <reconstruction>*o</reconstruction>,
    not <reconstruction>*wa</reconstruction>. But the support for this root in TB is sparse enough that
    a reconstruction with PTB <reconstruction>*o</reconstruction> probably can’t be ruled out; besides,
    comparisons involving zero or glottal initial may have different correspondences that remain to be
    clearly worked out.</par>'
