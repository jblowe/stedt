notes:
- type: T
  text: <par>This etymon is a prime example of the alternation between homorganic stop and nasal. Most
    subgroups reflect the *nasal, while Lolo-Burmese attests to the *stop.</par><par>Galo seems to have
    an interesting doublet <latinform>sɯ</latinform> ⪤ <latinform>`hɨɨ</latinform>. Note also the Trung
    [Dulong] doublet <latinform>śiŋ</latinform> ⪤ <latinform>śik</latinform>.</par><par><plainlatinform>LTSR
    118(a-b)</plainlatinform> also reconstructs two allofams, with the nasal-final variant attested in
    Bisu <latinform>tsɯ̀ŋ</latinform>.</par><par>As suggested in <plainlatinform>DL p. 1221</plainlatinform>,
    the poetic Lahu form <latinform>šɔ̂</latinform> might be from the nasal-final variant, although it
    is tonally aberrant.</par><par>The Chepang forms with final <latinform>-ŋʔ</latinform> suggest a stage
    intermediate between a final nasal and a final stop.</par>
