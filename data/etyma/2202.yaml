notes:
- type: F
  text: '<par><hanform>毒</hanform> OC <latinform>*d’ôk</latinform>, GSR #1016a; B &amp; S 2011: <latinform>*dˁuk
    {[d]ˁuk}</latinform>; Mand. <latinform>dú</latinform>. This Chinese character contains the graph for
    &apos;mother&apos; (<hanform>母</hanform>, Mand. <latinform>mǔ</latinform>), which seems to suggest
    that the original meaning might have been &quot;be revolted by food, as a pregnant woman&quot;. Cf.
    Lahu <latinform>tɔ̀ʔ</latinform>, which means both &apos;poison&apos; and &apos;be revolted by food&apos;.</par>'
