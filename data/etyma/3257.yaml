notes:
- type: T
  text: <par>Lahu <latinform>ɔ̀-vɛ̀ʔ</latinform> &apos;screw&apos; is not from this root, but is rather
    a borrowing from Modern Burmese <latinform>wɛʔ⁴⁴</latinform> &apos;pig&apos; (cf. WB <latinform>wak</latinform>
    &apos;pig&apos;), which occurs in the Burmese compound <latinform>wɛʔ⁴⁴ u²²</latinform> &apos;pig
    intestine; screw&apos;, the semantic link residing in the curly, twisted appearance of pig intestines.
    The true Lahu reflex is <latinform>vɔ̀ʔ ~ g̈ɔ̀ʔ</latinform> &apos;twist (as fringes)&apos;.</par>
