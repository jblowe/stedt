notes:
- type: I
  text: <par>cognate to GSR 457ab <latinform>mi̯ěn</latinform> “people” .</par>
- type: T
  text: <par>The <latinform>*-n</latinform> suffix (a morpheme signifying collectivity, according to Benedict,
    <plainlatinform>STC n. 428, pp. 157-8</plainlatinform>) is attested in Written Burmese and Chinese.</par><par>This
    morpheme frequently occurs as first element in compounds signifying body part terms (e.g., in Mzieme,
    Zeme, Magar).</par><par>It also occurs as final element in names of Tibeto-Burman ethnic groups (e.g.,
    Prinmi, Thangmi, Khumi, Xumi), and as first element in such names as well (e.g., Mizo, Mikir, Mishing,
    Miji). In this respect, it is similar to <xref ref="5632">#5632</xref>.</par>
- type: F
  text: '<par><hanform>民</hanform> OC <latinform>*mi̯ən ~ mi̯ĕn</latinform>, GSR #457a &apos;people&apos;;
    Schuessler 2007:386 <latinform>*min</latinform>; B &amp; S 2011: <latinform>*miŋ {mi[ŋ]}</latinform>;
    Mand. <latinform>mín</latinform></par>'
