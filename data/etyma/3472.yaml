notes:
- type: T
  text: <par>This root was set up in TBRS 154, but several of the supporting forms from Tamangic were
    spurious (p.c., M. Mazaudon, 2014). For the correct analysis of Gurung (Ghachok) <latinform>mrĩ la
    baq</latinform> &apos;copulate&apos;, see <xref ref="5752">#5752</xref>.</par><par>The only remaining
    support for this etymon is furnished by Tangkhul and Dumi, but these two forms are also subject to
    reevaluation.</par>
- type: T
  text: <par>This shaky root seems quite distinct from <xref ref="1647">#1647</xref>.</par>
