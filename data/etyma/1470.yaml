  text: <par>The <reconstruction>*s-</reconstruction> prefix is reconstructed here on the basis of the
    Newar and the Nusu (Central) forms.</par><par>Many forms, especially in Qiangic, Tamangic, and Tani,
    seem to be borrowings from Tibetan.</par><par>Cf. also <xref ref="1441">#1441</xref>.</par><par>For
