notes:
- type: T
  text: '<par>French says, &quot;Cf. Burmese-Lolo <latinform>(*k-)la</latinform> (&gt; WB <latinform>kyà</latinform>),
    which Benedict identifies as &quot;ultimately a loan from Austro-Asiatic <latinform>*k(u)la</latinform>&quot;
    (STC 177-178, n.472); the Khasi is <latinform>u-kla</latinform> (Robinson). This is probably also
    the source of the NN form, with the development of medial <latinform>-y-</latinform> &lt; <latinform>*-l-</latinform>
    paralleled in Burmese, and NN <latinform>*C-</latinform> &lt; PTB <latinform>*s-</latinform> &apos;animal
    prefix&apos; &quot; (1983: 569).</par>'
- type: T
  text: <par>This root is undoubtedly an early loan from Mon-Khmer; cf. Mon kula, Munda kul(a).</par>
- type: T
  text: <par>Old Burmese <latinform>klâ</latinform> developed into later Written Burmese <latinform>kyâ</latinform>,
    which is the source of modern Burmic forms with affricated initials.</par>
- type: F
  text: '<par><hanform>虎</hanform> OC <latinform>*xo</latinform>, GSR #57b-e &apos;tiger&apos;; STC:107,
    178 <latinform>*xlo</latinform>; B &amp; S 2011: <latinform>*qʰˁraʔ</latinform>; Schuessler 2007:281
    <latinform>*hlâ</latinform>; Mand. <latinform>hǔ</latinform>.</par>'
- type: T
  text: <par>There is a Chinese comparandum <hanform>虎</hanform> (GSR 57b-e <latinform>xo</latinform>,
    revised to <latinform>xlo</latinform> in STC:107, 178). </par>
