  text: <par>This root has only been identified in three languages (Darang, Lepcha, and Bai), though the
    semantic and phonological fit is good among them. The basic meaning of the etymon is &apos;purse,
    small pouch&apos; (cf. French <emph>la bourse</emph> &apos;purse; stock market&apos;, <emph>les bourses</emph>
    &apos;testicles&apos;). The resemblance to <xref ref="1638">#1638</xref> is due to chance.</par>
