- type: T
  text: <par>As is to be expected with high-frequency grammatical etyma, this root shows some vowel gradation,
    apparently between <latinform>*-ay</latinform> and <latinform>*-i</latinform>.</par><par>The nasal
    prefix is attested directly in Written Tibetan and Jingpho, and indirectly by the voiced initial in
    Written Burmese.</par>
