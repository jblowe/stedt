notes:
- type: T
  text: '<par>This tentatively reconstructed root is largely restricted to the final syllables of Loloish
    compounds, with a possible cognate from Kulung.</par><par>Baima <latinform>ʃhɑ⁵³ pɑ⁵³</latinform>
    &apos;skin&apos; (Sun 1991, &quot;Body Parts Questionnaire&quot;) and Tamang (Sahu) <latinform>grahm-pa-sa</latinform>
    &apos;lip&apos; and <latinform>sya</latinform> &apos;skin&apos; (Taylor et al. 1972: 1.28, 2.24) look
    suspiciously like Baima <latinform>shɑ¹³ kɛ³⁵</latinform> &apos;flesh, meat&apos; and Tamang (Sahu)
    <latinform>ra sya</latinform> &apos;meat&apos;, suggesting that these syllables derive from <xref
    ref="34">#34</xref>, rather than from the present etymon.</par><par>Several forms with initial palatal
    sibilants are assigned by W. T. French to PNN <reconstruction>*C̬-kʰuar</reconstruction>, which we
    in turn assign to <xref ref="593">#593</xref>.</par>'
