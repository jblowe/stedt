notes:
- type: T
  text: <par>This rather sparsely attested root has an apparently strange range of meaning, including
    both GUMS and PALATE, perhaps explicable by their common reddish color.</par><par>The second element
    of the Lahu compound <latinform>cì-qhɔ</latinform> is a possible phonological descendant of this root,
    but is better assigned to <xref ref="820">#820</xref>.</par><par>It seems likely that there is a connection
    between this root and <xref ref="473">#473</xref>.</par>
