notes:
- type: T
  text: '<par>STC originally set up two separate roots: <reconstruction>*kun</reconstruction> ALL (#10)
    and <reconstruction>*m-kul</reconstruction> TWENTY (#397). However, the discovery of the Karbi pair
    <latinform>koi</latinform> &apos;all&apos; / <latinform>iŋ-koi</latinform> &apos;twenty&apos; made
    it clear that a single etymon is involved, with an original meaning like &quot;such a large number
    that one has to use all the fingers and toes to count up to it.&quot;</par><par>This root may also
    be connected semantically with <xref ref="201">#201</xref>.</par>'
- type: F
  text: '<par><hanform>羣</hanform> OC <latinform>*g’i̯wən</latinform>, GSR #459d-e &apos;flock, group;
