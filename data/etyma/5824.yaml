- type: T
  text: <par>We posit a PTB etymon <latinform>*phya(k)</latinform> &apos;open; release&apos; based on
    evidence mostly from Himalayish languages. An allofamic relationship with <xref ref="5616">#5616</xref>
    is likely; at the same time, <latinform>*phya(k)</latinform> and <latinform>*pryak</latinform> differ
    in their semantic focus as well as their areal distribution within Tibeto-Burman. Perhaps the two
    etyma might be treated as mesoroots of an PTB super-etymon, as yet unproposed.</par><par>Good Chinese
    comparanda exist for both <latinform>*phyak</latinform> and <latinform>*pryak</latinform>; these comparanda
    can themselves be considered allofamic within Chinese.</par>
- type: F
  text: '<par><hanform>闢</hanform> OC <latinform>*b’i̯ĕk</latinform>, GSR #853k &apos;open; open up&apos;;
    Coblin 86:114 ST <latinform>*byeʔ</latinform> &gt; OC <latinform>*bjik</latinform>; Schuessler 2007:414
    <latinform>*bek</latinform> &lt; <latinform>*bai-k</latinform>; B &amp; S 2011: (<latinform>*bˁek</latinform>);
    Mand. <latinform>pì</latinform>.</par>'
