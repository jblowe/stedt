- type: T
  text: <par>The WT reflex for this root and a Chinese comparandum were first proposed by Coblin (1986)
    and were recapitulated in Schuessler (2007). As of now, primary supporting evidence is seen elsewhere
    than in Bodic, notably in Western Tani and Jingpho. Hopefully, additional corroborating data from
    spoken Tibetan dialects and Qiangic/rGyalrongic will some day become available.</par>
