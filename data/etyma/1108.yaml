notes:
- type: T
  text: <par>This widespread root displays several types of variation. While many languages reflect a
    <latinform>-y-</latinform> medial, Lolo-Burmese seems to have metathesized the palatal element to
    the post-vocalic position (PLB <latinform>*ray¹</latinform>). </par><par>A number of Himalayan languages
    (Written Tibetan, Thebor, Bunan, Magar, Bahing, Khaling, and Nachereng) attest to a dental stop suffix,
    as do Nung and Idu. An <latinform>-s</latinform> suffix appears in Written Tibetan and Nachereng,
    while Bahing shows variation between <latinform>-t</latinform> and <latinform>-s</latinform>. It is
    possible that a sequence of two suffixal elements (<latinform>-t-s</latinform>) was involved.</par><par>An
    <latinform>s-</latinform> prefix is reflected in Bunan <latinform>sred</latinform> &lt; <latinform>*s-ryat</latinform>
    and Nachereng <latinform>hres</latinform>.</par>
