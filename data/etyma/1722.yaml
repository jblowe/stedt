notes:
- type: T
  text: '<par>Lahu has developed two allofams of this root: the verb <latinform>tâʔ</latinform> from PLB
    <latinform>*ʔtakᴴ</latinform>, meaning both ASCEND and HOIST / CARRY ON SHOULDERS, and the spatial
    noun <latinform>thàʔ</latinform> UPPER SURFACE from PLB <latinform>*C-takᴸ</latinform>, the latter
    ultimately grammaticalizing to <latinform>thàʔ</latinform> ACCUSATIVE PARTICLE. See LTSR #42, Matisoff
    1973/1982: p. 158, DL:676. </par>'
- type: T
  text: <par>This root looks as if it is related to <xref ref="391">#391</xref>.</par><par>Several forms
    point to a variant with back vowel, perhaps <latinform>*twak</latinform> ⪤ <latinform>*twaŋ</latinform>,
    e.g. WT <latinform>thog-ma</latinform> &apos;upper end, uppermost place&apos;, Limbu <latinform>thuŋ-daŋ</latinform>,
    <latinform>thuŋ-tho</latinform>.</par><par>STC (p. 52) entertains the possibility that the general
    Kiranti root <latinform>*taŋ</latinform> HORN is related to this etymon, although it seems better
    to assign it to <xref ref="371">#371</xref>.</par><par>This root has developed the metaphorical extension
    of meaning from CARRY UPWARD into BEAR / ENDURE / CARRY A MENTAL BURDEN, in a manner quite similar
    to English <latinform>bear</latinform> (v.).</par><par>In Lahu, this root has been grammaticalized
    into an accusative particle, used mostly with animate objects. See DL:676-677 and Matisoff 1973/1982:3.641
    (<emph>The Grammar of Lahu</emph>).</par><par>A number of Chinese comparanda have been proposed, for
    what is evidently a rather complicated word family.</par><par>For an allofamically related root in
    this semantic area, see <xref ref="2725">#2725</xref>.</par>
- type: F
  text: '<par><hanform>陟</hanform> OC <latinform>*ti̯ĕk</latinform>, GSR #916a-c &apos;ascend, promote&apos;;
