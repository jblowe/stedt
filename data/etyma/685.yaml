notes:
- type: T
  text: <par>This etymon appears to be confined to the NE Indian Areal Group and Monpa (Mama Tshona),
    with the basic meaning &apos;ball; round object&apos;, appearing in such transparent compounds as
    Lushai (Mizo) <latinform>mit-mu</latinform> &apos;eyeball&apos; and <latinform>til-mu</latinform>
    &apos;testicle&apos;. Several Loloish forms also seem to be related.</par>
