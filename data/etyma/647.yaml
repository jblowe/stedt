notes:
- type: T
  text: '<par>This is actually a Southeast Asian <emph>Wanderwort</emph>, probably of Austronesian origin.
    Cf. Proto-Indonesian <latinform>*táʔaŋ</latinform> from PAN <latinform>*saqaŋ</latinform>; Proto-Tai
    <latinform>xiŋ</latinform> (Li Fang Kuei 1977:208, 210-11); Proto-Kam-Sui <latinform>*siŋ</latinform>
    (Li Fang Kuei 1965); Hlai <latinform>khüöŋ</latinform>; Proto-Hmong (Mortensen) <latinform>*qhiŋ</latinform>;
    Khasi <latinform>s’ing/sying</latinform> ‘ginger’ (Singh 1906: 203). See Benedict (ATLC):303.</par>'
- type: F
  text: '<par><hanform>薑</hanform> OC <latinform>*ki̯ɑng</latinform>, GSR #710d &apos;ginger&apos;; Schuessler
    2007:307 <latinform>*kaŋ</latinform>; B &amp; S 2011: <latinform>*kaŋ</latinform>; Mand. <latinform>jiāng</latinform>.</par>'
