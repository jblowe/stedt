notes:
- type: T
  text: <par>Written Tibetan <latinform>pus</latinform> is from <latinform>*put-s</latinform>, since WT
    dental stops do not occur before final <latinform>-s</latinform>. There is a West Tibetan variant
    <latinform>pis-mo</latinform>.</par>
- type: F
  text: '<par><hanform>ιü†</hanform> OC <latinform>*piΧ·Ρït</latinform>, GSR #407m &apos;knee cover&apos;;
    Coblin 86:101 <latinform>*pjit</latinform>; B &amp; S 2011: <latinform>*pit {pi[t]}</latinform>; Mand.
    <latinform>bΟ§</latinform>.<br /><hanform>ιüç</hanform> OC <latinform>*piΧ·w…ôt</latinform>, GSR #276l
    &apos;knee cover&apos;; Coblin 86:101 ST <latinform>*pjut</latinform> &gt; OC <latinform>*pi…ôt</latinform>
    &gt; <latinform>*pjw…ôt</latinform>; Mand. <latinform>fΟΚ</latinform>.<br /><hanform>εΖΩ</hanform> OC
    <latinform>*piΧ·w…ôt</latinform>, GSR #501a-b &apos;knee cover&apos;; Mand. <latinform>fΟΚ</latinform>.<br
    /><hanform>ηäΨ</hanform> OC <latinform>*piΧ·w…ôt</latinform>, GSR #501c &apos;knee cover&apos;; Mand.
    <latinform>fΟΚ</latinform>.</par><par>The primary comparanda here are <hanform>ιü†</hanform> <latinform>bΟ§</latinform>
    and <hanform>ιüç</hanform> <latinform>fΟΚ</latinform>, which are allofamic in OC.</par><par>The ideograph
    <hanform>εΖΩ</hanform> <latinform>fΟΚ</latinform> meaning &apos;knee cover&apos; apparently antedates
    <hanform>ιüç</hanform> <latinform>fΟΚ</latinform>, but the latter eventually became the predominant form.
    Likewise, the ideograph <hanform>ηäΨ</hanform> <latinform>fΟΚ</latinform> was optionally a loan character
    for <hanform>εΖΩ</hanform> <latinform>fΟΚ</latinform> (see note, GSR #501c).</par>'
