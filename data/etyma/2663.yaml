notes:
- type: T
  text: <par>The unusual <latinform>*-y</latinform> ⪤ <latinform>*-ŋ</latinform> alternation in coda may
    also be interpreted as an instance of a nasal suffix (<latinform>*s-ley-N ⪤ *s-rey-N</latinform>),
    although such a suffix is usually reconstructed for the dental point of articulation.</par><par>The
    first syllable of the Kuki-Chin binomes is obviously from a general root for rodents, <xref ref="2796">#2796</xref>.</par>
