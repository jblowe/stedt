notes:
- type: T
  text: '<par>This root is quite widely distributed in TB, appearing in the NE Indian Areal Group, Himalayish,
    Lolo-Burmese (including Jinuo), and Bai. It was reconstructed as PLB <reconstruction>*b(y)et</reconstruction>
    in Matisoff 1972b #5 (<emph>The Loloish Tonal Split Revisited</emph>) and HPTB p. 375, but that has
    been revised here to <reconstruction>*b(y)at</reconstruction> to accommodate those reflexes that have
    <latinform>-a-</latinform> vocalism (e.g. WB, Kokborok, Bunan). Bradley&apos;s (1979) PLB reconstruction
    without medial glide, <reconstruction>*bat</reconstruction>, does not account for certain Loloish
    reflexes with front vowels (e.g. Lahu <latinform>cha-pɛ̀ʔ</latinform>, since the regular Lahu reflex
    of <reconstruction>*-at</reconstruction> is <latinform>-eʔ</latinform>). Bauer 1991 (LTBA 14.1) treats
    this etymon as part of a binome <reconstruction>*dzu(k)-byet</reconstruction> (see <xref ref="1356">#1356</xref>
    for the first element), and adduces parallels in Hmong-Mien languages and Chinese. Benedict (1990)
    hypothesizes a &quot;Proto-Austro-Kadai&quot; binome <reconstruction>*tu-pi</reconstruction> (for
    the first element see <xref ref="661">#661</xref>). These freewheeling proposals remain to be evaluated
    by future generations. There does not seem to be any connection between this etymon and <xref ref="668">#668</xref>,
    which is confined mostly to Himalayish, and whose reflexes have back vowels.</par><par>The Bai forms
    listed below may well be loans from Chinese.</par><par>K. P. Malla suggests that the first syllable
    of Newar (Dolakhali) <latinform>pi-ci</latinform> &apos;vagina&apos; really means &apos;breast&apos;
    (see Kathmandu Newar <latinform>pi-si</latinform> &apos;breast&apos; under <xref ref="276">#276</xref>
    above), but can be used euphemistically to mean &apos;vagina&apos;. In the other Himalayish forms
    cited here, however, this morpheme does definitely seem to mean &apos;vagina&apos;.</par>'
- type: F
  text: '<par>According to H. Stimson 1966,<footnote>Hugh Stimson, &quot;A tabu word in the Peking dialect&quot;
    (<emph>Language</emph> 42.2:285-294). Cited in Bauer 1991:150.</footnote> the taboo word <hanform>屄</hanform>
    (Mand. <latinform>bī</latinform>) does not appear in dictionaries until the 17th century. Benedict
    1988<footnote>Untitled manuscript circulated as a handout at ICSTLL #21, Lund, Sweden.</footnote>
    posits OC <reconstruction>*b&apos;iĕt</reconstruction>, underlying such modern dialect forms as Hakka
    <latinform>piet⁸</latinform> and Min Kienyang (<hanform>建陽</hanform>) <latinform>pie⁷</latinform>.
    This Chinese word may well be the source of the Baic and some of the Loloish forms listed above.<br
    />[JAM]</par><par>Chinese dialect forms of this word point to both open and closed-syllable ancestral
    forms, for example Schuessler 2007:161 notes Amoy (= Xiamen) <latinform>tsiᴬ¹-paiᴬ²</latinform>.  This
    suggests early Chinese variants <reconstruction>*pe</reconstruction> and <reconstruction>*pet</reconstruction>,
    the latter of which corresponds well to PTB <reconstruction>*byat</reconstruction>.  (For the correspondence
    between OC <reconstruction>*e</reconstruction> and PTB <reconstruction>*ya</reconstruction>, cf. <hanform>八</hanform>
    OC <reconstruction>*pret</reconstruction> (Baxter) &apos;eight&apos;, PTB <reconstruction>*b-ryat</reconstruction>,
    Mand. <latinform>bā</latinform>. However Schuessler believes that this word is derived from &apos;to
    open&apos; (PST <reconstruction>*pe</reconstruction>), with the addition of <reconstruction>*-t</reconstruction>
    marking &quot;nouns of naturally occurring objects&quot;.  See Schuessler 2007:161, 414.  This hypothesis
    could also explain the etymology of the PTB etymon under discussion here.<br />[ZJH]</par>'
