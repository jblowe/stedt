notes:
- type: T
  text: <par>This etymon undoubted underlies the last syllable in many TB language names, e.g., Bisu,
    Lisu, Moso, Nasu, Nosu, Ersu, etc. I also believe that the last syllable of LAHU derives from an allofam
    <latinform>*s-lu</latinform>, that is also reflected by WB <latinform>lu</latinform> &apos;person&apos;.
    This view is reinforced by the existence of language names like Lalo and Laghuu. This etymology was
    first suggested in JAM 1969 (&quot;Lahu and Proto-Lolo-Burmese&quot;).</par><par>Another etymon recruited
    for names of Tibeto-Burman ethnic groups is <xref ref="1002">#1002</xref>.</par>
