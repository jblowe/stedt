- type: T
  text: <par>This root was originally reconstructed as <latinform>*(r-)tśrəy</latinform> in STC p. 30
    n. 95.</par><par>A few forms suggest the presence of a consonantal coda, either <latinform>*-t</latinform>
    or <latinform>*-s</latinform>, e.g. rGyalrong Maerkang Caodeng (B) <latinform>ka22 ʂtsǝᵗ44</latinform>,
    Kaman Miju <latinform>xɑ³¹tsɯt⁵⁵</latinform>, and rGyalrong (Maerkang Soman) <latinform>tə-rʦis</latinform>.</par>
