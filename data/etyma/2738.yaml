- type: F
  text: '<par><hanform>数</hanform> OC <latinform>*sli̯u</latinform>, GSR #123r; B &amp; S 2011: <latinform>*s-roʔ</latinform>;
    Mand. <plainlatinform>shǔ</plainlatinform>.</par><par>This Chinese word (<hanform>数</hanform> Mand.
