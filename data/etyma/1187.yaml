notes:
- type: T
  text: '<par>GSTC #109.</par>'
- type: T
  text: <par>Karenic languages seem to have developed the meaning &apos;tooth&apos; from this root, although
    the forms for &apos;tooth&apos; and &apos;face&apos; are slightly different in each language.</par>
- type: T
  text: <par>If we accept the cognacy of WB <latinform>hma</latinform> &apos;locative particle&apos; to
    the Kuki-Chin forms, this etymon should be reconstructed at the PTB level.</par>
- type: T
  text: <par>Several putative reflexes have back vowels (Chepang  <latinform>mo.hor</latinform>, Yi [Xide]
    <latinform>a⁵⁵-mo²¹</latinform>, Lisu <latinform>mu⁵prgh¹du³</latinform>). Two West Himalayish languages
    have forms with final dental stop and mid vowel (Bunan and Pattani <latinform>mod</latinform>), which
    makes it tempting to reconstruct a separate root <reconstruction>*mwa-t</reconstruction>, although
    this is premature.</par><par>This root seems to have developed the meaning TOOTH in Karenic.</par><par>Also
    possibly related is <xref ref="4766">#4766</xref>.</par>
