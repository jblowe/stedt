notes:
- type: T
  text: '<par>Contra STC #142, Lahu <latinform>bî </latinform> ‘full’ is not from this etymon, but rather
    from <xref ref="134">#134</xref>.</par><par>As discussed in Matisoff 1988 (&quot;Straight, flat, full&quot;),
    this root is allofamically related both to <xref ref="707">#707</xref> and <xref ref="2160">#2160</xref>,
    the common semantic core being &quot;a complete or ideal realization of a quality appropriate to a
    particular dimensionality in space&quot;.</par>'
