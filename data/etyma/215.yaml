notes:
- type: T
  text: <par>Written Burmese has a doublet <latinform>krô ~ kyô</latinform> &apos;back&apos; ⪤ <latinform>kyok</latinform>
    &apos;back of an animal&apos;, <latinform>kyok-kap</latinform> &apos;kidney&apos;, indicating that
    the final velar stop was sometimes treated as a suffix and dropped.</par><par>It is sometimes difficult
    to say to which of these allofams a Loloish or Qiangic open-syllable reflex  belongs.</par><par>The
    Bisu doublet <latinform>kjɔ̀ ~ tšɔ̀</latinform> clearly justifies the allofamic reconstruction with
    both a palatalized velar and a palatal affricate initial.</par>
