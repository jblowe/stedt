notes:
- type: F
  text: '<par><hanform>矧</hanform> OC <latinform>*śi̯ən</latinform>, GSR #560i; Mand. <latinform>shěn</latinform>.<br
    /><hanform>矤</hanform> OC <latinform>*śi̯ən</latinform>, GSR #560j; Mand. <latinform>shěn</latinform>.</par>'
- type: T
  text: <par>As STC surmises (note 58, p. 16), this root is very likely connected with <xref ref="2499">#2499</xref>,
    so that the original meaning seems to have been &quot;tooth-redness&quot;.</par><par>The <latinform>*m-</latinform>
    prefix (attested in Paangkua, Moyon, Angami) seems to be secondary in this root. This is reminiscent
    of the development of prefixal <latinform>r-</latinform> in Jingpho, which has regularly become a
    syllabic nasal. See STC:109-110 and HPTB:129.</par><par>A few languages (Kanauri, Written Tibetan)
    have developed an <latinform>s-</latinform> prefix, which is clearly a reduction of <xref ref="632">#632</xref>.
    The WT forms <latinform>so-rnyil</latinform> and <latinform>snyil</latinform> illustrate this prefixization
    process.</par>
