notes:
- type: T
  text: <par>Languages like Ao and Zeme have a sibilant fricative or affricate initial, although this
    may be chalked up to a widespread tendency to develop frication of <latinform>t</latinform> before
    <latinform>u</latinform>, as in Japanese.</par><par>Vowel length is reconstructed because of the WB
    rhyme <latinform>-uik</latinform>.</par>
- type: F
  text: '<par><hanform>篤</hanform> OC <latinform>*tôk</latinform>, GSR #1019g &apos;firm, solid, thick&apos;;
    Schuessler 2007:217 <latinform>*tûk</latinform>; B &amp; S 2011: <latinform>tˁuk</latinform>; Mand.
    <latinform>dǔ</latinform>.</par>'
- type: I
  text: <par>Recommend untagging anomalous Mongsen Ao form. There is no other support for a PTB *t- &gt;
    Mongsen s- development, and the source is not completely reliable.</par>
