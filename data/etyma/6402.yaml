  text: <par>This root bears a strong resemblance to the widespread etymon <xref ref="2177">#2177</xref>,
    and the Karenic forms were assigned to that root in the original version of STC. However, the published
    version (p. 135) recognizes that this is a complex root in Karenic, and it now seems best to treat
    these two etyma separately.</par><par>The reflexes show variation in the position of articulation
    of the final nasal between <latinform>-n</latinform> and <latinform>-ŋ</latinform>.</par>
