notes:
- type: T
  text: '<par>This etymon definitely shows variation between <latinform>-a-</latinform> and <latinform>-u-</latinform>,
    undoubtedly because of the rounding power of initial <latinform>w-</latinform>. As in many other TB
    etyma, there is also variation between the labial semivowel and labial stops. Cf. <xref ref="1168">#1168</xref>
    (TBRS #1).</par><par>This etymon appears as first element in a number of Kuki-Chin binomes, e.g.,
    <xref ref="4730">#4730</xref>, <xref ref="4292">#4292</xref>, etc.</par>'
- type: F
  text: '<par><hanform>羽</hanform> OC <latinform>*gi̯wo</latinform>, GSR #98a-b ‘feather’; Coblin 86:78
