notes:
- type: T
  text: <par>This etymon is very well attested in the NE Indian Areal Group, Lolo-Burmese, and Jingpho,
    with possible cognates also in Himalayish. STC (p. 96) recognizes a &apos;masculine suffix&apos; <reconstruction>*-la</reconstruction>,
    &quot;used with words for animals (in Tsangla, Digaro, Nung, Kachin, Burmese-Lolo, Konyak, Garo-Bodo,
    Mikir, and Meithei)&quot;.</par>
- type: T
  text: <par>Strangely enough, there is a homophonous root <xref ref="5493">#5493</xref> with the antonymous
    meaning FEMALE / DAUGHTER. Cf. Benedict 1981, 1991.</par>
