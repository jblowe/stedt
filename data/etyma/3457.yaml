notes:
- type: T
  text: <par>This root is evidently hypocoristic in origin (see also <xref ref="3459">#3459</xref>, above),
    and in fact is practically identical to the Indo-European root <emph>*mā-</emph> &apos;mother; breast&apos;
    (&gt; e.g. Latin <emph>mamma</emph>), of which the <emph>American Heritage Dictionary</emph> (1981:1527)
    says &quot;An imitative root derived from the child&apos;s cry for the breast (a linguistic universal
    found in many of the world&apos;s languages, often in reduplicated form).&quot; The final nasal in
    this etymon might have arisen through the reduction of an earlier reduplicated form <reconstruction>*ma-ma</reconstruction>
    (as in Ao, Sangtam, and Bunan).</par><par>There is a phonologically similar but apparently unrelated
    root <xref ref="3451">#3451</xref>, below.</par>
