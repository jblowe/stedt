- type: T
  text: <par>This phonologically unstable root is reconstructed with a labiovelar initial. The reflexes
    are divided between forms with labial and velar initials, sometimes even within a single subgroup,
    like Lolo-Burmese. Some reflexes have overt labiovelar initials, like Digaro <latinform>se-<emph>kwi</emph></latinform>
    and the Karenic root <reconstruction>*khwiɁᴰ</reconstruction>.</par><par>The Sulung form <latinform>biek³³</latinform>
    has an unexplained final <latinform>-k</latinform>, and the Bai form <latinform>su⁵⁵<emph>phĩ̱²¹</emph></latinform>
    has an unexplained nasal element.</par>
