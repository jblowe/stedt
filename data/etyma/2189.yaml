notes:
- type: T
  text: '<par>This etymon represents a combination of two roots set up separately in STC: <latinform>*byer</latinform>
    (pp. 83, 166) and <latinform>*pur ⪤ *pir</latinform> (#398). Thus, as now conceived, this etymon displays
    the same pattern of allofamy as <xref ref="363">#363</xref>, i.e. the allofams simultaneously illustrate
    two of the best attested TB variational patterns: <latinform>*-u- ⪤ *-i-</latinform> and <latinform>*-ya-
    ⪤ *-i-</latinform>.</par><par>This root is very probably related to <xref ref="355">#355</xref>.</par>'
- type: F
  text: '<par><hanform>飛</hanform> OC <latinform>*pi̯wər</latinform>, GSR #580a &apos;to fly&apos;; Schuessler
    2007: <latinform>*pəi</latinform> &lt; <latinform>*pui</latinform>; B &amp; S 2011: <latinform>*Cə.pər
    {Cə.pə[r]}</latinform> (dial. <latinform>*-r › *-j)</latinform>; Mand. <latinform>fēi</latinform>.<br
    /><unicode>26408</unicode>/<hanform>翂</hanform> OC <latinform>*pi̯wən</latinform>, GSR #471e-f &apos;fly,
    soar&apos;; Coblin 86:82 ST <reconstruction>*+ pjur</reconstruction> &gt; OC <latinform>* pjən</latinform>;
    Schuessler 2007:236 <latinform>*pən</latinform>; B &amp; S 2011: <latinform>*pər {(Cə.)pə[r]}</latinform>;
    Mand. <latinform>fēn</latinform>.<br /><hanform>奮</hanform> OC <latinform>* pi̯wən</latinform>, GSR
    #473a &apos;spread wings, fly up&apos;; Coblin 86:82 ST <latinform>*pjur</latinform> &gt; OC <latinform>*pjənh</latinform>;
    Schuessler 2007:236 <latinform>*pəns</latinform>; B &amp; S 2011: <latinform>*pən-s {p[ə][n]-s}</latinform>;
    Mand. <latinform>fèn</latinform>.</par><par>bian/fan</par>'
