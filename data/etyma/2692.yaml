notes:
- type: T
  text: <par>Several languages point to the presence of a palatal semivowel in this root (rGyalrongic,
    Tangkhulic, Atong, Anong, Tibetan), as well as in Chinese. WT shows clear-cut doublets with <latinform>a
    ⪤ i</latinform> vocalism, reflecting the presence or absence of the semivowel. </par>
- type: F
  text: '<par><hanform>摺</hanform> OC (<latinform>*t̑i̯ɛp</latinform>), GSR (not in #690) &apos;fold&apos;;
    Schuessler 2007:609 <latinform>*tap</latinform>; Mand. <latinform>zhé</latinform>.<br /><hanform>褶</hanform>
    OC <latinform>*dʻiəp</latinform>, GSR #690b &apos;double; lined (of garment)&apos;; Schuessler 2007:213
    <latinform>*lêp</latinform>; Mand. <latinform>dié</latinform>.<br /><hanform>疊</hanform> OC <latinform>*dʻiep</latinform>
    or <latinform>*dʻiəp</latinform>, GSR #1255a-b &apos;double; accumulate&apos;; Schuessler 2007:213
    <latinform>*lêp</latinform>; Mand. <latinform>dié</latinform>.</par><par><latinform>Comment:</latinform>
    Schuessler (2007:213) cautions not to confuse the above etyma, <hanform>摺</hanform>, <hanform>褶</hanform>,
    and <hanform>疊</hanform>, with another etymon, <hanform>牒</hanform> <latinform>dié</latinform>, ‘tablet;
    document, sheet’, a comparandum for <xref ref="2432">#2432</xref>, q.v.</par>'
