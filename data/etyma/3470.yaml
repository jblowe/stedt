- type: T
  text: <par>This root was reconstructed for Proto-Tani by J. Sun (1993), but seems to have a wider distribution,
    both elsewhere in the NE Indian Areal Group (Konyak) and in Himalayish. The Konyak, Baima, and Spiti
    compounds look like they all have the same morphemic structure, with <xref ref="3475">#3475</xref>
    [see below] as their second element.</par>
