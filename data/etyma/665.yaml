notes:
- type: T
  text: '<par>STC makes an artificial distinction between two groups of forms, one reconstructed <reconstruction>*kor</reconstruction>
    &apos;valley; pit; cave&apos; (#349) and the other <reconstruction>*kwar</reconstruction> &apos;hole&apos;
    (#350), here combined into a single etymon. This etymon is widely distributed in the NE Indian Areal
    Group, with scattered cognates elsewhere (Himalayish, Qiangic, Nungish, Bai). It appears as the last
    syllable in compounds referring to orifices of the body, especially EAR, NOSTRIL, ANUS, and VAGINA;
    occasionally also in compounds for EYE.</par><par>Sometimes, however, a similar morpheme appears as
    a monosyllable or as the first syllable in a compound; these cases I refer to a separate (but perhaps
    allofamically related) etymon <xref ref="3558">#3558</xref>, with the specific meaning EAR. A key
    form here is Kom Rem <latinform>kōr khur</latinform> &apos;ear canal&apos;, with the structure <xref
    ref="3558">#3558</xref> + <reconstruction>*kor</reconstruction>.</par><par>While I occasionally reconstruct
    <latinform>*kwar</latinform> for the second syllables of compounds meaning EYE (e.g. Wancho <latinform>mək-<emph>ər</emph></latinform>),
    there is a group of Bodo-Garo forms meaning EYE where I set up a separate (but again perhaps allofamic)
    etymon <xref ref="3557">#3557</xref>, with the specific meaning EYE. Compare Bodo <latinform>ha-khor</latinform>
    &apos;hole, valley&apos; vs. <latinform>me-gon</latinform> &apos;eye&apos;; Garo <latinform>ging-kol</latinform>
    &apos;nostril&apos; vs. <latinform>mik-on</latinform> &apos;eye&apos;. There is also some evidence
    from Monpa Tsangla for the independence of this etymon and <xref ref="3557">#3557</xref>: <latinform>miŋ-khor</latinform>
    &apos;eye&apos; vs. <latinform>miŋ-khoŋ-(taŋ)</latinform> &apos;eye (&lt; <xref ref="682">#682</xref>
    + <xref ref="3557">#3557</xref>).</par><par>This etymon may well be related to <xref ref="5748">#5748</xref>,
    the common core of meaning perhaps residing in the round appearance of many holes (cf. WT <latinform>kor</latinform>
    &apos;round, circular hollow in the ground, pit&apos;).</par><par>It is often difficult to distinguish
    reflexes of this etymon from those of <xref ref="820">#820</xref>, especially with respect to Loloish
    and Qiangic. More than one allofam are evidently involved; cf. e.g. Lahu <latinform>qhɔ</latinform>
    &apos;inside; hole&apos; ⪤ <latinform>qō</latinform> &apos;hollow object&apos;.</par>'
