notes:
- type: T
  text: <par>The initial consonant reflexes of this root vary between affricates, dental stop, and <latinform>s-</latinform>,
    in a manner similar to <xref ref="2742">#2742</xref>.</par><par>Written Tibetan attests both the <latinform>b-</latinform>
    and <latinform>g-</latinform> prefixes.</par><par>Mizo has a doublet <latinform>dai-lêng</latinform>
    &apos;shit&apos; and <latinform>tǔi-êk</latinform> &apos;rust&apos;, motivating the reconstruction
    of medial <reconstruction>*-w-</reconstruction>.</par>
