notes:
- type: T
  text: '<par>No fewer than three prefixes are attested for this interesting root: <latinform>*k-</latinform>
    (e.g., WT <latinform>grog-ma</latinform>), <latinform>*s-</latinform> (e.g., Anong <latinform>sərɔ</latinform>)
    and <latinform>*p-</latinform> (e.g., WB <latinform>pərwak</latinform>). This velar prefix occurs
    in several other Lolo-Burmese animal terms: CAT, RAT, CHICKEN, TIGER, and LEECH (see <plainlatinform>HPTB</plainlatinform>
    p. 138). The sibilant prefix is a reduction of <xref ref="34">#34</xref>. The labial prefix is a reduction
    of <xref ref="2178">#2178</xref>.</par>'
