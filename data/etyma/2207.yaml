notes:
- type: T
  text: <par>This etymon must rank among the most richly prefixable roots in TB, with at least five prefixes
    and prefix combinations attested. These include <latinform>*m-</latinform> (Qiangic, rGyalrongic,
    Tibetan, Jingpho), <latinform>*s-</latinform> (Tibetan, Garo, Dulong, Qiang), <latinform>*b-s-</latinform>
    (Garo <latinform>bistit</latinform>, WT <latinform>bstud</latinform>), <latinform>*k-</latinform>
    (Jingpho), and <latinform>*d-</latinform> (Anong).</par><par>It seems likely that the <latinform>*m-</latinform>
    and <latinform>*s-</latinform> prefixes reflect an original simplex / causative opposition, as in
    many other TB etyma.</par><par>For detailed discussion of this etymon with respect to Tibetan, see
    Bodman 1969.</par>
