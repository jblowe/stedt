notes:
- type: T
  text: '<par>See <reconstruction>*kok</reconstruction> STC #342 and n. 229. The allofam with medial labial
    is reconstructed on the basis of the Chourasya, Thulung, and rGyalrong forms. The <latinform>r-</latinform>
    prefix is reconstructed based on the rGyalrong forms. The initial reflexes of this etymon vary from
    <latinform>k-</latinform> to <latinform>h-</latinform>.</par><par>The WB form cannot descend from
    the variant with medial <latinform>*-wa-</latinform>, since that would have given WB <latinform>-wa-</latinform>.</par>'
- type: F
  text: '<par><hanform>革</hanform> OC <latinform>*kɛk</latinform>, GSR #931a-b &apos;hide, skin&apos;;
    WHB-OC #1325;  Li 1971: <latinform>*krək</latinform>; Baxter 1992: <latinform>*krɨk</latinform>  &gt;
    Mand. <latinform>gé</latinform> &apos;leather&apos;.</par><par>The reconstructed PTB form has a rounded
    element, reflected either in the main vowel (<latinform>*o</latinform>) or in the medial (<latinform>*w</latinform>).  The
    Chinese form must be reconstructed without a rounded element.  The correspondences of initial consonant,
    main vowel, and final consonant are regular (including the vowel correspondence PTB <latinform>*a</latinform>
    : OC <latinform>*ə</latinform>).</par><par>Generally, we expect to see OC medial <latinform>*-r-</latinform>
    corresponding to PTB <latinform>*-r-</latinform>.  However, there are some proposed cognates in which
    PTB prefixal <latinform>*r-</latinform> before velars appears to correspond to medial <latinform>*-r-</latinform>
    in OC, for example PTB <latinform>*r-kang</latinform> &apos;shin&apos;: OC <hanform>胻</hanform> <latinform>*grangs</latinform>
    &apos;shinbone&apos;, Mand. <latinform>héng</latinform> (for more details, see Handel 2009:188, 190-1).  Whether
    this indicates that metathesis has taken place in one or both languages, or that additional variants
    of the root existed, is not clear.</par>'
- type: F
  text: '<par><hanform>鞹</hanform> OC <latinform>*k’wɑ̂k</latinform>, GSR #774h-i &apos;leather&apos;;
    Coblin 86:134  ST <latinform>*khwak</latinform> &gt; OC <latinform>*khwak</latinform>; Schuessler
    2007:341 <latinform>*khwâk</latinform>; B &amp; S 2011: (<latinform>*kʷʰˁak</latinform>); Mand. <latinform>kuò</latinform>.</par>'
