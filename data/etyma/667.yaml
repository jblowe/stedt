notes:
- type: T
  text: <par>This etymon, with final dental nasal, seems so far to be relatively rare; yet its occurrence
    in widely separated languages like Jingpho, Meithei, and Chepang require us to set it up for PTB.
    Like <xref ref="3589">#3589</xref>, <xref ref="686">#686</xref>, <xref ref="1349">#1349</xref>, the
    semantic range of the present etymon includes both VAGINA and MOUTH/LIP; but all of these etyma, despite
    their phonosemantic similarity, may well be independent.</par>
