- type: T
  text: <par>Although this root is of quite limited distribution, the exact but unusual rhyme correspondence
    between Thulung and Nungic inspires confidence that this is a genuine etymon.</par><par>The first
    syllable of Rengma <latinform>te ro ha</latinform> &apos;feather&apos; looks related but it might
    mean &apos;bird&apos; (cf. <latinform>tegü</latinform> or <latinform>tegvu</latinform> &apos;bird&apos;).
    Cf. <xref ref="1604">#1604</xref> (STC pp. 149, 192), attested otherwise only in Bodo-Garo and Karenic.</par>
