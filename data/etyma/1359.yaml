notes:
- type: T
  text: <par>This etymon, which seems to cover quite an unusual semantic range, including COPULATE / LOVE,
    and WOMB / NEST, is fairly broadly distributed, with likely reflexes in the NE Indian Areal Group,
    Himalayish, Loloish, and Tangut (Xixia). Allofams with final velar stop and final velar nasal both
    occur. The nasal prefix is directly attested in Moyon, Bisu, and Tangut.</par>
