notes:
- type: T
  text: '<par>The most general form of this complex word family is reconstructed as <xref ref="163">#163</xref>.</par><par>Like
    <xref ref="1168">#1168</xref>, some of the reflexes of <reconstruction>*pʷam</reconstruction> have
    initial <latinform>w-</latinform> <xref ref="2108">#2108 </xref>, while others have an initial labial
    stop or derivative thereof <xref ref="673">#673 </xref>. All these forms meaning &apos;womb / placenta
    / nest / belly&apos; clearly represent the same etymon as <reconstruction>*p-wam</reconstruction>
    BELLY, presented separately as <xref ref="137">#137 </xref>. A further group of forms with nasal initials
    <xref ref="3444">#3444 </xref> may also be brought into this word family. Finally, there is a strong
    likelihood that <xref ref="680">#680</xref> is also allofamically related.</par><par>Some languages
    (e.g. Jingpho, Lashi, Zaiwa) show internal variation between stop and semivowel. The semantic association
    between WOMB and BELLY is too obvious to belabor. <emph>Belly</emph> was used frequently in early
    Mod. Eng. to mean WOMB: &quot;As yet my wife hath not laid her belly&quot; (<emph>Plumpton Correspondence</emph>
    1549-50); &quot;My belly did not blab, so I was still a Mayde&quot; (William Warner, <emph>Albion’s
    England</emph>, 1592); &quot;Why, she may plead her belly at worst&quot; (John Gay, <emph>The Beggar&apos;s
    Opera</emph>, 1728).<footnote>In former times, a pregnant female criminal condemned to death was allowed
    to bring the baby to term before being executed. This practice was known as &quot;pleading one&apos;s
    belly&quot;. See OED 1971:789.</footnote></par><par>Still another related form is <xref ref="3">#3</xref>,
    found especially in Kuki-Chin, with a meaning which goes beyond the visceral / gastric area to cover
    the whole body.</par><par>Cf. also <xref ref="2111">#2111</xref>.</par>'
