notes:
- type: T
  text: <par>Written Burmese <latinform>phyam</latinform> has always presented a puzzle (see <plainlatinform>STC
    107, n. 302</plainlatinform>). In Matisoff 2010 (&quot;Toward a Eurasian Bestiary&quot;), I surmised
    that the labial initial arose through a reduction of a Mon-Khmer etymon (see Mon-Khmer <latinform>*bheʔ</latinform>,
    Shorto 2006:#260).</par><par>Lisu <latinform>pu̱³³</latinform> and Hani (Khatu) <latinform>pjá tɔ̃</latinform>
    seem clearly to be loans from Burmese.</par><par>After much hesitation, STC chose to treat the initial
    combination <latinform>*sr-</latinform> as an intrinsic cluster rather than as a sequence of prefix
    plus root initial. This analysis is buttressed by forms like Mizo <latinform>sa-hram</latinform>.</par>
- type: F
  text: '<par><hanform>猵</hanform> OC <reconstruction>*piɑn</reconstruction>, GSR #246i &apos;otter&apos;;
    Schuessler 2007:165 <latinform>*pên</latinform>; Mand. <latinform>biān</latinform>.</par><par><latinform>Comment:</latinform>
    Cf. discussion in <plainlatinform>STC 107, n. 302</plainlatinform>, also Matisoff (2010). Forms with
    initial <latinform>p-</latinform> for &apos;otter&apos; are apparently rare across TB languages except
    for Written/Spoken Burmese (WB <latinform>phyam</latinform>) and possibly Sak and Marma (both <latinform>phaing</latinform>).</par>'
