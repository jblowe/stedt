notes:
- type: T
  text: <par>The Tamangic forms have medial <latinform>-y-</latinform>, which appears to be secondary.
    It is possible that this <latinform>-y-</latinform> derives from earlier prefixal <reconstruction>*s-</reconstruction>
    (see Benedict 1943, <emph>Secondary Infixation in Lepcha</emph>). Note the similar alternation between
    <latinform>l-</latinform> and <latinform>y-</latinform> in <xref ref="695">#695</xref> and <xref ref="699">#699</xref>.</par><par>There
    is apparently no connection <xref ref="2588">#2588</xref>.</par>
