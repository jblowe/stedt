notes:
- type: T
  text: <par>The variant of this root with final palatal semivowel is attested in Jingpho, Central Naga,
    and Qiangic languages. The variant with velar stop is found in Kuki-Chin, Kiranti, and Qiangic. Bodo-Garo
    has a metathesized form <latinform>aŋ</latinform>, which has probably arisen from syncope of a form
    with an <latinform>*a-</latinform> prefix, <latinform>*a-ŋa</latinform>, which actually exists synchronically
    in Garo.</par>
