  text: <par>This rather unusual reconstruction is meant to capture the alternation between reflexes with
    fricates and those with the labial semivowel. Note especially the WT forms <latinform>kʻur-tʻsós</latinform>
    &apos;cheek&apos;, <latinform>h̥poṅ-t&apos;sos</latinform> &apos;buttock&apos;, and <latinform>&apos;os-sko</latinform>
    &apos;chin&apos;.</par><par>This root frequently occurs as a non-initial syllable in compounds.</par>
