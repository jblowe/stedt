  text: <par>This root is reconstructed with a final lateral on the testimony of Written Tibetan. There
    is a closely similar comparandum in Chinese <hanform>菜</hanform> <latinform>ts&apos;âi&apos;</latinform>,
    although Karlgren (1923) only gives a Middle Chinese form. The Qiangic, Tujia, Baic, and Loloish forms
    may well be borrowings from either Tibetan or Chinese, although the Mizo form seems to reflect a genuine
    TB root.</par>
