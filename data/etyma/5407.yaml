notes:
- type: T
  text: '<par>The semantic range of this root is interesting: the basic meaning seems to have been &apos;rot&apos;;
    have spots of rot or mold&apos;, whence &apos;be spotted, mottled&apos;, thence to the notion of &apos;write&apos;
    (perceived by preliterate people as making spots on paper). Matisoff 1972 (LTSR) treats ROT / SPOIL
    (#75) as a separate etymon from WRITE / MAKE SPOTS (#89).</par><par>This root resembles <xref ref="197">#197</xref>,
    but is best kept distinct.</par>'
