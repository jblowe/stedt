notes:
- type: T
  text: <par>Note the superficial similarity between this genuine TB etymon<reconstruction>*g-ryaŋ</reconstruction>
    and the Nepali word <latinform>karang</latinform> &apos;rib&apos;. While Dimasa <latinform>sang-khreng</latinform>
    &apos;rib&apos; and Lalung <latinform>krengʔ</latinform> &apos;bone&apos; are descended from <reconstruction>*g-ryaŋ</reconstruction>,
    Chantyal <latinform>kərəŋ</latinform> and Yakha <latinform>karaŋ</latinform> are borrowings from Nepali.</par><par>The
    Karbi forms show preemption by the velar prefix.</par><par>The Miji and Darang forms reflect an <latinform>s-</latinform>
    prefix.</par>
