notes:
- type: T
  text: <par>This etymon is very likely allofamic with <xref ref="2722">#2722</xref>, illustrating the
    widespread alternation between dental stop and liquid in TB. See Matisoff 2013 (&quot;The dinguist&apos;s
    dilemma&quot;).</par>
- type: F
  text: '<par><hanform>良</hanform> OC <latinform>*li̯ɑng</latinform>, GSR #735a &apos;good&apos;; Schuessler
    2007: (<latinform>*raŋ</latinform>); B &amp; S 2011: <latinform>*raŋ {[r]aŋ}</latinform>; Mand. <latinform>liáng</latinform>.</par><par><latinform>Comment</latinform>:
    For <hanform>良</hanform> <latinform>liáng</latinform>, recently reconstructed as OC <latinform>*raŋ</latinform>,
    to be a valid comparandum, we would ideally wish to see an initial <latinform>*r-</latinform> in the
    PTB form here. One possible recourse is to assume an alternation <latinform>*l(y)a(k/ŋ)</latinform>
    ⪤ <latinform>*r(y)a(k/ŋ)</latinform> at the PST stage.</par>'
