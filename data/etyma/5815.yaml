- type: F
  text: '<par><hanform>乂</hanform>/<hanform>刈</hanform> OC <latinform>*ng̯i̯ɑ̆d</latinform>, GSR #347a,
    b &apos;mow, cut (grass)&apos;; Coblin 86:111 ST <latinform>*r̵ngjap</latinform> &gt; PC <latinform>*ngjabh</latinform>
    &gt; OC <latinform>*ngjadh</latinform>; Schuessler 2007:568 <latinform>*ŋa(t)s</latinform>; B &amp;
    S 2011: <latinform>*ŋat-s {ŋa[t]-s}</latinform>; Mand. <latinform>yì</latinform>.</par>'
- type: T
  text: <par>Note that for &quot;mow&quot;, Jäschke 1881 and Marrison 1967 cite the Written Tibetan root
    <latinform>rṅa</latinform>, i.e. <latinform>rŋa</latinform>, while Coblin 1986:111 cites <latinform>rngap</latinform>
    , i.e. <latinform>rŋap</latinform>. Jäschke also shows <latinform>rṅab</latinform>, i.e. <latinform>rŋab</latinform>
    for &quot;mow&quot;, but labels it as a &quot;Western Tibetan&quot; colloquial form.</par><par>We
    follow Coblin in treating <latinform>rngap/b</latinform> as possibly the more conservative Tibetan
    form, reflected in our PTB reconstruction by suffixed <latinform>-*p</latinform>. Whether this <latinform>-*p</latinform>
    can be traced back to Proto-ST and is the ultimate source of OC <latinform>*-t</latinform> in this
    root, as Coblin suggests, or whether OC <latinform>*-t</latinform> here arose independently in Chinese,
    is a matter for further research.</par>
