- type: T
  text: <par>It is so far unclear whether this root should be reconstructed with simple <latinform>*-u</latinform>
    or with the diphthong or long vowel <latinform>*-əw</latinform>. This uncertainty is conventionally
    reflected by the reconstruction <latinform>*-u(w)</latinform>.</par><par>The putative Tangut cognate
    has undergone a change from velar stop to velar nasal.</par><par>There is an excellent Chinese comparandum.</par>
