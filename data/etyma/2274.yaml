notes:
- type: T
  text: <par>As proposed in Matisoff 1972:72 (&quot;The Loloish tonal split revisited&quot;), the unique
    initial cluster in PLB <reconstruction>*ʔwyik</reconstruction> is to be explained by a disyllabic
    prototype <reconstruction>*ʔu-(y)ik</reconstruction>, where the first syllable is from <xref ref="385">#385</xref>,
    an honorific morpheme frequently occurring in Tibeto-Burman words for elder kinsmen.</par>
