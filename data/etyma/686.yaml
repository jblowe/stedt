notes:
- type: T
  text: <par>This etymon is best attested in Himalayish, with some support also from the NE Indian Areal
    Group and Asakian, and perhaps Qiangic and/or WB. The reflexes have either simple sibilant or affricate
    initials. I presume the proto-initial to have been <reconstruction>*s-</reconstruction>, in view of
    the natural tendency to develop secondary affrication before <latinform>-i-</latinform>.</par><par>It
    is very possible that this etymon belongs together with <xref ref="1349">#1349</xref>, in a single
    word-family, in view of the similar semantic range of <xref ref="3589">#3589</xref>.</par><par>A particularly
    interesting form is Newar <latinform>mhu◦tu◦si</latinform>, where <latinform>mhu◦tu</latinform> means
    &apos;mouth&apos;, and <latinform>si</latinform> means &apos;corner (of the mouth)&apos;. The basic
    meaning of <latinform>si</latinform> is &apos;border, margin, bank&apos;, as in <latinform>khu-si</latinform>
    &apos;riverbank&apos;, <latinform>mi-kha-pu-si</latinform> &apos;eyebrow&apos; (K. P. Malla, p.c.).
    Thus Newar <latinform>si</latinform> has nothing to do with the present etymon.</par><par>This etymon
    seems quite distinct from <xref ref="477">#477</xref>, which so far has been attested only in Himalayish.</par>
