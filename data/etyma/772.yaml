notes:
- type: F
  text: '<par><hanform>掌</hanform> OC <reconstruction>*t̑i̯ɑng</reconstruction> GSR #725j &apos;palm,
    sole&apos;; Li 1971: <latinform>(*tjangx)</latinform>; Baxter 1992 #231: <reconstruction>*tjangʔ</reconstruction>
    (#231); B &amp; S 2011: <reconstruction>*[k.t]aŋʔ</reconstruction><footnote>I do not understand why
    Baxter &amp; Sagart (2011) reconstruct a cluster <reconstruction>*k.t-</reconstruction> instead of
    plain <reconstruction>*t-</reconstruction> here. Their notation with a period (as opposed to a hyphen
    as in <reconstruction>*k-t-</reconstruction>) indicates that they have no evidence for a morphological
    prefix <reconstruction>*k-</reconstruction>, but I don’t see any motivation for reconstructing a purely
    phonological pre-initial element <reconstruction>*k</reconstruction>.</footnote>; Mand. <latinform>zhǎng</latinform>.<br
    />[ZJH]</par>'
