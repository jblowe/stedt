notes:
- type: T
  text: <par>This etymon is obviously an allofam of <xref ref="1284">#1284</xref>. The reflexes in this
    set arose through assimilation of the lateral root-initial to the nasal prefix. In some cases (e.g.
    Jingpho, Meithei) the prefix still co-occurs with the secondary nasal root-initial. In other languages
    (e.g. Lahu) the prefix has disappeared as such, after supplanting the original root-initial (&quot;prefix
    preemption&quot;).<footnote>For the first use of the term &quot;prefix preemption&quot; see Matisoff
    1972, &quot;Tangkhul Naga and comparative TB&quot;.</footnote> This allofam occurs in Jingpho, and
    is widely attested in Lolo-Burmese; there are also a few scattered reflexes in languages of the NE
    Indian Areal Group (Chang, Meithei, Mru).</par>
