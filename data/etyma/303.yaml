notes:
- type: T
  text: '<par>This etymon was reconstructed in Matisoff 1989 &quot;A new ST root <reconstruction>*d-yu-k</reconstruction>&quot;.
    See also Matisoff 1988: 469 (&quot;The Dictionary of Lahu&quot;).</par><par>The presumed semantic
    development of this etymon is fairly complex. According to one scenario, the basic meaning would be
    TAKE / ACCEPT, whence it acquired the more abstract sense of RELY UPON / DEPEND, and from there, to
    the notion of HANGING LOOSELY (cf. English <emph>depend</emph>, from Latin <emph>pendere</emph> &apos;to
    hang&apos;). On the other hand, the semantic development might have been in exactly the opposite direction!</par>'
