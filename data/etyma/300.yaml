notes:
- type: T
  text: <par>Especially in Himalayish and the NE Indian Areal Group, it is often difficult to distinguish
    <reconstruction>*d(w)əy</reconstruction> from its probable co-allofam <xref ref="1181">#1181</xref>.
    Thus, Kulung <latinform>wa-di</latinform> (&quot;bird + egg&quot;) looks like Tangsa (N.Naga) <latinform>wu-di</latinform>,
    Karbi <latinform>vo-ti</latinform>, etc., but other Kiranti languages (e.g. Limbu, Athpare) have reflexes
    with <latinform>-n</latinform>, apparently from <reconstruction>*-l</reconstruction>. Kanauri, Lepcha,
    and Tibetan retain <latinform>-l</latinform>. For now, we are assigning all Himalayish reflexes of
    this word-family to <reconstruction>*dil</reconstruction>, though a better Proto-Himalayish reconstruction
    would be <reconstruction>*di-l</reconstruction>. Similarly, some languages of the NE Indian Areal
    Group retain overt reflexes of <reconstruction>*-l</reconstruction>, but many have forms with open
    syllables. Our assignment of some NE Indian forms to <xref ref="300">#300</xref> rather than <xref
    ref="1181">#1181</xref> remains arbitrary.</par>
- type: T
  text: '<par>Benedict 1939:225 (&quot;Semantic differentiation in Indo-Chinese&quot;) analyzed compounds
    like Lushai (Mizo) <latinform>ar-tui</latinform> &apos;egg&apos; as &quot;bird + water&quot;. STC
    postulates a connection between <reconstruction>*twəy</reconstruction> &apos;egg&apos; (STC #168)
    and a general root <reconstruction>*ti(y)</reconstruction> &apos;water; moist&apos; (STC #55 and pp.
    45, 135, 196). (This latter root should actually be set up as <xref ref="298">#298</xref>.<footnote>See
    also LTSR #109 <reconstruction>*N/ʔ-tit/k</reconstruction> &apos;soak; saturate&apos;.</footnote>
    The proposed connection between EGG and WATER is complicated by the related forms for EGG with final
    <reconstruction>*-l</reconstruction>. STC (n. 149) admits that Dhimal has different forms for EGG
    (<latinform>tui</latinform>) and WATER (<latinform>tśi</latinform>), and yet a third form in <latinform>hna-thi</latinform>
    &apos;snot&apos;. Elsewhere in STC (p. 135, discussing the Karen cognates; and p. 196, in connection
    with the putative two-tone contrast for PTB), Benedict suggests that the etyma for EGG and WATER do
    indeed descend from separate allofams, different in both tone and initial at the PTB stage. </par>'
- type: T
  text: <par>There is a further semantic connection between EGG and HEEL (both being smooth and rounded).
    Cf. Lushai (Mizo) <latinform>ar-tui</latinform> &apos;egg&apos; (perhaps &quot;bird-water&quot;, <latinform>ke-ar-tui</latinform>
    &apos;heel&apos; (&quot;foot-egg&quot;, i.e. &quot;foot-bird-water&quot;). The syllable <latinform>-ar-</latinform>
    must be bleached of all avian meaning by the time it gets incorporated into HEEL. See Matisoff 1994
    (&quot;How ‘dull’ can you get?&quot;), which also brings BUTTOCK into the same network of semantic
    associations as HEEL.</par>
- type: T
  text: <par>The putative semantic connection between BIRD and WATER is strengthened by compounds of BIRD
    with other roots for WATER, e.g. &lt; <xref ref="2080">#2080</xref> (Tangkhul <latinform>tara</latinform>
    &apos;water&apos;, <latinform>har-ra</latinform> &apos;egg&apos; (<latinform>har</latinform> &apos;bird&apos;),
    <latinform>hai-ra</latinform> &apos;semen&apos;).<footnote>See also <xref ref="1614">#1614</xref>.</footnote>
    Less clear, but possibly a parallel formation is Muya <latinform>vɑ³³ vɑ⁵⁵</latinform> &apos;egg&apos;
    (<latinform>vɑ³³</latinform> &apos;bird&apos;). Cf. also Maring <latinform>wa-yui</latinform> &apos;egg&apos;,
    with the second element &lt; <xref ref="1013">#1013</xref>.</par>
- type: T
  text: <par>This root is widely distributed, appearing in the NE Indian Areal Group, Himalayish, Jingpho-Asakian,
    Karen, and Qiangic (including Tangut), and perhaps in a few Loloish forms (Xide, Nosu) where the initial
    is palatalized to an affricate.</par>
- type: T
  text: <par>Seven forms from four Luish [Asakian] languages (Sak Bawtala, Sak Dodem, Ganan, Kadu) cited
    in Luce 1985 (Chart L) have the confusing gloss &apos;Penis/Testicles&apos;. Since there are two phonologically
    similar etyma in this area, <reconstruction>*ti</reconstruction> EGG/TESTICLE and <xref ref="641">#641</xref>,
    these forms have presented serious problems of analysis, and have been reglossed to mean either &apos;penis&apos;
    or &apos;testicle&apos;, but not both. See Etymon Note under <xref ref="641">#641 </xref>, below.</par>
- type: H
  text: <par>See HPTB <reconstruction>*twəy ⪤ *dwəy</reconstruction> &apos;water; egg&apos;, p. 195.</par>
- type: F
  text: '<par><hanform>蚳</hanform> OC <reconstruction>*dʼi̯ər</reconstruction> GSR #590m, ‘ant egg’; Li
    1971: <latinform>(*drjid)</latinform>; Baxter 1992: <latinform>(*drjɨj)</latinform>; Mand. <latinform>chí</latinform>.</par><par>This
    rare character does not appear in Li or Baxter. However, reconstruction in either system is not in
    doubt based on reconstruction of other characters with the same phonetic and identical Middle Chinese
    pronunciation (e.g. Baxter 1992:750 <hanform>坻</hanform>  &lt; <latinform>drij</latinform> &lt; <reconstruction>*drjɨj</reconstruction>
    (Mand. <latinform>chí</latinform>)). But it is worth noting that at least one character with the same
    phonetic is placed in the <hanform>微</hanform> <plainlatinform>Wēi</plainlatinform> group by Baxter
    and reconstructed with <reconstruction>*-ij</reconstruction>: <hanform>鴟</hanform> <latinform>tsyhij</latinform>
    &lt; <latinform>*thjij</latinform> (Mand. <latinform>chī</latinform>), presumably because it is found
    rhyming with a <hanform>微</hanform> <plainlatinform>Wēi</plainlatinform> group word (<emph>Shijing</emph>
    24.3A). If  this character is not simply an exception, then according to Baxter’s rhyme group division,
    characters with the same phonetic are spread across the two rhyme groups. In the absence of rhyming
    evidence, <latinform>*drjij</latinform> is also a possible reconstruction for <hanform>蚳</hanform>
    in Baxter’s system.</par><par>Assuming the semantics are not problematic,<footnote>R. S. Cook (1995:63)
    offers much evidence that the real meaning of GSR 590m is &apos;scorpion&apos;. [JAM]</footnote> the
    correspondences are quite sound. Examples of OC <reconstruction>*-id</reconstruction> (Li 1971) corresponding
    to TB <reconstruction>*-əy</reconstruction> are numerous, and include <hanform>死</hanform> OC <reconstruction>*sjid</reconstruction>
    ‘die’ (Li), TB <latinform>*səy</latinform>, Mand. <latinform>sǐ</latinform>; <hanform>四</hanform>
    OC <reconstruction>*sjid</reconstruction> &apos;four&apos; (Li), TB <reconstruction>*b-ləy</reconstruction>,
    Mand. <latinform>sì</latinform>; <hanform>屎</hanform> OC <reconstruction>*hrjid</reconstruction> &apos;excrement&apos;,
    TB <reconstruction>*kləy</reconstruction>, Mand. <latinform>shǐ</latinform>. The TB final <reconstruction>*-i</reconstruction>
    should not be troubling; we would expect this relatively rare PTB final to correspond to OC in the
    same way as <reconstruction>*-əy</reconstruction> (in parallel to TB <reconstruction>*-əw</reconstruction>
    and <reconstruction>*-u</reconstruction>; see the discussion of <xref ref="1168">#1168</xref>).  On
    the correspondence of OC medial <reconstruction>*-r-</reconstruction>, see the discussion of <hanform>中</hanform>
    under <xref ref="3584">#3584</xref>.<br />[ZJH]</par>'
