notes:
- type: T
  text: <par>This root frequently occurs reduplicated, for obvious hypocoristic reasons, occasionally
    with voicing of the second reduplicate (cf. the Lalung form). This root is allofamically connected
    to <xref ref="5541">#5541</xref>. It is sometimes difficult to distinguish reflexes of the various
    allofams, especially in branches like Loloish that have reduced final consonantism. Many languages
    have allofamic doublets in any case.</par>
