notes:
- type: T
  text: '<par>The stronghold of this etymon is the Kiranti group, although there is also a good Karbi
    cognate. The gloss of Karbi <latinform>ham-bi</latinform> &apos;kidney, ankle bone, kneecap&apos;
    seems strange at first glance, but becomes clear in collocations: <latinform>kengphu a-ham-bi</latinform>
    &apos;kneecap&apos; (lit. &quot;knee&apos;s rounded part&quot;) and <latinform>keng ham-bi</latinform>
    &apos;ankle bone&apos; (lit. &quot;foot&apos;s rounded part&quot;). Cf. VSTB: 222-223.</par>'
