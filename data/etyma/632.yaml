notes:
- type: I
  text: <par><reconstruction>*s-wa ?&gt; *ma</reconstruction>. Chepang <latinform>ma-gam</latinform> MOLAR.
    Other languages have <latinform>wa-gam</latinform> (E.g., Garo), <latinform>pa-gam</latinform> (e.g.,
    Nocte).</par>
- type: T
  text: <par>Jackson Sun notes, &quot;Padam-Mising L has a form a-je, which seems to reflect a different
    root, cf. the Mising T doublet a-je; iː-paŋ. This root could be related to PTB *m-ćway &apos;tusk/tooth&apos;
    (Prof. Matisoff, p.c., cf. <xref ref="635">#635</xref>); the problem is that PT *-i(ː) normally reflects
    PTB *-əy rather than *-ay.&quot; Sun 1993a:102 (<emph>A historical-comparative study of the Tani (Mirish)
    branch of TB</emph>).</par><par>We have nevertheless treated both the Padam variants and a similar
    doublet in Apatani as reflexes of the present root for the time being.</par>
