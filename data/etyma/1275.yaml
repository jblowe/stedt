- type: T
  text: <par>These forms are undoubtedly related to those meaning &quot;egg&quot;, but have acquired or
    retained the more general meaning of BALL / SMALL ROUND OBJECT. This morpheme appears in several compound
    body part terms like &quot;eyeball&quot; and perhaps &quot;head&quot; (cf. <xref ref="385">#385</xref>).
    See also the discussion under <xref ref="137">#137</xref>, where this morpheme occurs as second element
    in compounds. Also probably reflecting this same etymon is &quot;shoulder&quot; <xref ref="3344">#3344</xref>.</par>
