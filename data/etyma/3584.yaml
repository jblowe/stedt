notes:
- type: T
  text: '<par>This etymon was originally set up as <reconstruction>*tsyuːŋ</reconstruction> in STC #390,
    on the basis of Lushai (Mizo), Bodo, and Dimasa forms. Benedict later revised this to <reconstruction>*tuːŋ</reconstruction>
    (STC n. 63, p.17), and specifically banished WT <latinform>gźuŋ</latinform> as probably not cognate.
    This reconstruction was also adopted in HPTB pp. 287, 310. It seems clear that the most ancient version
    of this root had a simple or palatalized dental stop, as witnessed by the certain Chinese cognate
    <hanform>中</hanform> GSR #1007a-e <latinform>ti̯ông/t̑i̯ung</latinform> &apos;middle&apos;  (see below).
    From an early date, however, many languages developed a sibilant or affricate initial before this
    medial vowel <latinform>-u-</latinform>, in a manner reminiscent of a phenomenon in modern Japanese,
    where the phonemic syllable /tu/ has come to be pronounced [tsɯ]. The same variation between stop
    and (af)fricate initials before <latinform>-u-</latinform> is to be found in &apos;mortar&apos; PTB
    <reconstruction>*(t)sum</reconstruction>, with most reflexes pointing unambiguously to PTB <reconstruction>*tsum</reconstruction>
    (e.g. WB <latinform>chum</latinform>, Lahu <latinform>chɛ</latinform>, Lushai (Mizo) <latinform>sum</latinform>),
    while Jingpho <latinform>thùm</latinform> reflects <reconstruction>*tum</reconstruction>. See also
    <xref ref="526">#526</xref>.</par><par>For convenience I am here assigning the reflexes of this etymon
    into two allofamic roots, according to whether they have retained a stop initial (<xref ref="3447">#3447
    </xref>) or have undergone initial frication (<xref ref="1628">#1628 </xref>).</par><par>The semantic
    range of this word-family includes the notion of CENTER (as does the phonologically unrelated root
    <xref ref="517">#517</xref> [q.v.]).</par><par>The <reconstruction>*-u- ⪤ *-wa-</reconstruction> variation
    posited for this root is paralleled in several other etyma, e.g. <xref ref="2009">#2009</xref>, <xref
    ref="359">#359</xref>, and <xref ref="2379">#2379</xref>. (See HPTB:513-514.) This variation parallels
    the <reconstruction>*-i- ⪤ *-ya-</reconstruction> alternation found in a number of roots, notably
    <xref ref="33">#33</xref>.</par>'
