notes:
- type: T
  text: '<par>Chantyal <latinform>nak/nakh</latinform> is a borrowing from Nepali <latinform>nāk</latinform>,
    but the superficially similar Tiddim form <latinform>naːk³</latinform> is a genuine descendant of
    PKC <latinform>*hnaar</latinform>. (The development of final <latinform>-r</latinform> to a velar
    is regular in Tiddim.)</par><par>A few Tani languages (Idu, Kaman) have developed secondary final
    consonants (<latinform>-m, -ŋ</latinform>)). There are separate but perhaps related roots: <xref ref="1415">#1415</xref>,
    <xref ref="805">#805</xref>. Cf. all the English words relating to the nose that begin with the clusters
    <emph>sm-</emph> or <emph>sn-</emph>.</par>'
- type: T
  text: <par>Noteworthy is the Qiang (Mawo) reflex with initial <latinform>st-</latinform> rather than
    <latinform>sn-</latinform>. This obstruentization of <latinform>n-</latinform> after the <latinform>s-</latinform>
    prefix had hitherto been noted only in Kanauri and Chinese. See HPTB:103.</par>
