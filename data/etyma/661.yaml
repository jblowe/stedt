notes:
- type: T
  text: <par>This is by far the best-attested root for VAGINA in TB, with reflexes in the NE Indian Areal
    Group, Himalayish, Lolo-Burmese, Karenic, and Qiangic. While most of the supporting forms point to
    a prefixal <reconstruction>*s-</reconstruction> plus <reconstruction>*t-</reconstruction> root-initial,
    a few reflexes seem to have undergone metathesis, e.g. Hayu <latinform>pep-tshu</latinform>, Lakher
    (Mara) <latinform>³tshu</latinform>, etc.</par><par>Some of the reflexes are transcribed with high
    front vowel <latinform>-i</latinform> instead of <latinform>-u</latinform>, but this fronting seems
    to be secondary. Compare, e.g. the Abor-Miri, Apatani, and Galo forms; or the Chepang, Dumi, and Bantawa
    reflexes, etc.</par>
- type: F
  text: <par><latinform>Comment:</latinform> Cf. comparanda for <xref ref="5689">#5689</xref>, in particular
    the etyma <hanform>屬</hanform> <latinform>zhǔ</latinform> and <hanform>屬</hanform> <latinform>shǔ</latinform>.</par>
