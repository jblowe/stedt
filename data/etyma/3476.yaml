  text: <par>This etymon is well-attested in the NE Indian Areal Group, with good-looking cognates in
    Himalayish and Loloish. Two allofams should be reconstructed, one with and one without final <reconstruction>*-k</reconstruction>.
    The Idu and Loloish forms point to an allofam with *voiceless initial, while the Moyon form reflects
    an evidently secondary nasal prefix.</par>
