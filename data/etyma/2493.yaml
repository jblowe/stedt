notes:
- type: T
  text: <par>French (1983:554) relates PNN <reconstruction>*ɲaːy</reconstruction> SOFT to this root. This
    is plausible in view of WB <latinform>nai</latinform> &apos;knead with hands / trample with feet&apos;,
    i.e. &quot;soften up&quot;.</par><par>French goes on to make a further association between SOFT and
    CHEAP, pointing to WB <latinform>nai</latinform> &apos;knead&apos;, and <latinform>jhe-nai</latinform>
    &apos;cheap&apos;, analogous to an antonymous association within Northern Naga, e.g. Chang <latinform>sek
    bu</latinform> &apos;expensive&apos; and <latinform>sek ok bu</latinform> &apos;hard&apos;.</par>
- type: T
  text: <par>This etymon seems definitely to be related to <xref ref="434">#434</xref>.</par>
