  text: '<par><hanform>翰</hanform> OC <latinform>*gʼɑ̂n</latinform>, GSR #140f-g &apos;to support&apos;;
    Li 1971: <latinform>(*ganh)</latinform>; Baxter 1992:761 <latinform>*gans</latinform>; B &amp; S 2011:
