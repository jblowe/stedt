- type: T
  text: <par>Although this etymon is of quite restricted distribution in TB, there is a possible Chinese
    comparandum.</par><par>The second syllable of Bodo <latinform>akánti</latinform> &apos;arm (upper
    part)&apos; might also be related.</par>
