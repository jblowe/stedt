notes:
- type: T
  text: '<par>This &quot;funny&quot; root is quite well attested in several branches of the family, usually
    as a sesqui- or di-syllable. Several languages (Ao, Bisu, Magar) show a variant with final velar stop,
    while others (WB, Gurung) show some sort of laryngeal feature after the vowel.</par><par>Yang 1985
    cites several extra-TB lookalikes: Khmer <latinform>kliək</latinform>, Indonesian <latinform>ketiak</latinform>
    &apos;armpit&apos;, Cham <latinform>kəlĕk</latinform> &apos;tickle&apos;. See also Benedict 1975a:410
    (&quot;Austro-Thai Language and Culture, with a glossary of roots&quot;).</par>'
