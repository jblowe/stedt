notes:
- type: T
  text: <par>Jackson Sun also suggests that this PTani reconstruction could have instead contained a <latinform>*-ɯs</latinform>
    rime (1993:361).</par>
- type: T
  text: <par>For detailed discussion of the numeral SEVEN, see Matisoff 1995 (&quot;Numerals&quot;), pp.
    197-203.</par><par>Written Tibetan <latinform>bdun</latinform> is an isolate, shared only by a few
    other languages in the Tibetosphere.</par><par>The phonological similarity between this numeral and
    <xref ref="2504">#2504</xref> has led to the deduction that the TB numeral system must once have had
    a quinary basis (<plainlatinform>STC pp. 16, 93</plainlatinform>), but nobody has been able to identify
    any part of the protoform <latinform>*s-ni-s</latinform> as meaning FIVE. (Modern Khmer is an example
    of a contemporary language with a quinary numeral system.)</par>
- type: F
  text: '<par><hanform>七</hanform> OC <latinform>*ts’i̯ĕt</latinform>, GSR #400a-d &apos;seven&apos;;
    Coblin 86:131 ST <latinform>*shnjis</latinform> &gt; PC <latinform>*shnjit</latinform> &gt; OC <latinform>*tshjit</latinform>;
    Schuessler 2007:419 <latinform>*tshit</latinform> &lt; <latinform>*snhit</latinform>; B &amp; S 2011:
    <latinform>*tsʰit {[tsʰ]i[t]}</latinform>; Mand. <latinform>qī</latinform>.</par>'
