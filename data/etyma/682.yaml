notes:
- type: T
  text: <par>A number of languages (e.g., Kuki-Chin, Meithei, Nocte, Andro) have developed a final dental
    stop in this root, undoubtedly due to the preceding high vowel.</par><par>Tsangla has acquired the
    homorganic final nasal in this root. </par><par>This etymon frequently occurs as first element in
    compounds meaning ANKLE (&quot;eye-foot&quot;).</par>
