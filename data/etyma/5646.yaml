- type: T
  text: <par>This root was originally set up only at the PLB level (cf. HPTB:73), but Qiangic/rGyalrongic
    cognates have since been discovered, which allow us to set it up for PTB. The Ergong form indicates
    that this root could take the <latinform>*s-</latinform> prefix.</par><par>Contra HPTB:520, we no
    longer consider this to be related to <xref ref="5563">#5563</xref>.</par>
