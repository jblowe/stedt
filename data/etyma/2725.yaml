notes:
- type: T
  text: '<par>We are here combining two roots reconstructed separately in HPTB: <reconstruction>*diŋ</reconstruction>
    (p.307) and <reconstruction>*s-tyaŋ</reconstruction> (p.304). This alternation in the rhyme is paralleled
    in several other roots, e.g. <xref ref="33">#33</xref> and <xref ref="2610">#2610</xref>.</par><par>Also
    undoubtedly related is <xref ref="1722">#1722</xref>.</par>'
