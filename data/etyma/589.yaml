    (&quot;Primary and secondary laryngeal initials in TB&quot;) and HPTB:54-58. Cf. e.g. Lisu <latinform>ko³⁵dʒi³³</latinform>
    and <latinform>hwa⁵-ji⁴</latinform>.</par>
