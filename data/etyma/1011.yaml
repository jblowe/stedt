notes:
- type: T
  text: <par>This well-established root shows <latinform>*-i- ⪤ -u-</latinform> variation, with the latter
    variant characteristic of the Tamangic group.</par><par>rGyalrongic attests a velar prefix, which
    always appears between the <latinform>*s-</latinform> prefix and the root initial.</par><par>It is
    claimed in DL:1297 that Lahu <latinform>yɨ̀</latinform> LONG and <latinform>šɨ</latinform> LENGTH
    appear not to descend from this root, since the rhyme <latinform>*-iŋ</latinform> usually goes to
    Lahu <latinform>-ɛ</latinform> not <latinform>-ɨ</latinform>. However, this is perhaps too strict
    since special vocalic reflexes frequently occur after sibilants in Loloish languages.</par>
