notes:
- type: T
  text: '<par>This etymon has been discovered in Himalayish (Chepang and Lepcha) and the NE Indian Areal
    Group (Karbi). A pair of superficially resemblant forms must be banished from this etymon:</par><par>Garo
    <latinform>go&apos;l-teng</latinform> &apos;penis&apos; is analyzed by Burling as STICK + LONG. The
    gloss of <latinform>go&apos;l</latinform> or <latinform>gol◦dik</latinform> as &apos;stick&apos; is
    confirmed in K. W. Momin&apos;s <emph>English-Achikku Dictionary</emph>  (n.d.:227). I have no independent
    evidence that <latinform>teng</latinform> means &apos;long&apos; in Garo, although several other NE
    Indian Areal Group languages have similar forms with that meaning: Khoirao <latinform>ka◦tang◦ba</latinform>,
    Liangmei <latinform>ka-theŋ-bu</latinform>, Maram <latinform>tang</latinform>, Karbi <latinform>ke◦ding</latinform>,
    Rengma <latinform>ka◦thong</latinform>, Tangkhul <latinform>ka◦sang</latinform>, etc.</par><par>Lepcha
    <latinform>tălam t&apos;yeṅ</latinform> &apos;testicle&apos; must also be rejected. According to Mainwaring/Grünwedel
    (1898:164), the second element <latinform>t&apos;yeṅ</latinform> actually means &apos;the chief or
    most precious part&apos;, as in <latinform>să-bŭr t&apos;yeṅ</latinform> &apos;the musk bag or gland
    of the musk-deer&apos;. The true Lepcha cognate is probably the first syllable of <latinform>čen̊
    pă-tin̊</latinform>.</par>'
