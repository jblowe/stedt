- type: T
  text: <par>The Qiangic and rGyalrongic forms point to <reconstruction>*s/m-dzi-s/k</reconstruction>,
    i.e. a prototype with affricated root-initial, either a sibilant or nasal prefix, and either a sibilant
    or velar suffix.</par>
