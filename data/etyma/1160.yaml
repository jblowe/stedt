notes:
- type: T
  text: '<par>This root is well-attested in TB, occurring in the NE Indian Areal Group, Lolo-Burmese,
    Jingpho, Karenic, and Baic. There is an excellent Chinese comparandum, <hanform>愛</hanform> &apos;love&apos;
    [GSR 508a]. STC (pp. 150, 192) compares Proto-Karen <reconstruction>*ʔai</reconstruction> to the Chinese
    word, but does not cite any other TB forms. In Matisoff 1985a (GSTC) #126, I reconstructed PTB <reconstruction>*ŋ-(w)ay</reconstruction>,
    on the basis of forms from Jingpho, Tiddim, Lushai (Mizo), and Tangkhul. Another set of forms, reconstructed
    separately in STC #315 as <reconstruction>*ŋoy</reconstruction>, with the gloss GENTLE / QUIET / MODERATE,
    I believe to be allofamically related to the present etymon (see GSTC #92).</par><par>There is a look-alike
    in Proto-Tai: <reconstruction>*ŋaayᴮ²</reconstruction> &apos;easy&apos; (HCT:204) &gt; Siamese <latinform>ŋâay</latinform>.</par>'
- type: F
  text: '<par><hanform>愛</hanform> OC <reconstruction>*ʔəd</reconstruction>, GSR #508a &apos;love&apos;;
    Li 1971: <reconstruction>*·ədh</reconstruction>; Baxter 1992 #337: <reconstruction>*ʔɨts</reconstruction>;
    Mand. <latinform>ài</latinform>.</par><par>The Chinese form most closely resembles the Karen form
    <latinform>ʔai</latinform>.  Because we expect OC <reconstruction>*ʔ-</reconstruction> to correspond
    to PTB <reconstruction>*Ø-</reconstruction> and OC <reconstruction>*ŋ-</reconstruction> to correspond
    to PTB <reconstruction>*ŋ-</reconstruction>, the Chinese form must be assumed to relate to a PTB allofam
    lacking initial <reconstruction>*ŋ-</reconstruction>.</par><par>Baxter reconstructs <reconstruction>*ʔɨts</reconstruction>,
    but a reconstruction of <reconstruction>*ʔɨjs</reconstruction> is also possible, as rhyming evidence
    does not definitvely indicate the presence of a stop coda.</par><par>The correspondence between TB
    final <reconstruction>*-ay</reconstruction> and OC final <reconstruction>*-əd</reconstruction> (Li),
    <reconstruction>*-ɨj</reconstruction> (Baxter) is attested, for example in the word for ‘tail’, TB
    <reconstruction>*r-may</reconstruction>; <hanform>尾</hanform> OC <reconstruction>*mjədx</reconstruction>
    (Li); <reconstruction>*mjɨjʔ</reconstruction> (Baxter); Mand. <latinform>wěi</latinform>. Elsewhere
    in this volume, <xref ref="519">#519</xref> offers additional support for this correspondence.<br
    />[ZJH]</par>'
