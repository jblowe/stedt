notes:
- type: T
  text: '<par>This root was originally reconstructed as <latinform>*m-(t)sin</latinform> in STC #74, with
    the remark that the PTB initial was &quot;uncertain&quot;. The reconstruction was revised to <latinform>*m-tsyen</latinform>
    in note 24, expanded in note 122 (p. 37).</par><par>Several allofams must be posited: one with final
    <latinform>*-l</latinform> (<xref ref="514">#514</xref>), one with an open syllable (<xref ref="515">#515</xref>),
    and one where the nasal prefix seems to have preempted the affricate initial (<xref ref="513">#513</xref>).</par><par>A
    number of languages have reduced the initial affricate to a simple fricative, hence the parentheses
    around the <latinform>t</latinform> in the PAF.</par>'
