- type: T
  text: <par>The reflexes show a certain amount of vocalic variation, only to be expected in such a sound-symbolic
    root.</par><par>There is a similar root <xref ref="1715">#1715</xref>, which should be kept distinct,
    since some languages (Nocte, Tangsa, Tamang) have compounds containing both etyma.</par><par>Several
    forms reflect a diphthongal rhyme <latinform>*-ay</latinform>, either directly (Tangsa, Lalung, Thakali,
    Lahu) or indirectly via a fronted vowel (Apatani, Chokri, Karbi).</par>
