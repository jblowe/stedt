- type: T
  text: '<par>STC #20 and HPTB p. 288 reconstruct the voiceless allofam with a long vowel because of the
    Lepcha vowel; a short medial PTB <latinform>-u-</latinform> tends to lower to Lepcha <latinform>-a-</latinform>
    while long <latinform>-uː-</latinform> remains <latinform>-u-</latinform>. Further data is needed
    to establish this point, however.</par>'
