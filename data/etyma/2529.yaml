notes:
- type: I
  text: <par>Mongsen Ao <latinform>ŋa</latinform> derives from PTB <latinform>*ŋa</latinform> (cf. <xref
    ref="1306">#1306</xref>, <xref ref="1455">#1455</xref>), and PTB <reconstruction>*-a(ː)w</reconstruction>
    should have yielded Mongsen <latinform>-u</latinform> (cf. <xref ref="2492">#2492</xref>, <xref ref="386">#386</xref>,
    <xref ref="2302">#2302</xref>), so this should probably be reconstructed as <latinform>*ŋa</latinform>
    instead of <latinform>*ŋaːw</latinform>. But then where did PKC final glide come from?</par>
- type: F
  text: '<par><hanform>禺</hanform> OC <latinform>*ngi̯u</latinform>, GSR #124a-b &apos;monkey&apos;; Schuessler
    2007:617 <latinform>*ŋoh</latinform>; B &amp; S 2011: (<latinform>*ŋo-s</latinform>); Mand. <latinform>yù</latinform>.</par>'
