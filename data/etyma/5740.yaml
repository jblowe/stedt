notes:
- type: T
  text: <par>So far this root has been found mostly in Bodo-Garo, with good cognates in Ao (Central Naga)
    and Nungish. This root has some resemblance to <xref ref="660">#660</xref>, but should probably be
    considered as quite separate.</par><par>The <latinform>*s-</latinform> prefix is implied by the Bodo
    forms with initial <latinform>h-</latinform>, as well as by the pre-glottalization in the Anong form.</par>
