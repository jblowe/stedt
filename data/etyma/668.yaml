notes:
- type: T
  text: '<par>This root appears mostly in Himalayish, with a possible cognate from Qiangic. The second
    syllable of Karbi <latinform>mak-phu</latinform> &apos;mons Veneris&apos; seems unrelated. In view
    of the gloss it probably means something like &apos;swelling; protuberance&apos;. It bears a resemblance
    to other reflexes of the well-attested root <reconstruction>*bwam ⪤ *pwam</reconstruction> PLUMP /
    SWOLLEN (STC #172; HPTB pp. 249, 252, 341, 518).</par>'
