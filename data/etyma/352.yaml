    /><hanform>熠</hanform> OC <latinform>*zi̯əp</latinform>, GSR #690f &apos;gleaming&apos;; Schuessler
    2007:570 <latinform>*wəp</latinform>; Mand. <latinform>yì</latinform>.</par>'
- type: T
  text: <par>The semantic connection between LIGHTNING and BUTTERFLY seems to reside in the iridescent
    quality of many butterfly wings, as well as by the rapidity of their wings flapping.</par><par>Bauer
    (1992) has identified this root as a &quot;pan-Southeast Asianism&quot;, and relates it to <xref ref="2790">#2790</xref>.</par><par>Also
    undoubtedly related to this etymon is <xref ref="2077">#2077</xref>.</par>
