- type: F
  text: '<par><hanform>蝶</hanform> OC <latinform>*dʼiɑp</latinform>, GSR #633h &apos;butterfly&apos;;
    Coblin 86:51 ST <latinform>*ƚep</latinform> &gt; OC <latinform>*diap</latinform>; Schuessler 2007:281
    <latinform>*lêp</latinform>; Mand. <latinform>dié</latinform>.<br /><hanform>燁</hanform>/<hanform>爗</hanform>
    OC <latinform>*gi̯əp</latinform> ~ <latinform>*gi̯ɛp</latinform>, GSR #682a-b &apos;shine, gleam&apos;;
