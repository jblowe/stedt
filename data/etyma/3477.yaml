  text: <par>This promising root, of limited distribution, has been found in the NE Indian Areal Group,
    with an apparent cognate in Himalayish (Chepang). Some reflexes have <latinform>-a</latinform>, others
    have a back vowel (<latinform>-u</latinform> or <latinform>-o</latinform>); the rhyme is reconstructed
    as <reconstruction>*-aw</reconstruction> on the testimony of Dimasa.</par>
