notes:
- type: I
  text: <par>Could this be the etymology of Lh. <latinform>mû qhâʔ ve</latinform> “have a drought”  (“heaven
    is difficult” ?) (for alternative see 1.3.1 above)</par>
- type: I
  text: <par>Look up collocations of WB kahk -- does it go with <latinform>mûi(gh)</latinform>?</par>
- type: T
  text: <par>The verb in the Lahu expression <latinform>mû qhâʔ ve</latinform> &apos;have a drought&apos;
    might possibly be from this etymon (<latinform>mû</latinform> &apos;heaven, sky&apos;), i.e., literally
    &apos;heaven is difficult&apos;.</par>
