notes:
- type: T
  text: <par>This curious etymon has so far been found only in a couple of Kiranti languages, Limbu and
    Hayu. The meaning seems to be specifically PUBIC HAIR (of either sex). It seems to bear no relationship
    to any etymon reconstructed with the general meaning BODY HAIR. It is included in this section for
    convenience, since Limbu <latinform>hi-rā-mu-rik</latinform> contains VAGINA as its first element.</par>
