notes:
- type: T
  text: <par>This extremely well-attested root shows considerable evidence for the <latinform>*s-</latinform>
    prefix (Qiangic, rGyalrongic, Sema, Kaike). The Qiangic forms with initial sibilants are deemed to
    show preemption by this prefix.</par><par>The Written Burmese doublet <latinform>ne</latinform> &apos;sun&apos;
    (Tone *1) and <latinform>ne&apos;</latinform> &apos;day&apos; (Tone *3), indirectly reflects the absence
    or presence of the <latinform>*s-</latinform> prefix. See Thurgood (1981) &quot;Notes on the Origin
    of Burmese Creaky Tone&quot;.</par><par>There is also scattered evidence for a velar prefix with this
    root (Khumi, Kom Rem).</par><par>The final <latinform>*-t</latinform> in the Chinese comparandum may
    be purely &quot;extrusional&quot; (see HPTB:464-465).</par>
- type: F
  text: '<par><hanform>日</hanform> OC <latinform>*ńi̯ĕt</latinform>, GSR #404a-d; B &amp; S 2011: <latinform>*C.nit
