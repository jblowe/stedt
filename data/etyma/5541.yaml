notes:
- type: I
  text: <par>Jingpho has a double reflex of this root, one with <latinform>-p</latinform> and one with
    <latinform>-ʔ</latinform> (from PTB <latinform>*-k</latinform>).</par>
- type: F
  text: '<par><hanform>噆</hanform> OC <latinform>*tsʼəm/tsəp</latinform>, GSR #660f, 660o ‘have in mouth;
    bite; sting’; Li 1971: <latinform>(*tshəm/p)</latinform>; Baxter 1992: <latinform>(*tshɨm/p)</latinform>;
    B &amp; S 2011: <latinform>*tsˁəp {tsˁ[ə]p}</latinform>; Mand. <latinform>cǎn</latinform>, <latinform>zǎn</latinform>.</par><par>Neither
    Li nor Baxter (1992) reconstructs this word. As Baxter notes (1992:555), this phonetic series presents
    unusual difficulties for OC reconstruction.  Baxter reconstructs some words with <reconstruction>*o</reconstruction>
    and others with <reconstruction>*i/ɨ</reconstruction>.</par><par>It is not clear why Karlgren lists
    the character twice in GSR #660. At GSR #660f he reconstructs <reconstruction>*tsʼəm</reconstruction>
    for the meaning ‘have in mouth’ and <reconstruction>*tsəp</reconstruction> for the meaning ‘bite’,
    while at GSR #660o he reconstructs <latinform>*tsəp</latinform> meaning ‘sting and suck’. Karlgren’s
    usual practice in GSR is to group multiple readings of a single character together, listing that character
    only once.</par><par>On the apparent mismatch between the voiceless PTB initial and the voiced OC
    initial, see the discussion under <xref ref="1654">#1654</xref>.</par><par>Vowel correspondences between
    OC and PTB before labial codas are difficult to pin down.  In Li&apos;s system, OC <reconstruction>*-ə-</reconstruction>
    regularly corresponds to TB <reconstruction>*-u-</reconstruction> and/or <reconstruction>*-i-</reconstruction>.
    Examples include <hanform>三</hanform> OC <reconstruction>*səm</reconstruction> ‘three’, PTB <reconstruction>*gsum</reconstruction>,
    Mand. <latinform>sān</latinform>; <hanform>入</hanform> OC <reconstruction>*njəp</reconstruction> &apos;enter/sink&apos;,
    PTB <reconstruction>*nup ⪤ *nip</reconstruction>, Mand. <latinform>rù</latinform>; and <hanform>寢</hanform>
    OC <reconstruction>*tshjəm</reconstruction> ‘sleep’, WT <latinform>gzim</latinform>, Mand. <latinform>qǐn</latinform>
    (Coblin 1986:134). Using Baxter’s system, however, where six vowels (as opposed to just <reconstruction>*a</reconstruction>,
    <reconstruction>*ə</reconstruction> in Li’s system) occur before bilabial consonants, correspondences
    are less regular.  This is in part because in many cases there is ambiguity in the reconstruction
    of vowels before bilabial codas in his system.  At the present state of our knowledge, the proposed
    cognate set is viable.<br />[ZJH]</par>'
- type: T
  text: <par>Many forms descending from this etymon have voiced initials, a fact which we might capture
    by setting up a separate allofam <latinform>*m-dz(y)up ⪤ *m-dz(y)ip</latinform>. Some of these cases
    can be ascribed to the influence of the nasal prefix. However, since there is so much variation in
    voicing even within a single subgroup, we have chosen to group all the reflexes under the prototype
    with voiceless root initial.</par>
- type: T
  text: '<par>This widespread etymon is set up as <reconstruction>*dzoːp</reconstruction> in STC #69,
    on the basis of forms from four Barish and Kuki-Chin languages: (Barish) Dimasa <latinform>dźop</latinform>
    and (Kuki-Chin) Lushai (Mizo) <latinform>foːp</latinform>, Thado <latinform>tsop</latinform>, and
    Siyin <latinform>tuop</latinform> &apos;suck; kiss&apos;. (Cf. also Kom Rem <latinform>məǰop</latinform>,
    Tiddim <latinform>toːp</latinform>, and Lai Chin <latinform>doop</latinform>.) However, the rhymes
    <reconstruction>*-op</reconstruction> and <reconstruction>*-oːp</reconstruction> are extremely rare
    in TB, with virtually no other examples (see HPTB, pp. 381-2), and it seems preferable to consider
    these forms with <latinform>-o(ː)-</latinform> vocalism to reflect a localized secondary development.
    (On the other hand, there is a parallel form in NW rGyalrong <latinform>kantsʰrop</latinform>, alongside
    Ma&apos;erkang rGyalrong <latinform>kɑ mə scçup</latinform>.) The vast majority of the reflexes point
    to a high proto-vowel, either <reconstruction>*-u-</reconstruction> or <reconstruction>*-i-</reconstruction>.
    The alternation between these two vowels is especially frequent in the environment of labial consonants,
    and indeed this is one of the best attested patterns of variation in TB, as well as in Chinese. (See
    VSTB pp. 41-2, HPTB pp. 493-505. See also <xref ref="3450">#3450</xref> and <xref ref="1613">#1613</xref>,
    below.) Several languages show internal variation between these vowels (e.g. Dimasa <latinform>dźop</latinform>
    &apos;suck&apos; <plainlatinform>⪤</plainlatinform> <latinform>sep</latinform> &apos;milk&apos;; Tiddim
    <latinform>teːp¹</latinform> &apos;suck&apos; <plainlatinform>⪤</plainlatinform> <latinform>toːp¹</latinform>
    &apos;kiss&apos;).</par><par>The nasal prefix <reconstruction>*m-</reconstruction> has been added
    to the reconstruction since it occurs in many languages of the NE Indian Areal Group (e.g. Sema <latinform>mtsü</latinform>,
    Ao Mongsen <latinform>mechep</latinform>, Kom Rem <latinform>məǰop</latinform>, Moyon <latinform>njúp</latinform>,
    etc.), as well as in Qiangic (e.g. Ergong <latinform>ndʑip⁵³</latinform>, Namuyi <latinform>ntshu⁵³</latinform>),
    and WT <latinform>ḥjib(s)-pa</latinform>, where <emph>a-chung</emph> &quot;ḥ&quot; is interpreted
    as a nasal prefix (see HPTB pp. 115-6).</par><par>Reflexes of the allofam with <reconstruction>*-u-</reconstruction>
    vocalism are presented in <xref ref="5541">#5541</xref>, and those from the <reconstruction>*-i-</reconstruction>
    variant in <xref ref="5541">#5541</xref>.</par><par>I also recognize an opened-syllable allofam <reconstruction>*dz(y)əw</reconstruction>
    <latinform>MILK/BREAST</latinform>, treated separately below <xref ref="5539">#5539</xref>.</par><par>A
    few languages show secondary variants with final stops other than <latinform>-p</latinform>. Jingpho
    has a doublet, one with the expected <latinform>-p</latinform> (<latinform>tšùp</latinform> &apos;suck,
    kiss, absorb&apos;), and one that reflects final <reconstruction>*-k</reconstruction> (<latinform>tšúʔ</latinform>
    &apos;breast&apos;; <latinform>-ʔ</latinform> is the regular Jg. reflex of <reconstruction>*-k</reconstruction>).
    Similar forms appear in several other languages: Sherpa (Helambu) <latinform>chuk pekin</latinform>
    &apos;kiss&apos;, Tamang (Sahu) <latinform>cyok-pa</latinform> &apos;kiss&apos;, Lashi <latinform>tʃu̱:k⁵⁵</latinform>
    &apos;nurse; suckle&apos;, Bisu <latinform>tʃhɔ̀k</latinform> &apos;suck&apos;. All these languages
    seem to have doublets with both <latinform>-p</latinform> and <latinform>-k</latinform>. WB has an
    aberrant form with a final dental (<latinform>cut</latinform> &apos;suck&apos;), paralleled by Dulong
    <latinform>tsut⁵⁵</latinform> &apos;suckle&apos; and Tamang (Sahu) <latinform>nyeh <emph>cʰuT</emph>
    Tai&apos;◦ti-pa</latinform>.<footnote>Cf. LTSR #73, which contains several typos corrected in VSTB,
    p. 32 and p. 239, n. 41.</footnote></par><par>For other etyma with similar variation in final position,
    cf. <xref ref="3450">#3450</xref> and <xref ref="1613">#1613</xref>.</par><par>The semantic connection
    between SUCK and KISS is paralleled by the vulgar English expression <emph>suck face</emph> for &apos;kiss&apos;.</par><par>There
    is a possible Chinese comparison, <hanform>噆</hanform> (Mand. <latinform>cǎn, zǎn</latinform>); this
    character has two OC readings, <latinform>*ts&apos;əm</latinform> &apos;have in the mouth&apos; and
    <latinform>*tsəp</latinform> &apos;bite; sting and suck (as a mosquito)&apos; [GSR #660f, #660o];
    see also Coblin 1986:144. TB also shows some variation between final stop and nasal in this etymon:
    cf. Sunwar <latinform>cim-cā</latinform> &apos;milk a cow&apos; <plainlatinform>⪤</plainlatinform>
    <latinform>yup-</latinform> &apos;suck&apos;; Tsangla (Motuo) <latinform>jum</latinform> &apos;suck
    (milk)&apos; <plainlatinform>⪤</plainlatinform> <latinform>tɕup⁵⁵ a⁵⁵</latinform> &apos;kiss&apos;.
    The final nasal in the Milang form <latinform>ɟim-ma</latinform> seems clearly to be due to assimilation
    of the initial to the suffix. See the discussion by ZJH, below. </par>'
- type: T
  text: <par>An undoubtedly related root (not in STC or HPTB) is <xref ref="86">#86</xref>, the semantic
    connection being the squeezing action required to express milk from a breast or udder. See DL:557-8.</par>
