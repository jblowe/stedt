notes:
- type: T
  text: <par>Besides Lolo-Burmese, where it is widely attested (even in Jinuo), this etymon has solid
    reflexes in Qiangic (Shixing) and Bai. The suggested NE Indian Areal Group cognate (in Mao) is uncertain;
    this form might better be assigned to <xref ref="1632">#1632</xref> (above), like Angami <latinform>kru</latinform>.
    This root was reconstructed for PLB in Matisoff 1978b:6 (&quot;Mpi and Lolo-Burmese microlinguistics&quot;);
    cf. also Matisoff 1988a:917-8. This is a good example of the development of *labiovelar initials into
    Lahu labials, as also in DOG (PTB <reconstruction>*kʷəy</reconstruction> &gt; Lahu <latinform>phɨ̂</latinform>);
    see also STC n. 83 (p. 26). Note the doublets in Hani (Khatu) and Naxi (Lijiang); the Naxi forms clearly
    show alternative labial and velar reflexes of the complex *labiovelar initial. Compounds for WOMB/PLACENTA
    typically have the structure CHILD + NEST. Compounds for SCROTUM have the structure TESTICLE + NEST.</par>
- type: F
  text: '<par><hanform>窠</hanform> ‘burrow, nest’; GSR: not in #351; Li 1971: <latinform>(*khwar)</latinform>;
    Baxter 1992: <latinform>(*kʷhaj)</latinform>; Mand. <latinform>kē</latinform>.</par><par>This character
    is not in GSR and is not reconstructed by either Li or Baxter. Based on its phonetic element and its
    Middle Chinese reading, however, its OC reconstruction is not in doubt. The word occurs in the <emph>Shuowen
    Jiezi</emph>, attesting to its existence in the first century AD. The <emph>Shuowen</emph> entry reads
    <hanform>空也。從穴。果聲。一曰鳥巢也。在樹曰巢。在穴曰窠。</hanform> (&quot;Empty. [The character is formed] from [semantic
    element] <hanform>穴</hanform>  and <hanform>果</hanform> is the phonetic. Another meaning is bird’s
    nest. When in a tree it is called <latinform>cháo</latinform>, in a cave it is called <latinform>kē</latinform>.&quot;)
    The  element <hanform>果</hanform> depicts an object in a tree and is part of the pictograph in <hanform>巢</hanform>,
    Mand. <latinform>cháo</latinform> ‘nest’. In <hanform>窠</hanform> it may be serving as a semantic
    as well as a phonetic element.</par><par>The connection with PTB was proposed by Handel (1998). It
    establishes a correspondence between PTB labiovelar initials and Chinese labiovelar initials.  The
    vowel correspondence, however, is problematic, since PTB final <reconstruction>*əy</reconstruction>
    usually corresponds to OC <reconstruction>*-id</reconstruction> (Li)/<reconstruction>*-əj</reconstruction>
    (Baxter); see the examples under the discussion for <xref ref="300">#300</xref>.<br />[ZJH]</par>'
