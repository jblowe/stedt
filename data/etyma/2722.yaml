notes:
- type: T
  text: <par>This etymon has a very likely connection with <xref ref="663">#663</xref>, illustrating the
    widespread alternation between dental stop and liquid in TB. See Matisoff 2013 (&quot;The dinguist&apos;s
    dilemma&quot;).</par>
- type: F
  text: '<par><hanform>寔</hanform> OC <latinform>*d̂i̯ək</latinform>, GSR #866s &apos;this; this is; really&apos;;
    Schuessler 2007:464 <latinform>*dək</latinform>; B &amp; S 2011: (<latinform>*dek</latinform>); Mand.
    <latinform>shí</latinform>.<br /><hanform>實</hanform> OC <latinform>*d̂i̯ĕt</latinform>, GSR #398a-c
    &apos;solid; true; really&apos;; Schuessler 2007:464 <latinform>*dit</latinform>; Mand. <latinform>shí</latinform>.<br
    /><hanform>直</hanform> OC <latinform>*di̯ək</latinform>, GSR #919a &apos;straight; right&apos;; Schuessler
    2007:616 <latinform>*drək</latinform>; B &amp; S 2011: <latinform>*N-t‹r›ək</latinform>; Mand. <latinform>zhí</latinform>.</par><par><hanform>正</hanform>
    OC <latinform>*t̂i̯ĕng</latinform>, GSR #833j &apos;first (lunar month)&apos;; B &amp; S 2011: <latinform>*C.teŋ</latinform>;
    Mand. <latinform>zhēng</latinform>.<br /><hanform>正</hanform> OC <latinform>*̵t̑i̯ĕng</latinform>,
    GSR #833j &apos;straight, correct&apos;; B &amp; S 2011: <latinform>*teŋ-s</latinform>; Mand. <latinform>zhèng</latinform>.<br
    /><hanform>政</hanform> OC <latinform>*̵t̑i̯ĕng</latinform>, GSR #833r-s &apos;government; rule, law;
    manage&apos;; Schuessler 2007: <latinform>*teŋh</latinform>; B &amp; S 2011: <latinform>*teŋ-s </latinform>;
    Mand. <latinform>zhèng</latinform>.</par><par><latinform>Comment:</latinform> Schuessler 2007:464
    considers <hanform>實</hanform> <latinform>shí</latinform> with the meaning &quot;solid, true, really&quot;
    to be a phonetic variant of <hanform>寔</hanform> <latinform>shí</latinform> in OC. He treats as a
    separate etymon <hanform>實</hanform> <latinform>shí</latinform>, when it means &quot;fruit&quot; (ibid.).</par>'
