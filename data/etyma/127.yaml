notes:
- type: I
  text: <par>Discuss possible allofamy with <reconstruction>*gzim</reconstruction> e128; Him. has linking
    forms like <latinform>im</latinform>. This root shows <latinform>-i-⪤-u-</latinform>.</par>
- type: I
  text: <par>Simplex/causative pair.</par>
- type: I
  text: '<par>STC #114; LTSR #180; (Him. forms reflect <reconstruction>*s-yum⪤*s-yim</reconstruction>);
    probably <latinform>⪤*g-zim</latinform> 128.</par>'
- type: T
  text: <par>This is one of the most widespread TB roots to show the variation between medial <latinform>*-i-</latinform>
    and <latinform>*-u-</latinform>. There might be an allofamic relationship between this root and <xref
    ref="128">#128</xref>.</par><par>This root frequently occurs as the first syllable in binomes meaning
    DREAM, where the second element is from <xref ref="126">#126</xref>.</par><par>Written Burmese <latinform>sip</latinform>
    &apos;put to sleep&apos; illustrates a rare survival of the causative prefix <latinform>*s-</latinform>;
    most Burmese morphological causatives simply have an aspirated initial.</par><par>Tibetan has developed
    the meaning HIDE for this root.</par>
