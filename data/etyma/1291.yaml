- type: T
  text: <par>The Kiranti binomes may well be hybrids of Nepali <latinform>kun</latinform> &apos;blood&apos;
    and <xref ref="2080">#2080</xref> (p.c. Boyd Michailovsky).</par><par>The Milang <latinform>kuŋ-nu</latinform>
    &apos;pus&apos; might be related to these forms.</par>
