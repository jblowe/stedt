notes:
- type: T
  text: '<par>This etymon is extremely well attested, occurring in the NE Indian Areal Group, Himalayish,
    Lolo-Burmese, Nungish, Qiangic, and probably Baic. Its range of meanings extends from WANT/DESIRE
    to LOVE to COPULATE. This root is notable for the large number of prefixes that it has acquired in
    various branches of TB: <reconstruction>*r-</reconstruction> (in Qiangic [rGyalrong, Ergong] and Amdo
    Tibetan); <reconstruction>*N-</reconstruction> (in Loloish and perhaps Meluri); <reconstruction>*d-</reconstruction>
    (in Written Tibetan), and <reconstruction>*s-</reconstruction> (in Qiangic [Pumi]).</par><par>This
    etymon has been grammaticalized in Lahu, where it now functions as a desiderative particle, e.g. <latinform>qay
    gâ</latinform> &apos;want to go&apos;, <latinform>dɔ̀ gâ</latinform> &apos;want to drink&apos;, etc.
    See Matisoff 1988a:399-400.</par><par>We have tentatively grouped Loloish forms with initial velar
    stops with those with initial labial or velar nasals, assuming that the former descend from the unprefixed
    root while the latter show preemption of the root initial by the nasal prefix.</par>'
