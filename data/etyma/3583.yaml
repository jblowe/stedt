- type: F
  text: '<par><hanform>波</hanform> OC <latinform>*pwɑ̂</latinform>, GSR #25l &apos;wave, surge&apos;;
    Baxter 92:1049 <latinform>*paj</latinform>; Mand. <latinform>bō</latinform>.</par>'
- type: T
  text: <par>The nasal prefix is confirmed by the voiced initials in Lahu. The <latinform>r-</latinform>
    and <latinform>d-</latinform> prefixes are directly attested in Tibetan. It has been shown that the
    semantically mysterious <latinform>r-</latinform> prefix is reflected by a syllabic nasal in Jingpho
    (STC p. 109), indicating that the former is more ancient in TB as a whole. The <latinform>d-</latinform>
    in Tibetan is not paralleled elsewhere as far as is now known.</par>
