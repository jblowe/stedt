notes:
- type: T
  text: <par>The basic meaning of this root in Indo-Aryan was &apos;donkey&apos; (<latinform>khara-</latinform>),
    with the word for the formerly exotic lagomorph &apos;rabbit&apos; expressed by the Old Indo-Aryan
    compound <latinform>kharabhaka-</latinform> (lit. &apos;long-eared like a donkey&apos;) (Turner 1966).
    Tibeto-Burman languages have borrowed this IA etymon in both senses. Cf. Nepali <latinform>kharāyō</latinform>
    &apos;rabbit&apos; (Schmidt 1993), the source of Newar <latinform>kharāyo</latinform>, as opposed
    to the meaning &apos;donkey&apos; in many other TB languages.</par><par>The Guiqiong forms look like
    IA + Chinese hybrids. Cf. <xref ref="5732">#5732</xref>.</par>
