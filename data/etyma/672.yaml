  text: <par>This etymon is firmly reconstructible for PTB on the basis of the excellent fit between the
    Himalayish and Lolo-Burmese cognates. The velar prefix is reconstructed to accommodate the WB and
    Pa-O forms, as well as a group of Himalayish forms that mean CRADLE. For a similar association with
    CRADLE see <xref ref="1615">#1615</xref>, below.</par>
