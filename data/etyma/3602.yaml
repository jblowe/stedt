- type: T
  text: <par>For now, we consider this etymon as distinct from <xref ref="1906">#1906</xref>, although
    several reflexes have <latinform>-i</latinform> vocalism; such <latinform>-i</latinform> ⪤ <latinform>-u</latinform>
    variation has so far only been solidly attested in closed syllables. The Qiangic form with <latinform>-i-</latinform>
    shows the expected &quot;brightening&quot;.</par><par>The Apatani forms might also come from <xref
    ref="1819">#1819</xref>.</par>
