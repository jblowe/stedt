notes:
- type: T
  text: '<par>Several phono-semantically similar variants are to be grouped together in this etymon. Their
    center of gravity is ROUND OBJECT, as shown in various compounds for rounded body parts and inanimate
    objects. The variants with final <latinform>-m</latinform> and <latinform>-ŋ</latinform> are equally
    well-attested, even within a single subgroup (cf. Bruhn&apos;s [2014] reconstructions for Proto-Central-Naga:
    PCN <latinform>*m-luŋ</latinform> HEART / BE ROUND and PCN <latinform>*ləm</latinform> HEAD / HEART
    / MIND.</par><par>Bahing <latinform>thym</latinform> and Hayu <latinform>thum</latinform> &apos;heart&apos;
    look as if they might somehow be related, although the initial dental stop is a problem.</par>'
