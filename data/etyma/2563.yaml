notes:
- type: I
  text: <par>This Proto-Tamangic root seems to descend from the general Tibeto-Burman root <latinform>ploŋ</latinform>
    &apos;RUN, FLEE&apos;. A number of other Himalayish forms point to a variant with final velar stop
    (Tamang Sahu <latinform>&apos;prok◦tong &apos;prok◦tong chyon</latinform>, Thulung <latinform>prok-</latinform>,
    and Sunwar <latinform>pre:k-cā</latinform>), while Bahing <latinform>prøt-</latinform> has a final
    dental.</par>
- type: T
  text: <par>Contra HPTB:378-379, we now regard this root as quite separate from <xref ref="6707">#6707</xref>.</par>
- type: F
  text: '<par><hanform>奔</hanform> OC <latinform>*pwən</latinform>, GSR #438a-c &apos;run (v.), hasten,
    rush about, elope&apos;; Schuessler 2007:160 <latinform>*pə̂n</latinform>; B &amp; S 2011: <latinform>*pˤur</latinform>;
    Mand. <latinform>bēn, bèn</latinform>.</par>'
