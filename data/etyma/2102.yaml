notes:
- type: T
  text: <par>Many Loloish languages have slightly different forms for KIDNEY as opposed to STOMACH. For
    now, we are attributing this to an alternation at the PLB level between <latinform>*wu</latinform>
    and <latinform>*ru</latinform>, e.g. Ahi <latinform>i³³ fu⁵⁵ zo²¹</latinform> &apos;kidney&apos; (&lt;
    <latinform>*wu</latinform>) vs. <latinform>ɣo²</latinform> &apos;intestines&apos; (&lt; <latinform>*ru</latinform>).
    Cf. the PLB reconstruction <latinform>*rə-ʔu¹</latinform> (DL:1130).</par>
