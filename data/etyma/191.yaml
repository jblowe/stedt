notes:
- type: T
  text: '<par>&quot;While the cited forms all mean &apos;soup&apos;, this PT root has a more general meaning
    &apos;thick liquid&apos; and appears also in such words as &apos;honey&apos;, &apos;tears&apos;, &apos;resin&apos;,
    and &apos;mucus&apos;. Cf. Mikir <latinform>a-lang</latinform> &apos;juice&apos;. Cf. PTB <reconstruction>*laŋ</reconstruction>
    &apos;water, river, valley&apos; (Prof. Matisoff, p.c.)&quot; Sun 1993a: 120.</par>'
- type: F
  text: '<par>The primary comparandum here is:</par><par><hanform>浪</hanform> OC <reconstruction>*lɑ̂ng</reconstruction>,
    GSR #735k &apos;name of a river&apos;; B &amp; S 2011: <reconstruction>*rˁaŋ {*[r]ˁaŋ}</reconstruction>;
    Mand. <latinform>(làng)</latinform>.</par><par>The entry for <hanform>浪</hanform> <latinform>làng</latinform>
    in <hanform>說文</hanform> Shuō Wén says simply &quot;<hanform>滄浪河南入江</hanform>&quot;, where <hanform>滄浪河</hanform>
    <latinform>Cánglàng Hé</latinform> is the name of a river, purportedly in Central China. Early on,
    <hanform>浪</hanform> appears in other toponyms as well, e.g. <hanform>莊浪</hanform> <latinform>Zhuānglàng</latinform>,
    a county in Gansu prov., <hanform>康浪</hanform> <latinform>Kānglàng</latinform>, a river in Shandong
    prov. At the very least, we are justified in treating <hanform>浪</hanform> as a hydronym in the above
    cases; however, we would further argue that <hanform>浪</hanform> was originally a more general, Sinitic
    term for &apos;river, stream, flow&apos;. A useful analogy can be found in European toponyms such
    as Aberdour (Scotland), Durance (France), Dora (Italy), which may not immediately appear to be related
    to each other, but all of which are posited as deriving from a Celtic element <reconstruction>*dur</reconstruction>,
    a generic term for &apos;water&apos;.</par><par>Also attested early on for <hanform>浪</hanform> is
    the meaning &apos;excessive, dissolute&apos;, cited by Karlgren in GSR #735k, but as a separate etymon.
    Likewise, the meaning &apos;wave, breaker&apos; the usual hydrologic sense of <hanform>浪</hanform>
    in Modern Chinese, may be a separate development; it is not cited in GSR #735, and is apparently not
    attested earlier than MC.<br />[SPB]</par>'
