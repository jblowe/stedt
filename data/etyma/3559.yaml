  text: <par>The basic meaning of this etymon seems to be SEED, with extensions into SMALL ROUND OBJECT,
    and thence to TESTICLE.</par><par>This morpheme frequently occurs as the last syllable in words for
    EYE, as does the semantically similar root <xref ref="1019">#1019</xref>.</par><par><xref ref="3559">#3559</xref>
    is quite distinct from <xref ref="1019">#1019</xref>, as witness the WB forms <latinform>sî</latinform>
    &apos;fruit&apos; vs. <latinform>ə-ceʼ</latinform> &apos;seed&apos;. </par>
