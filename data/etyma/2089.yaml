  text: <par>The typical word for earwax in TB languages is a compound EAR + SHIT. Cf., e.g. Lotha <latinform>E
    No chu</latinform> &apos;earwax&apos;, where the last syllable is from <xref ref="572">#572</xref>.
    It is quite possible that some of the forms grouped under the present etymon may have a similar origin.</par>
