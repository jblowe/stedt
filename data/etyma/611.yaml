notes:
- type: T
  text: <par>The final consonant of this root seems to be unstable, although the basic variant seems to
    be the one with -p. Jingpho (and perhaps Phunoi) point to a variant with -t. Bantawa has a form with
    initial h- and final -k (<latinform>hak</latinform>), but it is unclear whether it belongs under this
    etymon.</par><par>This root resembles <xref ref="610">#610</xref>, and for the moment we consider
    it to be allofamically related to it.</par>
