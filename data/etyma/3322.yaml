notes:
- type: T
  text: '<par>Cf. also <xref ref="225">#225</xref>, where the semantic center of gravity is lower in the
    body (i.e. lower back, buttocks, tail); however, the Sherpa, Lepcha, and Yakha forms are included
    here because of their stopped finals. </par><par>We recognize three quite similar etyma in this semantic
    area: the present root <xref ref="3322">#3322 </xref>, <xref ref="225">#225</xref>, and <xref ref="5639">#5639</xref>.
    In the case of phonologically eroded languages (e.g. Loloish, Qiangic, Baic), it is sometimes difficult
    to decide among them. Several Loloish languages have distinct reflexes for at least two of them, e.g.
    Lahu <latinform>tɔ̀</latinform> &apos;lower back / loins / lumbar region&apos; &lt; <xref ref="225">#225
    </xref> vs. <latinform>ɔ̀-mɛ̄-tu</latinform> &apos;tail&apos; &lt; <xref ref="5639">#5639 </xref>;
    Written Burmese <latinform>taŋ-pâ</latinform> &apos;buttock&apos; &lt; <xref ref="225">#225 </xref>
    vs. <latinform>khâ-tuiŋ</latinform> &apos;lower back / loins / lumbar region&apos; &lt; <xref ref="3322">#3322
    </xref>. Two Southern Loloish binomes are particularly problematic (Akha <latinform>dɔ̀-dàŋ</latinform>
    &apos;buttocks&apos; and Sangkong <latinform>toŋ³¹ taŋ⁵⁵</latinform> &apos;buttocks&apos;), where
    the first syllables are from <xref ref="225">#225 </xref>, while the second syllables are of uncertain
    origin despite their superficial resemblance to <xref ref="225">#225 </xref>.</par>'
