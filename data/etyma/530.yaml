notes:
- type: I
  text: <par>The supporting forms in Loloish (muscle, e.g.) may be scattered under other etyma.</par>
- type: T
  text: <par>This root is distinct from <xref ref="34">#34</xref>, although words meaning MUSCLE are sometimes
    assignable to it, since the bulging contour suggests the meaning FLESH. The general meaning of <xref
    ref="530">#530</xref> refers to body parts of rather obscure function that extend throughout the body.
    (These were referred to as &quot;obscure internal channels and connections&quot; or OICCs in VSTB.)
    The Karbi form <latinform>artho</latinform>, with meanings including &apos;vein&apos;, &apos;artery&apos;,
    &apos;ligament&apos;, &apos;muscle&apos;, &apos;sinew&apos;, and &apos;tendon&apos;, well illustrate
    this point.</par><par>Also to be assigned to this etymon is the first syllable of <xref ref="4418">#4418</xref>.</par>
