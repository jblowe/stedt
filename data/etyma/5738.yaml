- type: T
  text: <par>We include these Southern Loloish forms in this word family, even though the change from
    <latinform>*w</latinform> to <latinform>m</latinform> has not yet been discovered elsewhere. Perhaps
    these forms reflect a doubly-prefixed prototype <latinform>*s-m-wap</latinform>, which in turn derives
    from the full disyllable <latinform>sin-wap</latinform> that we find in Jingpho.</par>
