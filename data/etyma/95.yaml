notes:
- type: T
  text: '<par>This newly established root seems quite solid. The Barish forms (esp. Dimasa, Kokborok)
    point to a diphthongal prototype, while most Loloish (including Jinuo) and Qiangic forms seem to reflect
    a monophthong. (<reconstruction>*-a</reconstruction> &gt; <latinform>-i</latinform> is a common Qiangic
    development.) The Himalayish evidence is mixed: Bantawa has <latinform>-a</latinform>, but WT and
    Pattani have <latinform>-e</latinform> (presumably from <reconstruction>*-ay</reconstruction>). There
    is evidence from Bahing for alternation between voiced and voiceless initial stops, reflecting a distinction
    between simplex (‘be born’) vs. causative (‘give birth’).</par>'
