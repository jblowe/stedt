notes:
- type: T
  text: <par>A simplex-causative pair is involved here. Reflexes with voiceless laterals are to be assigned
    to the causative allofam with the <latinform>*s-</latinform> prefix, as are undoubtedly a number of
    other forms (e.g. in Loloish) recognizable by their special tones.</par><par>The allofam with medial
    <latinform>-i-</latinform> is confined to Bodo-Garo, Nungish, and Northern Naga.</par><par>Various
    scattered languages (Darang, Yidu, Sak, Mpi) have final <latinform>-ŋ</latinform> instead of <latinform>-m</latinform>.</par>
- type: F
  text: '<par><hanform>尋</hanform> OC <latinform>*dzi̯əm</latinform>, GSR #662a &apos;warm up (food)&apos;;
