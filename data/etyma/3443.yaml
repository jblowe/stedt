notes:
- type: F
  text: '<par><hanform>噫</hanform> OC <latinform>*ʔɛg</latinform>, GSR #957b; Mand. <latinform>yī</latinform>.</par><par>This
    character is also found in the Shi Jing with the interjectory meaning &apos;alas, oh&apos; and the
    OC reconstruction <latinform>*ʔi̯əg</latinform> (GSR #957b).</par>'
- type: T
  text: '<par>This obviously onomatopoetic root is quite widespread in the family. Occasionally there
    are phonological differences in a given languages between HICCUP and BELCH, e.g. Lahu <latinform>ə̀ʔ
    ve</latinform> &apos;belch&apos; and <latinform>ə̂ʔ ve</latinform> &apos;hiccup&apos;.</par><par>The
    PLB reconstruction <latinform>*ut</latinform> given in LTSR #161 is erroneous, as can be seen from
    the extra-Lolo-Burmese cognates with final <latinform>-k</latinform>.</par>'
