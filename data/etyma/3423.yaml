- type: T
  text: <par>This allofam is only shakily attested. The Spiti and Ergong forms look parallel, and it is
    possible that the latter is a borrowing from a western Tibetan dialect (no similar form has been uncovered
    in Written Tibetan). The fit between the Hayu form and the others is excellent.</par>
