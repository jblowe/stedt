notes:
- type: T
  text: '<par>This root has simplex/causative allofams in at least three subgroups: cf. WT <latinform>ḥphro-ba</latinform>
    and <latinform>spro-ba</latinform>, Jingpho <latinform>próʔ</latinform> and <latinform>śəpróʔ</latinform>,
    and Sak <latinform>phroʔ</latinform> and <latinform>pru</latinform>.</par><par>The reflexes vary between
    <latinform>-ro-</latinform> and <latinform>-ra-</latinform>, motivating the reconstruction <latinform>-rwa-</latinform>.</par><par>Kokborok
    and Tsangla show medial <latinform>-y-</latinform>, while Karenic has medial <latinform>-l-</latinform>,
    both plausible reflexes of the complex proto-medial.</par><par>The rGyalrong form looks like a borrowing
    from Tibetan.</par>'
