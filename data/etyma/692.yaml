notes:
- type: T
  text: '<par>This is one of several roots showing alternation between initial velar and glottal stop
    (=Ø) initial: <xref ref="2252">#2252</xref>, <xref ref="2232">#2232</xref>, <xref ref="5398">#5398</xref>,
    etc. (cf. HPTB:57). In this case, the crucial language for establishing the alternation is Written
    Burmese (<latinform>khuṁ</latinform> &apos;block&apos;, <latinform>ûṁ</latinform> &apos;pillow&apos;).</par><par>The
    reflexes of this root also illustrate the widespread variational pattern between medial <latinform>-i-</latinform>
    and medial <latinform>-u-</latinform>.</par>'
