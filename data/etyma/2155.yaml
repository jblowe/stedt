notes:
- type: T
  text: '<par>This is definitely an areal word, found in Mon-Khmer and Tai as well as in TB and perhaps
    Chinese. The meaning ranges from &apos;small weight or coin&apos; to &apos;bean, pea&apos;. Shorto
    2006 (#1489, p. 400) reconstructs Proto-Mon-Khmer <latinform>*ɓa(a)y</latinform> &apos;bean; small
    weight or coin&apos; (cf. Mon <latinform>boa</latinform> &apos;bean, pea, 1/16 tical&apos;); also
    Thai <latinform>pʰay</latinform> &apos;1/32 tical&apos;.</par><par>Shorto also suggests a connection
    with Amoy/Hokkien <latinform>pè</latinform> or <latinform>poè</latinform> <hanform>貝</hanform> (cf.
    Mand. <latinform>bèi</latinform>).</par><par>The present PTB reconstruction is a revision of STC
    #253, where the root is reconstructed <latinform>*be</latinform>.</par>'
