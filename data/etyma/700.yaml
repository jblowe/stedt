notes:
- type: T
  text: <par>The Nocte forms require no further comment. Of special interest is the Jingpho form <latinform>lətáʔ</latinform>,
    for which several explanations have been offered (cf. STC nn. 102, 109, 137). In my opinion, what
    happened was, after the obstruentization of original <latinform>l</latinform> to <latinform>t</latinform>
    in Jingpho, yielding <latinform>taʔ</latinform>, the form was reprefixed by the general root <reconstruction>*lak</reconstruction>,
    here reduced to <latinform>lə</latinform>. Note that in Jingpho, a secondary prefix <latinform>lə-</latinform>
    occurs in many verbs describing action with either the hands or the feet (see my portion of STC, n.
    308 and O. Hanson 358-85). The Tangut and Ergong forms seem to have a similar origin.</par><par>Another
    explanation might be in terms of metathesis, <reconstruction>**d-lak</reconstruction> &gt; <reconstruction>*l-dak</reconstruction>,
    in order to avoid the disfavored <latinform>dl-</latinform> cluster.</par>
