- type: T
  text: '<par>This etymon is evidently a borrowing into TB, perhaps ultimately from a Dravidian source
    (Tamil <latinform>ōṭu</latinform> &apos;roofing tile, potsherd, brick&apos; [Turner 1966: 77]).</par><par>Cf.
    also Proto-Mon-Khmer <reconstruction>*ʔit</reconstruction> &apos;brick&apos; (Shorto 2006:R:940.A).</par><par>The
    Jingpho, Rawang, and Karen forms are ultimately loans from Burmese.</par>'
