  text: <par>Jingpho <latinform>-n</latinform> is the regular reflex of PTB <latinform>-l</latinform>.
    </par><par>Forms with dental stop initial (e.g. Jingpho, Northern Naga, Kuki-Chin) might have arisen
    through preemption by the <latinform>d-</latinform> prefix found in Written Tibetan. Alternatively,
    these dentals might just represent a simplification of the unwieldy <latinform>dpr</latinform> cluster.</par>
