notes:
- type: T
  text: <par>A few languages have quite similar reflexes, except for a final <latinform>-k</latinform>
    instead of <latinform>-p</latinform>. For the moment, we have assigned these to <xref ref="1318">#1318</xref>.</par><par>In
    a couple of languages (Puiron, Kulung), this root has developed the meaning NOSE, although the usual
    etymon for nose is the allofamically related <xref ref="803">#803</xref>.</par>
