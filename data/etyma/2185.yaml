- type: I
  text: <par>HPTB p.332 (first table note a):<br />&quot;STC reconstructs <latinform>*bwat</latinform>,
    and JAM 2000a:#7 reconstructs <latinform>*bʷat</latinform>, but the Proto-Loloish high-stopped tone
    points to a voiceless prefix at the PLB level, undoubtedly <latinform>*s-</latinform> (<latinform>*s-watᴴ</latinform>),
    a reduction of the morpheme <reconstruction>*siŋ ⪤ *sik</reconstruction> &apos;tree&apos; that is
    the first element of the compound meaning &apos;flower&apos; in several languages (e.g. Nung, Lahu).&quot;</par>
