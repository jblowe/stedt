notes:
- type: T
  text: <par>As indicated in HPTB p. 380, it is sometimes quite difficult to distinguish the Loloish reflexes
    of the present root from those of <xref ref="2739">#2739</xref>. For now, we are assigning most forms
    with front vowels to <xref ref="2313">#2313</xref> and most of the others to <xref ref="2739">#2739</xref>.
    </par><par>The barking deer is a small species (<emph>Cervulus muntjac</emph>), renowned as the best
    eating in the jungle.</par><par>The first syllable of the Kuki-Chin binome reflects <xref ref="34">#34</xref>.</par>
- type: F
  text: '<par><hanform>麂</hanform> OC (<latinform>*ki̯ɛr</latinform>), (not in GSR #602) &apos;muntjac&apos;;
    Schuessler 2007:297 <latinform>*kriʔ</latinform>; Mand. <latinform>jǐ</latinform>.</par>'
