notes:
- type: T
  text: '<par>On the basis of the data so far available, this etymon has a fairly wide though scattered
    distribution, with reflexes in a single Himalayish language (Hayu), a few closely related Loloish
    languages (Noesu, Nosu, Nusu), and a couple of Qiangic languages (rGyalrong and Xixia). It is noteworthy
    that the nasal prefix is overtly attested in Hayu, rGyalrong, and Xixia, so that it may confidently
    be set up for PTB. This etymon is quite distinct from the most widely attested root for PENIS with
    nasal prefix, <xref ref="1284">#1284</xref> above, as proven e.g. by the Hayu reflexes: <reconstruction>*m-ley</reconstruction>
    &gt; Hayu <latinform>mli</latinform>, <reconstruction>*m-be</reconstruction> &gt; Hayu <latinform>-(m)be</latinform>.</par>'
