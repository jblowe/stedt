notes:
- type: F
  text: '<par><hanform>鐵</hanform> OC <latinform>*t’iet</latinform>, GSR #1256b &apos;iron&apos;; Coblin
    1986:98-99 ST <latinform>hliek*</latinform> &gt; PC <latinform>*hlik</latinform> &gt; OC <latinform>*thit</latinform>;
    Schuessler 2003:497 <latinform>*lhêt ~ lhît</latinform>; B &amp; S 2011: <latinform>*l̥ˁik</latinform>;
    Mand. <latinform>tiě</latinform>.</par><par>For <hanform>鐵</hanform>, Karlgren posits OC <latinform>*t’-</latinform>;
    later reconstructions have ST, PC and/or OC voiceless lateral <latinform>*lh-</latinform>, <latinform>*hl-</latinform>,
    or <latinform>*l̥-</latinform> (at the MC stage, all reconstructions for <hanform>鐵</hanform> show
    initial <reconstruction>*t’-</reconstruction>, cf. B &amp; S 2011 MC <latinform>*thet</latinform>).</par><par>Significantly,
    the recent ST, PC and OC reconstructions for <hanform>鐵</hanform> cited above, with initial <latinform>*lh-</latinform>,
    <latinform>*hl-</latinform>, or <latinform>*l̥-</latinform>, bear close comparison with PTB <latinform>*l-tsyak</latinform>
    &apos;iron&apos;. In fact, some scholars would prefer to derive WT <latinform>lčags</latinform> &apos;iron&apos;
    via palatalization of earlier PT <latinform>*hlyak</latinform> (Coblin, ibid.) or earlier <latinform>*lhyaks</latinform>
    (Schuessler, ibid.). This looks phonetically plausible; however, it begs the question of subgroup
    relationships within TB. Is the same shift <latinform>*hly/lhy-</latinform> &gt; <latinform>*lč</latinform>
    intended to account not only for WT <latinform>lčags</latinform>, but presumably, and ultimately also,
    WB <latinform>jak</latinform> &apos;bit of a bridle (of iron)&apos; and Lotha Naga <latinform> jon¹ tʃak²</latinform>
    &apos;iron&apos; (Bruhn 14 PCN:III.174)? For now, this intriguing issue will be left open for further
    inquiry. [SPB]</par>'
