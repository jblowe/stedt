notes:
- type: T
  text: <par>This root, discussed in detail in JAM 1995 &quot;Sino-Tibetan palatal suffixes revisited&quot;,
    appears in reduced form as <latinform>-i</latinform> or <latinform>-y</latinform> in a large number
    of etymologies. See also HPTB:482-489.</par><par>The high-rising tone of Lahu <latinform>ɛ́</latinform>
    &apos;baby, child&apos; is evidence for a final stop at the Proto-Loloish level, which motivates Bradley&apos;s
    reconstruction of PL <reconstruction>*s-yak<sup>L</sup></reconstruction>.</par><par>For a similar
    though distinct root, see <xref ref="2806">#2806</xref>.</par>
