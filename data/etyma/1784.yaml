notes:
- type: T
  text: <par>This root was set up as <latinform>*s-ŋor</latinform> in HPTB:400.</par><par>As noted in
    HPTB loc. cit., there is a similar Indo-Aryan etymon (cf. Nepali <latinform>ghur-nu</latinform>),
    but this resemblance appears accidental, probably due to the imitative nature of words for snoring.</par><par>Chepang
    <latinform>hŋrok naʔ</latinform> might be related, but presents problems. Thulung and Khaling <latinform>khor-</latinform>
    are perhaps borrowings from Nepali.</par><par>There is a possible allofamic relationship between this
    root and <xref ref="803">#803</xref>, reminding one of the English &quot;cryptotype&quot; <latinform>sm-
    ⪤ sn-</latinform> &apos;action related to the nose or lips&apos;. </par>
- type: F
  text: '<par><hanform>齁</hanform> OC (<latinform>*g’u</latinform>), GSR (not in #108) &apos;snore&apos;;
    Schuessler 2007:279; B &amp; S 2011: <latinform>*(qˁo)</latinform>; Mand. <latinform>hōu</latinform>.</par><par><latinform>Comment</latinform>:
    Cf. forms relating to &apos;neck, throat&apos; in <xref ref="5651">#5651</xref>.</par>'
