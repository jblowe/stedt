notes:
- type: T
  text: <par>The Qiangic forms are clearly borrowings from a Tibetan binome (cf. WT <latinform>sta ri</latinform>).</par><par>This
    root seems quite distinct from <xref ref="5609">#5609</xref>.</par>
- type: F
  text: '<par><hanform>刀</hanform> OC <latinform>*tog</latinform> GSR #1131a &apos;knife&apos;; Schuessler
    2007:207 <latinform>*tâu</latinform>; B &amp; S 2011: <latinform>*C.tˁaw</latinform>; Mand. <latinform>dāo</latinform>.</par><par>Schuessler
    2007:207 views Chinese <hanform>刀</hanform> <latinform>dāo</latinform> as perhaps an “…[A]rea word
    or CH loan&quot;. As an alternative, we posit Sino-Tibetan <latinform>*s-ta-w</latinform>, with suffix
    <latinform>*-w</latinform>, on the assumption that the suffix was dropped in Tibeto-Burman, yielding
    PTB <latinform>*s-ta</latinform>, but was retained in Sinitic, yielding OC <latinform>*C.tˁaw</latinform>
    (cf. B &amp; S 2011).</par><par>Comparative evidence for suffix <latinform>*-w</latinform> within
    Sinitic or Tibeto-Burman is sparse (cf. <xref ref="1707">#1707 EAT</xref>, where the range of reconstructed
    finals awaits confirmation). Nonetheless, the fact remains that PTB <latinform>*s-ta</latinform> &apos;knife,
    axe, sword&apos; and OC <latinform>*C.tˁaw</latinform> &apos;knife&apos; are quite close phonologically,
    and appear to reside within very old, core lexicon of their respective subfamilies. We suggest the
    issue of cognacy be left open for further research, rather than rejected outright. [SPB].</par>'
