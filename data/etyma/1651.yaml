notes:
- type: T
  text: <par>Some reflexes of this etymon have simple sibilant initials (e.g. Paangkhua <latinform>sùul</latinform>,
    Kham <latinform>sal</latinform>), while some have dental or palatal affricates, others have dental
    stops (e.g. Matupi and Maru) or even prefixed affricates (e.g. Pumi <latinform>stʃuɑ⁵⁵</latinform>).
    The vocalism of the reflexes ranges from <latinform>-u-</latinform> to <latinform>-wa-</latinform>
    to <latinform>-o-</latinform> to <latinform>-a-</latinform>. Semantically, this etymon varies in meaning
    from WOMB/PLACENTA to NEST and UMBILICAL CORD. This etymon is found throughout Chin and sporadically
    elsewhere in the NE Indian Areal Group (Mru); it also appears in Himalayish (often with the meaning
    UMBILICAL CORD and with <latinform>-a-</latinform> vocalism), and is also solidly attested in Qiangic.
    Inclusion of the Bai form is speculative.</par>
