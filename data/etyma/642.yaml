notes:
- type: T
  text: <par>This etymon is firmly established in Lolo-Burmese (Burmese itself has reflexes of both the
    stopped and non-stopped allofams) and Jingpho. The first syllable of Kham <latinform>zuh-riː</latinform>
    &apos;testicle&apos; is probably to be assigned to <xref ref="3436">#3436</xref> rather than to the
    present root, in view of the 2nd syllable of the compound <latinform>&apos;ba-zu-riː</latinform> &apos;(non-human)
    egg&apos;, where the first syllable means &apos;bird&apos;. Palaychi (Karenic) <latinform>shóq</latinform>
    &apos;penis&apos; seems unrelated.</par><par>The semantic center of the root seems to be VIRILITY.
    It occurs especially in compounds for intact (as opposed to castrated) male animals, with extensions
    into SEMEN, TESTICLES, and PENIS. This root was reconstructed for PLB in Matisoff 1988a:1225.</par>
