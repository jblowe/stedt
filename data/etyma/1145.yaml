notes:
- type: F
  text: '<par><hanform>發</hanform> OC <latinform>*pi̯wɑ̆t</latinform>, GSR #275c; B &amp; S 2011: <latinform>*Cə.pat</latinform>;
    Mand. <latinform>fā</latinform>.</par>'
- type: T
  text: '<par>This root is not reconstructed in STC, but has been reconstructed as <latinform>m-pat</latinform>
    in several sources (LTSR #124, GSTC #26, HPTB:330). </par><par>A medial <latinform>*-r-</latinform>
    is reconstructed for Proto-Tani and Proto-Karenic, and appears overtly in several other scattered
    languages (Khezha, Mao, Pattani, Tsangla, Motuo Menba). Final <latinform>*-s</latinform> appears instead
    of <latinform>*-t</latinform> in Kanauri and Kiranti languages; in at least two rGyalrongic dialects
    (Heishui Shashiduo <latinform>ka&apos;pʰəts</latinform>) and (Maerkang Baiwan Muerji <latinform>kamə&apos;pʰatz</latinform>)
    a final sequence <latinform>-ts</latinform> or <latinform>-tz</latinform> appears, motivating our
    reconstruction where the stop + sibilant co-occur syntagmatically. Chepang <latinform>has</latinform>
    also has final <latinform>-s</latinform> but the development of a *labial stop to Chepang <latinform>h</latinform>
    is not otherwise attested.</par><par>The nasal prefix is abundantly attested in Qiangic, rGyalrongic,
    and Jingpho. </par><par>The Chinese comparandum with medial <latinform>*-j-</latinform> was originally
    proposed by Coblin (1986:130).</par>'
