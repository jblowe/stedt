  text: '<par><hanform>乾</hanform> OC <latinform>*g’i̯ɑn</latinform>, GSR #140c &apos;heavenly&apos;;
    Schuessler 2007:425 <latinform>*gran</latinform>; B &amp; S 2011: (<latinform>*ɡran</latinform>);
    Mand. <latinform>qián</latinform>.</par><par><latinform>Comment:</latinform> In Chinese philosophy,
    <hanform>乾</hanform> <latinform>qián</latinform> refers to &quot;heaven, the male principle&quot;,
    the first of the <hanform>八</hanform><hanform>卦</hanform> <latinform>bā</latinform><latinform>guà</latinform>,
    i.e. the eight divinatory trigrams of the Book of Changes.</par>'
