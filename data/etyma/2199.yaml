  text: <par>This root is attested in Jingpho, Kanauri, a few languages of Nepal, and especially in Tibetan.
    Cf. WT <latinform>ḥdon-pa</latinform>, pf. <latinform>bton</latinform>, fut. <latinform>gdon</latinform>,
    imp. <latinform>thon</latinform> &apos;cause to go out / cause to come forth&apos;. Some reflexes
    have final <latinform>-ŋ</latinform> instead of <latinform>-n</latinform>. See STC p. 125.</par>
