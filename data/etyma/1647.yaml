- type: T
  text: <par>This etymon is attested in the NE Indian Areal Group and Himalayish, with a possible cognate
    in Loloish (Bisu). The initial shows variation between <latinform>l-</latinform> and <latinform>r-</latinform>.
    This root seems to be quite distinct from <xref ref="3472">#3472</xref>, below. The final <latinform>-t</latinform>
    in the Tangkhul forms is unexplained. See <plainlatinform>TBRS</plainlatinform> 151.</par>
