notes:
- type: T
  text: <par>The reflexes of this richly attested root range from velar stops to labial stops to <latinform>w-</latinform>,
    pointing to a complex allofamic reconstruction. The TB languages show much variation in the names
    of insects and other small creatures, which often run to four or more syllables. The large degree
    of variation to be found in such words can plausibly be ascribed to the tendency of successive generations
    of children to create new forms.</par><par>The nasal prefix in the PLB reconstruction accounts for
    the voicing of the Lahu initial. </par><par>Clearly related are <xref ref="5408">#5408</xref> and
    <xref ref="5681">#5681</xref>, also with voiced initials in Lahu. Polysyllabic Lahu forms like <latinform>na-gù-na-gá-pɛ̄</latinform>
    demonstrate that these two roots are separate.</par><par>Also possibly related is <xref ref="5682">#5682</xref>.</par>
- type: F
  text: '<par><hanform>紡</hanform> OC <latinform>*pʼi̯wɑng</latinform>, GSR #740r &apos;twist, spin&apos;;
