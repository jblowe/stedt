  text: <par>This root is well attested in the NE Indian Areal Group and Burmish, with an excellent cognate
    in Written Tibetan. The correspondence of WT <latinform>-ig</latinform> to WB <latinform>-ac</latinform>
    is perfectly regular. (Cf. HPTB pp. 343-348). The Maring form points to an allofam with final nasal.</par>
