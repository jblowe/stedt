notes:
- type: T
  text: <par>There are several Tujia forms with initial velar (e.g. <latinform>si¬≥lu¬Ļ<emph>ga¬Ļ</emph></latinform>
    &apos;pig&apos;s bone&apos;, <latinform>lu¬Ļ<emph>ga¬Ļ</emph></latinform> &apos;bone&apos;), which might
    belong to this root, if we assume preemption by the prefix. On the other hand, we are considering
    the Bai forms to descend from this etymon on the strength of the <latinform>-w-</latinform> medial.</par><par>Jingpho
    has developed a nasal prefix with this root.</par>
- type: F
  text: '<par><hanform>ŚĎā</hanform> / <hanform>Śźē</hanform> OC <latinform>*gliŐĮo</latinform>, GSR #76a-c
    &apos;spine; pitchpipe&apos;; Schuessler 2007:367 <latinform>*ra Ē</latinform>; B &amp; S 2011: <latinform>*ra Ē
    {[r]a Ē}</latinform>; Mand. <latinform>l«ö</latinform>.<br /><hanform>śĘ†</hanform> OC <latinform>*gliŐĮo</latinform>,
    GSR #76e-f &apos;beam supporting rafters of a roof&apos;; Schuessler 2007:367 <latinform>*ra Ē</latinform>;
    B &amp; S 2011: (<latinform>*ra Ē {[r]a Ē}</latinform>); Mand. <latinform>l«ö</latinform>.<br /><hanform>śóÖ</hanform>
    OC <latinform>*gliŐĮo</latinform>, GSR #77a &apos;arrange in a series; one after another; troops, multitude&apos;;
    Schuessler 2007:367 <latinform>*ra Ē</latinform>; B &amp; S 2011: <latinform>*ra Ē {[r]a Ē}</latinform>;
    Mand. <latinform>l«ö</latinform>.</par><par><latinform>Comment:</latinform> The etymon above glossed
    &apos;arrange in a series...&apos;, etc. is apparently the earliest to be associated with the graph
    <hanform>śóÖ</hanform> <latinform>l«ö</latinform> in Chinese. The same graph, <hanform>śóÖ</hanform>, was
    later borrowed to represent another, unrelated etymon glossed &apos;guest, stranger, ... lodging&apos;,
    which is also a comparandum for <xref ref="5531">#5531</xref>.</par><par>Note that the graph <hanform>ŤÜā</hanform>
    (GSR #77e), Mand. <latinform>l«ö</latinform>, is essentially the same etymon as <hanform>śóÖ</hanform>,
    with the same OC reconstruction.</par>'
