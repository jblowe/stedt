notes:
- type: T
  text: <par>This root is most abundantly attested in Loloish, with likely cognates in Galo, Bodo-Garo,
    and Chepang. The very-low tone in Lahu <latinform>mū</latinform> (Matisoff 1988, <emph>The Dictionary
    of Lahu</emph>, p. 1005), as well as the Lalo form <latinform>ʔmò</latinform>, point to a Proto-Loloish
    <reconstruction>*ʔ-</reconstruction> prefix, ultimately from prefixal <reconstruction>*s-</reconstruction>.</par>
- type: T
  text: <par>The constriction in Yi Mojiang is perhaps due to the <reconstruction>*ʔ-</reconstruction>
    prefix.</par>
