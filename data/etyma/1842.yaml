notes:
- type: T
  text: '<par>A few forms (Chepang, Burmish) show final <latinform>-m</latinform> instead of <latinform>-ŋ</latinform>.</par><par>For
    a possibly related root, where the <latinform>*r</latinform> is prefixal rather than part of an initial
    consonant cluster, see <xref ref="5727">#5727</xref>.</par><par>This root is set up as <latinform>*graŋ
    ⪤ *kraŋ</latinform> in HPTB:267.</par><par>There is apparently a doublet at the PKC level: PKC <latinform>*khrooŋ</latinform>
    &apos;strong&apos;, <latinform>*khraŋ-I, khran-II</latinform> &apos;grow / increase / rise&apos;.</par>'
- type: F
  text: '<par><hanform>彊</hanform> / <hanform>強</hanform> / <hanform>强</hanform> OC <latinform>*gʼi̯ɑng</latinform>,
    GSR #710e-g &apos;strong&apos;; Schuessler 2007:427 <latinform>*gaŋ</latinform>; B &amp; S 2011: <latinform>*ɡaŋ
    {[ɡ]aŋ}</latinform>; Mand. <latinform>qiáng</latinform>.<br /><hanform>強</hanform> / <hanform>强</hanform>
    OC <latinform>*gʼi̯ɑng</latinform>, GSR #710e-g &apos;make an effort&apos;; Schuessler 2007:427 <latinform>*gaŋʔ</latinform>;
    B &amp; S 2011: <latinform>*m-kaŋʔ</latinform>; Mand. <latinform>qiǎng</latinform>.</par><par><hanform>張</hanform>
    OC <latinform>*ti̯ɑng</latinform>, GSR #721h &apos;draw a bow; stretch, expand, extend&apos;; Schuessler
    2007:605-6 <latinform>*traŋ</latinform>; B &amp; S 2011: <latinform>*C.traŋ </latinform>; Mand. <latinform>zhāng</latinform>.<br
    /><hanform>帳</hanform> OC <latinform>*ti̯ɑng</latinform>, GSR #721g &apos;curtain&apos;; Schuessler
    2007:605-6 <latinform>*traŋh</latinform>; B &amp; S 2011: <latinform>*traŋ-s</latinform>; Mand. <latinform>zhāng</latinform>.<br
    /><hanform>長</hanform> OC <latinform>*d’i̯ɑng</latinform>, GSR #721a-e &apos;long, longstanding; excelling&apos;;
    Schuessler 2007:605-6 <latinform>*draŋ</latinform>; B &amp; S 2011: <latinform>*Cə-N-traŋ {Cə-[N]-traŋ}</latinform>;
