notes:
- type: T
  text: <par>Tamangic points to a possible connection between this etymon and the concept FLAT. Cf. Thakali
    (Tukche) <latinform>&apos;plja-lɔ</latinform> &apos;flatten dough (with roll)&apos;.</par><par>The
    allofam with medial <latinform>-y-</latinform> is reconstructed because of vowel fronting in several
    forms (Pattani, Tshona, Lepcha, Thakali). There are two possible Chinese comparanda (see below).</par>
- type: F
  text: '<par><hanform>膚</hanform> OC <latinform>*pli̯wo</latinform>, GSR #69g &apos;skin&apos;; WSC-SH:134;
    WHB-OC #1367; Schuessler 2007:243. Li 1971 <latinform>*pjag</latinform>; Baxter 1992: <latinform>*prja</latinform>
    &gt; Mand. <latinform>fū</latinform>.</par>'
- type: F
  text: '<par><hanform>皮</hanform> OC <reconstruction>*bʼiɑ</reconstruction>, GSR #25a-c &apos;skin&apos;;
    WHB-OC:1057; Li 1971: <reconstruction>*bjiar</reconstruction>; Baxter 1992: <reconstruction>*b(r)jaj</reconstruction>
    &gt; Mand. <latinform>pí</latinform>.</par><par>The form written <hanform>膚</hanform> likely reflects
    the Chinese root, with the form written <hanform>皮</hanform> derived from it by a prefix that voiced
    the labial initial (as well as by an unexplained change to the coda). The most likely prefix is <reconstruction>*m-</reconstruction>,
    which is found in a number of OC words for human body parts and is cognate to the PTB prefix <reconstruction>*m-</reconstruction>
    having a similar function.  In their latest system, Baxter and Sagart reconstruct this prefix in words
    for &apos;nose&apos;, &apos;belly&apos;, &apos;head&apos;, and &apos;right hand&apos;, as well as
    &apos;skin&apos;.  The OC pronunciation of <hanform>皮</hanform> can be reconstructed as <reconstruction>*m-pra-j</reconstruction>,
    with root <reconstruction>*pra</reconstruction>. (See Sagart &amp; Baxter 2010.)</par><par>Ignoring
    the medial <reconstruction>*-j-</reconstruction> (whose existence in OC is increasingly discounted,
    and which does not correspond regularly to anything in PTB), the correspondences between the variant
    PTB form <reconstruction>*pra</reconstruction> and the OC root are regular.</par><par><plainlatinform>ZJH</plainlatinform></par>'
