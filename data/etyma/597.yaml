notes:
- type: T
  text: <par>This root was reconstructed as PL <reconstruction>*ʔ-ban²</reconstruction> &apos;ring&apos;
    in Bradley 1979:235, and as PTB <reconstruction>*bran</reconstruction> in HPTB (p.69, n.101). In favor
    of this reconstruction is Pumi Dayang <latinform>ʐə̆ bʐéɴ</latinform> (HPTB:69); however, Lahu <latinform>-e</latinform>
    (as in <latinform>làʔ-pē</latinform> &apos;finger-ring&apos;) can descend from either <reconstruction>*-an</reconstruction>
    or <reconstruction>*-ay</reconstruction>, and on balance (see e.g. Tankghul, Mikir, and Jingpho) we
    now prefer the present reconstruction. </par>
