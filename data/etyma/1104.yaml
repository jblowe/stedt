notes:
- type: T
  text: <par>Proto-Kiranti reflects an allofam with a velar suffix. The Maru form <latinform>ŋuk³¹</latinform>,
    on the other hand, shows the regular Maru reflex <latinform>-uk</latinform> of PTB <latinform>*-əw</latinform>,
    as discovered by Burling (1966). (In a parallel manner, Maru <latinform>-it</latinform> is the regular
    reflex of PTB <latinform>*-əy</latinform>.)</par>
