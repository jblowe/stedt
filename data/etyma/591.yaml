notes:
- type: T
  text: <par>Like other roots reconstructed with <reconstruction>*pʷ-</reconstruction>, the reflexes of
    this etymon vary between labial stops and <latinform>w-</latinform>, <latinform>v-</latinform>, or
    zero initial.<footnote>See Matisoff 2000, &quot;An Extrusional Approach to <latinform>*p-/w-</latinform>
    Variation in Sino-Tibetan.&quot;</footnote> This root also shows the widespread Tibeto-Burman patterns
    of variation between medial <latinform>-i-</latinform> and <latinform>-u-</latinform>, and between
    final <latinform>-l</latinform> and <latinform>-n</latinform>.</par><par>A key doublet justifying
    this reconstruction are the Lushai (Mizo) forms <latinform>pil</latinform> and <latinform>vun</latinform>,
    both cited in Marrison 1967:233.</par><par>The Sunwar forms with initial <latinform>s-</latinform>
    and final <latinform>-l</latinform> (<latinform>&apos;ku-<emph>sul</emph></latinform> &apos;skin&apos;,
    <latinform><emph>&apos;sul</emph>-cā</latinform> &apos;feel (by touch)&apos;, <latinform>kru<emph>sul</emph></latinform>
    &apos;bark (of tree)&apos;, <latinform>ku<emph>sul</emph> &apos;u:-cā</latinform> &apos;skin&apos;)
    might also be related, if we assume an intermediate form like <reconstruction>**s-wul</reconstruction>.
    Cf. also French&apos;s (1983) Proto-Northern-Naga reconstructions <reconstruction>*wur</reconstruction>
    SKIN and <reconstruction>*swun</reconstruction> FLESH. </par>
