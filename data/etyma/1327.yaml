notes:
- type: T
  text: <par>This root is well distributed in several subgroups, with a good Chinese comparandum. It frequently
    appears as the second member of compounds after reflexes of <xref ref="695">#695 </xref>. Semantically,
    it is firmly in the area of UPPER ARM rather than HAND.</par><par>Jingpho <latinform>mə<emph>bùʔ</emph></latinform>
    &apos;wing&apos; (poetic couplet of <latinform>sìŋkō</latinform>) seems to point to an allofam with
    homorganic final stop, as is probably the case with the first syllable of Sangtam <latinform>pük yang</latinform>
    &apos;arm&apos;.</par><par>Reflexes of this root are divided between plausible prototypes with <reconstruction>*-aŋ</reconstruction>
    and those with a back vowel (<reconstruction>*-oŋ</reconstruction> or <reconstruction>*-uŋ</reconstruction>).
    Hence the reconstruction with <reconstruction>*-w-</reconstruction>. For similar outcomes, cf. <xref
    ref="711">#711</xref>.</par><par>This root is phonosemantically similar to <xref ref="745">#745</xref>,
    but should be kept distinct from it.</par>
- type: F
  text: '<par><hanform>膀</hanform> &apos;upper arms&apos;; GSR: not in #740; Li 1971: <latinform>(*bangx)</latinform>;
    Baxter 1992: <latinform>(*bangʔ)</latinform>; B &amp; S 2011: <latinform>(*[b]ˤaŋʔ)</latinform>; Schuessler
    2007:170 (see below <hanform>膊</hanform>); Mand. <latinform>bǎng</latinform>.</par><par>JAM: Yang
    1980 cites <hanform>肩膀</hanform> ‘shoulder’ Mand. <latinform>jiānbǎng</latinform> and <hanform>翅膀</hanform>
    &apos;wing&apos; Mand. <latinform>chìbǎng</latinform>, where the second element <hanform>膀</hanform>
    has the same phonetic as other members of GSR #740, with the basic meaning of SIDE. For instance:</par><par><hanform>房</hanform>
    OC <reconstruction>*b’iwɑng</reconstruction>, GSR #740y ‘side-room’; Mand. <latinform>fáng</latinform><br
    /><hanform>旁</hanform> OC <reconstruction>*b’wɑ̂ng</reconstruction>, GSR #740f’ ‘side, on all sides’;
    Mand. <latinform>páng</latinform><br /><hanform>傍</hanform> OC <reconstruction>*b’wɑ̂ng</reconstruction>,
    GSR #740m’ ‘at the side of; assist’; Mand. <latinform>bàng</latinform>.</par><par>ZJH: <hanform>膀</hanform>
    <latinform>bǎng</latinform> is not attested in early Chinese sources, which is the reason it is not
    found in GSR or the other sources for OC reconstruction (the reconstructions I have provided may therefore
    be anachronistic); it is either an old colloquial/dialectal term that was not recorded in texts, or
    a later development within Chinese. Schuessler (2007:170) raises the possibility that it derives from
    Chinese <hanform>膊</hanform> *pâk ‘shoulder blade’ (Mand. <latinform>bó</latinform>). But in terms
    of semantics and phonetics, <hanform>膀</hanform> <latinform>bǎng</latinform> is a good match for the
    TB root.</par>'
