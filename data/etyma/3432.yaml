notes:
- type: T
  text: <par>This root has so far been uncovered only in a few widely separated languages, which paradoxically
    seems to assure that it can be reconstructed for PTB. The basic meaning seems to be HOLE/ORIFICE,
    which is the gloss of the Limbu cognate syllable in isolation.</par>
- type: T
  text: <par>This root may be allofamically related to <xref ref="820">#820</xref>.</par>
- type: T
  text: <par>The Karbi form <latinform>kehot</latinform> &apos;glans penis&apos; is not related to this
    root; the morpheme <latinform>hot</latinform> is glossed as &apos;niche, groove&apos; in Walker 1925,
    p. 57. Cf. Lahu <latinform>nī-qhɛ̀ʔ</latinform> &apos;penis&apos;, where the second syllable means
    &apos;notch (as a stick); chip; break off a piece&apos;. The semantic association lies evidently in
    the notched appearance of the glans.</par>
