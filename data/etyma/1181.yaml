notes:
- type: T
  text: <par>This etymon is sometimes hard to distinguish from <xref ref="300">#300</xref>, above. It
    is possible that conflation with an Indo-Aryan root is involved. Jäschke (p. 234) says that WT <latinform>thul</latinform>
    is &quot;according to Cunningham a Cashmiri word&quot;. The TB cognates are indeed confined to Indospheric
    branches of TB (NE Indian Areal Group and Himalayish).</par>
- type: T
  text: '<par>Some Himalayish forms for HEEL have an element like <latinform>-din-</latinform> which look
    as if they could probably come from this etymon for EGG (see the note on Lushai (Mizo) <latinform>ke-ar-tui</latinform>):
    these include Kulung <latinform>&apos;dhin-di-ri</latinform>, and Thulung and Khaling <latinform>din-di-ri</latinform>.
    Yet the suspicious similarity among these forms suggest that they might be loans from Nepali.</par>'
- type: T
  text: <par>This is very likely the same etymon as <reconstruction>*r-tul ⪤ *r-til</reconstruction> DULL
    / BUTTOCK / HEEL / ROUNDED PART (HPTB p. 419), cf. WT <latinform>rtul-po</latinform> ‘blunt, dull’;
    Abor-Miri <latinform>ko-dun</latinform> ‘buttock’; Meithei <latinform>mə-thun</latinform> ‘buttock’;
    Wancho <latinform>chi-dun</latinform> ‘heel’ (<latinform>chi</latinform> ‘foot’); Khözha <latinform>šɯ́-dò</latinform>;
    Lisu <latinform>khi²¹du²¹</latinform> ‘buttock’ (<latinform>khi²¹</latinform> ‘excrement’); Phunoi
    <latinform>pi³³tun¹¹</latinform> ‘heel’. See Matisoff 1994 (&quot;How ‘dull’ can you get?&quot;),
    and the Chinese comparanda, below. The allofam with medial <latinform>-i-</latinform> is represented
    by Jingpho <latinform>šətīn</latinform> ‘buttock’, <latinform>ləthīn</latinform> ‘heel’, and also
    perhaps by WT <latinform><emph>rtiŋ</emph>-pa</latinform> &apos;heel&apos;.</par><par>Benedict apparently
    had a different theory. He implies a connection between Lushai (Mizo) <latinform>til</latinform> &apos;testicle&apos;
    and Thado <latinform>til</latinform> &apos;earthworm; testicle&apos; (cf. also PLB <reconstruction>*di</reconstruction>
    &apos;worm&apos; &gt; WB <latinform>ti</latinform>, Lisu <latinform>bi-<emph>di</emph></latinform>),
    which he reconstructs as PTB <reconstruction>*zril</reconstruction> &apos;worm&apos; (STC, n.121,
    p. 37). Several Chinese comparanda meaning WORM  are offered (n.457, p. 171). It must be said, however,
    that the semantic association between TESTICLE and WORM is a bit obscure.</par>
- type: F
  text: '<par>There are several likely Chinese comparanda (HPTB:422, 504), including:</par><par><hanform>臀</hanform>
    OC <latinform>*d’wən</latinform>, GSR #429b-c ‘buttocks’<br /><hanform>殿</hanform> OC <reconstruction>*tiən</reconstruction>,
    GSR #429d ‘rear of an army’<br /><hanform>沌</hanform> OC <reconstruction>*d&apos;wən</reconstruction>,
    GSR #427h ‘confused / stupid&apos;<br /><hanform>鈍</hanform> OC <reconstruction>*d&apos;wən</reconstruction>,
    GSR #427i ‘dull’<br /><hanform>頓</hanform> OC <reconstruction>*twən</reconstruction>, GSR #427j ‘worn
    / dull / spoiled’.<br />[JAM]</par>'
- type: F
  text: '<par>As noted above, if this PTB root is related to <reconstruction>*r-tul ⪤ *r-til</reconstruction>
    DULL / BUTTOCK / HEEL / ROUNDED PART, then it can be compared to the following Chinese word family
    (see Coblin 1986:67-68; Gong 1995 #154; HPTB:422, 504):</par><par><hanform>臀</hanform> OC <latinform>*d’wən</latinform>,
    GSR #429b-c ‘buttocks’; Li 1971: <latinform>*dən</latinform>; Baxter 1992: <latinform>*dun</latinform>;
    Mand. <latinform>tún</latinform>.<br /><hanform>殿</hanform> OC <latinform>*tiən</latinform>, GSR #429d
    ‘rear of army’; Li 1971: <latinform>*tiənh</latinform>; Baxter 1992: <latinform>*tɨns</latinform>;
    Mand. <latinform>diàn</latinform>.<br /><hanform>沌</hanform> OC <latinform>*d’wən</latinform>, GSR
    #427h ‘confused, stupid’;  Li 1971: <latinform>*dənx</latinform>; Baxter 1992: <latinform>*dunʔ</latinform>;
    Mand. <latinform>dùn</latinform>.<br /><hanform>鈍</hanform> OC <latinform>*d’wən</latinform>, GSR
    #427i ‘dull’; Li 1971: <latinform>*dənh</latinform>; Baxter 1992: <latinform>*duns</latinform>; Mand.
    <latinform>dùn</latinform>.<br /><hanform>頓</hanform> OC <latinform>*twən</latinform>, GSR #427j ‘worn,
    dull, spoiled’; Li 1971: <latinform>*tənh</latinform>; Baxter 1992: <latinform>*tuns</latinform>;
    Mand. <latinform>dùn</latinform>.</par><par>The correspondence between PTB <reconstruction>*-l</reconstruction>
    and OC <reconstruction>*-n</reconstruction> is regular (see Gong 1995 for numerous examples).  The
    initials and vowels also match well.  The voicing alternation and suffixation seen in the Chinese
    word family are typical, although in this case the morphological function is not clear.<br />[ZJH]</par>'
- type: F
  text: '<par>The following comparanda are offered for PTB <latinform>*zril</latinform> EARTHWORM in STC
    p. 171:</par><par><hanform>蟺</hanform> OC <latinform>*d̑i̯ɑn</latinform>, GSR# 148p; Mand. <latinform>shàn</latinform><br
    /><hanform>蚓</hanform> OC <latinform>*di̯ĕn</latinform>,  GSR# 371c; Mand. <latinform>yǐn</latinform><br
    /><hanform>螾</hanform> OC <latinform>*di̯ən</latinform>, GSR #450j; Mand. <latinform>yǐn</latinform></par><par>[JAM]</par>'
- type: F
  text: '<par><hanform>蟺</hanform> OC <latinform>*d̑i̯ɑn</latinform>, GSR #148p ‘earthworm’; Li 1971:
    <latinform>*djanx</latinform>; Baxter 1992: <latinform>*djanʔ</latinform>; Mand. <latinform>shàn</latinform>.<br
    /><hanform>蚓</hanform> OC <latinform>*di̯ĕn</latinform>, GSR #371c ‘earthworm’; Li 1971: <latinform>*rinx</latinform>;
    Baxter 1992: <latinform>*ljinʔ</latinform>; Mand. <latinform>yǐn</latinform>.<br /><hanform>螾</hanform>
    OC  <latinform>*di̯ən</latinform>, GSR #450j ‘earthworm’; Li 1971: <latinform>*rənx ?</latinform>;
    Baxter 1992: <latinform>*ljɨ/inʔ</latinform>; Mand. <latinform>yǐn</latinform>.</par><par>Benedict
    (STC p.37 note 121 and p. 171 note 457) argues that all three Chinese words are related and &apos;point...
    to an original initial such as <reconstruction>*zr-</reconstruction>&apos;.  These in turn are compared
    to TB <reconstruction>*zril</reconstruction> &apos;worm&apos;.<footnote>It is in footnote 121 that
    Benedict seems to relate TB <reconstruction>*zril</reconstruction> to Lushai (Mizo) <latinform>til</latinform>
    &apos;testicles&apos;, the TB etymon currently under discussion in this volume.</footnote>  Based
    on this and a handful of other comparisons, Benedict argues for the following developments from PST
    to Chinese: <reconstruction>*zr-</reconstruction> &gt; <reconstruction>*źr-</reconstruction> &gt;
    <reconstruction>*d̑i̯</reconstruction> <footnote><emph>d̑i̯</emph> is mistakenly written <emph>d&apos;i</emph>
    in STC; in Karlgren&apos;s reconstruction <emph>d</emph> with an inverted breve above is distinct
    from <emph>d</emph> followed by an apostrophe, but as far as I can tell Benedict transcribes them
    identically, perhaps due to typographic limitations.</footnote> varying with <reconstruction>*zr-</reconstruction>
    &gt; <reconstruction>*zy-</reconstruction> &gt; <reconstruction>*y-</reconstruction> &gt; <reconstruction>*di̯</reconstruction>.</par><par>Based
    on our current understanding of Old Chinese, Benedict&apos;s hypothesis is no longer sustainable,
    at least not in full.  GSR #148 is a dental series while GSR #371 and #450 are lateral series.  This
    and the vowel difference indicate that <hanform>蟺</hanform> <latinform>shàn</latinform> is not an
    allofam of <hanform>蚓</hanform> <latinform>yǐn</latinform> and <hanform>螾</hanform> <latinform>yǐn</latinform>.<footnote>Peiros
    and Starostin 1996 v2:156 set 570 relate Chinese <hanform>蟺</hanform> <latinform>shàn</latinform>
    to Lushai (Mizo) <latinform>tāl</latinform> &apos;to struggle, wriggle, writhe&apos;.  See also Schuessler
    2007:453.</footnote> As for the latter two, the reconstruction in both Li&apos;s and Baxter&apos;s
    systems is difficult.  The Middle Chinese forms might be descended from either OC <reconstruction>*i</reconstruction>
    or OC <reconstruction>*ə</reconstruction> (Li)/<reconstruction>*ɨ</reconstruction> (Baxter).  Li and
    Baxter agree that GSR #371 has main vowel <reconstruction>*i</reconstruction>, but the reconstruction
    of GSR #450 is ambiguous.</par><par>Schuessler 2007:574 explicitly relates <hanform>蚓</hanform> <latinform>yǐn</latinform>
    and <hanform>螾</hanform> <latinform>yǐn</latinform>, indicating that they are variant graphs used
    to write the same morpheme.  He reconstructs OC <reconstruction>*lə/inʔ</reconstruction> or <reconstruction>*jə/inʔ</reconstruction>.  While
    various attested binomial forms for &apos;earthworm&apos; suggest that <reconstruction>*i</reconstruction>
    is the OC vowel, Min dialect forms point to <reconstruction>*ə</reconstruction>.</par><par>As for
    the initial, it is now generally agreed that it should be <reconstruction>*l</reconstruction> or <reconstruction>*j</reconstruction>,
    not <reconstruction>*r</reconstruction>.</par><par>Looking again at Benedict&apos;s comparison with
    PTB <reconstruction>*zril</reconstruction>, we note that the vowel and coda correspondences are regular.  A
    comparison of PTB <reconstruction>*zr-</reconstruction> with OC <reconstruction>*l-</reconstruction>
    or <reconstruction>*j-</reconstruction> looks doubtful on phonetic grounds, but cannot be dismissed
    out of hand.  Since <reconstruction>*zr-</reconstruction> is so rare in TB, it is difficult to establish
    regularity of correspondence.</par><par>Whatever the fate of that comparison, Benedict&apos;s claim
    that these Chinese words are ultimately connected to <xref ref="1181">#1181</xref> now seems quite
    unlikely to be true.<br />[ZJH]</par>'
