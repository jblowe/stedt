- type: T
  text: '<par>The takin (/<latinform>ˈtɑːkɪn</latinform>/; <emph>Budorcas taxicolor</emph>; Tibetan: ར་རྒྱ་,
    Wylie: ra rgya), also called cattle chamois or gnu goat, is a goat-antelope found in the eastern Himalayas.
    Mitochondrial research shows the takin is related to sheep; its similarity to the muskox is an example
    of convergent evolution. The takin is the national animal of Bhutan. <footnote> cited from Wikipedia:
    http://en.wikipedia.org/wiki/Takin</footnote></par>'
