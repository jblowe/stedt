notes:
- type: T
  text: <par>The basic meaning of this etymon seems to be &apos;hang together; cohere; be connected; come
    together; meet, join&apos; (see the range of meanings in WT, Jäschke p. 402). It is attested chiefly
    in Himalayish, with apparently excellent Qiangic cognates. The nasal prefix is reflected by the WT
    a-chung (<latinform>ḥ-</latinform>), and directly by the Northern rGyalrong form. It is of course
    quite possible that the rGyalrong and Ergong forms are borrowings from Tibetan.</par>
