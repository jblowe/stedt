notes:
- type: F
  text: '<par><hanform>獵</hanform> OC <latinform>*li̯ɑp</latinform>, GSR #637e; Mand. <latinform>liè</latinform>.</par><par>Citations
    of <hanform>獵</hanform> &apos;tortoise; turtle&apos; are seen in <hanform>爾</hanform><hanform>雅</hanform>
    Er Ya and <hanform>周禮</hanform> Zhou Li. While it doesn&apos;t affect the validity of the comparandum,
    we should point out that the character <hanform>獵</hanform> most often represents a different etymon
    in OC, i.e. &apos;to hunt (prey)&apos; (GSR #637e); this is the only commonly recognized sense of
    <hanform>獵</hanform> <latinform>liè</latinform> in modern standard Chinese. Karlgren (GSR #637e) notes
    that <hanform>獵</hanform> <latinform>liè</latinform>, when used to mean &apos;turtle&apos;, is a phonetic
    loan for another character, now obsolete, perhaps attested as the Zhou dynasty pictograph shown in
    GSR #637b. [SPB]</par>'
