notes:
- type: I
  text: <par>is there a PLB *nak[L] root? (cf. HPTB p.39)</par>
- type: T
  text: '<par>The <latinform>*s-</latinform> prefix is reconstructed for this etymon on the basis of forms
    like Written Tibetan <latinform>snag</latinform> and Written Burmese <latinform>hmaŋ</latinform> &apos;ink&apos;,
    as well as on the basis of the high stopped tone in Loloish. The Mpi form <latinform>naŋʔ³</latinform>
    indirectly reflects this prefix by a sort of &quot;rhinoglottal transfer&quot; that occurs when a
    complex nasal (either with the <latinform>*s-</latinform> or the <latinform>*ʔ-</latinform> prefix)
    is the onset of a syllable with the <latinform>*-ak</latinform> rhyme: the original final stop was
    replaced by a vowel quality including both a nasal and a laryngeal component. There are no fewer than
    nine examples, see JAM (1978:22-23).</par><par>A similar root, PTB <latinform>*s-maŋ</latinform> ⪤
    <latinform>*s-mak</latinform> BLACK / DARK / INK, is reconstructed with an initial labial nasal. This
    may well be the original form of the etymon (there are excellent Chinese comparanda with a labial
    nasal), with the dental nasal a plausible outcome from the combination of the <latinform>*s-</latinform>
    prefix and a labial nasal.</par>'
- type: F
  text: <par><latinform>Comment:</latinform> Cf. comparanda and discussion under <xref ref="6130">#6130</xref>.</par>
