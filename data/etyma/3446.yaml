  text: <par>This root has only been discovered in two NE Indian Areal Group languages of Manipur, Meithei
    and Puiron, but the semantic and phonological correspondence is perfect. However, since Meithei (also
    known as Manipuri) is the dominant TB language of Manipur, the Puiron form may well be borrowed from
    it.</par>
