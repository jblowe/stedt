notes:
- type: T
  text: <par>The initial dentals in these Baic forms are similar to the first element in Tamangic and
    Karenic, suggesting a prefixal dental, something like <strong>*d-wak</strong>.</par>
- type: T
  text: <par>These Karenic forms reflect a secondary dental prefix (cf. the anomalous Karenic forms for
    <xref ref="1764">#1764</xref>).</par>
- type: I
  text: <par>It is difficult to say whether these Bodic forms in 2.1.2 are truly cognate to Tibetan <latinform>phag</latinform>,
    or rather loans from it.</par>
- type: F
  text: '<par><hanform>豝</hanform> OC <latinform>*pɑ̊</latinform>, GSR #39d &apos;sow, pig&apos;; Coblin
    86:117 ST <latinform>*pr̵wag</latinform> &gt; OC <latinform>*prag</latinform>; B &amp; S 2011: <latinform>*pˁra</latinform>;
    Mand. <latinform>bā</latinform>.</par><par><latinform>Comment:</latinform> Cf. STC, p. 189, note 488.</par>'
- type: T
  text: <par>The second element in the Karenic word for WILD BOAR is from <xref ref="2453">#2453</xref>.</par>
- type: T
  text: <par>This etymon is a prime example of the alternation between labial stop and semi-vowel, motivating
    the reconstruction of an &quot;extrusional&quot; proto-cluster <latinform>pʷ</latinform>. Cf. Matisoff
    2000, &quot;An extrusional approach to *p-/w- variation in Sino-Tibetan.&quot; Language and Linguistics
    (Taipei) 1.2:135-186.</par><par>Several Tibetan dialects (e.g. Alike, Amdo Zeku, Xiahe) have developed
    initial <latinform>h-</latinform> in this word; some Naga languages have gone further, and have zero-initial.  The
    development of <latinform>*p-</latinform> to <latinform>h-</latinform> is also characteristic of Japanese;
    Irish <latinform>aithir</latinform> from PIE <latinform>pətér</latinform> has gone the whole way
    from <latinform>p-</latinform> to zero.</par>
