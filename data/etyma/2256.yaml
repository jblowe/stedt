- type: T
  text: <par>All the forms cited here were put into the same etymon for the first time in HPTB:333-334.</par><par>The
    alternation between homorganic nasal and stop in this root is well-attested. Note the complex word
    family in WT. There is a good Chinese comparandum.</par><par>The Qiangic (including Tangut) forms
    show the expected &quot;brightening&quot; of the vowel to <latinform>-i</latinform>.</par>
