notes:
- type: T
  text: <par>STC p. 94 sets up PTB <latinform>*ʔit</latinform> on the basis of only two forms, Kanauri
    <latinform>id</latinform> and WB <latinform>ac</latinform>, identifying it (p. 162) as cognate to
    OC <latinform>*ʔi̯ĕt</latinform>.</par><par>To these we now add Chepang <latinform>yat</latinform>,
    motivating the allofamic reconstruction with <latinform>-i-</latinform> ⪤ <latinform>-ya-</latinform>
    variation, a pattern attested in several other roots (cf. <xref ref="33">#33</xref>, <xref ref="2610">#2610</xref>,
    etc.).</par><par>The Chinese form has been borrowed into Tai in compound numerals (e.g., Siamese <latinform>sìp-ʔèt</latinform>
    &apos;eleven, <latinform>rɔ́ɔj-ʔèt</latinform> &apos;one hundred and one&apos;).</par><par>Several
    TB languages of Nepal have disyllabic forms for ONE where the first syllable has a superficial resemblance
    to this etymon, but these all seem to be borrowings from Nepali <emph>ek</emph>. See Matisoff 1995:126-7.</par>
- type: F
  text: '<par><hanform>一</hanform> OC <latinform>*ʔi̯ĕt</latinform>, GSR #394a-d &apos;one&apos;; Coblin
    86:114 ST <latinform>*ʔjit</latinform> &gt; OC <latinform>*ʔjit</latinform>; Schuessler 2007:563 <latinform>*ʔit</latinform>;
    B &amp; S 2011: <latinform>*ʔit {ʔi[t]}</latinform>; Mand. <latinform>yī</latinform>.</par>'
