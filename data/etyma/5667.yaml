notes:
- type: T
  text: <par>WT <latinform>rgya</latinform>, glossed in Jäschke (p. 104) as &quot;seal, stamp, mark, sign,
    token&quot; is perhaps the origin of this ethnonym, which has somehow come to refer both to China
    and India, and by extension to European colonials in India. Jäschke observes (p. 106) that some scholars
    of his day derived it from <latinform>feringhi</latinform>, a general term for Europeans used since
    the Crusades, deriving ultimately from &apos;Frank, France, French.&apos;</par><par>The Qiangic/rGyalrongic
    forms all seem to be loans from Tibetan.</par>
