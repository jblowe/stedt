notes:
- type: T
  text: <par>This etymon is of very restricted distribution, occurring only in the Jingpho-Asakian group.
    It appears unrelated to the equally restricted etymon <xref ref="3492">#3492 </xref>. A Lepcha form
    <latinform>tălam-pót</latinform> &apos;testicles&apos; is not to be brought in here, since the last
    element (<latinform>pót</latinform>, <latinform>a-pót</latinform>) means &apos;fruit; ball&apos;,
    and recurs in other bodypart compounds like <latinform>nyen-pót</latinform> &apos;woman&apos;s breast;
    cow&apos;s udder&apos; and <latinform>anyor-pót</latinform> &apos;dewlap&apos;.</par>
