  text: '<par>This root shows two kinds of variation: alternation between medial <latinform>*-u-</latinform>
    and <latinform>*-i-</latinform>, and between nasal and stop labial finals.</par><par>Kuki-Chin has
    a doublet at the PKC level: <latinform>*tom ⪤ *tum</latinform> WRAP / ENVELOP and PKC <latinform>*tuam</latinform>
    BANDAGE / BIND / COVER / WRAP.</par>'
