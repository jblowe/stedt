notes:
- type: T
  text: <par>The semantic center of gravity of this root seems to be BODY HAIR, with an extension into
    FEATHER, and thence to WING.</par>
- type: F
  text: '<par><hanform>髮</hanform> OC <reconstruction>*pi̯wɑ̆t</reconstruction> &apos;head hair &apos;GSR
    #276i; Li 1971: <reconstruction>*pjat</reconstruction>; Baxter 1992 #997: <reconstruction>*pjot</reconstruction>;
    B &amp; S 2011: --; Schuessler 2007:228-9; Mand. <latinform>fǎ, fà</latinform>.</par><par><hanform>胈</hanform>
    OC <latinform>*pwɑ̂t</latinform> &apos;small hairs on body&apos; GSR #276f; Li 1971: <latinform>(*bat)</latinform>;
    Baxter 1992: <latinform>(*bat)</latinform>; B &amp; S 2011: --; Schuessler 2007:228-9; Mand. <latinform>bá</latinform>.</par><par>The
    Chinese and Yakha forms suggest a possible allofam <reconstruction>*pwat</reconstruction>.</par><par>ZJH:
    The OC vowel might be either <reconstruction>*a</reconstruction> or <reconstruction>*o</reconstruction>;
    with a labial initial and dental coda, the developments to Middle Chinese are identical, making it
    difficult to determine the OC vowel with certainty. However, either reconstruction is problematic
    for a comparison with PTB <reconstruction>*u</reconstruction>.  OC <reconstruction>*o</reconstruction>
    does sometimes correspond to Tibetan <latinform>u</latinform>, but only in open syllables (where we
    find Burmese <latinform>uiw</latinform>, as in the well-known words for ‘steal’: <hanform>寇</hanform>
    OC <reconstruction>*kʰˤo-s</reconstruction>; WT <latinform>rku</latinform>; WB <latinform>khuiw</latinform>;
    Mand. <latinform>kòu</latinform>), and before velars (where we find Burmese <latinform>o</latinform>,
    as in ‘torch, light, flame’: <hanform>燭</hanform> OC <reconstruction>*tok</reconstruction>; WT <latinform>dugs</latinform>;
    WB <latinform>tok</latinform>; Mand. <latinform>zhú</latinform>). There is no evidence for anything
    other than a coda <reconstruction>*-t</reconstruction> in Chinese, and no evidence for any kind of
    stop coda in the TB reflexes; the makes both the vowel and the coda problematic for cognacy. An internal
    Chinese derivation from <hanform>發</hanform> ‘come out; emit’ (Mand. <latinform>fā</latinform>) is
    also possible for these Chinese words (Schuessler 2007:228-9).</par><par>A comparison of the Chinese
    to WT <latinform>phud</latinform> ‘hair-knot’ is tempting given the dental coda, but OC <reconstruction>*o</reconstruction>
    does not correspond to Tibetan <latinform>u</latinform> before dentals.</par>'
