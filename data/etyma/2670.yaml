notes:
- type: F
  text: '<par><hanform>悉</hanform> OC <latinform>*si̯ĕt</latinform> GSR #1257e &apos;all, completely,
    exhaust&apos;; Coblin 86:101 ST <latinform>*syis</latinform> &gt; OC <latinform>*sjit</latinform>
    &apos;know&apos;; Schuessler 2007:523-4 <latinform>*sit</latinform> &apos;all, everything, exhaust;
    to know, comprehend&apos;; B &amp; S 2011: <latinform>*sit</latinform> &apos;completely&apos;; Mand.
    <latinform>xī</latinform>.</par><par>Note that Chinese <hanform>悉</hanform> <latinform>*xī</latinform>
    can mean not only &quot;all, completely&quot; but also &quot;investigate thoroughly, know, comprehend&quot;;
    these latter connotations are not shown in the gloss for GSR #1257e or in the entry for <hanform>悉</hanform>
    in B &amp; S 2011. For further discussion of the semantics of <hanform>悉</hanform>, see HPTB:465.  [SPB]</par>'
