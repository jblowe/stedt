notes:
- type: T
  text: '<par>This richly attested root must be considered distinct from <xref ref="530">#530</xref>,
    although certain forms (especially those meaning &apos;muscle&apos;) seem to show overlap between
    the two roots.</par><par>The <latinform>-n</latinform> suffix is directly attested in Jingpho, Geman/Kaman,
    and Chinese.</par><par>This morpheme appears as a prefix in numerous animal names and words for parts
    of the body. See HPTB:102 and STC:106-108.</par><par>We are positing an allofamic relationship between
    the forms with medial <latinform>*-ya-</latinform> and <latinform>*-i-</latinform>. See HPTB: 278,
    306, 449.</par>'
