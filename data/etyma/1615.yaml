notes:
- type: T
  text: <par>This root seems solidly established for Himalayish, where it means mostly NEST, but sometimes
    CRADLE, CAGE, or WOMB. However, many of these forms may be loans from Tibetan. The etymon also clearly
    appears in Lolo-Burmese, where it means WOMB/PLACENTA, and in at least one Qiangic language (Queyu),
    where it means NEST.</par>
