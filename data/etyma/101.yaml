notes:
- type: T
  text: <par>This etymon is particularly well-attested in Lolo-Burmese, where there is strong evidence
    for the final <reconstruction>*-p</reconstruction>.</par><par>Other languages seem to point to an
    open-syllable variant.</par><par>The Qiang (Mawo) binome <latinform>ɕi pi</latinform> might possibly
    be a dimidiation of the monosyllable with final <latinform>-p</latinform>. The term &apos;dimidiation&apos;
    is due to Peter Boodberg, who used it to describe the practice of using two Chinese characters to
    transcribe a single syllable.</par>
