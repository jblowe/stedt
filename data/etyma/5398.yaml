- type: T
  text: <par>A number of reflexes point to initial <latinform>*r-</latinform>, while many others reflect
    an initial velar; we are treating the velar element as prefixal, so that the reflexes with initial
    velar are deemed to have undergone prefix pre-emption. Written Burmese has an anomalous zero or glottal
    stop initial, a variational phenomenon which occurs in a considerable number of roots (see HPTB:57
    and JAM 1997).</par><par>The Chinese comparandum has a final labial nasal.</par>
