- type: T
  text: <par>This is a loan from Indo-Aryan, ult. from Sanskrit <emph>gandha-</emph> &apos;odor, odoriferous
    substance&apos;. As an interesting sidelight, this root is attested in Romani <emph>khan(d)</emph>,
    where it means &apos;stink, stench, smell&apos; (p.c. Terrence S. Kaufman).</par><par>The Mikir forms
    descend immediately from Assamese <emph>gandhaka</emph>. Cf. Turner 1966:214-5.</par>
