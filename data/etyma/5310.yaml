  text: '<par><hanform>甫</hanform> OC <latinform>*pi̯wo</latinform>, GSR #102n-q &apos;begin; just now&apos;;
    Schuessler 2007:231 <latinform>*paʔ</latinform>; B &amp; S 2011: <latinform>*paʔ {p(r)aʔ}</latinform>;
    Mand. <latinform>fǔ</latinform>.<br /><hanform>方</hanform> OC <latinform>*pi̯wɑng</latinform>, GSR
    #740a-f &apos;begin; just now&apos;; Schuessler 2007:231 <latinform>*paŋ</latinform>; B &amp; S 2011:
    <latinform>*paŋ</latinform>; Mand. <latinform>fāng</latinform>.</par><par><latinform>Comment:</latinform>
    This root is currently reconstructed for PKC only. However, examination of the OC forms cited above,
    along with Phom <latinform>baŋ⁵⁵</latinform>, Jingpho <latinform>phaŋ³³</latinform>, and Bahing <latinform>preŋ</latinform>,
    all meaning &apos;begin, start&apos;, suggests an allofam or root variant of <latinform>*pran</latinform>
    reconstructable for ST ending in <latinform>*-aŋ/ʔ</latinform>, and for PTB in <latinform>*aŋ</latinform>.</par>'
