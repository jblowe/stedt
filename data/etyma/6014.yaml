notes:
- type: T
  text: <par>This root bears a suspicious relationship to <xref ref="2264">#2264</xref>, the semantic
    association evidently residing in the supernatural beauty of the rainbow. In Lahu, however, the reflex
    of SOUL is <latinform>ha</latinform>, while the reflex of the present root is <latinform>lâ</latinform>,
    perhaps pointing to the prefixed allofam for <latinform>ha</latinform> and the unprefixed one for
    the <latinform>lâ</latinform>.</par>
