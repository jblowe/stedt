notes:
- type: T
  text: <par>The Tamangic group has forms with initial <latinform>ŋ-</latinform>, while other languages
    reflect a simple <latinform>*w-</latinform>, leading to the hypothesis that <latinform>ŋ</latinform>
    has there been treated as a prefix and dropped. In any case, <latinform>ŋ</latinform> and <latinform>w</latinform>
    are extremely close phonetically, which might have encouraged the loss of the first element in a <latinform>ŋw</latinform>
    sequence.</par>
