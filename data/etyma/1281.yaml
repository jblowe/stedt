notes:
- type: T
  text: <par>This root is extremely well established, with an impressive cognates even in Baic and Karenic.
    Several forms (Lyuzu, Ersu, and Southern Tujia) have affricated initials, which bear some resemblance
    to Mandarin Chinese <emph>zhǎ</emph> <hanform>拃</hanform>, although the latter shows no sign of a
    labial medial.</par>
